<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARD REALM — カード作成</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #f0d080; --gold-dim: #7a6430;
    --deep: #0a0a14; --panel: #0f1020; --panel2: #141428;
    --text: #e8e0d0; --text-dim: #8a8070;
    --border: rgba(201,168,76,0.25);
    --color-red: #c0392b; --color-blue: #2471a3; --color-yellow: #d4ac0d; --color-green: #1e8449;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--deep); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; padding: 2rem; }
  .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr; gap: 2rem; }
  .card-preview { width: 260px; height: 380px; border: 2px solid var(--gold); border-radius: 16px; background: #1a1a2e; position: relative; margin: 0 auto; padding: 1rem; text-align: center; }
  .form-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; }
  input, select { width: 100%; padding: 0.5rem; margin-bottom: 1rem; background: var(--panel2); border: 1px solid var(--border); color: #fff; }
  .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; background: var(--gold); color: #000; width: 100%; margin-top: 1rem; }
</style>
</head>
<body>
  <h1>CARD CREATOR</h1>
  <div class="container">
    <div class="preview-section">
      <div class="card-preview" id="preview">
        <h3 id="prevName">NEW CARD</h3>
        <div style="font-size:4rem; margin: 2rem 0">⚔️</div>
        <div>ATK: <span id="prevAtk">1</span> / DEF: <span id="prevDef">1</span></div>
      </div>
      <button class="btn" onclick="save()">保存する</button>
      <a href="index.html" style="color:var(--gold);display:block;margin-top:1rem;text-align:center">ホームに戻る</a>
    </div>
    <div class="form-panel">
      <label>カード名</label><input type="text" id="name" oninput="upd()">
      <label>ATK</label><input type="number" id="atk" value="1" oninput="upd()">
      <label>DEF</label><input type="number" id="def" value="1" oninput="upd()">
      <label>カラー</label>
      <select id="color" oninput="upd()">
        <option value="#c0392b">火 (Red)</option>
        <option value="#2471a3">水 (Blue)</option>
        <option value="#d4ac0d">光 (Yellow)</option>
        <option value="#1e8449">森 (Green)</option>
      </select>
    </div>
  </div>
  <script>
    function upd() {
      document.getElementById('prevName').textContent = document.getElementById('name').value || 'NEW CARD';
      document.getElementById('prevAtk').textContent = document.getElementById('atk').value;
      document.getElementById('prevDef').textContent = document.getElementById('def').value;
      document.getElementById('preview').style.borderColor = document.getElementById('color').value;
    }
    function save() {
      const card = { name: document.getElementById('name').value, atk: document.getElementById('atk').value, def: document.getElementById('def').value, color: document.getElementById('color').value };
      const deck = JSON.parse(localStorage.getItem('cardrealmDeck') || '[]');
      deck.push(card);
      localStorage.setItem('cardrealmDeck', JSON.stringify(deck));
      alert('保存しました');
    }
  </script>
</body>
</html>
