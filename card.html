<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARD REALM — カード作成</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a6430;
    --deep: #0a0a14;
    --panel: #0f1020;
    --panel2: #141428;
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --border: rgba(201,168,76,0.25);

    --color-red: #c0392b;
    --color-blue: #2471a3;
    --color-yellow: #d4ac0d;
    --color-green: #1e8449;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  .bg-stars { position: fixed; inset: 0; z-index: 0; }
  .star {
    position: absolute; width: 2px; height: 2px;
    background: white; border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; } 50% { opacity: 0.8; }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }

  .page-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .back-btn {
    display: flex; align-items: center; gap: 0.5rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--gold); }

  .page-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Layout */
  .creator-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 2rem;
    align-items: start;
  }

  /* Card Preview */
  .preview-section {
    position: sticky;
    top: 2rem;
  }

  .preview-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 1rem;
    text-align: center;
  }

  .card-preview {
    width: 260px;
    height: 380px;
    margin: 0 auto 1.5rem;
    border-radius: 16px;
    border: 2px solid var(--card-border, var(--gold-dim));
    background: var(--card-bg, #1a1a2e);
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px var(--card-glow, rgba(201,168,76,0.1));
    transition: all 0.3s;
    cursor: default;
    transform-style: preserve-3d;
  }

  .card-preview:hover {
    transform: rotateY(-5deg) rotateX(3deg) scale(1.03);
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 40px var(--card-glow, rgba(201,168,76,0.2));
  }

  .card-header {
    padding: 0.75rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--card-border, rgba(201,168,76,0.3));
    background: rgba(0,0,0,0.3);
  }

  .card-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.7rem;
    color: var(--card-accent, var(--gold-light));
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    max-width: 130px;
  }

  .card-cost-badge {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--card-accent, var(--gold));
    color: var(--deep);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    flex-shrink: 0;
    box-shadow: 0 0 10px var(--card-glow);
  }

  .card-art-area {
    height: 160px;
    background: var(--card-art-bg, rgba(0,0,0,0.4));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    position: relative;
    overflow: hidden;
  }

  .card-art-area::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, var(--card-bg, #1a1a2e) 100%);
  }

  .card-art-img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .card-stats {
    display: flex;
    justify-content: space-around;
    padding: 0.75rem;
  }

  .stat-box {
    text-align: center;
  }

  .stat-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--card-accent, var(--gold-dim));
    text-transform: uppercase;
    display: block;
  }

  .stat-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--card-accent, var(--gold-light));
  }

  .stat-divider {
    width: 1px;
    background: var(--card-border, rgba(201,168,76,0.2));
    margin: 0.2rem 0;
  }

  .card-flavor {
    padding: 0.5rem 1rem;
    font-size: 0.65rem;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.5;
    border-top: 1px solid var(--card-border, rgba(201,168,76,0.2));
    min-height: 60px;
    max-height: 75px;
    overflow: hidden;
  }

  .card-effect-badge {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.8);
    padding: 0.4rem 0.75rem;
    font-size: 0.6rem;
    color: var(--card-accent, var(--gold));
    text-align: center;
    letter-spacing: 0.05em;
  }

  .card-color-stripe {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 4px;
    background: var(--card-accent, var(--gold));
    opacity: 0.8;
  }

  /* Form Panel */
  .form-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
  }

  .form-section {
    margin-bottom: 2rem;
  }

  .form-section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .form-row { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  input[type="text"], input[type="number"], textarea, select {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
    outline: none;
  }

  input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus {
    border-color: var(--gold-dim);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }

  select option { background: var(--panel2); }

  /* Color Selector */
  .color-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem;
  }

  .color-btn {
    padding: 0.75rem;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-align: center;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .color-btn .color-icon { font-size: 1.3rem; }

  .color-btn.red { background: rgba(192,57,43,0.2); color: #e74c3c; border-color: rgba(192,57,43,0.3); }
  .color-btn.blue { background: rgba(36,113,163,0.2); color: #3498db; border-color: rgba(36,113,163,0.3); }
  .color-btn.yellow { background: rgba(212,172,13,0.2); color: #f1c40f; border-color: rgba(212,172,13,0.3); }
  .color-btn.green { background: rgba(30,132,73,0.2); color: #2ecc71; border-color: rgba(30,132,73,0.3); }

  .color-btn.active.red { border-color: #e74c3c; box-shadow: 0 0 15px rgba(231,76,60,0.4); }
  .color-btn.active.blue { border-color: #3498db; box-shadow: 0 0 15px rgba(52,152,219,0.4); }
  .color-btn.active.yellow { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241,196,15,0.4); }
  .color-btn.active.green { border-color: #2ecc71; box-shadow: 0 0 15px rgba(46,204,113,0.4); }

  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
  }

  /* Illustration Picker */
  .illust-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .illust-btn {
    aspect-ratio: 1;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    padding: 0;
  }

  .illust-btn:hover { border-color: var(--gold-dim); transform: scale(1.1); }
  .illust-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.1); }

  /* Effect Builder */
  .effect-builder {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
  }

  .effect-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .effect-preview-text {
    background: rgba(201,168,76,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    font-size: 0.8rem;
    color: var(--gold);
    font-style: italic;
    min-height: 2.5rem;
    line-height: 1.5;
  }

  /* Deck / Saved Cards */
  .deck-section {
    margin-top: 2rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .deck-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  .deck-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .deck-count {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .deck-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .mini-card {
    width: 80px;
    height: 110px;
    border-radius: 8px;
    border: 1px solid;
    background: var(--panel2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 0.4rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    font-size: 0.55rem;
  }

  .mini-card:hover { transform: translateY(-4px); }

  .mini-card-icon { font-size: 1.6rem; }
  .mini-card-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.55rem;
    text-align: center;
    line-height: 1.2;
    color: var(--text-dim);
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mini-card-stats {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.6rem;
    color: var(--text-dim);
    display: flex;
    gap: 0.3rem;
  }

  .mini-card-del {
    position: absolute;
    top: 2px; right: 2px;
    width: 16px; height: 16px;
    background: rgba(192,57,43,0.8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.5rem;
    color: white;
    opacity: 0;
    transition: opacity 0.2s;
    cursor: pointer;
    border: none;
  }
  .mini-card:hover .mini-card-del { opacity: 1; }

  .empty-deck {
    width: 100%;
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-style: italic;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border: none; border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: var(--deep);
    box-shadow: 0 4px 15px rgba(201,168,76,0.3);
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(201,168,76,0.5); }
  .btn-outline {
    background: transparent; color: var(--gold);
    border: 1px solid var(--gold-dim);
  }
  .btn-outline:hover { background: rgba(201,168,76,0.1); }

  .form-actions {
    display: flex; gap: 1rem; flex-wrap: wrap;
    margin-top: 1.5rem;
  }

  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--panel); border: 1px solid var(--gold);
    border-radius: 8px; padding: 1rem 2rem;
    font-family: 'Rajdhani', sans-serif; font-size: 0.95rem;
    letter-spacing: 0.1em; color: var(--gold);
    z-index: 1000; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 900px) {
    .creator-layout { grid-template-columns: 1fr; }
    .preview-section { position: static; }
  }
</style>
</head>
<body>

<div class="bg-stars" id="bgStars"></div>

<div class="container">
  <div class="page-header">
    <a href="index.html" class="back-btn">← ホーム</a>
    <h1 class="page-title">カード作成</h1>
  </div>

  <div class="creator-layout">

    <!-- ===== PREVIEW ===== -->
    <div class="preview-section">
      <div class="preview-title">✦ プレビュー ✦</div>
      <div class="card-preview" id="cardPreview">
        <div class="card-color-stripe"></div>
        <div class="card-header">
          <div class="card-name" id="previewName">カード名</div>
          <div class="card-cost-badge" id="previewCost">1</div>
        </div>
        <div class="card-art-area" id="previewArt">🗡️</div>
        <div class="card-stats">
          <div class="stat-box">
            <span class="stat-label">ATK</span>
            <span class="stat-value" id="previewAtk">0</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-box">
            <span class="stat-label">DEF</span>
            <span class="stat-value" id="previewDef">0</span>
          </div>
        </div>
        <div class="card-flavor" id="previewFlavor">フレーバーテキストがここに表示されます</div>
        <div class="card-effect-badge" id="previewEffect">スキルなし</div>
      </div>

      <div style="display:flex;justify-content:center;gap:0.75rem;flex-wrap:wrap;">
        <button class="btn btn-gold" onclick="saveCard()">＋ カードを保存</button>
        <button class="btn btn-outline" onclick="resetForm()">リセット</button>
      </div>
    </div>

    <!-- ===== FORM ===== -->
    <div class="form-panel">

      <!-- Color -->
      <div class="form-section">
        <div class="form-section-title">カラー（必須）</div>
        <div class="color-selector">
          <button class="color-btn red active" onclick="setColor('red', this)">
            <span class="color-icon">🔥</span>赤
          </button>
          <button class="color-btn blue" onclick="setColor('blue', this)">
            <span class="color-icon">💧</span>青
          </button>
          <button class="color-btn yellow" onclick="setColor('yellow', this)">
            <span class="color-icon">⚡</span>黄
          </button>
          <button class="color-btn green" onclick="setColor('green', this)">
            <span class="color-icon">🌿</span>緑
          </button>
        </div>
      </div>

      <!-- Basic Info -->
      <div class="form-section">
        <div class="form-section-title">基本情報</div>
        <div class="form-row">
          <label>カード名</label>
          <input type="text" id="cardName" placeholder="例：炎の剣士" maxlength="20" oninput="updatePreview()">
        </div>
        <div class="stats-row">
          <div class="form-row">
            <label>コスト</label>
            <input type="number" id="cardCost" value="1" min="1" max="10" oninput="updatePreview()">
          </div>
          <div class="form-row">
            <label>攻撃力 ATK</label>
            <input type="number" id="cardAtk" value="2" min="0" max="20" oninput="updatePreview()">
          </div>
          <div class="form-row">
            <label>防御力 DEF</label>
            <input type="number" id="cardDef" value="2" min="0" max="20" oninput="updatePreview()">
          </div>
        </div>
      </div>

      <!-- Illustration -->
      <div class="form-section">
        <div class="form-section-title">イラスト</div>
        <div class="illust-grid" id="illustGrid">
          <!-- Filled by JS -->
        </div>
        <div style="font-size:0.75rem;color:var(--text-dim);">カスタム画像URL:</div>
        <input type="text" id="customImgUrl" placeholder="https://... (画像URLを貼り付け)" oninput="setCustomImg(this.value)" style="margin-top:0.4rem;">
      </div>

      <!-- Flavor Text -->
      <div class="form-section">
        <div class="form-section-title">フレーバーテキスト</div>
        <div class="form-row">
          <textarea id="cardFlavor" placeholder="カードの雰囲気を表す文章を入力..." oninput="updatePreview()"></textarea>
        </div>
      </div>

      <!-- Effect Builder -->
      <div class="form-section">
        <div class="form-section-title">スキル設定（フレーバーから自動発動）</div>
        <div class="effect-builder">
          <div class="effect-row">
            <div>
              <label>発動条件</label>
              <select id="effectTrigger" onchange="updateEffect()">
                <option value="">なし（スキルなし）</option>
                <option value="onAttack">攻撃時</option>
                <option value="onDefend">防御時</option>
                <option value="onPlay">場に出た時</option>
                <option value="onDamage">ダメージを与えた時</option>
                <option value="onDraw">ドローした時</option>
                <option value="onTurnStart">自分のターン開始時</option>
              </select>
            </div>
            <div>
              <label>効果の種類</label>
              <select id="effectType" onchange="updateEffect()">
                <option value="">なし</option>
                <option value="draw">カードをドロー</option>
                <option value="buffAtk">手札1枚の攻撃力をアップ</option>
                <option value="buffDef">手札1枚の防御力をアップ</option>
                <option value="heal">HPを回復</option>
                <option value="damage">相手に追加ダメージ</option>
                <option value="costReduce">次のカードのコストを下げる</option>
              </select>
            </div>
          </div>
          <div class="effect-row" id="effectValueRow" style="display:none">
            <div>
              <label id="effectValueLabel">効果量</label>
              <input type="number" id="effectValue" value="1" min="1" max="10" oninput="updateEffect()">
            </div>
            <div></div>
          </div>
          <div>
            <label>スキルプレビュー</label>
            <div class="effect-preview-text" id="effectPreview">スキルなし</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Saved Deck -->
  <div class="deck-section" id="deckSection">
    <div class="deck-header">
      <div class="deck-title">🃏 作成済みカード（デッキ）</div>
      <div class="deck-count" id="deckCount">0 枚</div>
    </div>
    <div class="deck-cards" id="deckCards">
      <div class="empty-deck">まだカードがありません。上でカードを作って保存してください。</div>
    </div>
    <div style="margin-top:1.5rem;display:flex;gap:1rem;flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="exportDeck()">📤 デッキをエクスポート</button>
      <button class="btn btn-outline" onclick="importDeck()">📥 デッキをインポート</button>
      <button class="btn btn-outline" style="color:#e74c3c;border-color:rgba(231,76,60,0.3)" onclick="clearDeck()">🗑 全削除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ILLUSTRATIONS = [
  '🗡️','🛡️','🔥','💧','⚡','🌿','⚔️','🏹','🪄','🐉','🦋','💀',
  '🌙','☀️','⭐','🌊','🍀','🌸','💎','🔮','🦅','🐺','🦁','🐍',
  '🏔️','🌋','🌪️','❄️','🎯','💥','🌺','🦄'
];

const COLOR_MAP = {
  red:    { bg: '#2a0f0f', border: '#c0392b', accent: '#e74c3c', glow: 'rgba(192,57,43,0.3)', artBg: 'rgba(192,57,43,0.1)' },
  blue:   { bg: '#0f1a2a', border: '#2471a3', accent: '#3498db', glow: 'rgba(36,113,163,0.3)', artBg: 'rgba(36,113,163,0.1)' },
  yellow: { bg: '#2a2200', border: '#d4ac0d', accent: '#f1c40f', glow: 'rgba(212,172,13,0.3)', artBg: 'rgba(212,172,13,0.1)' },
  green:  { bg: '#0f2a15', border: '#1e8449', accent: '#2ecc71', glow: 'rgba(30,132,73,0.3)', artBg: 'rgba(30,132,73,0.1)' }
};

let currentColor = 'red';
let currentIllust = '🗡️';
let customImg = '';
let savedCards = JSON.parse(localStorage.getItem('cardrealmDeck') || '[]');

// Build illustration grid
const grid = document.getElementById('illustGrid');
ILLUSTRATIONS.forEach((emoji, i) => {
  const btn = document.createElement('button');
  btn.className = 'illust-btn' + (i === 0 ? ' active' : '');
  btn.textContent = emoji;
  btn.onclick = () => {
    document.querySelectorAll('.illust-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentIllust = emoji;
    customImg = '';
    document.getElementById('customImgUrl').value = '';
    updatePreview();
  };
  grid.appendChild(btn);
});

function setColor(color, btn) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentColor = color;
  updatePreview();
}

function setCustomImg(url) {
  customImg = url;
  if (url) {
    document.querySelectorAll('.illust-btn').forEach(b => b.classList.remove('active'));
  }
  updatePreview();
}

function updatePreview() {
  const name = document.getElementById('cardName').value || 'カード名';
  const cost = document.getElementById('cardCost').value || '1';
  const atk  = document.getElementById('cardAtk').value  || '0';
  const def  = document.getElementById('cardDef').value  || '0';
  const flavor = document.getElementById('cardFlavor').value || 'フレーバーテキストがここに表示されます';

  const c = COLOR_MAP[currentColor];
  const preview = document.getElementById('cardPreview');
  preview.style.setProperty('--card-bg', c.bg);
  preview.style.setProperty('--card-border', c.border);
  preview.style.setProperty('--card-accent', c.accent);
  preview.style.setProperty('--card-glow', c.glow);
  preview.style.setProperty('--card-art-bg', c.artBg);

  document.getElementById('previewName').textContent = name;
  document.getElementById('previewCost').textContent = cost;
  document.getElementById('previewAtk').textContent = atk;
  document.getElementById('previewDef').textContent = def;
  document.getElementById('previewFlavor').textContent = flavor;

  const artArea = document.getElementById('previewArt');
  if (customImg) {
    artArea.innerHTML = `<img src="${customImg}" class="card-art-img" onerror="this.parentElement.textContent='🖼️'">`;
  } else {
    artArea.textContent = currentIllust;
  }

  updateEffect();
}

function updateEffect() {
  const trigger = document.getElementById('effectTrigger').value;
  const type    = document.getElementById('effectType').value;
  const valueRow = document.getElementById('effectValueRow');

  if (type && trigger) {
    valueRow.style.display = 'grid';
  } else {
    valueRow.style.display = 'none';
  }

  const value = parseInt(document.getElementById('effectValue').value) || 1;
  const preview = document.getElementById('effectPreview');
  const badge   = document.getElementById('previewEffect');

  if (!trigger || !type) {
    preview.textContent = 'スキルなし';
    badge.textContent   = 'スキルなし';
    return;
  }

  const triggerText = {
    onAttack:    '攻撃時',
    onDefend:    '防御時',
    onPlay:      '場に出た時',
    onDamage:    'ダメージを与えた時',
    onDraw:      'ドローした時',
    onTurnStart: 'ターン開始時'
  }[trigger];

  const effectText = {
    draw:        `カードを${value}枚ドローする`,
    buffAtk:     `手札のカード1枚の攻撃力を${value}アップ`,
    buffDef:     `手札のカード1枚の防御力を${value}アップ`,
    heal:        `自分のHPを${value}回復する`,
    damage:      `相手に${value}の追加ダメージ`,
    costReduce:  `次のカードのコストを${value}下げる`
  }[type];

  const text = `【${triggerText}】${effectText}`;
  preview.textContent = text;
  badge.textContent = text;
}

function getCurrentCardData() {
  return {
    id: Date.now(),
    name:   document.getElementById('cardName').value || '名無しのカード',
    color:  currentColor,
    cost:   parseInt(document.getElementById('cardCost').value) || 1,
    atk:    parseInt(document.getElementById('cardAtk').value)  || 0,
    def:    parseInt(document.getElementById('cardDef').value)  || 0,
    flavor: document.getElementById('cardFlavor').value || '',
    illust: customImg || currentIllust,
    effect: {
      trigger: document.getElementById('effectTrigger').value,
      type:    document.getElementById('effectType').value,
      value:   parseInt(document.getElementById('effectValue').value) || 1
    }
  };
}

function saveCard() {
  const card = getCurrentCardData();
  if (!card.name || card.name === '名無しのカード') {
    showToast('カード名を入力してください');
    return;
  }
  savedCards.push(card);
  localStorage.setItem('cardrealmDeck', JSON.stringify(savedCards));
  renderDeck();
  showToast(`「${card.name}」を保存しました！`);
}

function deleteCard(id) {
  savedCards = savedCards.filter(c => c.id !== id);
  localStorage.setItem('cardrealmDeck', JSON.stringify(savedCards));
  renderDeck();
  showToast('カードを削除しました');
}

function renderDeck() {
  const container = document.getElementById('deckCards');
  document.getElementById('deckCount').textContent = savedCards.length + ' 枚';

  if (savedCards.length === 0) {
    container.innerHTML = '<div class="empty-deck">まだカードがありません。上でカードを作って保存してください。</div>';
    return;
  }

  container.innerHTML = savedCards.map(card => {
    const c = COLOR_MAP[card.color];
    const illust = card.illust.startsWith('http') 
      ? `<img src="${card.illust}" style="width:100%;height:40px;object-fit:cover;border-radius:4px;" onerror="this.outerHTML='🖼️'">`
      : `<span style="font-size:1.6rem">${card.illust}</span>`;
    return `
      <div class="mini-card" style="border-color:${c.border};box-shadow:0 0 10px ${c.glow}" title="${card.name}">
        <button class="mini-card-del" onclick="deleteCard(${card.id})">✕</button>
        ${illust}
        <div class="mini-card-name">${card.name}</div>
        <div class="mini-card-stats">
          <span style="color:${c.accent}">C:${card.cost}</span>
          <span>A:${card.atk}</span>
          <span>D:${card.def}</span>
        </div>
      </div>
    `;
  }).join('');
}

function resetForm() {
  document.getElementById('cardName').value = '';
  document.getElementById('cardCost').value = 1;
  document.getElementById('cardAtk').value  = 2;
  document.getElementById('cardDef').value  = 2;
  document.getElementById('cardFlavor').value = '';
  document.getElementById('customImgUrl').value = '';
  document.getElementById('effectTrigger').value = '';
  document.getElementById('effectType').value    = '';
  document.getElementById('effectValue').value   = 1;
  currentIllust = '🗡️';
  customImg = '';
  document.querySelectorAll('.illust-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('.color-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  currentColor = 'red';
  updatePreview();
}

function exportDeck() {
  const data = JSON.stringify(savedCards, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cardrealm-deck.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('デッキをエクスポートしました');
}

function importDeck() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error('不正なフォーマット');
        savedCards = [...savedCards, ...data];
        localStorage.setItem('cardrealmDeck', JSON.stringify(savedCards));
        renderDeck();
        showToast(`${data.length}枚のカードをインポートしました`);
      } catch(err) {
        showToast('インポートに失敗しました: ' + err.message);
      }
    };
    reader.readAsText(f);
  };
  input.click();
}

function clearDeck() {
  if (!confirm('全てのカードを削除しますか？')) return;
  savedCards = [];
  localStorage.setItem('cardrealmDeck', JSON.stringify(savedCards));
  renderDeck();
  showToast('全カードを削除しました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Stars
const bg = document.getElementById('bgStars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${-Math.random()*4}s;`;
  bg.appendChild(s);
}

// Init
updatePreview();
renderDeck();
</script>
</body>
</html>
