<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>しんウノ — カード作成</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%230e0e1d'/><text y='72' x='50' text-anchor='middle' font-size='60'>🃏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--g:#c9a84c;--gd:#7a6430;--deep:#09090f;--panel:#0f1020;--p2:#141428;--text:#e8e0d0;--dim:#8a8070;--bdr:rgba(201,168,76,.22);--red:#e74c3c;--blue:#3498db;--grn:#2ecc71}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:3rem}
.wrap{max-width:960px;margin:0 auto;padding:.8rem .8rem 2rem}
.ph{display:flex;align-items:center;gap:.8rem;padding:.6rem 0 .9rem;flex-wrap:wrap}
.back{color:var(--gd);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:.82rem}
.ph-t{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--g)}
.layout{display:grid;grid-template-columns:200px 1fr;gap:1.2rem;align-items:start}
@media(max-width:680px){.layout{grid-template-columns:1fr}}
/* Preview card */
.pv{position:sticky;top:.8rem}
.pv-lbl{font-family:'Rajdhani',sans-serif;font-size:.65rem;letter-spacing:.2em;color:var(--gd);text-align:center;margin-bottom:.5rem;text-transform:uppercase}
.card-prev{width:190px;height:300px;margin:0 auto .8rem;border-radius:12px;border:2px solid var(--cb,#7a6430);background:#06060e;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.8),0 0 20px var(--cglow,rgba(201,168,76,.08))}
.cp-bar{height:5px;flex-shrink:0}
.cp-head{display:flex;justify-content:space-between;align-items:center;padding:.42rem .55rem;background:rgba(0,0,0,.9);flex-shrink:0;gap:.3rem}
.cp-name{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;color:var(--cacc,var(--g));flex:1;overflow:hidden;word-break:break-all;line-height:1.2;max-height:2.4em}
.cp-cost{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;color:#000;flex-shrink:0}
.cp-art{height:110px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:rgba(255,255,255,.02);flex-shrink:0;overflow:hidden}
.cp-art img{width:100%;height:100%;object-fit:contain;background:#111}
.cp-strip{display:flex;height:4px;flex-shrink:0}
.cp-stats{display:flex;justify-content:space-around;padding:.35rem;background:rgba(0,0,0,.95);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700}
.cp-flavor{flex:1;padding:.32rem .5rem;background:rgba(0,0,0,.9);overflow:hidden;display:flex;flex-direction:column;gap:2px}
.cp-ft{font-size:.56rem;color:rgba(255,255,255,.35);font-style:italic;line-height:1.45}
.cp-sk{font-size:.52rem;color:#f1c40f;line-height:1.4}
/* Form panels */
.panel{background:var(--panel);border:1px solid var(--bdr);border-radius:10px;padding:.85rem;margin-bottom:.75rem}
.sec{font-family:'Rajdhani',sans-serif;font-size:.62rem;letter-spacing:.22em;color:var(--gd);text-transform:uppercase;margin-bottom:.65rem;padding-bottom:.3rem;border-bottom:1px solid var(--bdr)}
label{display:block;font-size:.74rem;color:var(--dim);margin-bottom:.25rem;font-family:'Rajdhani',sans-serif;letter-spacing:.05em}
input[type=text],input[type=number],textarea,select{width:100%;background:var(--p2);border:1px solid var(--bdr);border-radius:7px;padding:.5rem .75rem;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:.88rem;outline:none;transition:border-color .18s;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--gd)}
select option{background:var(--p2)}
textarea{resize:vertical;min-height:56px;line-height:1.5}
.sr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}
/* Color buttons */
.colors{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:.4rem}
.cb{padding:.45rem .2rem;border-radius:7px;border:2px solid transparent;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.82rem;text-align:center;transition:all .18s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:.15rem}
.cb span{font-size:1.1rem}
.cb.red{background:rgba(192,57,43,.12);color:#e74c3c;border-color:rgba(192,57,43,.22)}.cb.red.on{border-color:#e74c3c;background:rgba(231,76,60,.18)}
.cb.blue{background:rgba(36,113,163,.12);color:#3498db;border-color:rgba(36,113,163,.22)}.cb.blue.on{border-color:#3498db;background:rgba(52,152,219,.18)}
.cb.yellow{background:rgba(212,172,13,.12);color:#f1c40f;border-color:rgba(212,172,13,.22)}.cb.yellow.on{border-color:#f1c40f;background:rgba(241,196,15,.18)}
.cb.green{background:rgba(30,132,73,.12);color:#2ecc71;border-color:rgba(30,132,73,.22)}.cb.green.on{border-color:#2ecc71;background:rgba(46,204,113,.18)}
/* Emoji grid */
.egrid{display:grid;grid-template-columns:repeat(8,1fr);gap:.3rem;margin-bottom:.55rem}
.ib{aspect-ratio:1;background:var(--p2);border:1.5px solid var(--bdr);border-radius:6px;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:all .15s;touch-action:manipulation}
.ib:hover{border-color:var(--gd);transform:scale(1.1)}
.ib.on{border-color:var(--g);background:rgba(201,168,76,.1)}
/* Image upload */
.upload{border:2px dashed var(--bdr);border-radius:8px;padding:.75rem;text-align:center;cursor:pointer;position:relative;min-height:65px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:.5rem;transition:border-color .18s}
.upload:hover{border-color:var(--gd)}
.upload.has{border-color:var(--g);border-style:solid}
.upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2}
.upload img{max-height:70px;object-fit:contain;display:none;border-radius:4px}
.upload.has img{display:block}
.upload-hint{font-size:.7rem;color:var(--dim);margin-top:.25rem}
/* Effects */
.eff-entry{background:rgba(0,0,0,.3);border:1px solid var(--bdr);border-radius:8px;padding:.75rem;margin-bottom:.55rem;position:relative}
.eff-num{font-family:'Rajdhani',sans-serif;font-size:.62rem;letter-spacing:.1em;color:var(--gd);text-transform:uppercase;margin-bottom:.5rem}
.eff-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.45rem}
.eff-prev{background:rgba(201,168,76,.05);border:1px solid var(--bdr);border-radius:5px;padding:.4rem .55rem;font-size:.74rem;color:var(--g);font-style:italic;margin-top:.4rem;min-height:1.8rem}
.del-btn{position:absolute;top:.55rem;right:.55rem;background:rgba(192,57,43,.8);color:#fff;border:none;border-radius:4px;padding:.18rem .45rem;font-size:.65rem;cursor:pointer;font-family:'Rajdhani',sans-serif}
.add-btn{width:100%;padding:.48rem;border:1px dashed var(--gd);border-radius:7px;background:transparent;color:var(--gd);font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .18s;touch-action:manipulation}
.add-btn:hover{border-color:var(--g);color:var(--g)}
/* VFX */
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}
.vb{background:var(--p2);border:2px solid var(--bdr);border-radius:7px;padding:.45rem .3rem;cursor:pointer;text-align:center;transition:all .18s;font-family:'Rajdhani',sans-serif;touch-action:manipulation}
.vb.on{border-color:var(--g);background:rgba(201,168,76,.1)}
.vb-icon{font-size:1.2rem;display:block;margin-bottom:.15rem}
.vb-name{font-size:.62rem;color:var(--dim)}.vb.on .vb-name{color:var(--g)}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.25rem;padding:.52rem .95rem;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:.84rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.94)}
.btn-g{background:linear-gradient(135deg,var(--gd),var(--g));color:#05050e;box-shadow:0 3px 10px rgba(201,168,76,.28)}
.btn-out{background:transparent;color:var(--g);border:1px solid var(--gd)}
.btn-sm{padding:.3rem .6rem;font-size:.72rem}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(231,76,60,.3);font-size:.72rem;padding:.3rem .6rem}
/* Edit banner */
.edit-banner{background:rgba(36,113,163,.12);border:1px solid rgba(52,152,219,.3);border-radius:8px;padding:.5rem .8rem;margin-bottom:.75rem;display:none;align-items:center;gap:.6rem;font-family:'Rajdhani',sans-serif;font-size:.8rem;color:#3498db;flex-wrap:wrap}
.edit-banner button{margin-left:auto;padding:.2rem .55rem;font-size:.68rem;border-radius:5px;background:transparent;color:var(--g);border:1px solid var(--gd);cursor:pointer;font-family:'Rajdhani',sans-serif}
/* Deck */
.deck-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem;flex-wrap:wrap;gap:.4rem}
.deck-title{font-family:'Rajdhani',sans-serif;font-size:.85rem;letter-spacing:.1em;color:var(--g);text-transform:uppercase}
.deck-cards{display:flex;flex-wrap:wrap;gap:.6rem;min-height:50px}
.mini{width:76px;height:108px;border-radius:7px;border:1.5px solid;background:var(--p2);display:flex;flex-direction:column;position:relative;overflow:hidden;transition:transform .15s}
.mini:hover{transform:translateY(-4px)}
.mini-cs{height:3px;display:flex;flex-shrink:0}
.mini-cs-seg{flex:1}
.mini-art{flex:1;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:rgba(0,0,0,.3);overflow:hidden}
.mini-art img{width:100%;height:100%;object-fit:contain;background:#111}
.mini-bot{padding:2px 3px;background:rgba(0,0,0,.75)}
.mini-name{font-size:.5rem;font-family:'Rajdhani',sans-serif;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.mini-stats{display:flex;justify-content:space-around;font-size:.5rem;font-family:'Rajdhani',sans-serif}
.mini-acts{position:absolute;top:2px;right:2px;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.mini:hover .mini-acts{opacity:1}
.mini-abtn{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.58rem;color:#fff;cursor:pointer;border:none;touch-action:manipulation}
.empty-deck{color:var(--dim);font-size:.8rem;font-style:italic;padding:.75rem 0}
/* Toast */
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(120px);background:var(--panel);border:1px solid var(--g);border-radius:7px;padding:.55rem 1rem;font-family:'Rajdhani',sans-serif;font-size:.8rem;color:var(--g);z-index:1000;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:92vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
/* Compress progress */
.cmprog{display:none;background:rgba(201,168,76,.07);border:1px solid var(--bdr);border-radius:7px;padding:.55rem .8rem;margin-bottom:.6rem}
.cmprog-msg{font-family:'Rajdhani',sans-serif;font-size:.75rem;color:var(--g);margin-bottom:.3rem}
.cmprog-bar-out{background:rgba(255,255,255,.07);border-radius:3px;height:5px;overflow:hidden}
.cmprog-bar-in{height:100%;background:linear-gradient(90deg,var(--gd),var(--g));border-radius:3px;transition:width .3s}
/* Cond row */
.cond-row{background:rgba(52,152,219,.05);border:1px solid rgba(52,152,219,.2);border-radius:6px;padding:.55rem;margin-top:.4rem}
.cond-row label{color:#87ceeb}
</style>
</head>
<body>
<div class="wrap">
  <div class="ph">
    <a href="index.html" class="back">← ホーム</a>
    <h1 class="ph-t">🎨 カード作成</h1>
    <div style="margin-left:auto;font-family:'Rajdhani',sans-serif;font-size:.8rem;color:var(--dim)" id="authorLbl"></div>
  </div>
  <div class="edit-banner" id="editBanner">
    ✏️ 編集中: <span id="editName" style="font-weight:700;color:#3498db"></span>
    <button onclick="cancelEdit()">✕ キャンセル</button>
  </div>
  <div class="layout">
    <div class="pv">
      <div class="pv-lbl">✦ プレビュー ✦</div>
      <div class="card-prev" id="cardPrev">
        <div class="cp-bar" id="pBar"></div>
        <div class="cp-head"><div class="cp-name" id="pName">カード名</div><div class="cp-cost" id="pCost" style="background:#c9a84c">1</div></div>
        <div class="cp-art" id="pArt">🗡️</div>
        <div class="cp-strip" id="pStrip"></div>
        <div class="cp-stats"><span id="pAtk" style="color:#c9a84c">⚔0</span><span id="pDef" style="color:#c9a84c">🛡0</span></div>
        <div class="cp-flavor"><span class="cp-ft" id="pFlavor">フレーバーテキスト</span><span class="cp-sk" id="pSkill"></span></div>
      </div>
      <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-g" id="saveBtn" onclick="saveCard()">＋ 保存</button>
        <button class="btn btn-out" onclick="resetForm()">リセット</button>
      </div>
    </div>
    <div>
      <!-- Color -->
      <div class="panel">
        <div class="sec">カラー（複数選択可）</div>
        <div class="colors" id="colorBtns">
          <button class="cb red on" data-col="red" onclick="toggleColor('red',this)"><span>🔥</span>赤</button>
          <button class="cb blue" data-col="blue" onclick="toggleColor('blue',this)"><span>💧</span>青</button>
          <button class="cb yellow" data-col="yellow" onclick="toggleColor('yellow',this)"><span>⚡</span>黄</button>
          <button class="cb green" data-col="green" onclick="toggleColor('green',this)"><span>🌿</span>緑</button>
        </div>
      </div>
      <!-- Basic info -->
      <div class="panel">
        <div class="sec">基本情報</div>
        <div style="margin-bottom:.65rem"><label>カード名</label><input type="text" id="cardName" placeholder="例：炎の剣士" maxlength="24" oninput="updatePrev()"></div>
        <div class="sr">
          <div><label>コスト</label><input type="number" id="cardCost" value="1" min="1" max="99" oninput="updatePrev()"></div>
          <div><label>攻撃力</label><input type="number" id="cardAtk" value="2" min="0" max="99" oninput="updatePrev()"></div>
          <div><label>防御力</label><input type="number" id="cardDef" value="2" min="0" max="99" oninput="updatePrev()"></div>
        </div>
      </div>
      <!-- Art -->
      <div class="panel">
        <div class="sec">イラスト</div>
        <label>📁 ファイルから読み込み (最大3MB → 自動圧縮)</label>
        <div class="upload" id="uploadArea">
          <input type="file" id="fileInput" accept="image/*" onchange="onFile(event)">
          <img id="imgPrev" alt="">
          <div class="upload-hint" id="uploadHint">クリック or ドロップ</div>
        </div>
        <button class="btn btn-out btn-sm" id="clearBtn" onclick="clearImg()" style="display:none;margin-bottom:.5rem">🗑 画像を削除</button>
        <label>絵文字</label>
        <div class="egrid" id="egrid"></div>
        <label>画像URL</label>
        <input type="text" id="urlInput" placeholder="https://..." oninput="setUrl(this.value)">
      </div>
      <!-- Flavor -->
      <div class="panel">
        <div class="sec">フレーバーテキスト</div>
        <textarea id="cardFlavor" placeholder="カードの雰囲気..." oninput="updatePrev()"></textarea>
      </div>
      <!-- Skills -->
      <div class="panel">
        <div class="sec">スキル設定</div>
        <div style="font-size:.7rem;color:var(--dim);margin-bottom:.65rem;padding:.45rem;background:rgba(201,168,76,.04);border:1px solid var(--bdr);border-radius:6px;line-height:1.6">
          ①発動条件 ②効果 ③効果量の順に設定。「出し条件」は発動条件欄で選択後、条件内容が表示されます。
        </div>
        <div id="effList"></div>
        <button class="add-btn" onclick="addEff()">＋ スキルを追加</button>
      </div>
      <!-- VFX -->
      <div class="panel">
        <div class="sec">ビジュアルエフェクト（複数選択可）</div>
        <div class="vgrid" id="vgrid"></div>
      </div>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.2rem">
        <button class="btn btn-g" id="saveBtn2" onclick="saveCard()">＋ カードを保存</button>
        <button class="btn btn-out" onclick="resetForm()">リセット</button>
      </div>
    </div>
  </div>
  <!-- Deck -->
  <div class="panel">
    <div class="deck-head">
      <div class="deck-title">🃏 カード一覧 <span style="font-size:.75rem;color:var(--dim)" id="deckCnt">0枚</span></div>
      <div style="display:flex;gap:.35rem;flex-wrap:wrap">
        <button class="btn btn-out btn-sm" onclick="recompressAll()" title="既存画像を一括圧縮">🗜️ 一括圧縮</button>
        <button class="btn btn-out btn-sm" onclick="exportDeck()">📤 Export</button>
        <button class="btn btn-out btn-sm" onclick="importDeck()">📥 Import</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑 全削除</button>
      </div>
    </div>
    <div class="cmprog" id="cmprog">
      <div class="cmprog-msg" id="cmMsg">圧縮中...</div>
      <div class="cmprog-bar-out"><div class="cmprog-bar-in" id="cmBar" style="width:0%"></div></div>
    </div>
    <div id="fbStatus" style="font-family:'Rajdhani',sans-serif;font-size:.72rem;color:var(--dim);margin-bottom:.5rem">Firebase接続中...</div>
    <div class="deck-cards" id="deckCards"><div class="empty-deck">読み込み中...</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getDatabase,ref,set,onValue,remove,get}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const FB={apiKey:"AIzaSyBsASKwkmpRx_vi7JBqC-fvBl3LOgoOtbo",authDomain:"newcard-8fd59.firebaseapp.com",databaseURL:"https://newcard-8fd59-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"newcard-8fd59",storageBucket:"newcard-8fd59.firebasestorage.app",messagingSenderId:"822236707244",appId:"1:822236707244:web:f2a82f612226d7ac3f6209"};
const db=getDatabase(initializeApp(FB));
const cardsRef=ref(db,'sharedCards');

const ILLS=['🗡️','🛡️','🔥','💧','⚡','🌿','⚔️','🏹','🪄','🐉','🦋','💀','🌙','☀️','⭐','🌊','🍀','🌸','💎','🔮','🦅','🐺','🦁','🐍','🏔️','🌋','🌪️','❄️','🎯','💥','🌺','🦄'];
const CM={red:{border:'#c0392b',accent:'#e74c3c',glow:'rgba(192,57,43,.3)',dot:'#e74c3c'},blue:{border:'#2471a3',accent:'#3498db',glow:'rgba(36,113,163,.3)',dot:'#3498db'},yellow:{border:'#d4ac0d',accent:'#f1c40f',glow:'rgba(212,172,13,.3)',dot:'#f1c40f'},green:{border:'#1e8449',accent:'#2ecc71',glow:'rgba(30,132,73,.3)',dot:'#2ecc71'}};
const TRIGS=[
  {v:'',l:'（条件なし・常時）',n:false,cond:false},
  {v:'onAttack',l:'このカードで攻撃した時',n:false,cond:false},
  {v:'onDefend',l:'このカードで防御した時',n:false,cond:false},
  {v:'onPlay',l:'このカードを場に出した時',n:false,cond:false},
  {v:'onDamage',l:'相手にダメージを与えた時',n:false,cond:false},
  {v:'onTakeDmg',l:'ダメージを受けた時',n:false,cond:false},
  {v:'ifHpLow',l:'自HPがn以下（プレイ時評価）',n:true,cond:false},
  {v:'ifHpHigh',l:'自HPがn以上（プレイ時評価）',n:true,cond:false},
  {v:'ifChance',l:'n%の確率（プレイ時）',n:true,cond:false},
  {v:'ifWeatherSun',l:'晴れの時（プレイ時）',n:false,cond:false},
  {v:'ifWeatherRain',l:'雨の時（プレイ時）',n:false,cond:false},
  {v:'ifWeatherStorm',l:'嵐の時（プレイ時）',n:false,cond:false},
  {v:'ifTurnGte',l:'ターンn以上（プレイ時）',n:true,cond:false},
  {v:'playCondition',l:'★出し条件（条件を満たす時のみ出せる）',n:false,cond:true},
];
const PCONDS=[
  {v:'ifHpLow',l:'自HPがn以下',n:true},{v:'ifHpHigh',l:'自HPがn以上',n:true},
  {v:'ifChance',l:'n%の確率',n:true},{v:'ifWeatherSun',l:'晴れ時',n:false},
  {v:'ifWeatherRain',l:'雨時',n:false},{v:'ifWeatherStorm',l:'嵐時',n:false},
];
const EFFS=[
  {v:'',l:'（効果なし）'},{v:'draw',l:'n枚ドロー'},{v:'selfHeal',l:'自HP+n回復'},
  {v:'selfDamage',l:'自分にnダメージ（デメリット）'},{v:'selfAtkUp',l:'手札1枚ATK+n'},
  {v:'selfDefUp',l:'手札1枚DEF+n'},{v:'selfCardAtkUp',l:'このカードATK+n'},
  {v:'selfCardDefUp',l:'このカードDEF+n'},{v:'oppDamage',l:'相手に+nダメージ'},
  {v:'selfCostDown',l:'次コスト-n（最低1）'},{v:'selfCostUp',l:'自コスト+n'},

  {v:'oppDefDown',l:'次相手DEF-n'},{v:'weatherSun',l:'天候→☀️晴れ'},
  {v:'weatherRain',l:'天候→🌧️雨'},{v:'weatherStorm',l:'天候→⛈️嵐'},

];

  draw:n=>`${n}枚ドロー`,selfHeal:n=>`自HP+${n}`,selfDamage:n=>`自-${n}ダメ`,
  selfAtkUp:n=>`手札ATK+${n}`,selfDefUp:n=>`手札DEF+${n}`,
  selfCardAtkUp:n=>`カードATK+${n}`,selfCardDefUp:n=>`カードDEF+${n}`,
  oppDamage:n=>`相手+${n}ダメ`,selfCostDown:n=>`次コスト-${n}`,
  selfCostUp:n=>`自コスト+${n}`,oppCostDown:n=>`相コスト-${n}`,
  oppAtkDown:n=>`相ATK-${n}`,oppDefDown:n=>`相DEF-${n}`,
  weatherSun:()=>'→☀️',weatherRain:()=>'→🌧️',weatherStorm:()=>'→⛈️',weatherChange:()=>'天候変化',
};
const VFX=[{id:'bigIllust',icon:'🖼️',name:'イラスト'},{id:'fire',icon:'🔥',name:'炎'},
  {id:'ice',icon:'❄️',name:'氷'},{id:'lightning',icon:'⚡',name:'雷'},
  {id:'leaf',icon:'🌿',name:'葉'},{id:'shockwave',icon:'💥',name:'衝撃'},
  {id:'darkness',icon:'💀',name:'暗黒'},{id:'rainbow',icon:'🌈',name:'虹'},

window.toggleColor=function(col,btn){
  if(colors.includes(col)){if(colors.length<=1){showToast('最低1色必要');return;}colors=colors.filter(c=>c!==col);btn.classList.remove('on');}
  else{colors.push(col);btn.classList.add('on');}
  updatePrev();
};

// ── Image handling ──
const IMG_W=240,IMG_H=240,IMG_Q=0.82;
function compress(src){
  return new Promise((res,rej)=>{
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      const cv=document.createElement('canvas');cv.width=IMG_W;cv.height=IMG_H;
      const ctx=cv.getContext('2d');ctx.fillStyle='#111';ctx.fillRect(0,0,IMG_W,IMG_H);
      const scale=Math.min(IMG_W/img.width,IMG_H/img.height);
      const sw=Math.round(img.width*scale),sh=Math.round(img.height*scale);
      ctx.drawImage(img,Math.round((IMG_W-sw)/2),Math.round((IMG_H-sh)/2),sw,sh);
      res(cv.toDataURL('image/jpeg',IMG_Q));
    };
    img.onerror=()=>rej(new Error('読み込み失敗'));img.src=src;
  });
}
window.onFile=async function(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>10*1024*1024){showToast('10MB以内');return;}
  showToast('⏳ 圧縮中...');
  const r=new FileReader();
  r.onload=async ev=>{
    const compressed=await compress(ev.target.result).catch(()=>ev.target.result);
    imgSrc=compressed;setImgUI(imgSrc);updatePrev();
    showToast('✅ 圧縮完了 ~'+Math.round(compressed.length*.75/1024)+'KB');
  };
  r.readAsDataURL(f);
};

  const ua=document.getElementById('uploadArea');ua.classList.remove('has');
  document.getElementById('imgPrev').src='';document.getElementById('clearBtn').style.display='none';
  document.getElementById('uploadHint').textContent='クリック or ドロップ';
  document.getElementById('fileInput').value='';
}
function setImgUI(src){
  const ua=document.getElementById('uploadArea');ua.classList.add('has');

  document.getElementById('uploadHint').textContent='';
}

ua.addEventListener('dragover',e=>{e.preventDefault();ua.style.borderColor='var(--g)';});
ua.addEventListener('dragleave',()=>ua.style.borderColor='');

// ── Skills ──
function buildSkillText(e){
  if(e.trigger==='playCondition'){
    const pc=PCONDS.find(c=>c.v===e.playCond);if(!pc)return '★出し条件: 未設定';
    return `★出し条件[${pc.l.replace(/n/g,e.condVal||'?')}]`;
  }
  const td=TRIGS.find(t=>t.v===e.trigger)||{l:'',n:false};
  const tl=td.l.includes('n')?td.l.replace(/n/g,e.condVal||'?'):td.l;
  const effKey=e.eff||'';const ev=e.effVal||1;
  const el=EFF_DESC[effKey]?EFF_DESC[effKey](ev):'';
  if(!tl&&!el)return '（スキルなし）';
  return `【${tl||'常時'}】${el}`;
}
function renderEffects(){
  document.getElementById('effList').innerHTML=effects.map((e,idx)=>{
    const td=TRIGS.find(t=>t.v===e.trigger)||{n:false,cond:false};
    const hasCond=td.cond;
    const trigOpts=TRIGS.map(t=>`<option value="${t.v}"${e.trigger===t.v?' selected':''}>${t.l}</option>`).join('');
    const effOpts=EFFS.map(t=>`<option value="${t.v}"${e.eff===t.v?' selected':''}>${t.l}</option>`).join('');
    let condUI='';
    if(hasCond){
      const pc=PCONDS.find(c=>c.v===e.playCond)||{n:false};
      const pcOpts=PCONDS.map(c=>`<option value="${c.v}"${e.playCond===c.v?' selected':''}>${c.l}</option>`).join('');
      condUI=`<div class="cond-row" style="margin-top:.4rem"><label>★ 出し条件の内容</label>
        <select style="margin-bottom:.35rem" onchange="effChg('${e.id}','playCond',this.value)"><option value="">条件を選択</option>${pcOpts}</select>
        ${pc.n?`<label>n値</label><input type="number" value="${e.condVal||3}" min="1" max="100" onchange="effChg('${e.id}','condVal',this.value)" oninput="effChg('${e.id}','condVal',this.value)">`:''}</div>`;
    }
    return `<div class="eff-entry" id="ee_${e.id}">
      <div class="eff-num">スキル ${idx+1}</div>
      <button class="del-btn" onclick="removeEff('${e.id}')">✕ 削除</button>
      <div class="eff-row">
        <div><label>① 発動条件</label><select onchange="effChg('${e.id}','trigger',this.value)">${trigOpts}</select></div>
        <div><label>② 効果</label><select onchange="effChg('${e.id}','eff',this.value)">${effOpts}</select></div>
      </div>
      ${td.n&&!hasCond?`<div style="margin-bottom:.4rem"><label>条件のn値</label><input type="number" value="${e.condVal||3}" min="1" max="100" onchange="effChg('${e.id}','condVal',this.value)" oninput="effChg('${e.id}','condVal',this.value)"></div>`:''}
      ${condUI}
      ${!hasCond?`<div><label>効果量</label><input type="number" value="${e.effVal||1}" min="1" max="99" onchange="effChg('${e.id}','effVal',this.value)" oninput="effChg('${e.id}','effVal',this.value)"></div>`:''}
      <div class="eff-prev">${buildSkillText(e)}</div>
    </div>`;
  }).join('');
}
window.addEff=function(){effects.push({id:'e'+(eid++),trigger:'',eff:'',condVal:3,effVal:1,playCond:''});renderEffects();updatePrev();};
window.removeEff=function(id){effects=effects.filter(e=>e.id!==id);renderEffects();updatePrev();};
window.effChg=function(id,field,val){
  const e=effects.find(x=>x.id===id);if(!e)return;
  e[field]=(field==='condVal'||field==='effVal')?parseInt(val)||1:val;
  if(field==='trigger'||field==='playCond')renderEffects();
  else{const ep=document.getElementById('ep_'+id);if(ep)ep.textContent=buildSkillText(e);}
  updatePrev();
};

// ── Preview update ──
const ECOLS={draw:'#3498db',selfHeal:'#2ecc71',selfDamage:'#e74c3c',selfAtkUp:'#e74c3c',selfDefUp:'#3498db',selfCardAtkUp:'#e74c3c',selfCardDefUp:'#3498db',oppDamage:'#e74c3c',selfCostDown:'#f1c40f',selfCostUp:'#f1c40f',oppCostDown:'#e67e22',oppAtkDown:'#e67e22',oppDefDown:'#e67e22',weatherSun:'#f39c12',weatherRain:'#3498db',weatherStorm:'#9b59b6',weatherChange:'#87ceeb'};
window.updatePrev=function(){
  const name=document.getElementById('cardName').value||'カード名';
  const cost=document.getElementById('cardCost').value||'1';
  const atk=document.getElementById('cardAtk').value||'0';
  const def=document.getElementById('cardDef').value||'0';
  const flavor=document.getElementById('cardFlavor').value||'フレーバー';

  const prev=document.getElementById('cardPrev');
  prev.style.setProperty('--cb',mc.border);prev.style.setProperty('--cacc',mc.accent);prev.style.setProperty('--cglow',mc.glow);
  const grad=colors.map(c=>CM[c]?.accent||'#888').join(',');

};
updatePrev();

// ── Save card ──
window.saveCard=async function(){
  const name=document.getElementById('cardName').value.trim();if(!name){showToast('カード名を入力してください');return;}
  const id=editId||('card_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));
  const illust=imgSrc||curIll;
  // Size check for data URLs
  if(illust&&illust.startsWith('data:')){const kb=Math.round(illust.length*.75/1024);if(kb>400){showToast(`画像が大きすぎます(${kb}KB)。自動圧縮されますが再度ファイルを選択してください`);return;}}
  const card={id,name,colors,color:colors[0],cost:parseInt(document.getElementById('cardCost').value)||1,atk:parseInt(document.getElementById('cardAtk').value)||0,def:parseInt(document.getElementById('cardDef').value)||0,flavor:document.getElementById('cardFlavor').value||'',illust,effects:effects.filter(e=>e.eff||e.trigger||e.playCond),vfx:[...selVfx],author:myName,createdAt:editId?allCards.find(c=>c.id===editId)?.createdAt||Date.now():Date.now()};
  try{await set(ref(db,`sharedCards/${id}`),card);showToast(editId?`「${name}」更新！`:`「${name}」保存！`);if(editId)cancelEdit();else resetForm();}
  catch(e){showToast('保存失敗: '+e.message);console.error(e);}
};
window.editCard=function(id){
  const card=allCards.find(c=>c.id===id);if(!card)return;
  editId=id;
  document.getElementById('cardName').value=card.name||'';document.getElementById('cardCost').value=card.cost||1;document.getElementById('cardAtk').value=card.atk||0;document.getElementById('cardDef').value=card.def||0;document.getElementById('cardFlavor').value=card.flavor||'';
  colors=Array.isArray(card.colors)?[...card.colors]:[card.color||'red'];
  document.querySelectorAll('.cb').forEach(b=>b.classList.toggle('on',colors.includes(b.dataset.col)));
  imgSrc='';document.getElementById('urlInput').value='';
  if(card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))){imgSrc=card.illust;setImgUI(imgSrc);document.querySelectorAll('.ib').forEach(b=>b.classList.remove('on'));}
  else{curIll=card.illust||'🗡️';clearImgUI();document.querySelectorAll('.ib').forEach(b=>b.classList.toggle('on',b.textContent===curIll));}
  effects=(card.effects?.length?card.effects:[]).map(e=>({id:'e'+(eid++),trigger:e.trigger||'',eff:e.eff||e.type||'',condVal:e.condVal||3,effVal:e.effVal||e.value||1,playCond:e.playCond||''}));
  selVfx=new Set(card.vfx||[]);
  document.querySelectorAll('.vb').forEach((b,i)=>b.classList.toggle('on',selVfx.has(VFX[i]?.id)));
  renderEffects();
  document.getElementById('editBanner').style.display='flex';document.getElementById('editName').textContent=`「${card.name}」`;
  document.getElementById('saveBtn').textContent='✓ 更新';document.getElementById('saveBtn2').textContent='✓ 更新';
  updatePrev();window.scrollTo({top:0,behavior:'smooth'});showToast('編集モード: '+card.name);
};
window.cancelEdit=function(){editId=null;document.getElementById('editBanner').style.display='none';document.getElementById('saveBtn').textContent='＋ 保存';document.getElementById('saveBtn2').textContent='＋ カードを保存';resetForm();};
window.deleteCard=async function(id){const c=allCards.find(x=>x.id===id);if(!c||!confirm(`「${c.name}」を削除しますか？`))return;await remove(ref(db,`sharedCards/${id}`));showToast('削除しました');};
window.resetForm=function(){
  document.getElementById('cardName').value='';document.getElementById('cardCost').value=1;document.getElementById('cardAtk').value=2;document.getElementById('cardDef').value=2;document.getElementById('cardFlavor').value='';document.getElementById('urlInput').value='';
  colors=['red'];document.querySelectorAll('.cb').forEach(b=>b.classList.toggle('on',b.dataset.col==='red'));
  curIll='🗡️';imgSrc='';clearImgUI();document.querySelectorAll('.ib').forEach((b,i)=>b.classList.toggle('on',i===0));
  effects=[];selVfx=new Set();document.querySelectorAll('.vb').forEach(b=>b.classList.remove('on'));
  renderEffects();updatePrev();
};

// ── Render deck ──
function renderDeck(){
  const el=document.getElementById('deckCards');document.getElementById('deckCnt').textContent=allCards.length+'枚';
  if(!allCards.length){el.innerHTML='<div class="empty-deck">まだカードがありません</div>';return;}
  el.innerHTML=allCards.map(card=>{
    const cols=Array.isArray(card.colors)?card.colors:[card.color||'red'];
    const mc=CM[cols[0]]||CM.red;
    const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:contain;background:#111" onerror="this.outerHTML='🃏'">`:(card.illust||'🃏');
    const cs=cols.map(c=>`<div class="mini-cs-seg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
    return `<div><div class="mini" style="border-color:${mc.border};box-shadow:0 0 6px ${mc.glow}" title="${card.name}"><div class="mini-cs">${cs}</div><div class="mini-acts"><button class="mini-abtn" style="background:rgba(36,113,163,.85)" onclick="editCard('${card.id}')">✏</button><button class="mini-abtn" style="background:rgba(192,57,43,.85)" onclick="deleteCard('${card.id}')">✕</button></div><div class="mini-art">${ill}</div><div class="mini-bot"><div class="mini-stats"><span style="color:${mc.accent}">C${card.cost}</span><span>A${card.atk}</span><span>D${card.def}</span></div><div class="mini-name">${card.name}</div></div></div><div style="font-size:.44rem;color:var(--dim);text-align:center;margin-top:2px;font-family:'Rajdhani',sans-serif">${card.author||''}</div></div>`;
  }).join('');
}

// ── Card select for lobby (saved to localStorage) ──
function renderSelCards(){
  const saved=localStorage.getItem('activeCardIds');
  if(!saved||saved==='all'){const ids=allCards.map(c=>c.id);localStorage.setItem('activeCardIds',JSON.stringify(ids));}
}

// ── Export/Import ──
window.exportDeck=function(){const b=new Blob([JSON.stringify(allCards,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='shinuno_cards.json';a.click();URL.revokeObjectURL(u);showToast('エクスポートしました');};
window.importDeck=function(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=async e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw 0;for(const c of d){c.id=c.id||('card_'+Date.now()+'_'+Math.random().toString(36).slice(2,5));c.author=c.author||myName;await set(ref(db,`sharedCards/${c.id}`),c);}showToast(`${d.length}枚インポートしました`);}catch{showToast('インポート失敗');}};r.readAsText(f);};i.click();};
window.clearAll=async function(){if(!confirm('全カードを削除しますか？'))return;for(const c of allCards)await remove(ref(db,`sharedCards/${c.id}`));showToast('全削除しました');};

// ── Recompress all ──
window.recompressAll=async function(){
  const targets=allCards.filter(c=>c.illust&&(c.illust.startsWith('data:')||c.illust.startsWith('http')));
  if(!targets.length){showToast('圧縮対象なし');return;}
  if(!confirm(`${targets.length}枚の画像を圧縮します。続けますか？`))return;
  const prog=document.getElementById('cmprog');prog.style.display='block';
  let done=0,saved=0,savedKb=0;
  for(const card of targets){
    document.getElementById('cmMsg').textContent=`圧縮中: 「${card.name}」(${done+1}/${targets.length})`;
    document.getElementById('cmBar').style.width=Math.round(done/targets.length*100)+'%';
    try{
      const before=card.illust.startsWith('data:')?Math.round(card.illust.length*.75/1024):null;
      const compressed=await compress(card.illust);const after=Math.round(compressed.length*.75/1024);
      if(!before||after<before){if(before)savedKb+=before-after;await set(ref(db,`sharedCards/${card.id}`),{...card,illust:compressed});saved++;}
    }catch(e){console.warn('skip:',card.name,e.message);}
    done++;await new Promise(r=>setTimeout(r,100));
  }
  document.getElementById('cmBar').style.width='100%';
  const msg=`✅ ${saved}枚圧縮 約${Math.round(savedKb)}KB削減`;
  document.getElementById('cmMsg').textContent=msg;setTimeout(()=>prog.style.display='none',5000);showToast(msg);
};

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
