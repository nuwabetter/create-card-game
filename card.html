<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CARD REALM — カード作成</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#0a0a14;--panel:#0f1020;--panel2:#141428;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,0.25)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}
.bg{position:fixed;inset:0;z-index:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.8}}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:1rem 1rem 3rem}
.ph{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap}
.back{color:var(--gold-dim);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase}
.back:hover{color:var(--gold)}
.ptitle-main{font-family:'Cinzel Decorative',serif;font-size:1.5rem;background:linear-gradient(135deg,var(--gold-dim),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* Layout */
.layout{display:grid;grid-template-columns:300px 1fr;gap:1.5rem;align-items:start}
@media(max-width:800px){.layout{grid-template-columns:1fr}.preview-wrap{order:-1}}
/* Preview */
.preview-wrap{position:sticky;top:1rem}
.prev-label{font-family:'Rajdhani',sans-serif;font-size:.7rem;letter-spacing:.3em;color:var(--gold-dim);text-transform:uppercase;text-align:center;margin-bottom:.8rem}
/* Card template */
.card-tmpl{
  width:240px;height:350px;margin:0 auto 1rem;
  border-radius:14px;
  border:2px solid var(--cb,#7a6430);
  background:var(--deep); /* very dark base */
  position:relative;overflow:hidden;
  box-shadow:0 15px 50px rgba(0,0,0,.7),0 0 25px var(--cglow,rgba(201,168,76,.1));
  transition:all .3s;perspective:600px;
  transform-style:preserve-3d;
}
.card-tmpl:hover{transform:rotateY(-4deg) rotateX(2deg) scale(1.03);box-shadow:0 25px 70px rgba(0,0,0,.8),0 0 35px var(--cglow,rgba(201,168,76,.2))}
/* Multi-color stripe at top */
.c-stripe{position:absolute;top:0;left:0;right:0;height:4px;z-index:10}
/* Left side stripe */
.c-left{position:absolute;top:0;left:0;bottom:0;width:4px;z-index:10}
/* Card header: very dark */
.c-head{
  padding:.55rem .7rem .4rem;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,.85);
  border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;z-index:2;
}
.c-name{font-family:'Cinzel Decorative',serif;font-size:.6rem;color:var(--cacc,var(--gold-light));text-overflow:ellipsis;overflow:hidden;white-space:nowrap;max-width:130px}
.c-cost{width:28px;height:28px;border-radius:50%;background:var(--cacc,var(--gold));color:#000;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;flex-shrink:0;box-shadow:0 0 8px var(--cglow)}
/* Art area - bright contrast */
.c-art{
  height:150px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(0,0,0,.3));
  display:flex;align-items:center;justify-content:center;font-size:5rem;
}
.c-art::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.9) 100%)}
.c-art img{width:100%;height:100%;object-fit:cover}
/* Stats: very dark */
.c-stats{
  display:flex;justify-content:space-around;padding:.5rem .4rem;
  background:rgba(0,0,0,.9);
  position:relative;z-index:2;
}
.c-stat-box{text-align:center}
.c-stat-lbl{font-family:'Rajdhani',sans-serif;font-size:.52rem;letter-spacing:.15em;color:var(--cacc,var(--gold-dim));text-transform:uppercase;display:block}
.c-stat-val{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--cacc,var(--gold-light))}
.c-stat-div{width:1px;background:rgba(255,255,255,.1);margin:.1rem 0}
/* Color badges */
.c-colors{display:flex;gap:3px;padding:.3rem .7rem;background:rgba(0,0,0,.8);border-top:1px solid rgba(255,255,255,.05);position:relative;z-index:2}
.c-color-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
/* Flavor / skill zone: dark */
.c-flavor{
  padding:.4rem .7rem .5rem;
  background:rgba(0,0,0,.88);
  border-top:1px solid rgba(255,255,255,.05);
  min-height:70px;flex:1;position:relative;z-index:2;
}
.c-flavor-text{font-size:.58rem;color:rgba(255,255,255,.5);font-style:italic;line-height:1.5;display:block;margin-bottom:.25rem}
.c-skill-text{font-size:.58rem;color:var(--cacc,#f1c40f);line-height:1.5;display:block}
/* Form */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:1rem}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:.68rem;letter-spacing:.28em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.frow{margin-bottom:.85rem}
label{display:block;font-size:.72rem;color:var(--text-dim);margin-bottom:.3rem;font-family:'Rajdhani',sans-serif;letter-spacing:.08em;text-transform:uppercase}
input[type=text],input[type=number],textarea,select{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:.55rem .8rem;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:.85rem;transition:border-color .2s;outline:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold-dim)}
textarea{resize:vertical;min-height:65px;line-height:1.5}
select option{background:var(--panel2)}
/* Color multi-select */
.color-multi{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
.cm-btn{padding:.55rem .3rem;border-radius:7px;border:2px solid transparent;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.82rem;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:.2rem;touch-action:manipulation}
.cm-btn .ci{font-size:1.2rem}
.cm-btn.red{background:rgba(192,57,43,.15);color:#e74c3c;border-color:rgba(192,57,43,.25)}
.cm-btn.blue{background:rgba(36,113,163,.15);color:#3498db;border-color:rgba(36,113,163,.25)}
.cm-btn.yellow{background:rgba(212,172,13,.15);color:#f1c40f;border-color:rgba(212,172,13,.25)}
.cm-btn.green{background:rgba(30,132,73,.15);color:#2ecc71;border-color:rgba(30,132,73,.25)}
.cm-btn.red.on{border-color:#e74c3c;box-shadow:0 0 12px rgba(231,76,60,.4);background:rgba(231,76,60,.2)}
.cm-btn.blue.on{border-color:#3498db;box-shadow:0 0 12px rgba(52,152,219,.4);background:rgba(52,152,219,.2)}
.cm-btn.yellow.on{border-color:#f1c40f;box-shadow:0 0 12px rgba(241,196,15,.4);background:rgba(241,196,15,.2)}
.cm-btn.green.on{border-color:#2ecc71;box-shadow:0 0 12px rgba(46,204,113,.4);background:rgba(46,204,113,.2)}
.color-hint{font-size:.68rem;color:var(--text-dim);margin-top:.4rem}
/* Stats row */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
/* Illust */
.illust-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.4rem;margin-bottom:.6rem}
.ib{aspect-ratio:1;background:var(--panel2);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:1.4rem;display:flex;align-items:center;justify-content:center;transition:all .18s;touch-action:manipulation}
.ib:hover{border-color:var(--gold-dim);transform:scale(1.1)}
.ib.on{border-color:var(--gold);background:rgba(201,168,76,.1)}
/* Effect */
.effect-box{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:1rem}
.eff-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.eff-preview{background:rgba(201,168,76,.04);border:1px solid var(--border);border-radius:6px;padding:.6rem;font-size:.75rem;color:var(--gold);font-style:italic;min-height:2rem;line-height:1.5}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;padding:.6rem 1.1rem;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .18s;touch-action:manipulation}
.btn:active{transform:scale(.96)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--deep);box-shadow:0 3px 12px rgba(201,168,76,.3)}
.btn-gold:hover{box-shadow:0 5px 20px rgba(201,168,76,.5)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold-dim)}
.btn-outline:hover{background:rgba(201,168,76,.08)}
.btn-danger{background:transparent;color:#e74c3c;border:1px solid rgba(231,76,60,.3)}
.form-actions{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1rem}
/* Deck */
.deck-panel{margin-top:1rem}
.deck-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:.5rem}
.deck-title{font-family:'Rajdhani',sans-serif;font-size:.95rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.deck-cards{display:flex;flex-wrap:wrap;gap:.6rem;min-height:60px}
.mini{width:70px;height:100px;border-radius:7px;border:1px solid;background:var(--panel2);display:flex;flex-direction:column;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;flex-shrink:0}
.mini:hover{transform:translateY(-4px)}
.mini-art{flex:1;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:rgba(0,0,0,.3)}
.mini-bot{padding:2px 3px;background:rgba(0,0,0,.7)}
.mini-name{font-size:.42rem;font-family:'Rajdhani',sans-serif;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-stats{display:flex;justify-content:space-around;font-size:.48rem;font-family:'Rajdhani',sans-serif}
.mini-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(192,57,43,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;color:#fff;opacity:0;transition:opacity .18s;cursor:pointer;border:none;z-index:5}
.mini:hover .mini-del{opacity:1}
.empty-deck{color:var(--text-dim);font-size:.8rem;font-style:italic;padding:1rem 0}
/* Toast */
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(120px);background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:.65rem 1.3rem;font-family:'Rajdhani',sans-serif;font-size:.85rem;letter-spacing:.1em;color:var(--gold);z-index:1000;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg" id="bgStars"></div>
<div class="wrap">
  <div class="ph">
    <a href="index.html" class="back">← ホーム</a>
    <h1 class="ptitle-main">カード作成</h1>
  </div>

  <div class="layout">
    <!-- Preview -->
    <div class="preview-wrap">
      <div class="prev-label">✦ プレビュー ✦</div>
      <div class="card-tmpl" id="cardTmpl">
        <div class="c-stripe" id="pStripe"></div>
        <div class="c-left" id="pLeft"></div>
        <div class="c-head">
          <div class="c-name" id="pName">カード名</div>
          <div class="c-cost" id="pCost">1</div>
        </div>
        <div class="c-art" id="pArt">🗡️</div>
        <div class="c-colors" id="pColors"></div>
        <div class="c-stats">
          <div class="c-stat-box">
            <span class="c-stat-lbl">ATK</span>
            <span class="c-stat-val" id="pAtk">0</span>
          </div>
          <div class="c-stat-div"></div>
          <div class="c-stat-box">
            <span class="c-stat-lbl">DEF</span>
            <span class="c-stat-val" id="pDef">0</span>
          </div>
        </div>
        <div class="c-flavor">
          <span class="c-flavor-text" id="pFlavor">フレーバーテキスト</span>
          <span class="c-skill-text" id="pSkill"></span>
        </div>
      </div>
      <div style="display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap">
        <button class="btn btn-gold" onclick="saveCard()">＋ 保存</button>
        <button class="btn btn-outline" onclick="resetForm()">リセット</button>
      </div>
    </div>

    <!-- Form -->
    <div>
      <div class="panel">
        <!-- Color multi-select -->
        <div class="sec-title">カラー（複数選択可）</div>
        <div class="color-multi">
          <button class="cm-btn red on" onclick="toggleColor('red',this)" id="cbred"><span class="ci">🔥</span>赤</button>
          <button class="cm-btn blue" onclick="toggleColor('blue',this)" id="cbblue"><span class="ci">💧</span>青</button>
          <button class="cm-btn yellow" onclick="toggleColor('yellow',this)" id="cbyellow"><span class="ci">⚡</span>黄</button>
          <button class="cm-btn green" onclick="toggleColor('green',this)" id="cbgreen"><span class="ci">🌿</span>緑</button>
        </div>
        <div class="color-hint">※複数選択すると多色カードになります。出す時は選択色のいずれかでマッチします。</div>
      </div>

      <div class="panel">
        <div class="sec-title">基本情報</div>
        <div class="frow">
          <label>カード名</label>
          <input type="text" id="cardName" placeholder="例：炎の剣士" maxlength="20" oninput="updatePrev()">
        </div>
        <div class="stats-row">
          <div class="frow">
            <label>コスト</label>
            <input type="number" id="cardCost" value="1" min="1" max="10" oninput="updatePrev()">
          </div>
          <div class="frow">
            <label>攻撃力</label>
            <input type="number" id="cardAtk" value="2" min="0" max="20" oninput="updatePrev()">
          </div>
          <div class="frow">
            <label>防御力</label>
            <input type="number" id="cardDef" value="2" min="0" max="20" oninput="updatePrev()">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="sec-title">イラスト</div>
        <div class="illust-grid" id="illustGrid"></div>
        <div style="font-size:.72rem;color:var(--text-dim);margin-bottom:.35rem">カスタム画像URL:</div>
        <input type="text" id="customUrl" placeholder="https://..." oninput="setCustomImg(this.value)">
      </div>

      <div class="panel">
        <div class="sec-title">フレーバーテキスト</div>
        <div class="frow">
          <textarea id="cardFlavor" placeholder="カードの雰囲気を表す文章..." oninput="updatePrev()"></textarea>
        </div>
      </div>

      <div class="panel">
        <div class="sec-title">スキル設定（カードに自動記載）</div>
        <div class="effect-box">
          <div class="eff-row">
            <div>
              <label>発動条件</label>
              <select id="effTrig" onchange="updateEffect()">
                <option value="">なし</option>
                <option value="onAttack">攻撃時</option>
                <option value="onDefend">防御時</option>
                <option value="onPlay">場に出た時</option>
                <option value="onDamage">ダメージを与えた時</option>
                <option value="onDraw">ドローした時</option>
                <option value="onTurnStart">ターン開始時</option>
              </select>
            </div>
            <div>
              <label>効果</label>
              <select id="effType" onchange="updateEffect()">
                <option value="">なし</option>
                <option value="draw">カードをドロー</option>
                <option value="buffAtk">手札ATKアップ</option>
                <option value="buffDef">手札DEFアップ</option>
                <option value="heal">HPを回復</option>
                <option value="damage">追加ダメージ</option>
                <option value="costReduce">コスト低下</option>
              </select>
            </div>
          </div>
          <div id="effValRow" style="display:none;margin-bottom:.75rem">
            <label>効果量</label>
            <input type="number" id="effVal" value="1" min="1" max="10" oninput="updateEffect()">
          </div>
          <label>スキルプレビュー</label>
          <div class="eff-preview" id="effPreview">スキルなし</div>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-gold" onclick="saveCard()">＋ カードを保存</button>
        <button class="btn btn-outline" onclick="resetForm()">リセット</button>
      </div>
    </div>
  </div>

  <!-- Deck -->
  <div class="panel deck-panel">
    <div class="deck-head">
      <div class="deck-title">🃏 作成済みカード（全員共有）</div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <span style="font-family:'Rajdhani',sans-serif;font-size:.78rem;color:var(--text-dim)" id="deckCount">0枚</span>
        <button class="btn btn-outline" style="padding:.3rem .65rem;font-size:.7rem" onclick="exportDeck()">📤 エクスポート</button>
        <button class="btn btn-outline" style="padding:.3rem .65rem;font-size:.7rem" onclick="importDeck()">📥 インポート</button>
        <button class="btn btn-danger" style="padding:.3rem .65rem;font-size:.7rem" onclick="clearDeck()">🗑 全削除</button>
      </div>
    </div>
    <div class="deck-cards" id="deckCards">
      <div class="empty-deck">まだカードがありません</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const ILLS=['🗡️','🛡️','🔥','💧','⚡','🌿','⚔️','🏹','🪄','🐉','🦋','💀','🌙','☀️','⭐','🌊','🍀','🌸','💎','🔮','🦅','🐺','🦁','🐍','🏔️','🌋','🌪️','❄️','🎯','💥','🌺','🦄'];
const COLOR_MAP={
  red:{border:'#c0392b',accent:'#e74c3c',glow:'rgba(192,57,43,.35)',dot:'#e74c3c'},
  blue:{border:'#2471a3',accent:'#3498db',glow:'rgba(36,113,163,.35)',dot:'#3498db'},
  yellow:{border:'#d4ac0d',accent:'#f1c40f',glow:'rgba(212,172,13,.35)',dot:'#f1c40f'},
  green:{border:'#1e8449',accent:'#2ecc71',glow:'rgba(30,132,73,.35)',dot:'#2ecc71'}
};
const COLOR_NAMES={red:'赤',blue:'青',yellow:'黄',green:'緑'};
const TRIG_TEXT={onAttack:'攻撃時',onDefend:'防御時',onPlay:'場に出た時',onDamage:'ダメージを与えた時',onDraw:'ドローした時',onTurnStart:'ターン開始時'};
const EFF_TEXT={draw:n=>`${n}枚ドロー`,buffAtk:n=>`手札1枚ATK+${n}`,buffDef:n=>`手札1枚DEF+${n}`,heal:n=>`HP+${n}回復`,damage:n=>`追加${n}ダメージ`,costReduce:n=>`コスト-${n}`};

let selColors=['red'], curIll='🗡️', customImg='', savedCards=[];

function loadDeck(){savedCards=JSON.parse(localStorage.getItem('cardrealmDeck')||'[]');renderDeck();}

// Build illust grid
const ig=document.getElementById('illustGrid');
ILLS.forEach((e,i)=>{
  const b=document.createElement('button');
  b.className='ib'+(i===0?' on':'');
  b.textContent=e;
  b.onclick=()=>{
    document.querySelectorAll('.ib').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    curIll=e; customImg='';
    document.getElementById('customUrl').value='';
    updatePrev();
  };
  ig.appendChild(b);
});

window.toggleColor=function(col,btn){
  if(selColors.includes(col)){
    if(selColors.length<=1){showToast('最低1色は選択してください');return;}
    selColors=selColors.filter(c=>c!==col);
    btn.classList.remove('on');
  } else {
    selColors.push(col);
    btn.classList.add('on');
  }
  updatePrev();
};

window.setCustomImg=function(url){
  customImg=url;
  if(url) document.querySelectorAll('.ib').forEach(b=>b.classList.remove('on'));
  updatePrev();
};

function getCardColors(){return selColors;}

function buildCardStyle(){
  const cols=getCardColors();
  const mainC=COLOR_MAP[cols[0]]||COLOR_MAP.red;
  // For multi-color, make gradient
  if(cols.length===1){
    return{border:mainC.border,accent:mainC.accent,glow:mainC.glow,
      stripe:`background:${mainC.accent}`,
      left:`background:${mainC.accent}`};
  }
  const grad=cols.map(c=>COLOR_MAP[c]?.accent||'#888').join(',');
  return{border:cols.map(c=>COLOR_MAP[c]?.border||'#888')[0],accent:mainC.accent,glow:mainC.glow,
    stripe:`background:linear-gradient(90deg,${grad})`,
    left:`background:linear-gradient(180deg,${grad})`};
}

window.updatePrev=function(){
  const name=document.getElementById('cardName').value||'カード名';
  const cost=document.getElementById('cardCost').value||'1';
  const atk=document.getElementById('cardAtk').value||'0';
  const def=document.getElementById('cardDef').value||'0';
  const flavor=document.getElementById('cardFlavor').value||'フレーバーテキスト';

  const s=buildCardStyle();
  const tmpl=document.getElementById('cardTmpl');
  tmpl.style.setProperty('--cb',s.border);
  tmpl.style.setProperty('--cacc',s.accent);
  tmpl.style.setProperty('--cglow',s.glow);

  document.getElementById('pStripe').style.cssText=s.stripe;
  document.getElementById('pLeft').style.cssText=s.left;
  document.getElementById('pName').textContent=name;
  document.getElementById('pCost').textContent=cost;
  document.getElementById('pAtk').textContent=atk;
  document.getElementById('pDef').textContent=def;
  document.getElementById('pFlavor').textContent=flavor;

  // Art
  const art=document.getElementById('pArt');
  if(customImg){
    art.innerHTML=`<img src="${customImg}" onerror="this.outerHTML='🖼️'">`;
  } else {
    art.textContent=curIll;
  }

  // Color dots
  const cd=document.getElementById('pColors');
  cd.innerHTML=getCardColors().map(c=>`<span class="c-color-dot" style="background:${COLOR_MAP[c]?.dot||'#888'}" title="${COLOR_NAMES[c]||c}"></span>`).join('');

  updateEffect();
};

window.updateEffect=function(){
  const trig=document.getElementById('effTrig').value;
  const type=document.getElementById('effType').value;
  const vrow=document.getElementById('effValRow');
  vrow.style.display=(trig&&type)?'block':'none';
  const v=parseInt(document.getElementById('effVal').value)||1;

  let text='スキルなし';
  if(trig&&type){
    const ft=EFF_TEXT[type]?EFF_TEXT[type](v):'';
    text=`【${TRIG_TEXT[trig]||trig}】${ft}`;
  }
  document.getElementById('effPreview').textContent=text;
  document.getElementById('pSkill').textContent=text==='スキルなし'?'':text;
};

function getCardData(){
  const cols=getCardColors();
  return{
    id:Date.now(),
    name:document.getElementById('cardName').value||'名無し',
    colors:cols,color:cols[0],
    cost:parseInt(document.getElementById('cardCost').value)||1,
    atk:parseInt(document.getElementById('cardAtk').value)||0,
    def:parseInt(document.getElementById('cardDef').value)||0,
    flavor:document.getElementById('cardFlavor').value||'',
    illust:customImg||curIll,
    effect:{
      trigger:document.getElementById('effTrig').value,
      type:document.getElementById('effType').value,
      value:parseInt(document.getElementById('effVal').value)||1
    }
  };
}

window.saveCard=function(){
  const card=getCardData();
  if(!card.name||card.name==='名無し'){showToast('カード名を入力してください');return;}
  savedCards.push(card);
  localStorage.setItem('cardrealmDeck',JSON.stringify(savedCards));
  renderDeck();
  showToast(`「${card.name}」を保存しました！`);
};

window.deleteCard=function(id){
  savedCards=savedCards.filter(c=>c.id!==id);
  localStorage.setItem('cardrealmDeck',JSON.stringify(savedCards));
  renderDeck();showToast('削除しました');
};

function renderDeck(){
  const el=document.getElementById('deckCards');
  document.getElementById('deckCount').textContent=savedCards.length+'枚';
  if(!savedCards.length){el.innerHTML='<div class="empty-deck">まだカードがありません</div>';return;}
  el.innerHTML=savedCards.map(card=>{
    const cols=Array.isArray(card.colors)?card.colors:[card.color||'red'];
    const c=COLOR_MAP[cols[0]]||COLOR_MAP.red;
    const border=cols.length>1
      ?`linear-gradient(var(--panel2),var(--panel2)) padding-box, linear-gradient(135deg,${cols.map(x=>COLOR_MAP[x]?.accent||'#888').join(',')}) border-box`
      :c.border;
    const ill=card.illust&&card.illust.startsWith('http')
      ?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='🃏'">`
      :(card.illust||'🃏');
    return `<div class="mini" style="border-color:${cols.length>1?'transparent':c.border};${cols.length>1?`border-image:${border}`:''}box-shadow:0 0 8px ${c.glow}" title="${card.name}">
      <button class="mini-del" onclick="deleteCard(${card.id})">✕</button>
      <div class="mini-art" style="background:rgba(0,0,0,.3)">${ill}</div>
      <div class="mini-bot">
        <div class="mini-stats"><span style="color:${c.accent}">C${card.cost}</span><span>A${card.atk}</span><span>D${card.def}</span></div>
        <div class="mini-name">${card.name}</div>
      </div>
    </div>`;
  }).join('');
}

window.resetForm=function(){
  document.getElementById('cardName').value='';
  document.getElementById('cardCost').value=1;
  document.getElementById('cardAtk').value=2;
  document.getElementById('cardDef').value=2;
  document.getElementById('cardFlavor').value='';
  document.getElementById('customUrl').value='';
  document.getElementById('effTrig').value='';
  document.getElementById('effType').value='';
  document.getElementById('effVal').value=1;
  selColors=['red'];curIll='🗡️';customImg='';
  ['red','blue','yellow','green'].forEach(c=>{
    document.getElementById('cb'+c).classList.toggle('on',c==='red');
  });
  document.querySelectorAll('.ib').forEach((b,i)=>b.classList.toggle('on',i===0));
  updatePrev();
};

window.exportDeck=function(){
  const b=new Blob([JSON.stringify(savedCards,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download='cardrealm-deck.json';a.click();URL.revokeObjectURL(u);
  showToast('エクスポートしました');
};

window.importDeck=function(){
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!Array.isArray(d))throw new Error();
        savedCards=[...savedCards,...d];
        localStorage.setItem('cardrealmDeck',JSON.stringify(savedCards));
        renderDeck();showToast(`${d.length}枚インポートしました`);
      }catch{showToast('インポートに失敗しました');}
    };r.readAsText(f);
  };i.click();
};

window.clearDeck=function(){
  if(!confirm('全カードを削除しますか？'))return;
  savedCards=[];
  localStorage.setItem('cardrealmDeck',JSON.stringify(savedCards));
  renderDeck();showToast('全削除しました');
};

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Stars
const bg=document.getElementById('bgStars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${-Math.random()*4}s`;
  bg.appendChild(s);
}

updatePrev();
loadDeck();
</script>
</body>
</html>
