<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しんウノ — 対戦</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%230e0e1d'/><rect x='20' y='10' width='60' height='80' rx='8' fill='%23c9a84c' opacity='.9'/><text y='62' x='50' text-anchor='middle' font-size='48' font-family='serif'>🃏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#07070f;--panel:#0e0e1d;--panel2:#131325;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,.18);--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--yellow:#f1c40f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column}
#loadScr{position:fixed;inset:0;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:999}
.load-logo{font-family:'Rajdhani',sans-serif;font-size:clamp(1.3rem,5vw,2rem);font-weight:700;color:var(--gold)}
.load-msg{font-family:'Rajdhani',sans-serif;letter-spacing:.15em;color:var(--text-dim);font-size:.85rem}
.load-bar{width:min(200px,80vw);height:3px;background:#141428;border-radius:3px;overflow:hidden}
.load-fill{height:100%;width:0;background:linear-gradient(90deg,#7a6430,#c9a84c);border-radius:3px;transition:width .5s}
#gameApp{display:flex;flex-direction:column;height:100%;overflow:hidden}
/* HUD */
.hud{display:flex;align-items:center;gap:.38rem;padding:.28rem .48rem;background:rgba(10,10,20,.96);border-bottom:1px solid var(--border);flex-shrink:0;min-height:34px}
.hud-back{color:var(--gold-dim);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:.7rem}
.hud-title{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:var(--gold);flex:1;text-align:center}
.hud-turn{font-family:'Rajdhani',sans-serif;font-size:.65rem;color:var(--text-dim);flex-shrink:0}
.tbadge{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;padding:.18rem .48rem;border-radius:4px;text-transform:uppercase;flex-shrink:0}
.tb-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.5)}
.tb-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.5)}
.tb-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.2)}
/* TURN BANNER */
.turn-banner{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.38rem .5rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(.82rem,3.2vw,.95rem);letter-spacing:.1em;text-transform:uppercase;border-bottom:2px solid transparent;transition:background .3s}
.turn-banner.attack{background:rgba(231,76,60,.16);border-bottom-color:rgba(231,76,60,.6);color:var(--red);animation:pA .9s ease-in-out infinite alternate}
.turn-banner.defend{background:rgba(52,152,219,.16);border-bottom-color:rgba(52,152,219,.6);color:var(--blue);animation:pD .9s ease-in-out infinite alternate}
.turn-banner.wait{background:rgba(20,20,40,.6);border-bottom-color:rgba(100,100,130,.2);color:var(--text-dim)}
@keyframes pA{to{background:rgba(231,76,60,.26)}}
@keyframes pD{to{background:rgba(52,152,219,.26)}}
/* MY STATUS */
.my-status{display:flex;align-items:center;gap:.42rem;padding:.32rem .5rem;background:rgba(5,5,18,.94);border-bottom:1px solid var(--border);flex-shrink:0}
.mys-name{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;color:var(--gold);flex-shrink:0;max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mys-hp-row{display:flex;align-items:center;gap:.3rem;flex:1;min-width:70px}
.mys-hp-bar-out{flex:1;height:12px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.mys-hp-bar-in{height:100%;border-radius:6px;transition:width .5s;background:linear-gradient(90deg,#c0392b,#e67e22,#27ae60)}
.mys-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;color:#fff;flex-shrink:0;min-width:40px;text-align:right}
.cost-circle{flex-shrink:0;width:42px;height:42px;border-radius:50%;border:2.5px solid rgba(201,168,76,.5);background:rgba(201,168,76,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .4s,box-shadow .4s}
.cost-circle-lbl{font-family:'Rajdhani',sans-serif;font-size:.4rem;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase;line-height:1}
.cost-circle-num{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--gold);line-height:1}
/* WEATHER */
.wbar{display:flex;align-items:center;gap:.4rem;padding:.24rem .48rem;background:rgba(8,8,20,.85);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.68rem}
.wbar .wc{font-size:.56rem;color:var(--text-dim);margin-left:auto}
/* HINT */
.shint{padding:.24rem .48rem;background:rgba(201,168,76,.07);border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:.62rem;color:var(--gold);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* SCROLL */
.gscroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:.3rem .35rem .3rem}
/* OPPONENTS */
.opp-area{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:.4rem .52rem;margin-bottom:.28rem;transition:border-color .3s}
.opp-area.oa{border-color:rgba(231,76,60,.55)}
.opp-area.od{border-color:rgba(52,152,219,.55)}
.opp-dead{opacity:.45;border-color:rgba(100,100,100,.3)!important}
.opp-info{display:flex;align-items:center;gap:.38rem;flex-wrap:wrap;margin-bottom:.22rem}
.opp-name{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:var(--gold)}
.rpill{font-family:'Rajdhani',sans-serif;font-size:.55rem;font-weight:700;padding:.1rem .36rem;border-radius:3px;text-transform:uppercase}
.rp-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.4)}
.rp-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.4)}
.rp-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.18)}
.rp-dead{background:rgba(60,60,60,.3);color:var(--text-dim);border:1px solid rgba(100,100,100,.25)}
/* Opponent HP row — larger for mobile readability */
.opp-hp-row{display:flex;align-items:center;gap:.3rem;flex:1;min-width:100px}
.opp-hb-out{flex:1;height:10px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;position:relative}
.opp-hb-in{height:100%;border-radius:5px;transition:width .5s;background:linear-gradient(90deg,var(--red),#e67e22,var(--green))}
.opp-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;color:var(--text);min-width:38px;text-align:right}
.opp-cost-c{width:26px;height:26px;border-radius:50%;border:2px solid rgba(201,168,76,.45);background:rgba(201,168,76,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.occ-l{font-family:'Rajdhani',sans-serif;font-size:.35rem;color:var(--gold-dim);text-transform:uppercase;line-height:1}
.occ-n{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;color:var(--gold);line-height:1}
/* BATTLEFIELD */
.battlefield{display:grid;grid-template-columns:1fr 58px 1fr;gap:.28rem;margin:.25rem 0;align-items:start}
.field-col{display:flex;flex-direction:column;gap:.1rem}
.field-lbl{font-family:'Rajdhani',sans-serif;font-size:.5rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-bottom:.1rem}
.field-zone{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:7px;padding:.26rem;min-height:92px;display:flex;align-items:center;justify-content:center}
.field-empty{border:1px dashed rgba(201,168,76,.12);border-radius:5px;width:56px;height:80px;display:flex;align-items:center;justify-content:center;font-size:.95rem;opacity:.13}
.discard-col{display:flex;flex-direction:column;align-items:center;gap:.1rem}
.discard-lbl{font-family:'Rajdhani',sans-serif;font-size:.44rem;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase}
.discard-zone{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.22);border-radius:7px;padding:.26rem;width:58px;min-height:92px;display:flex;align-items:center;justify-content:center}
.discard-none{font-family:'Rajdhani',sans-serif;font-size:.42rem;color:rgba(201,168,76,.28);text-align:center;line-height:1.5}
/* GAME CARD — field/discard small */
.gc{width:56px;height:80px;border-radius:5px;border:1.5px solid;background:var(--panel2);display:flex;flex-direction:column;cursor:pointer;transition:transform .12s;position:relative;overflow:hidden;flex-shrink:0}
.gc:hover{transform:translateY(-5px) scale(1.04)}
.gc.sel{transform:translateY(-12px) scale(1.09);z-index:20;outline:3px solid var(--gold);outline-offset:1px}
.gc.dim{opacity:.2;cursor:not-allowed}
.gc.dim:hover{transform:none}
.gc.static-card,.gc.facedown{cursor:default}
.gc.static-card:hover,.gc.facedown:hover{transform:none}
.gc.facedown{background:repeating-linear-gradient(45deg,var(--panel2)0,var(--panel2)4px,rgba(201,168,76,.04)4px,rgba(201,168,76,.04)8px)}
.gc-cs{height:4px;display:flex;flex-shrink:0;border-radius:3px 3px 0 0}
.gc-cs-seg{flex:1}
.gc-head{padding:2px 3px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.88);flex-shrink:0;gap:2px}
.gc-cost{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.56rem;color:#000;flex-shrink:0}
.gc-name{font-size:.38rem;color:rgba(255,255,255,.65);overflow:hidden;font-family:'Rajdhani',sans-serif;font-weight:700;word-break:break-all;line-height:1.2;max-height:1.6em;flex:1}
.gc-art{height:30px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(0,0,0,.15);position:relative;overflow:hidden;flex-shrink:0}
.gc-art img{width:100%;height:100%;object-fit:contain;background:#12121e}
.gc-stats{display:flex;justify-content:space-around;padding:2px;background:rgba(0,0,0,.9);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.52rem;font-weight:700}
.gc-flavor{flex:1;padding:1px 3px;background:rgba(0,0,0,.85);overflow:hidden;display:flex;flex-direction:column;gap:1px}
.gc-ft{font-size:.38rem;color:rgba(255,255,255,.32);font-style:italic;line-height:1.3;overflow:hidden}
.gc-sl{font-size:.38rem;color:#f1c40f;line-height:1.25;overflow:hidden}
.gc-sdot{position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:#f1c40f;z-index:3}
/* HAND CARD — 2.5x larger */
.gc.hand-card{width:148px;height:232px;border-radius:10px;border:2px solid}
.gc.hand-card:hover{transform:translateY(-11px) scale(1.04)}
.gc.hand-card.sel{transform:translateY(-18px) scale(1.08);outline:3px solid var(--gold);outline-offset:2px}
.gc.hand-card.dim:hover{transform:none}
.gc.hand-card .gc-cs{height:6px;border-radius:8px 8px 0 0}
.gc.hand-card .gc-head{padding:4px 6px}
.gc.hand-card .gc-cost{width:25px;height:25px;font-size:.78rem}
.gc.hand-card .gc-name{font-size:.6rem;max-height:2.4em;word-break:break-all;line-height:1.2}
.gc.hand-card .gc-art{height:88px;font-size:3rem}
.gc.hand-card .gc-stats{font-size:.75rem;padding:3px 5px}
.gc.hand-card .gc-sdot{width:6px;height:6px;top:3px;right:3px}
.gc.hand-card .gc-ft{font-size:.54rem;line-height:1.4;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
.gc.hand-card .gc-sl{font-size:.54rem;line-height:1.35}
/* HAND */
.hs-wrap{margin:.25rem 0 0}
.hand-label{font-family:'Rajdhani',sans-serif;font-size:.58rem;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.2rem;padding:0 .08rem}
.hand-scroll{display:flex;gap:.4rem;overflow-x:auto;padding:.22rem .08rem .38rem;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;min-height:258px;align-items:flex-end}
.hand-scroll::-webkit-scrollbar{height:3px}
.hand-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,.32);border-radius:2px}
/* ACTION BAR */
.abar{display:flex;gap:.28rem;align-items:center;padding:.32rem .42rem;background:rgba(0,0,0,.85);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.22rem;padding:.42rem .72rem;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .12s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap}
.btn:active{transform:scale(.92)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--deep)}
.btn-gold:disabled{opacity:.2;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#1a4a6b,#2471a3);color:#fff}
.btn-blue:disabled{opacity:.2;cursor:not-allowed}
.btn-red{background:linear-gradient(135deg,#7b241c,#c0392b);color:#fff}
.btn-red:disabled{opacity:.2;cursor:not-allowed}
.btn-gray{background:rgba(80,80,100,.22);color:var(--text-dim);border:1px solid rgba(80,80,100,.28);font-size:.66rem;padding:.38rem .55rem}
/* LOG */
.glog{height:54px;overflow-y:auto;padding:.26rem .48rem;background:rgba(0,0,0,.72);border-top:1px solid var(--border);flex-shrink:0;font-size:.63rem;line-height:1.6}
.glog::-webkit-scrollbar{width:3px}
.glog::-webkit-scrollbar-thumb{background:rgba(201,168,76,.25)}
.le{color:var(--text-dim)}.le.hl{color:var(--gold)}.le.dmg{color:var(--red)}.le.heal{color:var(--green)}.le.eff{color:#f1c40f}.le.wth{color:#87ceeb}
/* TOOLTIP */
.tooltip{position:fixed;z-index:500;background:rgba(5,5,18,.97);border:1px solid var(--gold-dim);border-radius:9px;padding:.6rem;font-size:.7rem;max-width:190px;pointer-events:none;display:none;line-height:1.55;backdrop-filter:blur(4px)}
.tt-name{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:.2rem}
.tt-stat{color:var(--text-dim);margin-bottom:.2rem;font-family:'Rajdhani',sans-serif;font-size:.74rem}
.tt-skill{color:#f1c40f;font-style:italic;font-size:.7rem;white-space:pre-wrap}
.tt-flavor{color:var(--text-dim);font-style:italic;font-size:.65rem;margin-top:.18rem;border-top:1px solid var(--border);padding-top:.18rem}
/* VFX — lightweight, CSS-only where possible */
.dmg-float{position:fixed;z-index:600;font-family:'Rajdhani',sans-serif;font-weight:900;pointer-events:none;animation:fup 1.6s ease-out forwards;will-change:transform,opacity}
@keyframes fup{0%{opacity:1;transform:translateY(0)scale(1.2)}80%{opacity:.8}100%{opacity:0;transform:translateY(-80px)scale(.7)}}
.df-r{color:var(--red);font-size:clamp(1.8rem,7vw,2.8rem);text-shadow:0 0 15px var(--red)}
.df-g{color:var(--green);font-size:clamp(1.8rem,7vw,2.8rem);text-shadow:0 0 15px var(--green)}
.hp-pop{position:fixed;z-index:600;font-family:'Rajdhani',sans-serif;font-size:clamp(.85rem,3vw,1.05rem);font-weight:700;pointer-events:none;animation:fup2 1.2s ease-out forwards}
@keyframes fup2{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-22px)}}
.sw{position:fixed;z-index:580;border-radius:50%;pointer-events:none;animation:swA .6s ease-out forwards;will-change:transform,opacity}
@keyframes swA{0%{transform:scale(.1);opacity:.9}100%{transform:scale(5);opacity:0}}
.pt{position:fixed;z-index:585;border-radius:50%;pointer-events:none;animation:ptA var(--dur,.75s) ease-out forwards;will-change:transform,opacity}
@keyframes ptA{0%{transform:translate(0,0)scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty))scale(0);opacity:0}}
.sf{position:fixed;inset:0;z-index:560;pointer-events:none;animation:sfA .5s ease-out forwards}
@keyframes sfA{0%{opacity:.45}100%{opacity:0}}
.bi{position:fixed;bottom:calc(54px + 3rem + .5rem);right:.65rem;z-index:690;pointer-events:none;width:84px;height:120px;border-radius:8px;overflow:hidden;animation:biIn .28s ease-out forwards;will-change:transform,opacity;border:2px solid var(--bi-b,rgba(201,168,76,.5));box-shadow:0 0 22px rgba(0,0,0,.7),0 0 14px var(--bi-g,rgba(201,168,76,.3))}
.bi-art{width:100%;height:calc(100% - 20px);display:flex;align-items:center;justify-content:center;font-size:3.2rem;background:rgba(0,0,0,.3);overflow:hidden}
.bi-art img{width:100%;height:100%;object-fit:cover}
.bi-nm{height:20px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;color:#fff;background:rgba(0,0,0,.82);padding:0 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes biIn{0%{opacity:0;transform:translateX(18px)scale(.85)}100%{opacity:1;transform:translateX(0)scale(1)}}
.bi.out{animation:biOut .22s ease-in forwards}
@keyframes biOut{0%{opacity:1}100%{opacity:0;transform:translateX(12px)}}
/* Card pick modal */
.cpov{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:1rem}
.cpov-t{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:.7rem;text-align:center}
.cpov-s{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;max-height:52vh;overflow-y:auto;padding:.25rem}
.cpov-item{cursor:pointer;border-radius:7px;border:2px solid var(--border);transition:all .18s;touch-action:manipulation}
.cpov-item:hover,.cpov-item:active{border-color:var(--gold);transform:scale(1.05)}
/* Game over */
.gop{position:fixed;bottom:0;left:0;right:0;z-index:800;background:rgba(5,5,18,.97);border-top:2px solid var(--gold);padding:.85rem;backdrop-filter:blur(6px);transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.gop.show{transform:translateY(0)}
.gop-title{font-family:'Rajdhani',sans-serif;font-size:clamp(1.2rem,5.5vw,1.7rem);font-weight:700;text-align:center;margin-bottom:.25rem}
.gop-sub{font-family:'Rajdhani',sans-serif;font-size:.85rem;color:var(--text-dim);text-align:center;margin-bottom:.75rem;line-height:1.55}
.gop-btns{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap}
.proc-ov{position:fixed;inset:0;z-index:750;background:transparent;cursor:wait}
.toast{position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%) translateY(110px);background:var(--panel);border:1px solid var(--gold);border-radius:7px;padding:.5rem 1rem;font-family:'Rajdhani',sans-serif;font-size:.78rem;letter-spacing:.07em;color:var(--gold);z-index:420;transition:transform .32s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
/* Card deal animation */
@keyframes dealCard{
  0%{opacity:0;transform:translateY(-40px) scale(.7) rotate(-8deg)}
  60%{opacity:1;transform:translateY(6px) scale(1.05) rotate(1deg)}
  100%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
}
.hand-card.dealing{animation:dealCard .38s cubic-bezier(.34,1.4,.64,1) forwards}
</style>
</head>
<body>
<div id="loadScr"><div class="load-logo">🃏 しんウノ</div><div class="load-msg" id="loadMsg">対戦を準備中...</div><div class="load-bar"><div class="load-fill" id="loadFill"></div></div></div>
<div id="gameApp" style="display:none">
  <div class="hud">
    <a href="javascript:void(0)" class="hud-back" onclick="leaveToLobby()">← ロビー</a>
    <div class="hud-title">🃏 しんウノ</div>
    <div class="hud-turn" id="hudTurn">T1</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getDatabase,ref,set,onValue,remove,update}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const FB={apiKey:"AIzaSyBsASKwkmpRx_vi7JBqC-fvBl3LOgoOtbo",authDomain:"newcard-8fd59.firebaseapp.com",databaseURL:"https://newcard-8fd59-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"newcard-8fd59",storageBucket:"newcard-8fd59.firebasestorage.app",messagingSenderId:"822236707244",appId:"1:822236707244:web:f2a82f612226d7ac3f6209"};
const db=getDatabase(initializeApp(FB));

// ─── LocalStorage params (set by lobby.html before navigating here) ───
const roomCode=localStorage.getItem('roomCode')||'';
const mySlot=parseInt(localStorage.getItem('mySlot')||'1');
const numP=parseInt(localStorage.getItem('actualPlayers')||localStorage.getItem('numPlayers')||'2');
const myName=localStorage.getItem('myName')||'P'+mySlot;
const pNames=JSON.parse(localStorage.getItem('playerNames')||'{}');
const activeIdStr=localStorage.getItem('activeCardIds')||'all';

// Firebase refs
const gameRef=roomCode?ref(db,`rooms/${roomCode}/gameState`):ref(db,'gameState_solo');
const cardsRef=ref(db,'sharedCards');
const roomRef=roomCode?ref(db,`rooms/${roomCode}`):null;

// ─── Constants ───
const CM={
  red:{border:'#c0392b',accent:'#e74c3c',glow:'rgba(192,57,43,.4)',cost:'#c0392b',dot:'#e74c3c',fx:'rgba(231,76,60,.85)'},
  blue:{border:'#2471a3',accent:'#3498db',glow:'rgba(36,113,163,.4)',cost:'#2471a3',dot:'#3498db',fx:'rgba(52,152,219,.85)'},
  yellow:{border:'#d4ac0d',accent:'#f1c40f',glow:'rgba(212,172,13,.4)',cost:'#d4ac0d',dot:'#f1c40f',fx:'rgba(241,196,15,.85)'},
  green:{border:'#1e8449',accent:'#2ecc71',glow:'rgba(30,132,73,.4)',cost:'#1e8449',dot:'#2ecc71',fx:'rgba(46,204,113,.85)'}
};
const CN={red:'赤',blue:'青',yellow:'黄',green:'緑'};
const WEATHERS=[{id:'sun',icon:'☀️',name:'晴れ',eff:'天候効果なし'},{id:'rain',icon:'🌧️',name:'雨',eff:'コスト-1(最低1)'},{id:'storm',icon:'⛈️',name:'嵐',eff:'全ATK+2'}];

// ─── Mutable state ───
let G=null,pool=[],poolMap={},navigating=false,gameOverShown=false;
let processing=false,selCard=-1;
const newCards=new Set();

// ─── Helpers ───
const wData=id=>WEATHERS.find(w=>w.id===id)||WEATHERS[0];
const getColors=c=>Array.isArray(c.colors)?c.colors:[c.color||'red'];
const mainC=c=>CM[getColors(c)[0]]||CM.red;
const clone=o=>JSON.parse(JSON.stringify(o));
const setLoad=(p,m)=>{document.getElementById('loadFill').style.width=p+'%';document.getElementById('loadMsg').textContent=m;};
function showGame(){document.getElementById('loadScr').style.display='none';document.getElementById('gameApp').style.display='flex';}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

// ─── Pool management ───
// poolMap: cardId → full card with images
// This lets us re-inject images after Firebase strips them
function setPool(cards){
  pool=cards;
  poolMap={};
  cards.forEach(c=>{if(c.id)poolMap[c.id]=c;});
}
function drawCard(){if(!pool.length)return null;return clone(pool[Math.floor(Math.random()*pool.length)]);}
function drawCardWeighted(hand){
  if(!pool.length)return null;
  const myC=new Set();(hand||[]).forEach(c=>getColors(c).forEach(col=>myC.add(col)));
  const w=[];for(const c of pool){const n=getColors(c).some(col=>!myC.has(col));for(let i=0;i<(n?3:1);i++)w.push(c);}
  return clone(w[~~(Math.random()*w.length)]);
}

// ★ KEY FIX: Re-inject images from poolMap into cards that have illust='[img]'
function rehydrate(card){
  if(!card)return card;
  if(card.illust==='[img]'&&card.id&&poolMap[card.id]){
    card.illust=poolMap[card.id].illust;
  }
  return card;
}
function rehydrateState(S){
  if(!S)return S;
  for(const p of Object.values(S.players||{})){
    (p.hand||[]).forEach(rehydrate);
  }
  rehydrate(S.atkCardPlayed);rehydrate(S.defCardPlayed);rehydrate(S.discardCard);
  return S;
}

function applyPool(cards){
  let p=cards;
  if(activeIdStr&&activeIdStr!=='all'){
    try{const ids=new Set(JSON.parse(activeIdStr));p=cards.filter(c=>ids.has(c.id));}catch(e){}
  }
  if(!p.length)p=cards;
  if(!p.length)p=genDefault();
  setPool(p);
}

const cur=S=>(S||G).seq[(S||G).seqIdx%(S||G).seq.length];
const isMyTurn=S=>cur(S).player===mySlot;
const phase=S=>cur(S).phase;
function lockUI(){processing=true;if(!document.getElementById('procOv')){const o=document.createElement('div');o.className='proc-ov';o.id='procOv';document.body.appendChild(o);}}
function unlockUI(){processing=false;const o=document.getElementById('procOv');if(o)o.remove();}

// ─── Weather ───
function wCost(card,S){return(S||G).weather.current==='rain'?Math.max(1,(card.cost||1)-1):(card.cost||1);}
function wAtk(card,S){S=S||G;return(card.atk||0)+(S.weather.current==='storm'?2:0);}
function setWeather(S,id){S.weather.current=id;S.weather.defendsDone=0;S.log.push(`🌤 天候→${wData(id).icon}${wData(id).name}`);}
function weatherTick(S){
  S.weather.defendsDone=(S.weather.defendsDone||0)+1;
  if(S.weather.defendsDone>=2*S.numP){
    S.weather.defendsDone=0;
    const ids=['sun','rain','storm'].filter(w=>w!==S.weather.current);
    const nw=ids[~~(Math.random()*ids.length)]||'sun';
    S.weather.current=nw;S.log.push(`🌤 天候変化→${wData(nw).icon}${wData(nw).name}`);
  }
}

// ─── canPlay ───
function canPlay(card,S){
  S=S||G;const me=S.players[mySlot];if(!me)return false;
  if((me.cost||0)<wCost(card,S))return false;
  const disc=S.discardCard;
  if(disc){const mc=getColors(card),dc=getColors(disc);if(!mc.some(c=>dc.includes(c))&&(card.cost||1)!==(disc.cost||1))return false;}
  for(const e of(card.effects||[])){
    if(e.trigger!=='playCondition')continue;
    const pc=e.playCond||'',cv=parseInt(e.condVal||3);
    if(pc==='ifHpLow'&&(me.hp||0)>cv)return false;
    if(pc==='ifHpHigh'&&(me.hp||0)<cv)return false;
    if(pc==='ifChance'&&Math.random()*100>cv)return false;
    if(pc==='ifWeatherSun'&&S.weather.current!=='sun')return false;
    if(pc==='ifWeatherRain'&&S.weather.current!=='rain')return false;
    if(pc==='ifWeatherStorm'&&S.weather.current!=='storm')return false;
  }
  return true;
}

// ─── Skill text ───
const EFF_DESC={
  draw:n=>`${n}枚ドロー`,selfHeal:n=>`自HP+${n}`,selfDamage:n=>`自-${n}ダメ`,
  selfAtkUp:n=>`手札ATK+${n}`,selfDefUp:n=>`手札DEF+${n}`,
  selfCardAtkUp:n=>`カードATK+${n}`,selfCardDefUp:n=>`カードDEF+${n}`,
  oppDamage:n=>`相手+${n}ダメ`,selfCostDown:n=>`次コスト-${n}`,
  selfCostUp:n=>`自コスト+${n}`,oppCostDown:n=>`相コスト-${n}`,
  oppAtkDown:n=>`相ATK-${n}`,oppDefDown:n=>`相DEF-${n}`,
  weatherSun:()=>'→☀️',weatherRain:()=>'→🌧️',weatherStorm:()=>'→⛈️',weatherChange:()=>'天候変化',
  buffAtk:n=>`手札ATK+${n}`,buffDef:n=>`手札DEF+${n}`,heal:n=>`自HP+${n}`,
  damage:n=>`相手+${n}ダメ`,costReduce:n=>`次コスト-${n}`,costGain:n=>`自コスト+${n}`,
};
const TRIG_S={onAttack:'攻撃時',onDefend:'防御時',onPlay:'出した時',onDamage:'ダメ与',onTakeDmg:'被ダメ',ifHpLow:'HP≤n',ifHpHigh:'HP≥n',ifChance:'n%で',ifWeatherSun:'晴れ時',ifWeatherRain:'雨時',ifWeatherStorm:'嵐時',ifTurnGte:'T≥n',playCondition:'★出し条件'};
const PCOND_S={ifHpLow:'HP≤n',ifHpHigh:'HP≥n',ifChance:'n%',ifWeatherSun:'晴れ時',ifWeatherRain:'雨時',ifWeatherStorm:'嵐時'};
function skillLine(e){
  if(e.trigger==='playCondition')return`★出し条件[${(PCOND_S[e.playCond]||'?').replace(/n/g,e.condVal||'?')}]`;
  const trig=e.trigger||'';const ek=e.eff||e.type||'';const ev=e.effVal||e.value||1;const cv=e.condVal||ev;
  const t=(TRIG_S[trig]||trig).replace(/n/g,cv);const ef=EFF_DESC[ek]?EFF_DESC[ek](ev):'';
  if(!t&&!ef)return '';return`【${t||'常時'}】${ef}`;
}
function cardSkills(card){
  const effs=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type||'',effVal:card.effect.value}]:[]);
  return effs.map(e=>skillLine(e)).filter(Boolean);
}

// ─── Effects ───
function applyEff(card,S,slot,trigger,pickIdx){
  if(!card)return;
  const effs=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type||'',effVal:card.effect.value,condVal:3}]:[]);
  const COND_TRIGS=['ifHpLow','ifHpHigh','ifChance','ifWeatherSun','ifWeatherRain','ifWeatherStorm','ifTurnGte'];
  const PLAY_TRIGS=['onPlay','onAttack','onDefend'];
  const getOpp=sl=>{if(S.numP===2)return sl===1?2:1;const ni=(S.seqIdx+1)%S.seq.length;return S.seq[ni].player;};
  for(const e of effs){
    const trig=e.trigger||'';if(trig==='playCondition')continue;
    const ek=e.eff||e.type||'';const ev=parseInt(e.effVal||e.value||1);const cv=parseInt(e.condVal||ev);
    if(COND_TRIGS.includes(trig)){
      if(!PLAY_TRIGS.includes(trigger))continue;
      if(trig==='ifHpLow'&&(S.players[slot]?.hp||0)>cv)continue;
      if(trig==='ifHpHigh'&&(S.players[slot]?.hp||0)<cv)continue;
      if(trig==='ifChance'&&Math.random()*100>cv)continue;
      if(trig==='ifWeatherSun'&&S.weather.current!=='sun')continue;
      if(trig==='ifWeatherRain'&&S.weather.current!=='rain')continue;
      if(trig==='ifWeatherStorm'&&S.weather.current!=='storm')continue;
      if(trig==='ifTurnGte'&&(S.turnCount||0)<cv)continue;
    } else if(trig!==trigger)continue;
    const p=S.players[slot];if(!p)continue;
    const oppSlot=getOpp(slot);const op=oppSlot?S.players[oppSlot]:null;
    switch(ek){
      case'draw':for(let i=0;i<ev;i++){const d=drawCard();if(d){p.hand.push(d);newCards.add('new_'+(p.hand.length-1));}}S.log.push(`🌟${card.name}→${ev}枚ドロー`);break;
      case'selfHeal':case'heal':if((p.hp||0)>0){p.hp=Math.min(p.maxHp,(p.hp||0)+ev);S.log.push(`🌟${card.name}→自HP+${ev}`);}break;
      case'selfDamage':p.hp=Math.max(0,(p.hp||0)-ev);S.log.push(`🌟${card.name}→自-${ev}ダメ`);break;
      case'selfAtkUp':case'buffAtk':{const idx=pickIdx??0;if(p.hand[idx]){p.hand[idx].atk=(p.hand[idx].atk||0)+ev;S.log.push(`🌟${card.name}→ATK+${ev}`);}}break;
      case'selfDefUp':case'buffDef':{const idx=pickIdx??0;if(p.hand[idx]){p.hand[idx].def=(p.hand[idx].def||0)+ev;S.log.push(`🌟${card.name}→DEF+${ev}`);}}break;
      case'oppDamage':case'damage':if(op){op.hp=Math.max(0,(op.hp||0)-ev);S.log.push(`🌟${card.name}→相手-${ev}ダメ`);}break;
      case'selfCostDown':case'costReduce':p._cB=(p._cB||0)+ev;S.log.push(`🌟${card.name}→次コスト-${ev}`);break;
      case'selfCostUp':case'costGain':p.cost=(p.cost||0)+ev;S.log.push(`🌟${card.name}→自コスト+${ev}`);break;
      case'oppCostDown':if(op){op.cost=Math.max(0,(op.cost||0)-ev);S.log.push(`🌟${card.name}→相コスト-${ev}`);}break;
      case'oppAtkDown':if(op){op._nAtkD=(op._nAtkD||0)+ev;S.log.push(`🌟${card.name}→相ATK-${ev}`);}break;
      case'oppDefDown':if(op){op._nDefD=(op._nDefD||0)+ev;S.log.push(`🌟${card.name}→相DEF-${ev}`);}break;
      case'weatherSun':setWeather(S,'sun');break;case'weatherRain':setWeather(S,'rain');break;
      case'weatherStorm':setWeather(S,'storm');break;
      case'weatherChange':{const ids=['sun','rain','storm'].filter(w=>w!==S.weather.current);setWeather(S,ids[~~(Math.random()*ids.length)]||'sun');}break;
    }
  }
}

// ─── VFX ───
function getCenter(){const bf=document.querySelector('.battlefield');if(!bf)return{x:innerWidth/2,y:innerHeight/2};const r=bf.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function spawnPt(cx,cy,d,sz,col,dur){const e=document.createElement('div');const a=Math.random()*360,rad=a*Math.PI/180;e.style.cssText=`position:fixed;left:${cx-sz/2}px;top:${cy-sz/2}px;width:${sz}px;height:${sz}px;background:${col};border-radius:50%;pointer-events:none;z-index:585;animation:ptA ${dur}s ease-out forwards;--tx:${Math.cos(rad)*d}px;--ty:${Math.sin(rad)*d}px`;document.body.appendChild(e);setTimeout(()=>e.remove(),(dur*1000)+50);}
function flashScreen(col){const f=document.createElement('div');f.style.cssText=`position:fixed;inset:0;background:${col};opacity:.18;pointer-events:none;z-index:560;animation:sfA .5s ease-out forwards`;document.body.appendChild(f);setTimeout(()=>f.remove(),600);}
function floatNum(txt,col,cx,cy){const e=document.createElement('div');e.style.cssText=`position:fixed;left:${cx-25}px;top:${cy-15}px;font-family:'Rajdhani',sans-serif;font-size:clamp(1.6rem,6vw,2.4rem);font-weight:900;color:${col};text-shadow:0 0 12px ${col};pointer-events:none;z-index:600;animation:fup 1.6s ease-out forwards`;e.textContent=txt;document.body.appendChild(e);setTimeout(()=>e.remove(),1800);}
let biTimer=null;
function showBigIllust(card,mc){
  if(biTimer)clearTimeout(biTimer);document.querySelectorAll('.bi').forEach(e=>e.remove());
  const ov=document.createElement('div');ov.className='bi';ov.style.cssText=`position:fixed;bottom:calc(54px + 3.5rem);right:.65rem;z-index:690;pointer-events:none;width:84px;height:120px;border-radius:8px;overflow:hidden;border:2px solid ${mc.border};box-shadow:0 0 18px rgba(0,0,0,.7),0 0 12px ${mc.glow};animation:biIn .28s ease-out forwards`;
  const art=document.createElement('div');art.style.cssText='width:100%;height:calc(100% - 20px);display:flex;align-items:center;justify-content:center;font-size:3rem;background:rgba(0,0,0,.3);overflow:hidden';
  if(card.illust&&card.illust!=='[img]'&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))){const img=document.createElement('img');img.src=card.illust;img.style.cssText='width:100%;height:100%;object-fit:contain;background:#111';art.appendChild(img);}
  else art.textContent=(card.illust&&card.illust!=='[img]')?card.illust:'🃏';
  const nm=document.createElement('div');nm.style.cssText="height:20px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;color:#fff;background:rgba(0,0,0,.85);padding:0 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap";nm.textContent=card.name||'';
  ov.appendChild(art);ov.appendChild(nm);document.body.appendChild(ov);
  biTimer=setTimeout(()=>{ov.style.animation='biOut .22s ease-in forwards';setTimeout(()=>ov.remove(),250);},1700);
}
function triggerVfx(card){
  const vfxSet=new Set(card.vfx||[]);const mc=mainC(card);const{x:cx,y:cy}=getCenter();
  if(vfxSet.size===0||vfxSet.has('bigIllust'))showBigIllust(card,mc);
  flashScreen(mc.fx);
  for(let i=0;i<16;i++)spawnPt(cx,cy,50+Math.random()*100,5+Math.random()*7,mc.fx,.45+Math.random()*.7);
  if(vfxSet.has('fire')||(!vfxSet.size&&getColors(card).includes('red')))for(let i=0;i<6;i++)setTimeout(()=>spawnPt(cx,cy,30+Math.random()*55,8,i%2?'#e74c3c':'#f39c12',.6),i*20);
  if(vfxSet.has('lightning')||(!vfxSet.size&&getColors(card).includes('yellow'))){const l=document.createElement('div');l.style.cssText=`position:fixed;left:${cx-1}px;top:${cy-55}px;width:2px;height:110px;background:linear-gradient(to bottom,transparent,#f1c40f,#fff,#f1c40f,transparent);z-index:575;pointer-events:none;animation:sfA .4s ease-out forwards;box-shadow:0 0 8px #f1c40f`;document.body.appendChild(l);setTimeout(()=>l.remove(),450);}
  if(vfxSet.has('shockwave')){const sw=document.createElement('div');sw.style.cssText=`position:fixed;left:${cx-55}px;top:${cy-55}px;width:110px;height:110px;border-radius:50%;border:4px solid ${mc.fx};pointer-events:none;z-index:580;animation:swA .6s ease-out forwards`;document.body.appendChild(sw);setTimeout(()=>sw.remove(),700);}
  if(vfxSet.has('darkness'))flashScreen('rgba(0,0,0,.5)');
  if(vfxSet.has('rainbow'))flashScreen('linear-gradient(135deg,rgba(255,0,0,.1),rgba(0,200,0,.1),rgba(0,0,255,.1))');
}
function attackEffect(atkCard,dmg,blocked){
  const mc=mainC(atkCard);const{x:cx,y:cy}=getCenter();
  flashScreen(mc.fx);for(let i=0;i<18;i++)spawnPt(cx,cy,60+Math.random()*110,6+Math.random()*8,mc.fx,.45+Math.random()*.75);
  setTimeout(()=>{if(blocked)floatNum('🛡BLOCK','#2ecc71',cx,cy-20);else floatNum('-'+dmg,'#e74c3c',cx,cy-20);},180);
}

// ─── Card pick modal ───
function pickHandCard(hand,title){
  return new Promise(res=>{
    if(!hand?.length){res(-1);return;}
    document.getElementById('cpovT').textContent=title||'手札から1枚選んでください';

// ─── Build game state ───
function genDefault(){
  const cols=[['red'],['blue'],['yellow'],['green'],['red','blue'],['yellow','green']];
  const nms=['騎士','魔法使い','竜','妖精','戦士','弓使い','僧侶','忍者','海賊','錬金術師','天使','悪魔','剣士','盗賊','召喚士','聖騎士','魔剣士','竜騎士','幻術師','召喚魔法'];
  const ils=['⚔️','🔮','🐉','🦋','🛡️','🏹','✨','🌸','🗡️','🧪','👼','😈','⚡','🗺️','📖','🏰','🌙','🦅','🌀','🔥'];
  return nms.map((nm,i)=>({id:'def'+i,name:nm,colors:cols[i%cols.length],color:cols[i%cols.length][0],cost:1+~~(i/4),atk:2+(i%5),def:1+(i%4),illust:ils[i],flavor:'',effects:[],vfx:[]}));
}
function buildState(n){
  if(!pool.length)return null;// Cannot build without cards
  let order=Array.from({length:n},(_,i)=>i+1);
  for(let i=order.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  const seq=[];for(let oi=0;oi<order.length;oi++){seq.push({player:order[oi],phase:'attack'});seq.push({player:order[(oi+1)%order.length],phase:'defend'});}
  const players={};
  for(let oi=0;oi<order.length;oi++){
    const slot=order[oi];
    const hand=Array.from({length:oi===0?7:8},()=>drawCard()).filter(Boolean);
    if(slot===mySlot)hand.forEach((_,i)=>newCards.add('init_'+i));
    // ★ FIX: first attack turn starts with cost 1, first cost recovery happens at turn 2
    // Actually cost starts at 1 and the first endTurn adds +3, so the first attack player
    // needs cost to already be 4 at start (1 initial + would-have-recovered 3)
    // Solution: give everyone cost=4 at start so first turn feels normal
    players[slot]={hp:20,maxHp:20,cost:4,_cB:0,_nAtkD:0,_nDefD:0,hand,alive:true};
  }
  const firstPlayer=seq[0].player;
  return{status:'playing',numP:n,seqIdx:0,seq,players,discardCard:null,atkCardPlayed:null,defCardPlayed:null,playedThisTurn:false,turnCount:0,weather:{current:'sun',changeCount:0,defendsDone:0},log:[`ゲーム開始！先行: P${firstPlayer}「${pNames[firstPlayer]||'P'+firstPlayer}」`]};
}

// ─── Save to Firebase ───
// Strips base64 images (saves bandwidth), cards re-hydrated from poolMap on load
async function save(S){
  try{
    const slim=JSON.parse(JSON.stringify(S));
    // Strip images but keep card id for rehydration
    const stripIll=c=>{if(c?.illust?.startsWith('data:'))c.illust='[img]';};
    for(const p of Object.values(slim.players||{}))(p.hand||[]).forEach(stripIll);
    stripIll(slim.atkCardPlayed);stripIll(slim.defCardPlayed);stripIll(slim.discardCard);
    await set(gameRef,slim);
  }catch(e){console.warn('save fail:',e.message);}
}

// ─── INIT ───
// Phase 1: Load cards (from cache or Firebase), then
// Phase 2: Load/create game state
// Rule: Only mySlot===1 (host) creates game state. Others wait for Firebase.
function init(){
  setLoad(20,'カードを読み込み中...');

  // Try cache first
  let cachedCards=[];
  try{const cd=localStorage.getItem('cardrealmDeck');if(cd)cachedCards=JSON.parse(cd);}catch(e){}

  // ★ KEY: We must have cards before showing the game
  // If we have cached cards, start immediately
  // If not, show loading until Firebase delivers them
  let cardsReady=cachedCards.length>0;
  let gameStateReady=false;

  function tryStartGame(){
    if(!cardsReady||!gameStateReady)return;
    setLoad(100,'開始！');
    setTimeout(showGame,150);
    setTimeout(renderAll,200);
  }

  if(cardsReady){
    applyPool(cachedCards);
    setLoad(50,'ゲーム状態を確認中...');
  }

  // ★ Fetch cards from Firebase ONCE (not continuous listener to save bandwidth)
  // Use onValue with onlyOnce:true for card loading
  onValue(cardsRef,snap=>{
    try{
      const cards=Object.values(snap.val()||{});
      if(cards.length){
        localStorage.setItem('cardrealmDeck',JSON.stringify(cards));
        applyPool(cards);
        cardsReady=true;
        if(!gameStateReady)setLoad(50,'ゲーム状態を確認中...');
        tryStartGame();
      } else if(!cardsReady){
        // No cards in Firebase and no cache - use defaults
        applyPool(genDefault());
        cardsReady=true;
        tryStartGame();
      }
    }catch(e){console.warn('cards error:',e);}
  },{onlyOnce:true});

  // ★ Timeout: if cards don't load in 5s, use defaults
  setTimeout(()=>{
    if(!cardsReady){
      applyPool(genDefault());cardsReady=true;
      tryStartGame();
    }
  },5000);

  // ─── Game state sync ───
  // ★ CRITICAL DESIGN:
  // - Host (mySlot===1): Creates game state, saves to Firebase
  // - Others: Wait for Firebase to deliver host's state
  // - On reconnect: Always use Firebase state (never re-build)
  // - Only skip Firebase update if BOTH turnCount AND seqIdx AND playedThisTurn unchanged
  //   AND hand length unchanged (handles case where only hand changed)
  let firstGameSync=true;

  onValue(gameRef,snap=>{
    try{
      // ★ FIX: Never skip due to processing - we need opponent's moves
      // Only skip if we're mid-animation (brief window)
      const ng=snap.val();

      if(!ng){
        // No game state yet
        if(!firstGameSync)return;// Already processed empty state
        firstGameSync=false;
        if(mySlot===1&&cardsReady){
          // Host creates state
          const newState=buildState(numP);
          if(newState){G=newState;save(G);gameStateReady=true;tryStartGame();}
        } else {
          // Non-host: show loading, wait for host to create state
          setLoad(60,'ホストの開始を待っています...');
          // Will receive state via this same onValue when host saves
        }
        return;
      }

      // Received game state from Firebase
      if(firstGameSync){
        firstGameSync=false;
        // Always trust Firebase on first load
        G=rehydrateState(ng);
        gameStateReady=true;
        tryStartGame();
        return;
      }

      // ★ Subsequent updates: always apply (opponent's moves must be reflected)
      // Skip ONLY if nothing meaningful changed
      const handLenMe=(ng.players?.[mySlot]?.hand||[]).length;
      const handLenNow=(G?.players?.[mySlot]?.hand||[]).length;
      if(ng.turnCount===G?.turnCount&&
         ng.seqIdx===G?.seqIdx&&
         ng.playedThisTurn===G?.playedThisTurn&&
         ng.status===G?.status&&
         handLenMe===handLenNow)return;

      // Apply update with image rehydration
      G=rehydrateState(ng);
      renderAll();checkWin();
    }catch(e){console.warn('gameRef error:',e.message);}
  });

  // Room listener
  if(roomRef){
    onValue(roomRef,snap=>{
      try{
        if(!snap.exists()||navigating)return;
        const room=snap.val();
        if(room.action==='home'){
          navigating=true;
          update(roomRef,{action:null}).catch(()=>{});
          setTimeout(()=>window.location.href='index.html',300);
        } else if(room.action==='rematch'){
          update(roomRef,{action:null}).catch(()=>{});
          gameOverShown=false;firstGameSync=true;
          document.getElementById('gop').classList.remove('show');
          if(mySlot===1&&cardsReady){const ns=buildState(numP);if(ns){G=ns;save(G);renderAll();}}
        }
      }catch(e){console.warn('room error:',e.message);}
    });
  }
}

// ─── Actions ───
window.selCardFn=function(i){
  if(processing)return;
  if(!isMyTurn()){showToast('あなたのターンではありません');return;}
  if(G.playedThisTurn){showToast('今ターンはすでにカードを出しました');return;}
  const card=G.players[mySlot]?.hand?.[i];if(!card)return;
  if(selCard===i){selCard=-1;renderMyHand();updateBtns();return;}
  if(!canPlay(card)){const d=G.discardCard;showToast(d?'出せません（同色/同コスト、または出し条件未達）':'コスト不足か出し条件未達');return;}
  selCard=i;renderMyHand();updateBtns();
};

window.playCard=async function(){
  if(processing||selCard<0||!isMyTurn()||G.playedThisTurn)return;
  lockUI();
  try{
    const me=G.players[mySlot];const card=me.hand?.[selCard];if(!card){unlockUI();return;}
    let pickIdx=-1;
    const needsPick=(card.effects||[]).some(e=>['selfAtkUp','selfDefUp','buffAtk','buffDef'].includes(e.eff||e.type||'')&&(e.trigger==='onPlay'||e.trigger==='onAttack'||e.trigger==='onDefend'||['ifHpLow','ifHpHigh','ifChance'].includes(e.trigger)));
    if(needsPick&&me.hand.length>1){
      const other=me.hand.filter((_,i)=>i!==selCard);
      const pi=await pickHandCard(other,'手札から1枚選んでください');
      pickIdx=pi>=selCard?pi+1:pi;
    }
    const S=clone(G);const p=S.players[mySlot];
    const pc={...card};
    if(p._nAtkD){pc.atk=Math.max(0,(pc.atk||0)-p._nAtkD);p._nAtkD=0;}
    if(p._nDefD){pc.def=Math.max(0,(pc.def||0)-p._nDefD);p._nDefD=0;}
    for(const e of(card.effects||[])){if(e.eff==='selfCardAtkUp')pc.atk=(pc.atk||0)+(e.effVal||1);if(e.eff==='selfCardDefUp')pc.def=(pc.def||0)+(e.effVal||1);}
    const baseCost=wCost(card,S);const finalCost=Math.max(1,baseCost-(p._cB||0));
    if((p.cost||0)<finalCost){showToast('コスト不足');unlockUI();return;}
    p.cost-=finalCost;p._cB=0;
    p.hand.splice(selCard,1);S.playedThisTurn=true;S.discardCard=clone(pc);

    if(phase(S)==='attack'){
      S.atkCardPlayed=clone(pc);S.defCardPlayed=null;S.lastAtkPlayer=mySlot;
      S.log.push(`P${mySlot}「${pNames[mySlot]||myName}」→攻撃「${pc.name}」ATK:${wAtk(pc,S)}`);
      applyEff(pc,S,mySlot,'onPlay',pickIdx);applyEff(pc,S,mySlot,'onAttack',pickIdx);
    } else {
      S.defCardPlayed=clone(pc);
      const atkCard=S.atkCardPlayed;
      if(atkCard){
        const av=wAtk(atkCard,S);const dv=pc.def||0;const dmg=Math.max(0,av-dv);
        if(dmg>0){p.hp=Math.max(0,p.hp-dmg);S.log.push(`⚔「${atkCard.name}」ATK:${av} vs「${pc.name}」DEF:${dv} → ${dmg}ダメ！`);setTimeout(()=>attackEffect(atkCard,dmg,false),150);applyEff(atkCard,S,S.lastAtkPlayer,'onDamage',pickIdx);applyEff(pc,S,mySlot,'onTakeDmg',pickIdx);}
        else{S.log.push(`🛡「${atkCard.name}」ATK:${av} vs「${pc.name}」DEF:${dv} → ブロック！`);setTimeout(()=>attackEffect(atkCard,0,true),150);}
      }
      applyEff(pc,S,mySlot,'onPlay',pickIdx);applyEff(pc,S,mySlot,'onDefend',pickIdx);
      S.atkCardPlayed=null;weatherTick(S);
    }
    const drawn=drawCard();
    if(drawn){p.hand.push(drawn);newCards.add('new_'+(p.hand.length-1));S.log.push(`P${mySlot}→1枚ドロー`);}
    triggerVfx(pc);selCard=-1;G=S;renderAll();checkWin();await save(S);
    setTimeout(async()=>{if(!G||!isMyTurn()||!G.playedThisTurn)return;lockUI();try{await endTurnInternal();}finally{unlockUI();}},900);
  }catch(e){console.error('playCard error',e);showToast('エラー: '+e.message);}
  finally{unlockUI();}
};

window.extraDraw=async function(){
  if(processing||!isMyTurn()||phase()!=='attack'||G.playedThisTurn)return;
  lockUI();try{
    const S=clone(G);const p=S.players[mySlot];
    if((p.hp||0)<=2){showToast('HP2消費できません');return;}
    const card=drawCardWeighted(p.hand);if(!card){showToast('プールが空です');return;}
    p.hp-=2;p.hand.push(card);newCards.add('new_'+(p.hand.length-1));S.log.push(`P${mySlot}がHP-2で追加ドロー`);
    G=S;renderAll();await save(S);showToast('ドロー！');
  }finally{unlockUI();}
};

window.endTurn=async function(){if(processing||!isMyTurn())return;lockUI();try{await endTurnInternal();}finally{unlockUI();}};

async function endTurnInternal(){
  if(!isMyTurn())return;
  const S=clone(G);const c=S.seq[S.seqIdx%S.seq.length];
  if(c.phase==='defend'&&!S.playedThisTurn){
    const atkCard=S.atkCardPlayed;
    if(atkCard){const av=wAtk(atkCard,S);if(av>0){S.players[c.player].hp=Math.max(0,(S.players[c.player].hp||0)-av);S.log.push(`P${c.player}がガードせず${av}ダメ！`);setTimeout(()=>attackEffect(atkCard,av,false),50);applyEff(atkCard,S,S.lastAtkPlayer,'onDamage',-1);}}
  }
  if(c.phase==='defend'){S.atkCardPlayed=null;S.defCardPlayed=null;weatherTick(S);}
  for(let i=1;i<=S.numP;i++){if(S.players[i]&&(S.players[i].hp||0)<=0&&S.players[i].alive!==false){S.players[i].alive=false;S.log.push(`💀 P${i}「${pNames[i]||'P'+i}」脱落！`);}}
  let nextIdx=(S.seqIdx+1)%S.seq.length;
  for(let safe=0;safe<S.seq.length*2;safe++){if(S.players[S.seq[nextIdx%S.seq.length].player]?.alive!==false)break;nextIdx=(nextIdx+1)%S.seq.length;}
  S.seqIdx=nextIdx%S.seq.length;S.playedThisTurn=false;S.turnCount=(S.turnCount||0)+1;
  const next=S.seq[S.seqIdx%S.seq.length];const np=S.players[next.player];
  if(np){np.cost=(np.cost||0)+3;S.log.push(`P${next.player}「${pNames[next.player]||'P'+next.player}」の${next.phase==='attack'?'攻撃':'防御'}ターン（コスト+3）`);}
  selCard=-1;G=S;renderAll();checkWin();await save(S);
}

// ─── Win check ───
function checkWin(){
  if(!G||G.status!=='playing'||gameOverShown)return;
  const alive=[];for(let i=1;i<=G.numP;i++)if(G.players[i]?.alive!==false&&(G.players[i]?.hp||0)>0)alive.push(i);
  if(alive.length>1)return;
  gameOverShown=true;G.status='over';
  const iWin=alive.includes(mySlot)||alive.length===0;
  const winName=alive.length?alive.map(i=>pNames[i]||'P'+i).join('・'):'引き分け';
  document.getElementById('gopTitle').textContent=iWin?'🏆 勝利！':'💀 敗北';
  document.getElementById('gopTitle').style.color=iWin?'var(--gold)':'var(--red)';
  document.getElementById('gopSub').innerHTML=`${winName} の勝利！<br><small style="opacity:.6">${G.log?.[G.log.length-1]||''}</small>`;
  setTimeout(()=>document.getElementById('gop').classList.add('show'),2000);
}

    const d=document.createElement('div');d.className='opp-area'+(isDead?' opp-dead':isAtk?' oa':isDef?' od':'');
    d.innerHTML=`<div class="opp-info"><div class="opp-name">${nm}</div><div class="rpill ${rc}">${rt}</div>
      <div class="opp-hp-row"><span style="font-size:.7rem;flex-shrink:0">❤️</span><div class="opp-hb-out"><div class="opp-hb-in" style="width:${pct}%"></div></div><div class="opp-hp-txt">${p.hp}/${p.maxHp}</div></div>
      <div class="opp-cost-c"><div class="occ-l">cost</div><div class="occ-n">${p.cost||0}</div></div>
      <span style="font-family:'Rajdhani',sans-serif;font-size:.58rem;color:var(--text-dim)">🃏${p.hand?.length||0}</span></div>
    <div style="display:flex;gap:.3rem;flex-wrap:wrap">
      ${!isDead&&p.hand?.length?`<div style="display:flex;gap:.22rem;overflow-x:auto">${Array(Math.min(p.hand.length,6)).fill(0).map(()=>`<div class="gc facedown static-card" style="border-color:rgba(201,168,76,.15);width:36px;height:52px"><div class="gc-art" style="height:26px;font-size:.75rem;z-index:1;position:relative">🃏</div></div>`).join('')}${p.hand.length>6?`<span style="font-size:.52rem;color:var(--text-dim);align-self:center">+${p.hand.length-6}</span>`:''}</div>`:''}
      ${fieldCard?`<div style="flex-shrink:0">${buildGC(fieldCard,false,true)}</div>`:''}
    </div>`;
    el.appendChild(d);
  }
}
function renderBF(){
  document.getElementById('atkZone').innerHTML=G.atkCardPlayed?buildGC(G.atkCardPlayed,false,true):'<div class="field-empty">🗡️</div>';
  document.getElementById('discardZone').innerHTML=G.discardCard?buildGC(G.discardCard,false,true):'<div class="discard-none">なし<br>最初は<br>自由</div>';
  document.getElementById('defZone').innerHTML=G.defCardPlayed?buildGC(G.defCardPlayed,false,true):'<div class="field-empty">🛡️</div>';
}
function renderMyHand(){
  const me=G?.players?.[mySlot];const hand=me?.hand||[];
  const el=document.getElementById('myHand');
  if(!hand.length){el.innerHTML='<div style="color:var(--text-dim);font-size:.76rem;padding:.4rem">手札なし</div>';return;}
  const myT=isMyTurn();
  const sorted=[...hand.map((c,i)=>({card:c,origIdx:i}))].sort((a,b)=>(a.card.cost||0)-(b.card.cost||0));
  el.innerHTML=sorted.map(({card,origIdx:i},si)=>{
    const mc=mainC(card);const cols=getColors(card);
    const effAtk=wAtk(card);const atkCh=effAtk!==(card.atk||0);
    const effCost=Math.max(1,wCost(card)-(me._cB||0));const cstCh=effCost!==card.cost;
    const isSel=selCard===i;
    const isDim=myT?(!G.playedThisTurn?!canPlay(card):true):false;
    const isNew=newCards.has('init_'+i)||newCards.has('new_'+i)||newCards.has('init_'+si);
    if(isNew){newCards.delete('init_'+i);newCards.delete('new_'+i);newCards.delete('init_'+si);}
    const sk=cardSkills(card);
    const cs=cols.map(c=>`<div class="gc-cs-seg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
    return `<div class="gc hand-card${isSel?' sel':''}${isDim?' dim':''}${isNew?' dealing':''}"
      style="border-color:${mc.border};box-shadow:${isSel?'0 0 16px '+mc.glow+',0 0 28px '+mc.glow.replace('.4','.15'):'none'}"
      onclick="${myT&&!isDim&&!processing?`selCardFn(${i})`:'void(0)'}"
      onmouseenter="showTT(event,${i})" onmouseleave="hideTT()"
      ontouchstart="showTT(event,${i})" ontouchend="hideTT()">
      ${sk.length?'<div class="gc-sdot"></div>':''}
      <div class="gc-cs">${cs}</div>
      <div class="gc-head"><div class="gc-cost" style="background:${mc.cost};${cstCh?'outline:2px solid #f1c40f;outline-offset:-1px':''}">${effCost}</div><div class="gc-name">${card.name||'?'}</div></div>
      <div class="gc-art">${buildIll(card)}</div>
      <div class="gc-stats"><span style="color:${atkCh?'#f1c40f':mc.accent}">⚔${effAtk}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div>
      <div class="gc-flavor">${card.flavor?`<div class="gc-ft">${card.flavor}</div>`:''}${sk.map(s=>`<div class="gc-sl">${s}</div>`).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('handCnt').textContent=`(${hand.length}枚)`;
}
function renderLog(){const el=document.getElementById('glog');el.innerHTML=(G.log||[]).slice(-12).map(t=>{let c='le';if(t.includes('ダメ')||t.includes('ガード'))c+=' dmg';else if(t.includes('回復'))c+=' heal';else if(t.includes('🌟'))c+=' eff';else if(t.includes('天候'))c+=' wth';else if(t.includes('ゲーム'))c+=' hl';return`<div class="${c}">▸ ${t}</div>`;}).join('');el.scrollTop=el.scrollHeight;}
function updateBtns(){const myT=isMyTurn();document.getElementById('btnDraw').disabled=!myT||phase()!=='attack'||G.playedThisTurn||processing;document.getElementById('btnPlay').disabled=!myT||selCard<0||G.playedThisTurn||processing;document.getElementById('btnEnd').disabled=!myT||processing;}
window.showTT=function(e,i){
  const me=G?.players?.[mySlot];if(!me)return;const card=me.hand?.[i];if(!card)return;
  document.getElementById('ttN').textContent=card.name||'?';
  document.getElementById('ttS').textContent=`コスト:${Math.max(1,wCost(card)-(me._cB||0))} ATK:${wAtk(card)} DEF:${card.def||0} [${getColors(card).map(c=>CN[c]||c).join('/')}]`;
  document.getElementById('ttSk').textContent=cardSkills(card).join('\n')||'スキルなし';
  document.getElementById('ttF').textContent=card.flavor||'';
  const t=document.getElementById('tooltip');t.style.display='block';
  const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;
  t.style.left=Math.min(cx+12,innerWidth-198)+'px';t.style.top=Math.max(cy-130,5)+'px';
};
window.hideTT=function(){document.getElementById('tooltip').style.display='none';};

// CSS for animations
document.head.insertAdjacentHTML('beforeend',`<style>
@keyframes fup{0%{opacity:1;transform:translateY(0)scale(1.2)}80%{opacity:.8}100%{opacity:0;transform:translateY(-75px)scale(.7)}}
@keyframes sfA{0%{opacity:.45}100%{opacity:0}}
@keyframes swA{0%{transform:scale(.1);opacity:.9}100%{transform:scale(5);opacity:0}}
@keyframes ptA{0%{transform:translate(0,0)scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty))scale(0);opacity:0}}
@keyframes biIn{0%{opacity:0;transform:translateX(16px)scale(.85)}100%{opacity:1;transform:translateX(0)scale(1)}}
@keyframes biOut{0%{opacity:1}100%{opacity:0;transform:translateX(10px)}}
@keyframes dealCard{0%{opacity:0;transform:translateY(-40px)scale(.7)rotate(-8deg)}60%{opacity:1;transform:translateY(6px)scale(1.05)rotate(1deg)}100%{opacity:1;transform:translateY(0)scale(1)rotate(0)}}
.hand-card.dealing{animation:dealCard .38s cubic-bezier(.34,1.4,.64,1) forwards}
</style>`);

init();
</script>
</body>
</html>
