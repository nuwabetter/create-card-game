<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CARD REALM — 対戦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#07070f;--panel:#0e0e1d;--panel2:#131325;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,.18);--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--yellow:#f1c40f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column}

/* LOAD */
#loadScr{position:fixed;inset:0;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:999}
.load-logo{font-family:'Cinzel Decorative',serif;font-size:2.2rem;background:linear-gradient(135deg,#7a6430,#f0d080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.load-msg{font-family:'Rajdhani',sans-serif;letter-spacing:.2em;color:var(--text-dim);font-size:.9rem}
.load-bar{width:220px;height:3px;background:#141428;border-radius:3px;overflow:hidden}
.load-fill{height:100%;width:0;background:linear-gradient(90deg,#7a6430,#c9a84c);border-radius:3px;transition:width .5s}

#gameApp{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* HUD */
.hud{display:flex;align-items:center;gap:.4rem;padding:.32rem .55rem;background:rgba(10,10,20,.95);border-bottom:1px solid var(--border);flex-shrink:0;min-height:38px}
.hud-back{color:var(--gold-dim);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:.72rem;letter-spacing:.08em}
.hud-title{font-family:'Cinzel Decorative',serif;font-size:.78rem;color:var(--gold);flex:1;text-align:center}
.tbadge{font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.08em;padding:.22rem .55rem;border-radius:5px;text-transform:uppercase;flex-shrink:0}
.tb-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.5)}
.tb-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.5)}
.tb-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.2)}

/* ===== TURN BANNER (big, obvious) ===== */
.turn-banner{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:.65rem;padding:.45rem .6rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;transition:all .35s;border-bottom:2px solid transparent}
.turn-banner.attack{background:rgba(231,76,60,.16);border-bottom-color:rgba(231,76,60,.6);color:var(--red);animation:pA .8s ease-in-out infinite alternate}
.turn-banner.defend{background:rgba(52,152,219,.16);border-bottom-color:rgba(52,152,219,.6);color:var(--blue);animation:pD .8s ease-in-out infinite alternate}
.turn-banner.wait{background:rgba(30,30,50,.6);border-bottom-color:rgba(138,128,112,.25);color:var(--text-dim)}
@keyframes pA{to{background:rgba(231,76,60,.26);box-shadow:0 2px 15px rgba(231,76,60,.25)}}
@keyframes pD{to{background:rgba(52,152,219,.26);box-shadow:0 2px 15px rgba(52,152,219,.25)}}
.turn-icon{font-size:1.4rem}

/* MY STATUS BAR */
.my-status{display:flex;align-items:center;gap:.5rem;padding:.38rem .6rem;background:rgba(5,5,18,.92);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.mys-name{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;color:var(--gold);flex-shrink:0;max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mys-hp-row{display:flex;align-items:center;gap:.35rem;flex:1;min-width:90px}
.mys-hp-bar-out{flex:1;height:12px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.mys-hp-bar-in{height:100%;border-radius:6px;transition:width .6s;background:linear-gradient(90deg,#c0392b,#e67e22,#27ae60)}
.mys-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;color:#fff;flex-shrink:0;min-width:46px;text-align:right}
.mys-cost{font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;color:var(--gold);background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.45);border-radius:6px;padding:.2rem .55rem;flex-shrink:0}

/* WEATHER */
.wbar{display:flex;align-items:center;gap:.45rem;padding:.28rem .55rem;background:rgba(8,8,20,.85);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'Rajdhani',sans-serif}
.wi{font-size:1rem}.wn{font-size:.76rem;font-weight:700}.we{font-size:.62rem;color:var(--text-dim)}.wc{font-size:.6rem;color:var(--text-dim);margin-left:auto}

/* HINT */
.shint{padding:.28rem .55rem;background:rgba(201,168,76,.07);border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:.68rem;color:var(--gold);text-align:center;flex-shrink:0;letter-spacing:.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SCROLL */
.gscroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:.35rem .42rem .4rem}

/* OPPONENTS */
.opp-area{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:.45rem .6rem;margin-bottom:.35rem;transition:border-color .3s,box-shadow .3s}
.opp-area.oa{border-color:rgba(231,76,60,.55);box-shadow:0 0 12px rgba(231,76,60,.12)}
.opp-area.od{border-color:rgba(52,152,219,.55);box-shadow:0 0 12px rgba(52,152,219,.12)}
.opp-info{display:flex;align-items:center;gap:.42rem;margin-bottom:.28rem;flex-wrap:wrap}
.opp-name{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;color:var(--gold)}
.rpill{font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.1em;padding:.12rem .4rem;border-radius:3px;text-transform:uppercase}
.rp-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.4)}
.rp-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.4)}
.rp-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.18)}
.opp-hp-row{display:flex;align-items:center;gap:.35rem;flex:1;min-width:80px}
.opp-hb-out{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.opp-hb-in{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--red),#e67e22,var(--green))}
.opp-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.7rem;color:var(--text-dim)}
.opp-cost{font-family:'Rajdhani',sans-serif;font-size:.68rem;color:var(--gold);border:1px solid var(--border);border-radius:4px;padding:.1rem .35rem}

/* BATTLEFIELD */
.battlefield{display:grid;grid-template-columns:1fr 72px 1fr;gap:.35rem;margin:.3rem 0;align-items:start}
.field-col{display:flex;flex-direction:column;gap:.15rem}
.field-lbl{font-family:'Rajdhani',sans-serif;font-size:.54rem;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-bottom:.12rem}
.field-zone{background:rgba(0,0,0,.42);border:1px solid var(--border);border-radius:8px;padding:.32rem;min-height:108px;display:flex;align-items:center;justify-content:center}
.field-empty{border:1px dashed rgba(201,168,76,.12);border-radius:6px;width:68px;height:96px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;opacity:.13}
.discard-col{display:flex;flex-direction:column;align-items:center;gap:.15rem}
.discard-lbl{font-family:'Rajdhani',sans-serif;font-size:.5rem;letter-spacing:.12em;color:var(--gold-dim);text-transform:uppercase}
.discard-zone{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.22);border-radius:8px;padding:.32rem;width:72px;min-height:108px;display:flex;align-items:center;justify-content:center}
.discard-none{font-family:'Rajdhani',sans-serif;font-size:.47rem;letter-spacing:.1em;color:rgba(201,168,76,.28);text-align:center;line-height:1.5}

/* ===== GAME CARD (LARGER) ===== */
.gc{width:82px;height:130px;border-radius:8px;border:2px solid;background:var(--panel2);display:flex;flex-direction:column;cursor:pointer;transition:transform .15s,box-shadow .15s,outline .1s;position:relative;overflow:hidden;flex-shrink:0}
.gc:hover{transform:translateY(-10px) scale(1.06);z-index:10}
.gc.sel{transform:translateY(-16px) scale(1.12);z-index:20;outline:3px solid var(--gold);outline-offset:1px}
.gc.dim{opacity:.22;cursor:not-allowed}
.gc.dim:hover{transform:none}
.gc.static-card{cursor:default}
.gc.static-card:hover{transform:none}
.gc.facedown{background:repeating-linear-gradient(45deg,var(--panel2)0,var(--panel2)4px,rgba(201,168,76,.04)4px,rgba(201,168,76,.04)8px);cursor:default}
/* Multi-color top stripe */
.gc-colstrip{height:5px;display:flex;flex-shrink:0;border-radius:6px 6px 0 0}
.gc-colseg{flex:1}
.gc-head{padding:3px 4px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.88);flex-shrink:0}
.gc-cost{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.65rem;color:#000;flex-shrink:0}
.gc-name{font-size:.5rem;color:rgba(255,255,255,.72);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50px;font-family:'Rajdhani',sans-serif;font-weight:700}
.gc-art{height:52px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:rgba(0,0,0,.15);position:relative;overflow:hidden;flex-shrink:0}
.gc-art img{width:100%;height:100%;object-fit:cover}
.gc-art::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(0,0,0,.8)100%);pointer-events:none}
.gc-stats{display:flex;justify-content:space-around;padding:2px 3px;background:rgba(0,0,0,.9);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700}
/* Flavor + skill — KEY: now visible in game */
.gc-flavor{flex:1;padding:3px 5px;background:rgba(0,0,0,.85);overflow:hidden;display:flex;flex-direction:column;gap:1px}
.gc-flavor-txt{font-size:.48rem;color:rgba(255,255,255,.38);font-style:italic;line-height:1.45;overflow:hidden}
.gc-skill-line{font-size:.47rem;color:#f1c40f;line-height:1.4;overflow:hidden}
.gc-skill-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#f1c40f;box-shadow:0 0 4px #f1c40f;z-index:3}

/* HAND SECTION — full width, large cards */
.hs-wrap{margin:.3rem 0 0}
.hand-label{font-family:'Rajdhani',sans-serif;font-size:.62rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.25rem;padding:0 .1rem}
.hand-scroll{display:flex;gap:.4rem;overflow-x:auto;padding:.25rem .1rem .4rem;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;min-height:140px;align-items:flex-end}
.hand-scroll::-webkit-scrollbar{height:4px}
.hand-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,.32);border-radius:2px}

/* ACTION BAR */
.abar{display:flex;gap:.35rem;align-items:center;padding:.4rem .5rem;background:rgba(0,0,0,.8);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.26rem;padding:.48rem .85rem;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap}
.btn:active{transform:scale(.92)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--deep);box-shadow:0 2px 10px rgba(201,168,76,.35)}
.btn-gold:disabled{opacity:.2;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#1a4a6b,#2471a3);color:#fff}
.btn-blue:disabled{opacity:.2;cursor:not-allowed}
.btn-red{background:linear-gradient(135deg,#7b241c,#c0392b);color:#fff}
.btn-red:disabled{opacity:.2;cursor:not-allowed}
.btn-gray{background:rgba(80,80,100,.25);color:var(--text-dim);border:1px solid rgba(80,80,100,.3);font-size:.72rem;padding:.44rem .65rem}

/* LOG */
.glog{height:60px;overflow-y:auto;padding:.3rem .52rem;background:rgba(0,0,0,.7);border-top:1px solid var(--border);flex-shrink:0;font-size:.68rem;line-height:1.62}
.glog::-webkit-scrollbar{width:3px}
.glog::-webkit-scrollbar-thumb{background:rgba(201,168,76,.25)}
.le{color:var(--text-dim)}.le.hl{color:var(--gold)}.le.dmg{color:var(--red)}.le.heal{color:var(--green)}.le.eff{color:#f1c40f}.le.wth{color:#87ceeb}

/* TOOLTIP */
.tooltip{position:fixed;z-index:500;background:rgba(5,5,18,.97);border:1px solid var(--gold-dim);border-radius:9px;padding:.7rem;font-size:.74rem;max-width:200px;pointer-events:none;display:none;line-height:1.58;backdrop-filter:blur(6px);box-shadow:0 4px 20px rgba(0,0,0,.6)}
.tt-name{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:.22rem}
.tt-stat{color:var(--text-dim);margin-bottom:.22rem;font-family:'Rajdhani',sans-serif;font-size:.78rem}
.tt-skill{color:#f1c40f;font-style:italic;font-size:.74rem;white-space:pre-wrap}
.tt-flavor{color:var(--text-dim);font-style:italic;font-size:.68rem;margin-top:.2rem;border-top:1px solid var(--border);padding-top:.22rem}

/* ===== VFX ===== */
/* Floating numbers */
.dmg-float{position:fixed;z-index:600;font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;pointer-events:none;animation:fup 1.5s ease-out forwards;text-shadow:0 2px 12px rgba(0,0,0,.7)}
@keyframes fup{0%{opacity:1;transform:translateY(0)scale(1)}80%{opacity:.7}100%{opacity:0;transform:translateY(-80px)scale(1.5)}}
.df-r{color:var(--red)}.df-g{color:var(--green)}.df-y{color:var(--yellow)}
/* Shockwave */
.shockwave{position:fixed;z-index:580;border-radius:50%;pointer-events:none;animation:sw .65s ease-out forwards}
@keyframes sw{0%{transform:scale(.1);opacity:.95}100%{transform:scale(5);opacity:0}}
/* Particles */
.particle{position:fixed;z-index:585;border-radius:50%;pointer-events:none;animation:pt var(--dur,.8s) ease-out forwards}
@keyframes pt{0%{transform:translate(0,0)scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty))scale(0);opacity:0}}
/* Screen flash */
.screen-flash{position:fixed;inset:0;z-index:560;pointer-events:none;animation:sf .55s ease-out forwards}
@keyframes sf{0%{opacity:.5}100%{opacity:0}}
/* Big Illust overlay */
.big-illust{position:fixed;inset:0;z-index:700;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);animation:biIn .35s ease-out forwards;pointer-events:none}
.big-illust-inner{max-width:min(85vw,380px);max-height:70vh;position:relative;animation:biScale .35s ease-out forwards}
.big-illust-inner img{width:100%;height:100%;object-fit:contain;border-radius:12px;box-shadow:0 0 60px rgba(0,0,0,.8)}
.big-illust-inner .bi-emoji{font-size:min(40vw,220px);display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 30px rgba(255,255,255,.4))}
.big-illust-name{position:absolute;bottom:-2.5rem;left:0;right:0;text-align:center;font-family:'Cinzel Decorative',serif;font-size:1.3rem;color:var(--gold-light);text-shadow:0 0 20px rgba(201,168,76,.6)}
@keyframes biIn{0%{opacity:0}100%{opacity:1}}
@keyframes biScale{0%{transform:scale(.5) rotate(-5deg);opacity:0}60%{transform:scale(1.08) rotate(1deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.big-illust.out{animation:biOut .3s ease-in forwards}
@keyframes biOut{0%{opacity:1}100%{opacity:0}}
/* Lightning */
.lightning{position:fixed;z-index:575;pointer-events:none;animation:lz .45s ease-out forwards}
@keyframes lz{0%{opacity:1;transform:scaleX(3)}100%{opacity:0;transform:scaleX(.5)}}
/* Darkness */
.darkness{position:fixed;inset:0;z-index:555;pointer-events:none;background:radial-gradient(circle,transparent 20%,rgba(0,0,0,.9)100%);animation:dk .7s ease-out forwards}
@keyframes dk{0%{opacity:1}100%{opacity:0}}
/* Rainbow */
.rainbow{position:fixed;inset:0;z-index:558;pointer-events:none;background:linear-gradient(135deg,rgba(255,0,0,.12),rgba(255,165,0,.12),rgba(255,255,0,.12),rgba(0,255,0,.12),rgba(0,0,255,.12),rgba(238,130,238,.12));animation:rb .7s ease-out forwards}
@keyframes rb{0%{opacity:1}100%{opacity:0}}

/* GAME OVER PANEL (not modal, stays in flow) */
.game-over-panel{position:fixed;bottom:0;left:0;right:0;z-index:800;background:rgba(5,5,18,.97);border-top:2px solid var(--gold);padding:1rem;backdrop-filter:blur(8px);transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.game-over-panel.show{transform:translateY(0)}
.gop-title{font-family:'Cinzel Decorative',serif;font-size:1.8rem;text-align:center;margin-bottom:.3rem;animation:mg 2s ease-in-out infinite}
@keyframes mg{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.4))}50%{filter:drop-shadow(0 0 20px rgba(201,168,76,.9))}}
.gop-sub{font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--text-dim);text-align:center;margin-bottom:.9rem;line-height:1.6}
.gop-btns{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(110px);background:var(--panel);border:1px solid var(--gold);border-radius:7px;padding:.55rem 1.1rem;font-family:'Rajdhani',sans-serif;font-size:.82rem;letter-spacing:.08em;color:var(--gold);z-index:420;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loadScr">
  <div class="load-logo">CARD REALM</div>
  <div class="load-msg" id="loadMsg">対戦を準備中...</div>
  <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
</div>

<div id="gameApp" style="display:none">
  <div class="hud">
    <a href="index.html" class="hud-back">← ホーム</a>
    <div class="hud-title">⚔ CARD REALM</div>
    <div class="tbadge tb-w" id="turnBadge">準備中</div>
  </div>

  <!-- BIG TURN BANNER -->
  <div class="turn-banner wait" id="turnBanner">
    <span class="turn-icon" id="turnBannerIcon">⏳</span>
    <span id="turnBannerText">読み込み中...</span>
  </div>

  <!-- My Status -->
  <div class="my-status">
    <div class="mys-name" id="myNameDisp">あなた</div>
    <div class="mys-hp-row">
      <span style="font-size:.85rem;flex-shrink:0">❤️</span>
      <div class="mys-hp-bar-out"><div class="mys-hp-bar-in" id="myHpBar" style="width:100%"></div></div>
      <div class="mys-hp-txt" id="myHpTxt">20/20</div>
    </div>
    <div class="mys-cost" id="myCostDisp">💎 0</div>
  </div>

  <div class="shint" id="shint">—</div>

  <div class="wbar">
    <div class="wi" id="wIcon">☀️</div>
    <div class="wn" id="wName">晴れ</div>
    <div class="we" id="wEff">天候効果なし</div>
    <div class="wc" id="wChg">—</div>
  </div>

  <div class="gscroll">
    <div id="oppsPanel"></div>

    <div class="battlefield">
      <div class="field-col">
        <div class="field-lbl">🗡️ 攻撃フィールド</div>
        <div class="field-zone" id="atkZone"><div class="field-empty">🗡️</div></div>
      </div>
      <div class="discard-col">
        <div class="discard-lbl">捨て札</div>
        <div class="discard-zone" id="discardZone"><div class="discard-none">なし<br>最初は<br>自由</div></div>
      </div>
      <div class="field-col">
        <div class="field-lbl">🛡️ 防御フィールド</div>
        <div class="field-zone" id="defZone"><div class="field-empty">🛡️</div></div>
      </div>
    </div>

    <div class="hs-wrap">
      <div class="hand-label">あなたの手札 <span id="handCnt" style="color:var(--gold)"></span> — カードをタップして選択</div>

<script type="module">

const FB={apiKey:"AIzaSyCXyreqDjZXIWnZqWZShw1yjwubHduqCoc",authDomain:"createcardgame-8edbf.firebaseapp.com",databaseURL:"https://createcardgame-8edbf-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"createcardgame-8edbf",storageBucket:"createcardgame-8edbf.firebasestorage.app",messagingSenderId:"173024784980",appId:"1:173024784980:web:606d80ee258239d656f3c1"};

// ═══ CONSTANTS ═══
const CM={
  red:   {border:'#c0392b',accent:'#e74c3c',glow:'rgba(192,57,43,.45)',cost:'#c0392b',dot:'#e74c3c',fx:'rgba(231,76,60,.9)'},
  blue:  {border:'#2471a3',accent:'#3498db',glow:'rgba(36,113,163,.45)',cost:'#2471a3',dot:'#3498db',fx:'rgba(52,152,219,.9)'},
  yellow:{border:'#d4ac0d',accent:'#f1c40f',glow:'rgba(212,172,13,.45)',cost:'#d4ac0d',dot:'#f1c40f',fx:'rgba(241,196,15,.9)'},
  green: {border:'#1e8449',accent:'#2ecc71',glow:'rgba(30,132,73,.45)',cost:'#1e8449',dot:'#2ecc71',fx:'rgba(46,204,113,.9)'}
};
const CN={red:'赤',blue:'青',yellow:'黄',green:'緑'};
const WEATHERS=[{id:'sun',icon:'☀️',name:'晴れ',eff:'天候効果なし'},{id:'rain',icon:'🌧️',name:'雨',eff:'コスト-1(最低1)'},{id:'storm',icon:'⛈️',name:'嵐',eff:'ATK×1.5(4回後)'}];

// ═══ STATE ═══
let G=null;
let mySlot=parseInt(localStorage.getItem('mySlot')||'1');
let numP=parseInt(localStorage.getItem('actualPlayers')||'2');
let myName=localStorage.getItem('myName')||('P'+mySlot);
let pNames=JSON.parse(localStorage.getItem('playerNames')||'{}');
let selCard=-1;
let pool=[];

// ═══ HELPERS ═══
const wData=id=>WEATHERS.find(w=>w.id===id)||WEATHERS[0];
const getColors=c=>Array.isArray(c.colors)?c.colors:[c.color||'red'];
const mainC=c=>CM[getColors(c)[0]]||CM.red;
const clone=o=>JSON.parse(JSON.stringify(o));
const setLoad=(p,m)=>{document.getElementById('loadFill').style.width=p+'%';document.getElementById('loadMsg').textContent=m;};
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function drawCard(){if(!pool.length)return null;return clone(pool[Math.floor(Math.random()*pool.length)]);}
const cur=S=>(S||G).seq[(S||G).seqIdx%(S||G).seq.length];
const isMyTurn=S=>cur(S).player===mySlot;
const phase=S=>cur(S).phase;

// ═══ WEATHER ═══
function wCost(card,S){const c=card.cost||1;return (S||G).weather.current==='rain'?Math.max(1,c-1):c;}
function wAtk(card,S){const a=card.atk||0;S=S||G;return (S.weather.current==='storm'&&(S.weather.changeCount||0)>=4)?Math.floor(a*1.5):a;}
function weatherTick(S){
  S.weather.defendsDone=(S.weather.defendsDone||0)+1;
  if(S.weather.defendsDone>=2*S.numP){
    S.weather.defendsDone=0;
    const ids=['sun','rain','storm'];
    const avail=ids.filter(w=>w!==S.weather.current&&(w!=='storm'||(S.weather.changeCount||0)>=3));
    const pick=avail.length?avail[~~(Math.random()*avail.length)]:ids.filter(w=>w!==S.weather.current)[0];
    S.weather.current=pick;S.weather.changeCount=(S.weather.changeCount||0)+1;
    S.log.push(`🌤 天候変化 → ${wData(pick).icon}${wData(pick).name}`);
  }
}
function changeWeatherRandom(S){
  const ids=['sun','rain','storm'];const avail=ids.filter(w=>w!==S.weather.current);
  const pick=avail[~~(Math.random()*avail.length)]||'sun';
  S.weather.current=pick;S.weather.changeCount=(S.weather.changeCount||0)+1;
  S.log.push(`🌤 天候強制変化 → ${wData(pick).icon}${wData(pick).name}`);
}

// ═══ canPlay ═══
function canPlay(card,S){
  if(!S)S=G;const me=S.players[mySlot];if(!me)return false;
  if((me.cost||0)<wCost(card,S))return false;
  const disc=S.discardCard;if(!disc)return true;
  const myC=getColors(card);const dC=getColors(disc);
  return myC.some(c=>dC.includes(c))||card.cost===disc.cost;
}

// ═══ SKILL TEXT (MUST match effect names in card.html) ═══
const EFF_DESC={
  // New unified names — matches card.html exactly
  draw:         n=>`自分${n}枚ドロー`,
  selfAtkUp:    n=>`自分手札ATK+${n}`,
  selfDefUp:    n=>`自分手札DEF+${n}`,
  selfHeal:     n=>`自分HP+${n}回復`,
  oppDamage:    n=>`相手に+${n}ダメージ`,
  selfCostDown: n=>`次コスト-${n}`,
  selfCostUp:   n=>`自コスト+${n}`,
  oppCostDown:  n=>`相コスト-${n}`,
  oppAtkDown:   n=>`相手次ATK-${n}`,
  oppDefDown:   n=>`相手次DEF-${n}`,
  weatherChange:()=>'天候変化',
  // Legacy names (old cards) — mapped for compatibility
  buffAtk:      n=>`自分手札ATK+${n}`,
  buffDef:      n=>`自分手札DEF+${n}`,
  heal:         n=>`自分HP+${n}回復`,
  damage:       n=>`相手に+${n}ダメージ`,
  costReduce:   n=>`次コスト-${n}`,
  costGain:     n=>`自コスト+${n}`,
};
const TRIG_SHORT={
  onAttack:'攻撃時',onDefend:'防御時',onPlay:'出した時',onDamage:'ダメ与',
  onTakeDmg:'被ダメ時',onDraw:'ドロー時',onTurnStart:'ターン開始',
  ifHpLow:'HP低n以下',ifHpHigh:'HP高n以上',ifChance:'n%で',
  ifWeatherSun:'晴れ時',ifWeatherRain:'雨時',ifWeatherStorm:'嵐時',ifTurnGte:'Tn以上',
};
function buildSkillLine(e){
  const trig=e.trigger||'';const effKey=e.eff||e.effType||e.type||'';
  const ev=e.effVal||e.val||e.value||1;const cv=e.condVal||ev;
  const trigTxt=(TRIG_SHORT[trig]||trig).replace(/n/g,cv);
  const effTxt=EFF_DESC[effKey]?EFF_DESC[effKey](ev):'';
  if(!trigTxt&&!effTxt)return '';
  return `【${trigTxt||'常時'}】${effTxt}`;
}
function cardSkillLines(card){
  const effs=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type||'',effVal:card.effect.value}]:[]);
  return effs.map(e=>buildSkillLine(e)).filter(Boolean);
}

// ═══ APPLY EFFECTS (unified key mapping) ═══
// Internal processing: map new+old keys to actions
function applyEff(card,S,slot,trigger){
  if(!card)return;
  const effs=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type||'',effVal:card.effect.value,condVal:3}]:[]);
  const opp=getOpp(slot,S);
  for(const e of effs){
    const trig=e.trigger||'';
    const effKey=e.eff||e.effType||e.type||'';
    const ev=parseInt(e.effVal||e.val||e.value||1);
    const cv=parseInt(e.condVal||ev);
    // Condition checks
    if(trig==='ifHpLow'&&(S.players[slot]?.hp||0)>cv)continue;
    if(trig==='ifHpHigh'&&(S.players[slot]?.hp||0)<cv)continue;
    if(trig==='ifChance'&&Math.random()*100>cv)continue;
    if(trig==='ifWeatherSun'&&S.weather.current!=='sun')continue;
    if(trig==='ifWeatherRain'&&S.weather.current!=='rain')continue;
    if(trig==='ifWeatherStorm'&&S.weather.current!=='storm')continue;
    if(trig==='ifTurnGte'&&(S.turnCount||0)<cv)continue;
    const isCondOnly=['ifHpLow','ifHpHigh','ifChance','ifWeatherSun','ifWeatherRain','ifWeatherStorm','ifTurnGte'].includes(trig);
    if(!isCondOnly&&trig!==trigger)continue;
    if(!S.players[slot])continue;
    const p=S.players[slot];const op=opp?S.players[opp]:null;
    // Execute effect — handle both new and legacy keys
    switch(effKey){
      case 'draw':         {for(let i=0;i<ev;i++){const d=drawCard();if(d)p.hand.push(d);}S.log.push(`🌟「${card.name}」→${ev}枚ドロー`);break;}
      case 'selfAtkUp':case 'buffAtk':{if(p.hand.length){const ri=~~(Math.random()*p.hand.length);p.hand[ri].atk=(p.hand[ri].atk||0)+ev;}S.log.push(`🌟「${card.name}」→自分手札ATK+${ev}`);break;}
      case 'selfDefUp':case 'buffDef':{if(p.hand.length){const ri=~~(Math.random()*p.hand.length);p.hand[ri].def=(p.hand[ri].def||0)+ev;}S.log.push(`🌟「${card.name}」→自分手札DEF+${ev}`);break;}
      case 'selfHeal':case 'heal':    {p.hp=Math.min(p.maxHp,(p.hp||0)+ev);S.log.push(`🌟「${card.name}」→HP+${ev}回復`);const pos=getCenter();healFx(pos.x,pos.y,ev);break;}
      case 'oppDamage':case 'damage': {if(op)op.hp=Math.max(0,(op.hp||0)-ev);S.log.push(`🌟「${card.name}」→相手に${ev}ダメージ`);break;}
      case 'selfCostDown':case 'costReduce':{p._cB=(p._cB||0)+ev;S.log.push(`🌟「${card.name}」→次コスト-${ev}`);break;}
      case 'selfCostUp':case 'costGain':{p.cost=(p.cost||0)+ev;S.log.push(`🌟「${card.name}」→コスト+${ev}`);break;} // NO CAP
      case 'oppCostDown': {if(op)op.cost=Math.max(0,(op.cost||0)-ev);S.log.push(`🌟「${card.name}」→相手コスト-${ev}`);break;}
      case 'oppAtkDown':  {if(op)op._nAtkD=(op._nAtkD||0)+ev;S.log.push(`🌟「${card.name}」→相手次ATK-${ev}`);break;}
      case 'oppDefDown':  {if(op)op._nDefD=(op._nDefD||0)+ev;S.log.push(`🌟「${card.name}」→相手次DEF-${ev}`);break;}
      case 'weatherChange':{changeWeatherRandom(S);break;}
    }
  }
}
function getOpp(slot,S){if(S.numP===2)return slot===1?2:1;const ni=(S.seqIdx+1)%S.seq.length;return S.seq[ni].player;}

// ═══ VFX ═══
function getCenter(){const bf=document.querySelector('.battlefield');if(!bf){return{x:window.innerWidth/2,y:window.innerHeight/2};}const r=bf.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}

function triggerVfx(card){
  const vfxSet=new Set(card.vfx||[]);
  const cols=getColors(card);const mc=mainC(card);
  const pos=getCenter();const cx=pos.x,cy=pos.y;

  // Big Illust (always super prominent)
  if(vfxSet.has('bigIllust')||vfxSet.size===0){
    // Show big illust by default if no VFX set, or if specifically chosen
    if(vfxSet.has('bigIllust')||card.illust){showBigIllust(card);}
  }

  // Shockwave (default if no vfx picked or shockwave chosen)
  if(vfxSet.has('shockwave')||vfxSet.size===0){
    const sw=document.createElement('div');sw.className='shockwave';
    sw.style.cssText=`left:${cx-50}px;top:${cy-50}px;width:100px;height:100px;border:3px solid ${mc.fx};box-shadow:0 0 25px ${mc.fx}`;
    document.body.appendChild(sw);setTimeout(()=>sw.remove(),750);
  }

  // Screen flash
  {const fl=document.createElement('div');fl.className='screen-flash';fl.style.background=mc.fx.replace('.9','.15');document.body.appendChild(fl);setTimeout(()=>fl.remove(),650);}

  // Color-specific effects
  if(vfxSet.has('fire')||cols.includes('red')&&vfxSet.size===0) fireFx(cx,cy);
  if(vfxSet.has('ice') ||cols.includes('blue')&&vfxSet.size===0) iceFx(cx,cy);
  if(vfxSet.has('lightning')||cols.includes('yellow')&&vfxSet.size===0) lightFx(cx,cy);
  if(vfxSet.has('leaf')||cols.includes('green')&&vfxSet.size===0) leafFx(cx,cy);

  // Extra VFX
  if(vfxSet.has('darkness')){const d=document.createElement('div');d.className='darkness';document.body.appendChild(d);setTimeout(()=>d.remove(),800);}
  if(vfxSet.has('rainbow')){const rb=document.createElement('div');rb.className='rainbow';document.body.appendChild(rb);setTimeout(()=>rb.remove(),800);}
  if(vfxSet.has('coins')){coinsFx(cx,cy);}

  // Multi-color particles (always)
  const pColors=cols.map(c=>CM[c]?.fx||'#fff');
  for(let i=0;i<16;i++){
    const p=document.createElement('div');p.className='particle';
    const a=Math.random()*360;const d=45+Math.random()*90;const rad=a*Math.PI/180;const dur=.45+Math.random()*.65;
    p.style.cssText=`left:${cx-4}px;top:${cy-4}px;width:7px;height:7px;background:${pColors[i%pColors.length]};--tx:${Math.cos(rad)*d}px;--ty:${Math.sin(rad)*d}px;--dur:${dur}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),(dur*1000)+50);
  }
}

let bigIllustTimer=null;
function showBigIllust(card){
  if(bigIllustTimer)clearTimeout(bigIllustTimer);
  document.querySelectorAll('.big-illust').forEach(el=>el.remove());
  const ov=document.createElement('div');ov.className='big-illust';
  const inner=document.createElement('div');inner.className='big-illust-inner';
  if(card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))){
    const img=document.createElement('img');img.src=card.illust;img.onerror=()=>{inner.innerHTML='';const e=document.createElement('div');e.className='bi-emoji';e.textContent=card.illust;inner.appendChild(e);};inner.appendChild(img);
  } else {
    const emoji=document.createElement('div');emoji.className='bi-emoji';emoji.textContent=card.illust||'🃏';inner.appendChild(emoji);
  }
  const nameEl=document.createElement('div');nameEl.className='big-illust-name';nameEl.textContent=card.name||'';inner.appendChild(nameEl);
  ov.appendChild(inner);document.body.appendChild(ov);
  bigIllustTimer=setTimeout(()=>{ov.classList.add('out');setTimeout(()=>ov.remove(),350);},1600);
}

function floatNum(txt,cls,cx,cy){const el=document.createElement('div');el.className='dmg-float '+cls;el.textContent=txt;el.style.cssText=`left:${cx-20}px;top:${cy-35}px`;document.body.appendChild(el);setTimeout(()=>el.remove(),1600);}
function healFx(cx,cy,n){floatNum('+'+n,'df-g',cx,cy);for(let i=0;i<10;i++){const p=document.createElement('div');p.className='particle';const a=Math.random()*360;const d=30+Math.random()*55;const rad=a*Math.PI/180;const dur=.5+Math.random()*.6;p.style.cssText=`left:${cx-4}px;top:${cy-4}px;width:7px;height:7px;background:#2ecc71;--tx:${Math.cos(rad)*d}px;--ty:${Math.sin(rad)*d}px;--dur:${dur}s`;document.body.appendChild(p);setTimeout(()=>p.remove(),(dur*1000)+50);}}
function fireFx(cx,cy){for(let i=0;i<12;i++){setTimeout(()=>{const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${cx-4}px;top:${cy-4}px;width:9px;height:9px;border-radius:50% 50% 50% 0;background:${i%2?'#e74c3c':'#f39c12'};--tx:${(Math.random()-.5)*70}px;--ty:${-35-Math.random()*75}px;--dur:.8s`;document.body.appendChild(p);setTimeout(()=>p.remove(),900);},i*25);}}
function iceFx(cx,cy){for(let i=0;i<10;i++){const p=document.createElement('div');p.className='particle';const a=i/10*360;const d=55+Math.random()*45;const rad=a*Math.PI/180;p.style.cssText=`left:${cx-2}px;top:${cy-6}px;background:#74b9ff;width:4px;height:14px;border-radius:2px;transform:rotate(${a}deg);--tx:${Math.cos(rad)*d}px;--ty:${Math.sin(rad)*d}px;--dur:.65s`;document.body.appendChild(p);setTimeout(()=>p.remove(),750);}}
function lightFx(cx,cy){const lz=document.createElement('div');lz.className='lightning';lz.style.cssText=`left:${cx-1}px;top:${cy-65}px;width:2px;height:130px;background:linear-gradient(to bottom,transparent,#f1c40f,#fff,#f1c40f,transparent);z-index:575;box-shadow:0 0 12px #f1c40f`;document.body.appendChild(lz);setTimeout(()=>lz.remove(),550);}
function leafFx(cx,cy){const l=['🍃','🍀','🌿','🌱'];for(let i=0;i<8;i++){const id='lf'+Date.now()+i;const el=document.createElement('div');el.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;font-size:1.1rem;z-index:585;pointer-events:none`;el.textContent=l[i%l.length];const tx=(Math.random()-.5)*100;const ty=-25-Math.random()*90;const rot=Math.random()*360;document.head.insertAdjacentHTML('beforeend',`<style>@keyframes lf${id}{0%{opacity:1;transform:translate(0,0)rotate(0)}100%{opacity:0;transform:translate(${tx}px,${ty}px)rotate(${rot}deg)}}</style>`);el.style.animation=`lf${id} .9s ease-out forwards`;document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}}
function coinsFx(cx,cy){for(let i=0;i<14;i++){const p=document.createElement('div');p.className='particle';const a=Math.random()*360;const d=50+Math.random()*70;const rad=a*Math.PI/180;const dur=.5+Math.random()*.7;p.style.cssText=`left:${cx-4}px;top:${cy-4}px;width:8px;height:8px;background:${i%3===0?'#f1c40f':i%3===1?'#fff':'#e67e22'};border-radius:${i%2?'50%':'2px'};--tx:${Math.cos(rad)*d}px;--ty:${Math.sin(rad)*d}px;--dur:${dur}s`;document.body.appendChild(p);setTimeout(()=>p.remove(),(dur*1000)+50);}}

function attackEffect(atkCard,dmg,blocked){
  const cols=getColors(atkCard);const mc=mainC(atkCard);const pos=getCenter();const cx=pos.x,cy=pos.y;
  // Flash
  const fl=document.createElement('div');fl.className='screen-flash';fl.style.background=mc.fx.replace('.9','.2');document.body.appendChild(fl);setTimeout(()=>fl.remove(),600);
  // Shockwave
  const sw=document.createElement('div');sw.className='shockwave';sw.style.cssText=`left:${cx-55}px;top:${cy-55}px;width:110px;height:110px;border:4px solid ${mc.fx};box-shadow:0 0 30px ${mc.fx}`;document.body.appendChild(sw);setTimeout(()=>sw.remove(),750);
  // Particles
  const pColors=cols.map(c=>CM[c]?.fx||'#fff');
  for(let i=0;i<18;i++){const p=document.createElement('div');p.className='particle';const a=Math.random()*360;const d=50+Math.random()*100;const rad=a*Math.PI/180;const dur=.45+Math.random()*.7;p.style.cssText=`left:${cx-4}px;top:${cy-4}px;width:8px;height:8px;background:${pColors[i%pColors.length]};--tx:${Math.cos(rad)*d}px;--ty:${Math.sin(rad)*d}px;--dur:${dur}s`;document.body.appendChild(p);setTimeout(()=>p.remove(),(dur*1000)+50);}
  // Number
  setTimeout(()=>{if(blocked){floatNum('BLOCK!','df-g',cx,cy);}else{floatNum('-'+dmg,'df-r',cx,cy);}},200);
  // Color FX
  if(cols.includes('red'))fireFx(cx,cy);
  if(cols.includes('blue'))iceFx(cx,cy);
  if(cols.includes('yellow'))lightFx(cx,cy);
  if(cols.includes('green'))leafFx(cx,cy);
}

// ═══ BUILD STATE ═══
function buildState(n){
  // ★ RANDOM turn order
  let order=Array.from({length:n},(_,i)=>i+1);
  for(let i=order.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  const seq=[];
  for(let oi=0;oi<order.length;oi++){
    seq.push({player:order[oi],phase:'attack'});
    seq.push({player:order[(oi+1)%order.length],phase:'defend'});
  }
  const players={};
  for(let oi=0;oi<order.length;oi++){
    const slot=order[oi],isFirst=oi===0;
    const hand=Array.from({length:isFirst?7:8},()=>drawCard()).filter(Boolean);
    players[slot]={hp:20,maxHp:20,cost:isFirst?1:2,_cB:0,_nAtkD:0,_nDefD:0,hand};
    // ★ NO maxCost cap
  }
  return{
    status:'playing',numP:n,seqIdx:0,seq,players,
    discardCard:null,atkCardPlayed:null,defCardPlayed:null,
    playedThisTurn:false,turnCount:0,
    weather:{current:'sun',changeCount:0,defendsDone:0},
    log:[`ゲーム開始！先行: P${seq[0].player}「${pNames[seq[0].player]||'P'+seq[0].player}」`]
  };
}

// ═══ INIT ═══
async function init(){
  setLoad(15,'カード読み込み中...');
  const activeIdStr=localStorage.getItem('activeCardIds')||'all';
  const csnap=await get(cardsRef);
  const allCards=Object.values(csnap.val()||{});
  if(activeIdStr==='all'||!activeIdStr){pool=allCards;}
  else{const ids=new Set(JSON.parse(activeIdStr));pool=allCards.filter(c=>ids.has(c.id));if(!pool.length)pool=allCards;}
  if(!pool.length)pool=genDefault();

  setLoad(40,'ゲーム確認...');
  const snap=await get(gameRef);const ex=snap.val();
  if(ex&&ex.status==='playing'&&ex.numP===numP){G=ex;setLoad(85,'復帰中...');}
  else{setLoad(60,'初期化中...');G=buildState(numP);await save(G);}
  setLoad(100,'開始！');
  setTimeout(()=>{document.getElementById('loadScr').style.display='none';document.getElementById('gameApp').style.display='flex';renderAll();},350);
  onValue(gameRef,snap=>{if(!snap.val())return;G=snap.val();renderAll();checkWin();});
}

async function save(s){G=s;try{await set(gameRef,s);}catch(e){console.warn('save fail',e);}renderAll();checkWin();}

// ═══ ACTIONS ═══
window.selCardFn=function(i){
  if(!isMyTurn()){showToast('あなたのターンではありません');return;}
  if(G.playedThisTurn){showToast('今ターンはすでにカードを出しました');return;}
  const card=G.players[mySlot]?.hand?.[i];if(!card)return;
  if(selCard===i){selCard=-1;renderMyHand();updateBtns();return;}
  const cost=wCost(card);
  if((G.players[mySlot].cost||0)<cost){showToast(`コスト不足 (必要:${cost} 所持:${G.players[mySlot].cost||0})`);return;}
  if(!canPlay(card)){const disc=G.discardCard;showToast(disc?`出せません（捨て札「${disc.name}」と同色/同コストのみ）`:'コスト不足');return;}
  selCard=i;renderMyHand();updateBtns();
};

window.playCard=async function(){
  if(selCard<0||!isMyTurn()||G.playedThisTurn)return;
  const me=G.players[mySlot];const card=me.hand?.[selCard];if(!card)return;
  const S=clone(G);const p=S.players[mySlot];
  const pc={...card};
  if(p._nAtkD){pc.atk=Math.max(0,(pc.atk||0)-p._nAtkD);p._nAtkD=0;}
  if(p._nDefD){pc.def=Math.max(0,(pc.def||0)-p._nDefD);p._nDefD=0;}
  const cost=wCost(card,S);const bonus=p._cB||0;
  p.cost-=Math.max(0,cost-bonus);p._cB=0;
  p.hand.splice(selCard,1);S.playedThisTurn=true;
  S.discardCard=clone(pc); // ★ immediate discard update

  if(phase(S)==='attack'){
    S.atkCardPlayed=clone(pc);S.defCardPlayed=null;S.lastAtkPlayer=mySlot;
    const av=wAtk(pc,S);
    S.log.push(`P${mySlot}「${pNames[mySlot]||myName}」→攻撃「${pc.name}」ATK:${av}`);
    applyEff(pc,S,mySlot,'onPlay');applyEff(pc,S,mySlot,'onAttack');
    triggerVfx(pc); // ★ VFX on attack
  } else {
    S.defCardPlayed=clone(pc);
    const atkCard=S.atkCardPlayed;
    if(atkCard){
      const av=wAtk(atkCard,S);const dv=pc.def||0;const dmg=Math.max(0,av-dv);
      if(dmg>0){p.hp=Math.max(0,p.hp-dmg);S.log.push(`⚔ 「${atkCard.name}」ATK:${av} vs 「${pc.name}」DEF:${dv} → ${dmg}ダメ！`);setTimeout(()=>attackEffect(atkCard,dmg,false),150);applyEff(atkCard,S,S.lastAtkPlayer,'onDamage');applyEff(pc,S,mySlot,'onTakeDmg');}
      else{S.log.push(`🛡 「${atkCard.name}」ATK:${av} vs 「${pc.name}」DEF:${dv} → ブロック！`);setTimeout(()=>attackEffect(atkCard,0,true),150);}
    }
    applyEff(pc,S,mySlot,'onPlay');applyEff(pc,S,mySlot,'onDefend');
    S.atkCardPlayed=null;weatherTick(S);
    triggerVfx(pc); // ★ VFX on defend
  }
  selCard=-1;await save(S);
};

window.extraDraw=async function(){
  if(!isMyTurn()||phase()!=='attack')return;
  const S=clone(G);const p=S.players[mySlot];
  if((p.hp||0)<=2){showToast('HP2消費できません');return;}
  const card=drawCard();if(!card){showToast('カードプールが空です');return;}
  p.hp-=2;p.hand.push(card);applyEff(card,S,mySlot,'onDraw');
  S.log.push(`P${mySlot}がHP2消費で追加ドロー`);await save(S);showToast('ドロー！');
};

window.endTurn=async function(){
  if(!isMyTurn())return;
  const S=clone(G);const c=S.seq[S.seqIdx%S.seq.length];
  if(c.phase==='defend'&&!S.playedThisTurn){
    const atkCard=S.atkCardPlayed;
    if(atkCard){const av=wAtk(atkCard,S);if(av>0){S.players[c.player].hp=Math.max(0,(S.players[c.player].hp||0)-av);S.log.push(`P${c.player}がガードせず ${av}ダメ！`);setTimeout(()=>attackEffect(atkCard,av,false),50);applyEff(atkCard,S,S.lastAtkPlayer,'onDamage');}}}
  if(c.phase==='defend'){S.atkCardPlayed=null;S.defCardPlayed=null;weatherTick(S);}
  S.seqIdx=(S.seqIdx+1)%S.seq.length;S.playedThisTurn=false;S.turnCount=(S.turnCount||0)+1;
  const next=S.seq[S.seqIdx%S.seq.length];const np=S.players[next.player];
  if(next.phase==='attack'){
    if(np){S.atkCardPlayed=null;S.defCardPlayed=null;const d=drawCard();if(d){np.hand.push(d);applyEff(d,S,next.player,'onDraw');}
    // ★ cost recovery: +3 (no cap)
    np.cost=(np.cost||0)+3;
    S.log.push(`P${next.player}「${pNames[next.player]||'P'+next.player}」の攻撃ターン（コスト+3、1ドロー）`);}
  } else {
    if(np){np.cost=(np.cost||0)+3;S.log.push(`P${next.player}「${pNames[next.player]||'P'+next.player}」の防御ターン（コスト+3）`);} // ★ also +3
  }
  if(np)applyEff({effects:[]},S,next.player,'onTurnStart');
  selCard=-1;await save(S);
};

window.forceEnd=async function(){
  if(!confirm('試合を強制終了しますか？'))return;
  await remove(gameRef);await remove(lobbyRef);await remove(lobbyCtrlRef);window.location.href='index.html';
};
window.rematch=async function(){
  document.getElementById('gameOverPanel').classList.remove('show');
  await remove(lobbyRef);await remove(lobbyCtrlRef);G=buildState(numP);await save(G);selCard=-1;
};

// ═══ WIN CHECK — no instant popup ═══
let gameOverShown=false;
function checkWin(){
  if(!G||G.status!=='playing'||gameOverShown)return;
  const dead=[];
  for(let i=1;i<=G.numP;i++)if(G.players[i]&&(G.players[i].hp||0)<=0)dead.push(i);
  if(!dead.length)return;
  gameOverShown=true;G.status='over';
  const survivors=[];for(let i=1;i<=G.numP;i++)if(!dead.includes(i))survivors.push(i);
  const iLose=dead.includes(mySlot);
  const winNames=survivors.map(i=>pNames[i]||'P'+i).join('・');
  const deadNames=dead.map(i=>pNames[i]||'P'+i).join('・');
  document.getElementById('gopTitle').textContent=iLose?'💀 敗北':'🏆 勝利！';
  document.getElementById('gopTitle').style.color=iLose?'var(--red)':'var(--gold)';
  // Show cause of defeat
  const lastDmg=G.log?.[G.log.length-1]||'';
  document.getElementById('gopSub').innerHTML=iLose
    ?`${winNames} の勝利です<br><small style="font-size:.78rem;opacity:.7">${lastDmg}</small>`
    :`おめでとうございます！<br><small style="font-size:.78rem;opacity:.7">${deadNames} が敗北</small>`;
  // Slide up after 2 seconds
  setTimeout(()=>document.getElementById('gameOverPanel').classList.add('show'),2000);
}

// ═══ RENDER ═══
function renderAll(){if(!G)return;renderMyStatus();renderTurnBanner();renderStatusHint();renderWeather();renderOpps();renderBattlefield();renderMyHand();renderLog();updateBtns();}

function renderMyStatus(){
  const me=G.players[mySlot];if(!me)return;
  const pct=Math.max(0,Math.min(100,(me.hp/me.maxHp)*100));
  document.getElementById('myNameDisp').textContent=(pNames[mySlot]||myName)+' 👤';
  document.getElementById('myHpBar').style.width=pct+'%';
  document.getElementById('myHpTxt').textContent=`${me.hp}/${me.maxHp}`;
  document.getElementById('myCostDisp').textContent=`💎 ${me.cost||0}`;
}

function renderTurnBanner(){
  const c=cur();const tb=document.getElementById('turnBadge');
  const banner=document.getElementById('turnBanner');
  const icon=document.getElementById('turnBannerIcon');
  const txt=document.getElementById('turnBannerText');
  if(isMyTurn()&&phase()==='attack'){
    tb.className='tbadge tb-a';tb.textContent='あなたの攻撃';
    banner.className='turn-banner attack';icon.textContent='⚔️';txt.textContent='あなたの攻撃ターン — カードを選んで「出す」を押してください';
  } else if(isMyTurn()&&phase()==='defend'){
    tb.className='tbadge tb-d';tb.textContent='あなたの防御';
    banner.className='turn-banner defend';icon.textContent='🛡️';txt.textContent='あなたの防御ターン — 防御カードを出すかターン終了（ノーガード）';
  } else {
    const name=pNames[c.player]||`P${c.player}`;
    tb.className='tbadge tb-w';tb.textContent=`${name}の${phase()==='attack'?'攻撃':'防御'}`;
    banner.className='turn-banner wait';icon.textContent='⏳';txt.textContent=`${name} のターン（${phase()==='attack'?'攻撃中':'防御中'}）— お待ちください`;
  }
}

function renderStatusHint(){
  const sh=document.getElementById('shint');const disc=G.discardCard;
  const discInfo=disc?`捨て札:「${disc.name}」[${getColors(disc).map(x=>CN[x]||x).join('/')} C${disc.cost}]`:'捨て札なし（最初は何でも出せる）';
  const atkInfo=G.atkCardPlayed?` | 攻撃中:「${G.atkCardPlayed.name}」ATK:${wAtk(G.atkCardPlayed)}`:'';
  sh.textContent=discInfo+atkInfo;
}

function renderWeather(){
  const w=wData(G.weather.current);
  document.getElementById('wIcon').textContent=w.icon;document.getElementById('wName').textContent=w.name;
  document.getElementById('wEff').textContent=w.eff+(G.weather.current==='storm'&&(G.weather.changeCount||0)<4?' ※4回変化後':'');
  document.getElementById('wChg').textContent=`変化まで${2*G.numP-(G.weather.defendsDone||0)}防御`;
}

function renderOpps(){
  const pp=document.getElementById('oppsPanel');pp.innerHTML='';const c=cur();
  for(let i=1;i<=G.numP;i++){
    if(i===mySlot)continue;const p=G.players[i];if(!p)continue;
    const isAtk=c.player===i&&c.phase==='attack';const isDef=c.player===i&&c.phase==='defend';
    const pct=Math.max(0,Math.min(100,(p.hp/p.maxHp)*100));
    const cls='opp-area'+(isAtk?' oa':isDef?' od':'');
    const rc=isAtk?'rp-a':isDef?'rp-d':'rp-w';const rt=isAtk?'攻撃中':isDef?'防御中':'待機';
    const name=pNames[i]||`P${i}`;
    const d=document.createElement('div');d.className=cls;
    // Show field card if opponent has one
    const oppAtkCard=(G.atkCardPlayed&&G.lastAtkPlayer===i)?G.atkCardPlayed:null;
    const oppDefCard=G.defCardPlayed&&isDef?G.defCardPlayed:null;
    const fieldCardShow=oppAtkCard||oppDefCard;
    d.innerHTML=`<div class="opp-info">
      <div class="opp-name">${name}</div><div class="rpill ${rc}">${rt}</div>
      <div class="opp-hp-row"><span style="font-size:.72rem">❤️</span><div class="opp-hb-out"><div class="opp-hb-in" style="width:${pct}%"></div></div><div class="opp-hp-txt">${p.hp}/${p.maxHp}</div></div>
      <div class="opp-cost">💎${p.cost||0}</div><span style="font-family:'Rajdhani',sans-serif;font-size:.6rem;color:var(--text-dim)">🃏${p.hand?.length||0}</span>
    </div>
    <div style="display:flex;gap:.4rem;align-items:flex-start;flex-wrap:wrap">
      ${p.hand?.length?`<div class="hand-scroll" style="min-height:unset">${Array(Math.min(p.hand.length,8)).fill(0).map(()=>`<div class="gc facedown static-card" style="border-color:rgba(201,168,76,.15);width:48px;height:72px"><div class="gc-art" style="font-size:.9rem;height:40px;z-index:1;position:relative">🃏</div></div>`).join('')}${p.hand.length>8?`<span style="font-size:.58rem;color:var(--text-dim);align-self:center;flex-shrink:0">+${p.hand.length-8}</span>`:''}</div>`:'' }
      ${fieldCardShow?`<div style="flex-shrink:0">${buildGC(fieldCardShow,false,true,true)}</div>`:''}
    </div>`;
    pp.appendChild(d);
  }
}

function renderBattlefield(){
  const az=document.getElementById('atkZone');
  if(G.atkCardPlayed){az.innerHTML=buildGC(G.atkCardPlayed,false,true,false);}else{az.innerHTML='<div class="field-empty">🗡️</div>';}
  const dz=document.getElementById('discardZone');
  if(G.discardCard){dz.innerHTML=buildGC(G.discardCard,false,true,false);}else{dz.innerHTML='<div class="discard-none">なし<br>最初は<br>自由</div>';}
  const dfz=document.getElementById('defZone');
  if(G.defCardPlayed){dfz.innerHTML=buildGC(G.defCardPlayed,false,true,false);}else{dfz.innerHTML='<div class="field-empty">🛡️</div>';}
}

// buildGC: build a game card HTML string
// isSmall: for opponent hand cards
function buildGC(card,isSel,isStatic,showSkills){
  const cols=getColors(card);const mc=mainC(card);
  const av=wAtk(card);const atkCh=av!==(card.atk||0);
  const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:(card.illust||'🃏');
  // Multi-color stripe
  const colStrip=cols.map(c=>`<div class="gc-colseg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
  const skillLines=cardSkillLines(card);
  const hasSkill=skillLines.length>0;
  return `<div class="gc${isSel?' sel':''}${isStatic?' static-card':''}"
    style="border-color:${mc.border};box-shadow:${isStatic?'0 0 10px '+mc.glow:isSel?'0 0 15px '+mc.glow:'none'}">
    ${hasSkill?'<div class="gc-skill-dot"></div>':''}
    <div class="gc-colstrip">${colStrip}</div>
    <div class="gc-head"><div class="gc-cost" style="background:${mc.cost}">${card.cost||1}</div><div class="gc-name">${card.name||'?'}</div></div>
    <div class="gc-art" style="height:52px">${ill}</div>
    <div class="gc-stats"><span style="color:${atkCh?'#f1c40f':mc.accent}">${av>0?'⚔':''}${av}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div>
    <div class="gc-flavor">
      ${card.flavor?`<div class="gc-flavor-txt">${card.flavor}</div>`:''}
      ${skillLines.map(s=>`<div class="gc-skill-line">${s}</div>`).join('')}
    </div>
  </div>`;
}

function renderMyHand(){
  const me=G?.players?.[mySlot];const hand=me?.hand||[];
  const el=document.getElementById('myHand');
  if(!hand.length){el.innerHTML='<div style="color:var(--text-dim);font-size:.78rem;padding:.4rem">手札なし</div>';return;}
  const myT=isMyTurn();
  el.innerHTML=hand.map((card,i)=>{
    const mc=mainC(card);const cols=getColors(card);
    const effAtk=wAtk(card);const atkCh=effAtk!==(card.atk||0);
    const effCost=wCost(card);const cstCh=effCost!==card.cost;
    const isSel=selCard===i;
    let isDim=false;
    if(myT&&!G.playedThisTurn){const hasCost=(me.cost||0)>=effCost;let ok=true;const disc=G.discardCard;if(disc){const myC=getColors(card);const dC=getColors(disc);ok=myC.some(c=>dC.includes(c))||card.cost===disc.cost;}isDim=!(hasCost&&ok);}
    else if(myT&&G.playedThisTurn){isDim=true;}
    const skillLines=cardSkillLines(card);const hasSkill=skillLines.length>0;
    const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:(card.illust||'🃏');
    const colStrip=cols.map(c=>`<div class="gc-colseg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
    return `<div class="gc${isSel?' sel':''}${isDim?' dim':''}"
      style="border-color:${mc.border};box-shadow:${isSel?'0 0 15px '+mc.glow:'none'}"
      onclick="${myT&&!isDim?`selCardFn(${i})`:'void(0)'}"
      onmouseenter="showTT(event,${i})" onmouseleave="hideTT()"
      ontouchstart="showTT(event,${i})" ontouchend="hideTT()">
      ${hasSkill?'<div class="gc-skill-dot"></div>':''}
      <div class="gc-colstrip">${colStrip}</div>
      <div class="gc-head">
        <div class="gc-cost" style="background:${mc.cost};${cstCh?'outline:2px solid #f1c40f;outline-offset:-1px':''}">${effCost}</div>
        <div class="gc-name">${card.name||'?'}</div>
      </div>
      <div class="gc-art" style="height:52px">${ill}</div>
      <div class="gc-stats"><span style="color:${atkCh?'#f1c40f':mc.accent}">${effAtk>0?'⚔':''}${effAtk}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div>
      <div class="gc-flavor">
        ${card.flavor?`<div class="gc-flavor-txt">${card.flavor}</div>`:''}
        ${skillLines.map(s=>`<div class="gc-skill-line">${s}</div>`).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('handCnt').textContent=`(${hand.length}枚)`;
}

function renderLog(){
  const el=document.getElementById('glog');const logs=(G.log||[]).slice(-14);
  el.innerHTML=logs.map(t=>{let cls='le';if(t.includes('ダメ')||t.includes('ガード'))cls+=' dmg';else if(t.includes('回復'))cls+=' heal';else if(t.includes('🌟'))cls+=' eff';else if(t.includes('天候')||t.includes('🌤'))cls+=' wth';else if(t.includes('開始')||t.includes('ゲーム'))cls+=' hl';return `<div class="${cls}">▸ ${t}</div>`;}).join('');el.scrollTop=el.scrollHeight;
}

function updateBtns(){
  const myT=isMyTurn();const ph=phase();
  document.getElementById('btnDraw').disabled=!myT||ph!=='attack';
  document.getElementById('btnPlay').disabled=!myT||selCard<0||G.playedThisTurn;
  document.getElementById('btnEnd').disabled=!myT;
}

window.showTT=function(e,i){
  const me=G?.players?.[mySlot];if(!me)return;const card=me.hand?.[i];if(!card)return;
  document.getElementById('ttName').textContent=card.name||'?';
  document.getElementById('ttStat').textContent=`コスト:${wCost(card)} ATK:${wAtk(card)} DEF:${card.def||0} [${getColors(card).map(c=>CN[c]||c).join('/')}]`;
  document.getElementById('ttSkill').textContent=cardSkillLines(card).join('\n')||'スキルなし';
  document.getElementById('ttFlavor').textContent=card.flavor||'';
  const t=document.getElementById('tooltip');t.style.display='block';
  const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;
  t.style.left=Math.min(cx+12,window.innerWidth-210)+'px';t.style.top=Math.max(cy-120,5)+'px';
};
window.hideTT=function(){document.getElementById('tooltip').style.display='none';};

function genDefault(){
  const cols=[['red'],['blue'],['yellow'],['green'],['red','blue'],['yellow','green']];
  const names=['騎士','魔法使い','竜','妖精','戦士','弓使い','僧侶','忍者','海賊','錬金術師','天使','悪魔','剣士','盗賊','召喚士','聖騎士','魔剣士','竜騎士','幻術師','召喚魔法'];
  const ills=['⚔️','🔮','🐉','🦋','🛡️','🏹','✨','🌸','🗡️','🧪','👼','😈','⚡','🗺️','📖','🏰','🌙','🦅','🌀','🔥'];
  return names.map((n,i)=>({id:'def'+i,name:n,colors:cols[i%cols.length],color:cols[i%cols.length][0],cost:1+~~(i/4),atk:2+(i%5),def:1+(i%4),illust:ills[i],flavor:'',effects:[],effect:{trigger:'',type:'',value:1},vfx:[]}));
}
init();
</script>
