<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CARD REALM — 対戦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#07070f;--panel:#0e0e1d;--panel2:#131325;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,.18);--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--yellow:#f1c40f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
#loadScr{position:fixed;inset:0;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:999}
.load-logo{font-family:'Cinzel Decorative',serif;font-size:clamp(1.5rem,6vw,2.2rem);background:linear-gradient(135deg,#7a6430,#f0d080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.load-msg{font-family:'Rajdhani',sans-serif;letter-spacing:.2em;color:var(--text-dim);font-size:.88rem}
.load-bar{width:min(220px,80vw);height:3px;background:#141428;border-radius:3px;overflow:hidden}
.load-fill{height:100%;width:0;background:linear-gradient(90deg,#7a6430,#c9a84c);border-radius:3px;transition:width .5s}
#gameApp{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* HUD */
.hud{display:flex;align-items:center;gap:.4rem;padding:.3rem .5rem;background:rgba(10,10,20,.96);border-bottom:1px solid var(--border);flex-shrink:0;min-height:36px}
.hud-back{color:var(--gold-dim);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:.72rem;letter-spacing:.08em}
.hud-title{font-family:'Cinzel Decorative',serif;font-size:.76rem;color:var(--gold);flex:1;text-align:center}
.tbadge{font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;padding:.2rem .5rem;border-radius:4px;text-transform:uppercase;flex-shrink:0}
.tb-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.5)}
.tb-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.5)}
.tb-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.2)}

/* TURN BANNER */
.turn-banner{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:.55rem;padding:.42rem .6rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(.85rem,3.5vw,1rem);letter-spacing:.1em;text-transform:uppercase;transition:all .35s;border-bottom:2px solid transparent}
.turn-banner.attack{background:rgba(231,76,60,.16);border-bottom-color:rgba(231,76,60,.6);color:var(--red);animation:pA .8s ease-in-out infinite alternate}
.turn-banner.defend{background:rgba(52,152,219,.16);border-bottom-color:rgba(52,152,219,.6);color:var(--blue);animation:pD .8s ease-in-out infinite alternate}
.turn-banner.wait{background:rgba(30,30,50,.6);border-bottom-color:rgba(138,128,112,.25);color:var(--text-dim)}
@keyframes pA{to{background:rgba(231,76,60,.28);box-shadow:0 2px 18px rgba(231,76,60,.3)}}
@keyframes pD{to{background:rgba(52,152,219,.28);box-shadow:0 2px 18px rgba(52,152,219,.3)}}
.turn-icon{font-size:1.3rem}

/* MY STATUS */
.my-status{display:flex;align-items:center;gap:.45rem;padding:.35rem .55rem;background:rgba(5,5,18,.94);border-bottom:1px solid var(--border);flex-shrink:0}
.mys-name{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:var(--gold);flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mys-hp-row{display:flex;align-items:center;gap:.32rem;flex:1;min-width:70px}
.mys-hp-icon{font-size:.85rem;flex-shrink:0}
.mys-hp-bar-out{flex:1;height:13px;background:rgba(255,255,255,.08);border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.mys-hp-bar-in{height:100%;border-radius:7px;transition:width .6s;background:linear-gradient(90deg,#c0392b,#e67e22,#27ae60)}
.mys-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;color:#fff;flex-shrink:0;min-width:42px;text-align:right}
.mys-cost-circle{flex-shrink:0;width:44px;height:44px;border-radius:50%;border:3px solid rgba(201,168,76,.55);background:rgba(201,168,76,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .4s}
.mys-cost-lbl{font-family:'Rajdhani',sans-serif;font-size:.42rem;letter-spacing:.12em;color:var(--gold-dim);text-transform:uppercase;line-height:1}
.mys-cost-num{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;color:var(--gold);line-height:1}

/* WEATHER */
.wbar{display:flex;align-items:center;gap:.42rem;padding:.26rem .5rem;background:rgba(8,8,20,.85);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'Rajdhani',sans-serif}
.wi{font-size:.95rem}.wn{font-size:.74rem;font-weight:700}.we{font-size:.6rem;color:var(--text-dim)}.wc{font-size:.58rem;color:var(--text-dim);margin-left:auto}

/* HINT */
.shint{padding:.26rem .5rem;background:rgba(201,168,76,.07);border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:.64rem;color:var(--gold);text-align:center;flex-shrink:0;letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SCROLL */
.gscroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:.32rem .38rem .3rem}

/* OPPONENTS */
.opp-area{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:.42rem .55rem;margin-bottom:.3rem;transition:border-color .3s,box-shadow .3s}
.opp-area.oa{border-color:rgba(231,76,60,.55);box-shadow:0 0 12px rgba(231,76,60,.12)}
.opp-area.od{border-color:rgba(52,152,219,.55);box-shadow:0 0 12px rgba(52,152,219,.12)}
.opp-dead{border-color:rgba(100,100,100,.3)!important;opacity:.5}
.opp-info{display:flex;align-items:center;gap:.4rem;margin-bottom:.25rem;flex-wrap:wrap}
.opp-name{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:var(--gold)}
.rpill{font-family:'Rajdhani',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:.1em;padding:.1rem .38rem;border-radius:3px;text-transform:uppercase}
.rp-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.4)}
.rp-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.4)}
.rp-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.18)}
.rp-dead{background:rgba(60,60,60,.3);color:var(--text-dim);border:1px solid rgba(100,100,100,.25)}
.opp-hp-row{display:flex;align-items:center;gap:.32rem;flex:1;min-width:70px}
.opp-hb-out{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.opp-hb-in{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--red),#e67e22,var(--green))}
.opp-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.68rem;color:var(--text-dim)}
.opp-cost-circle{width:28px;height:28px;border-radius:50%;border:2px solid rgba(201,168,76,.45);background:rgba(201,168,76,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.occ-lbl{font-family:'Rajdhani',sans-serif;font-size:.36rem;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase;line-height:1}
.occ-num{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:var(--gold);line-height:1}

/* BATTLEFIELD */
.battlefield{display:grid;grid-template-columns:1fr 62px 1fr;gap:.3rem;margin:.28rem 0;align-items:start}
.field-col{display:flex;flex-direction:column;gap:.12rem}
.field-lbl{font-family:'Rajdhani',sans-serif;font-size:.52rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-bottom:.1rem}
.field-zone{background:rgba(0,0,0,.42);border:1px solid var(--border);border-radius:7px;padding:.28rem;min-height:96px;display:flex;align-items:center;justify-content:center}
.field-empty{border:1px dashed rgba(201,168,76,.12);border-radius:5px;width:60px;height:88px;display:flex;align-items:center;justify-content:center;font-size:1rem;opacity:.13}
.discard-col{display:flex;flex-direction:column;align-items:center;gap:.12rem}
.discard-lbl{font-family:'Rajdhani',sans-serif;font-size:.47rem;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase}
.discard-zone{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.22);border-radius:7px;padding:.28rem;width:62px;min-height:96px;display:flex;align-items:center;justify-content:center}
.discard-none{font-family:'Rajdhani',sans-serif;font-size:.44rem;letter-spacing:.08em;color:rgba(201,168,76,.28);text-align:center;line-height:1.5}

/* FIELD/DISCARD CARD (small) */
.gc{width:58px;height:84px;border-radius:6px;border:2px solid;background:var(--panel2);display:flex;flex-direction:column;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;flex-shrink:0}
.gc:hover{transform:translateY(-6px) scale(1.05);z-index:10}
.gc.sel{transform:translateY(-14px) scale(1.1);z-index:20;outline:3px solid var(--gold);outline-offset:1px}
.gc.dim{opacity:.22;cursor:not-allowed}
.gc.dim:hover{transform:none}
.gc.static-card{cursor:default}
.gc.static-card:hover{transform:none}
.gc.facedown{background:repeating-linear-gradient(45deg,var(--panel2)0,var(--panel2)4px,rgba(201,168,76,.04)4px,rgba(201,168,76,.04)8px);cursor:default}
.gc-colstrip{height:4px;display:flex;flex-shrink:0;border-radius:4px 4px 0 0}
.gc-colseg{flex:1}
.gc-head{padding:2px 3px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.88);flex-shrink:0}
.gc-cost{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.58rem;color:#000;flex-shrink:0}
.gc-name{font-size:.42rem;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:33px;font-family:'Rajdhani',sans-serif;font-weight:700}
.gc-art{height:36px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(0,0,0,.15);position:relative;overflow:hidden;flex-shrink:0}
.gc-art img{width:100%;height:100%;object-fit:cover}
.gc-art::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(0,0,0,.82)100%);pointer-events:none}
.gc-stats{display:flex;justify-content:space-around;padding:2px;background:rgba(0,0,0,.9);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.56rem;font-weight:700}
.gc-flavor{flex:1;padding:2px 4px;background:rgba(0,0,0,.85);overflow:hidden;display:flex;flex-direction:column;gap:1px}
.gc-flavor-txt{font-size:.42rem;color:rgba(255,255,255,.35);font-style:italic;line-height:1.4;overflow:hidden}
.gc-skill-line{font-size:.42rem;color:#f1c40f;line-height:1.35;overflow:hidden}
.gc-skill-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#f1c40f;box-shadow:0 0 4px #f1c40f;z-index:3}

/* HAND CARD (large) */
.gc.hand-card{width:150px;height:235px;border-radius:11px;border:2.5px solid;cursor:pointer}
.gc.hand-card:hover{transform:translateY(-12px) scale(1.05)}
.gc.hand-card.sel{transform:translateY(-20px) scale(1.09);outline:4px solid var(--gold);outline-offset:2px}
.gc.hand-card.dim:hover{transform:none}
.gc.hand-card .gc-colstrip{height:6px;border-radius:9px 9px 0 0}
.gc.hand-card .gc-head{padding:4px 6px}
.gc.hand-card .gc-cost{width:26px;height:26px;font-size:.8rem}
.gc.hand-card .gc-name{font-size:.64rem;max-width:108px}
.gc.hand-card .gc-art{height:90px;font-size:3.2rem}
.gc.hand-card .gc-stats{font-size:.78rem;padding:3px 5px}
.gc.hand-card .gc-skill-dot{width:7px;height:7px;top:3px;right:3px}
.gc.hand-card .gc-flavor-txt{font-size:.58rem;line-height:1.45;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
.gc.hand-card .gc-skill-line{font-size:.58rem;line-height:1.4}

/* HAND SECTION */
.hs-wrap{margin:.28rem 0 0}
.hand-label{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.22rem;padding:0 .1rem}
.hand-scroll{display:flex;gap:.42rem;overflow-x:auto;padding:.25rem .1rem .4rem;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;min-height:262px;align-items:flex-end}
.hand-scroll::-webkit-scrollbar{height:3px}
.hand-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,.32);border-radius:2px}

/* ACTION BAR */
.abar{display:flex;gap:.3rem;align-items:center;padding:.35rem .45rem;background:rgba(0,0,0,.82);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.22rem;padding:.44rem .75rem;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;transition:all .15s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap}
.btn:active{transform:scale(.92)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--deep);box-shadow:0 2px 10px rgba(201,168,76,.35)}
.btn-gold:disabled{opacity:.2;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#1a4a6b,#2471a3);color:#fff}
.btn-blue:disabled{opacity:.2;cursor:not-allowed}
.btn-red{background:linear-gradient(135deg,#7b241c,#c0392b);color:#fff}
.btn-red:disabled{opacity:.2;cursor:not-allowed}
.btn-gray{background:rgba(80,80,100,.22);color:var(--text-dim);border:1px solid rgba(80,80,100,.28);font-size:.68rem;padding:.4rem .58rem}

/* LOG */
.glog{height:56px;overflow-y:auto;padding:.28rem .5rem;background:rgba(0,0,0,.72);border-top:1px solid var(--border);flex-shrink:0;font-size:.65rem;line-height:1.62}
.glog::-webkit-scrollbar{width:3px}
.glog::-webkit-scrollbar-thumb{background:rgba(201,168,76,.25)}
.le{color:var(--text-dim)}.le.hl{color:var(--gold)}.le.dmg{color:var(--red)}.le.heal{color:var(--green)}.le.eff{color:#f1c40f}.le.wth{color:#87ceeb}

/* TOOLTIP */
.tooltip{position:fixed;z-index:500;background:rgba(5,5,18,.97);border:1px solid var(--gold-dim);border-radius:9px;padding:.65rem;font-size:.72rem;max-width:195px;pointer-events:none;display:none;line-height:1.58;backdrop-filter:blur(6px);box-shadow:0 4px 20px rgba(0,0,0,.6)}
.tt-name{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;margin-bottom:.2rem}
.tt-stat{color:var(--text-dim);margin-bottom:.2rem;font-family:'Rajdhani',sans-serif;font-size:.76rem}
.tt-skill{color:#f1c40f;font-style:italic;font-size:.72rem;white-space:pre-wrap}
.tt-flavor{color:var(--text-dim);font-style:italic;font-size:.66rem;margin-top:.18rem;border-top:1px solid var(--border);padding-top:.18rem}

/* VFX */
.dmg-float{position:fixed;z-index:600;font-family:'Rajdhani',sans-serif;font-weight:900;pointer-events:none;animation:fup 1.8s ease-out forwards;text-shadow:0 3px 15px rgba(0,0,0,.8),0 0 30px currentColor}
@keyframes fup{0%{opacity:1;transform:translateY(0)scale(1.3)}15%{transform:translateY(-12px)scale(1.55)}85%{opacity:.9}100%{opacity:0;transform:translateY(-95px)scale(.7)}}
.df-r{color:var(--red);font-size:clamp(2rem,8vw,3rem)}
.df-g{color:var(--green);font-size:clamp(2rem,8vw,3rem)}
.df-y{color:var(--yellow);font-size:clamp(1.5rem,6vw,2.4rem)}
.hp-change-pop{position:fixed;z-index:600;font-family:'Rajdhani',sans-serif;font-size:clamp(.9rem,3.5vw,1.15rem);font-weight:700;pointer-events:none;animation:fup2 1.3s ease-out forwards;text-shadow:0 2px 8px rgba(0,0,0,.8)}
@keyframes fup2{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-24px)}}
.shockwave{position:fixed;z-index:580;border-radius:50%;pointer-events:none;animation:sw .65s ease-out forwards}
@keyframes sw{0%{transform:scale(.1);opacity:.95}100%{transform:scale(5.5);opacity:0}}
.shockwave2{position:fixed;z-index:579;border-radius:50%;pointer-events:none;animation:sw2 .95s ease-out forwards}
@keyframes sw2{0%{transform:scale(.05);opacity:.7}100%{transform:scale(8);opacity:0}}
.particle{position:fixed;z-index:585;border-radius:50%;pointer-events:none;animation:pt var(--dur,.8s) ease-out forwards}
@keyframes pt{0%{transform:translate(0,0)scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty))scale(0);opacity:0}}
.screen-flash{position:fixed;inset:0;z-index:560;pointer-events:none;animation:sf .55s ease-out forwards}
@keyframes sf{0%{opacity:.5}100%{opacity:0}}
.big-illust{position:fixed;bottom:calc(56px + 3.5rem + .5rem);right:.7rem;z-index:690;pointer-events:none;animation:biIn .3s ease-out forwards}
.big-illust-inner{width:88px;height:124px;border-radius:9px;overflow:hidden;box-shadow:0 0 28px rgba(0,0,0,.75),0 0 18px var(--bi-glow,rgba(201,168,76,.4));border:2px solid var(--bi-border,rgba(201,168,76,.5));display:flex;flex-direction:column}
.bi-art{flex:1;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:rgba(0,0,0,.3)}
.bi-art img{width:100%;height:100%;object-fit:cover}
.bi-name{height:22px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;color:#fff;background:rgba(0,0,0,.8);letter-spacing:.04em;padding:0 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
@keyframes biIn{0%{opacity:0;transform:translateX(20px)scale(.85)}100%{opacity:1;transform:translateX(0)scale(1)}}
.big-illust.out{animation:biOut .25s ease-in forwards}
@keyframes biOut{0%{opacity:1}100%{opacity:0;transform:translateX(15px)scale(.9)}}
.lightning{position:fixed;z-index:575;pointer-events:none;animation:lz .45s ease-out forwards}
@keyframes lz{0%{opacity:1;transform:scaleX(3)}100%{opacity:0;transform:scaleX(.5)}}
.darkness{position:fixed;inset:0;z-index:555;pointer-events:none;background:radial-gradient(circle,transparent 20%,rgba(0,0,0,.9)100%);animation:dk .7s ease-out forwards}
@keyframes dk{0%{opacity:1}100%{opacity:0}}
.rainbow-fx{position:fixed;inset:0;z-index:558;pointer-events:none;background:linear-gradient(135deg,rgba(255,0,0,.13),rgba(255,165,0,.13),rgba(255,255,0,.13),rgba(0,255,0,.13),rgba(0,0,255,.13),rgba(238,130,238,.13));animation:dk .7s ease-out forwards}

/* Card pick modal */
.card-pick-overlay{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(5px);padding:1rem}
.card-pick-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold);margin-bottom:.8rem;text-align:center}
.card-pick-scroll{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:center;max-height:55vh;overflow-y:auto;padding:.3rem}
.card-pick-item{cursor:pointer;border-radius:8px;border:2px solid var(--border);transition:all .2s;touch-action:manipulation}
.card-pick-item:hover,.card-pick-item:active{border-color:var(--gold);transform:scale(1.06)}

/* Game Over */
.game-over-panel{position:fixed;bottom:0;left:0;right:0;z-index:800;background:rgba(5,5,18,.97);border-top:2px solid var(--gold);padding:.9rem;backdrop-filter:blur(8px);transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.game-over-panel.show{transform:translateY(0)}
.gop-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.3rem,6vw,1.8rem);text-align:center;margin-bottom:.28rem;animation:mg 2s ease-in-out infinite}
@keyframes mg{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.4))}50%{filter:drop-shadow(0 0 20px rgba(201,168,76,.9))}}
.gop-sub{font-family:'Rajdhani',sans-serif;font-size:.88rem;color:var(--text-dim);text-align:center;margin-bottom:.8rem;line-height:1.6}
.gop-btns{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap}
.toast{position:fixed;bottom:4.8rem;left:50%;transform:translateX(-50%) translateY(110px);background:var(--panel);border:1px solid var(--gold);border-radius:7px;padding:.52rem 1.05rem;font-family:'Rajdhani',sans-serif;font-size:.8rem;letter-spacing:.07em;color:var(--gold);z-index:420;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

.proc-overlay{position:fixed;inset:0;z-index:750;background:transparent;cursor:wait}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, get, remove }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const FB={apiKey:"AIzaSyCXyreqDjZXIWnZqWZShw1yjwubHduqCoc",authDomain:"createcardgame-8edbf.firebaseapp.com",databaseURL:"https://createcardgame-8edbf-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"createcardgame-8edbf",storageBucket:"createcardgame-8edbf.firebasestorage.app",messagingSenderId:"173024784980",appId:"1:173024784980:web:606d80ee258239d656f3c1"};
const db=getDatabase(initializeApp(FB));
const gameRef=ref(db,'gameState');const cardsRef=ref(db,'sharedCards');
const lobbyRef=ref(db,'lobby');const lobbyCtrlRef=ref(db,'lobbyCtrl');

const CM={
  red:   {border:'#c0392b',accent:'#e74c3c',glow:'rgba(192,57,43,.45)',cost:'#c0392b',dot:'#e74c3c',fx:'rgba(231,76,60,.9)'},
  blue:  {border:'#2471a3',accent:'#3498db',glow:'rgba(36,113,163,.45)',cost:'#2471a3',dot:'#3498db',fx:'rgba(52,152,219,.9)'},
  yellow:{border:'#d4ac0d',accent:'#f1c40f',glow:'rgba(212,172,13,.45)',cost:'#d4ac0d',dot:'#f1c40f',fx:'rgba(241,196,15,.9)'},
  green: {border:'#1e8449',accent:'#2ecc71',glow:'rgba(30,132,73,.45)',cost:'#1e8449',dot:'#2ecc71',fx:'rgba(46,204,113,.9)'}
};
const CN={red:'赤',blue:'青',yellow:'黄',green:'緑'};
const WEATHERS=[
  {id:'sun',  icon:'☀️',name:'晴れ',eff:'天候効果なし'},
  {id:'rain', icon:'🌧️',name:'雨',  eff:'コスト-1(最低1)'},
  {id:'storm',icon:'⛈️',name:'嵐',  eff:'全カードATK+2'}
];

// ═══ STATE ═══
let G=null;
let mySlot=parseInt(localStorage.getItem('mySlot')||'1');
let numP=parseInt(localStorage.getItem('actualPlayers')||'2');
let myName=localStorage.getItem('myName')||('P'+mySlot);
let pNames=JSON.parse(localStorage.getItem('playerNames')||'{}');
let selCard=-1;
let pool=[];
let processing=false; // ★ prevent double-action

// ═══ HELPERS ═══
const wData=id=>WEATHERS.find(w=>w.id===id)||WEATHERS[0];
const getColors=c=>Array.isArray(c.colors)?c.colors:[c.color||'red'];
const mainC=c=>CM[getColors(c)[0]]||CM.red;
function clone(o){return JSON.parse(JSON.stringify(o));}
const setLoad=(p,m)=>{document.getElementById('loadFill').style.width=p+'%';document.getElementById('loadMsg').textContent=m;};
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function drawCard(){if(!pool.length)return null;return clone(pool[Math.floor(Math.random()*pool.length)]);}
const cur=S=>(S||G).seq[(S||G).seqIdx%(S||G).seq.length];
const isMyTurn=S=>cur(S).player===mySlot;
const phase=S=>cur(S).phase;

// ★ Processing lock: prevent any action while a card is being processed
function lockUI(){processing=true;const ov=document.createElement('div');ov.className='proc-overlay';ov.id='procOv';document.body.appendChild(ov);}
function unlockUI(){processing=false;const ov=document.getElementById('procOv');if(ov)ov.remove();}

// ═══ WEATHER ═══
function wCost(card,S){const c=card.cost||1;return (S||G).weather.current==='rain'?Math.max(1,c-1):c;}
function wAtk(card,S){const a=card.atk||0;S=S||G;return S.weather.current==='storm'?a+2:a;}
function setWeather(S,id){
  S.weather.current=id;S.weather.defendsDone=0;S.weather.changeCount=(S.weather.changeCount||0)+1;
  S.log.push(`🌤 天候変化 → ${wData(id).icon}${wData(id).name}（カウントリセット）`);
}
function weatherTick(S){
  S.weather.defendsDone=(S.weather.defendsDone||0)+1;
  if(S.weather.defendsDone>=2*S.numP){
    S.weather.defendsDone=0;const ids=['sun','rain','storm'];
    const avail=ids.filter(w=>w!==S.weather.current);
    const pick=avail[~~(Math.random()*avail.length)]||'sun';
    S.weather.current=pick;S.weather.changeCount=(S.weather.changeCount||0)+1;
    S.log.push(`🌤 天候変化 → ${wData(pick).icon}${wData(pick).name}`);
  }
}

// ═══ canPlay ═══
function canPlay(card,S){
  if(!S)S=G;const me=S.players[mySlot];if(!me)return false;
  if((me.cost||0)<wCost(card,S))return false;
  const disc=S.discardCard;
  if(disc){const myC=getColors(card);const dC=getColors(disc);if(!myC.some(c=>dC.includes(c))&&card.cost!==disc.cost)return false;}
  // playCondition check
  for(const e of (card.effects||[])){
    if(e.trigger!=='playCondition')continue;
    const cv=parseInt(e.condVal||3);
    if(e.eff==='ifHpLow'&&(me.hp||0)>cv)return false;
    if(e.eff==='ifHpHigh'&&(me.hp||0)<cv)return false;
    if(e.eff==='ifWeatherSun'&&S.weather.current!=='sun')return false;
    if(e.eff==='ifWeatherRain'&&S.weather.current!=='rain')return false;
    if(e.eff==='ifWeatherStorm'&&S.weather.current!=='storm')return false;
  }
  return true;
}

// ═══ SKILL TEXT ═══
const EFF_DESC={
  draw:n=>`自分${n}枚ドロー`,selfHeal:n=>`自分HP+${n}回復`,
  selfAtkUp:n=>`手札から1枚選びATK+${n}`,selfDefUp:n=>`手札から1枚選びDEF+${n}`,
  selfCardAtkUp:n=>`このカードATK+${n}`,selfCardDefUp:n=>`このカードDEF+${n}`,
  oppDamage:n=>`相手に+${n}ダメージ`,selfCostDown:n=>`次コスト-${n}`,
  selfCostUp:n=>`自コスト+${n}`,oppCostDown:n=>`相コスト-${n}`,
  oppAtkDown:n=>`相手次ATK-${n}`,oppDefDown:n=>`相手次DEF-${n}`,
  weatherSun:()=>'天候→☀️晴れ',weatherRain:()=>'天候→🌧️雨',
  weatherStorm:()=>'天候→⛈️嵐',weatherChange:()=>'天候ランダム変化',
  // Legacy
  buffAtk:n=>`手札から1枚選びATK+${n}`,buffDef:n=>`手札から1枚選びDEF+${n}`,
  heal:n=>`自分HP+${n}回復`,damage:n=>`相手に+${n}ダメージ`,
  costReduce:n=>`次コスト-${n}`,costGain:n=>`自コスト+${n}`,
};
const TRIG_SHORT={
  onAttack:'攻撃時',onDefend:'防御時',onPlay:'出した時',onDamage:'ダメ与',onTakeDmg:'被ダメ時',
  onDraw:'ドロー時',onTurnStart:'ターン開始',ifHpLow:'HP低n以下',ifHpHigh:'HP高n以上',
  ifChance:'n%で',ifWeatherSun:'晴れ時',ifWeatherRain:'雨時',ifWeatherStorm:'嵐時',ifTurnGte:'Tn以上',
  playCondition:'★出し条件',
};
function buildSkillLine(e){
  if(e.trigger==='playCondition'){const cv=e.condVal||3;const cond={ifHpLow:`HP${cv}以下`,ifHpHigh:`HP${cv}以上`,ifWeatherSun:'晴れ時',ifWeatherRain:'雨時',ifWeatherStorm:'嵐時'}[e.eff]||e.eff;return `★出し条件: ${cond}`;}
  const trig=e.trigger||'';const effKey=e.eff||e.effType||e.type||'';
  const ev=e.effVal||e.val||e.value||1;const cv=e.condVal||ev;
  const trigTxt=(TRIG_SHORT[trig]||trig).replace(/n/g,cv);
  const effTxt=EFF_DESC[effKey]?EFF_DESC[effKey](ev):'';
  if(!trigTxt&&!effTxt)return '';
  return `【${trigTxt||'常時'}】${effTxt}`;
}
function cardSkillLines(card){
  const effs=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type||'',effVal:card.effect.value}]:[]);
  return effs.map(e=>buildSkillLine(e)).filter(Boolean);
}

// ═══ CARD PICK MODAL ═══
function pickHandCard(hand,title){
  return new Promise(resolve=>{
    if(!hand?.length){resolve(-1);return;}
    document.getElementById('cardPickTitle').textContent=title||'手札から1枚選んでください';
    const scroll=document.getElementById('cardPickScroll');scroll.innerHTML='';
    hand.forEach((card,i)=>{
      const mc=mainC(card);const div=document.createElement('div');div.className='card-pick-item';
      const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:(card.illust||'🃏');
      const colStrip=getColors(card).map(c=>`<div class="gc-colseg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
      div.innerHTML=`<div class="gc static-card" style="border-color:${mc.border};width:100px;height:155px">
        <div class="gc-colstrip" style="height:5px">${colStrip}</div>
        <div class="gc-head" style="padding:3px 4px"><div class="gc-cost" style="background:${mc.cost};width:20px;height:20px;font-size:.7rem">${card.cost}</div><div class="gc-name" style="font-size:.55rem;max-width:65px">${card.name||'?'}</div></div>
        <div class="gc-art" style="height:60px;font-size:2.2rem">${ill}</div>
        <div class="gc-stats" style="font-size:.68rem;padding:2px 4px"><span style="color:${mc.accent}">⚔${wAtk(card)}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div>
        <div class="gc-flavor" style="padding:2px 4px"><div class="gc-skill-line" style="font-size:.5rem">${cardSkillLines(card).join(' ')}</div></div>
      </div>`;
      div.onclick=()=>{document.getElementById('cardPickOverlay').style.display='none';resolve(i);};
      scroll.appendChild(div);
    });
    document.getElementById('cardPickOverlay').style.display='flex';
  });
}

// ═══ APPLY EFFECTS — SYNCHRONOUS (no async/await to prevent double-fire) ═══
// All effects run synchronously in the state S. Async card pick is handled via pickHandCard
// which we call before this function for selfAtkUp/selfDefUp.
function applyEffSync(card,S,slot,trigger,pickIdx){
  // pickIdx: pre-selected hand index for selfAtkUp/selfDefUp (passed from caller)
  if(!card)return;
  const effs=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type||'',effVal:card.effect.value,condVal:3}]:[]);
  const opp=getOpp(slot,S);
  const COND_TRIGS=['ifHpLow','ifHpHigh','ifChance','ifWeatherSun','ifWeatherRain','ifWeatherStorm','ifTurnGte'];
  const PLAY_T=['onPlay','onAttack','onDefend'];

  for(const e of effs){
    const trig=e.trigger||'';const effKey=e.eff||e.effType||e.type||'';
    const ev=parseInt(e.effVal||e.val||e.value||1);const cv=parseInt(e.condVal||ev);
    if(trig==='playCondition')continue;
    const isCond=COND_TRIGS.includes(trig);
    if(isCond){
      if(!PLAY_T.includes(trigger))continue;
      if(trig==='ifHpLow'&&(S.players[slot]?.hp||0)>cv)continue;
      if(trig==='ifHpHigh'&&(S.players[slot]?.hp||0)<cv)continue;
      if(trig==='ifChance'&&Math.random()*100>cv)continue;
      if(trig==='ifWeatherSun'&&S.weather.current!=='sun')continue;
      if(trig==='ifWeatherRain'&&S.weather.current!=='rain')continue;
      if(trig==='ifWeatherStorm'&&S.weather.current!=='storm')continue;
      if(trig==='ifTurnGte'&&(S.turnCount||0)<cv)continue;
    } else {if(trig!==trigger)continue;}
    if(!S.players[slot])continue;
    const p=S.players[slot];
    // ★ CRITICAL: get opponent EACH time from current state (not cached)
    const oppSlot=getOpp(slot,S);
    const op=oppSlot?S.players[oppSlot]:null;

    switch(effKey){
      case 'draw':{for(let i=0;i<ev;i++){const d=drawCard();if(d)p.hand.push(d);}S.log.push(`🌟「${card.name}」→${ev}枚ドロー`);break;}
      case 'selfHeal':case 'heal':{
        // ★ HP0以下のプレイヤーは回復不可
        if((p.hp||0)<=0){S.log.push(`🌟「${card.name}」→回復無効（HP0）`);break;}
        p.hp=Math.min(p.maxHp,(p.hp||0)+ev);S.log.push(`🌟「${card.name}」→HP+${ev}回復`);
        const pos=getCenter();healFx(pos.x,pos.y,ev);break;}
      case 'selfAtkUp':case 'buffAtk':{
        const idx=pickIdx??0;
        if(p.hand.length&&idx>=0&&idx<p.hand.length){p.hand[idx].atk=(p.hand[idx].atk||0)+ev;S.log.push(`🌟「${card.name}」→「${p.hand[idx].name}」ATK+${ev}`);}break;}
      case 'selfDefUp':case 'buffDef':{
        const idx=pickIdx??0;
        if(p.hand.length&&idx>=0&&idx<p.hand.length){p.hand[idx].def=(p.hand[idx].def||0)+ev;S.log.push(`🌟「${card.name}」→「${p.hand[idx].name}」DEF+${ev}`);}break;}
      case 'oppDamage':case 'damage':{if(op)op.hp=Math.max(0,(op.hp||0)-ev);S.log.push(`🌟「${card.name}」→相手に${ev}ダメージ`);break;}
      case 'selfCostDown':case 'costReduce':{p._cB=(p._cB||0)+ev;S.log.push(`🌟「${card.name}」→次コスト-${ev}`);break;}
      case 'selfCostUp':case 'costGain':{p.cost=(p.cost||0)+ev;S.log.push(`🌟「${card.name}」→コスト+${ev}`);break;}
      case 'oppCostDown':{if(op)op.cost=Math.max(0,(op.cost||0)-ev);S.log.push(`🌟「${card.name}」→相手コスト-${ev}`);break;}
      case 'oppAtkDown':{if(op)op._nAtkD=(op._nAtkD||0)+ev;S.log.push(`🌟「${card.name}」→相手次ATK-${ev}`);break;}
      case 'oppDefDown':{if(op)op._nDefD=(op._nDefD||0)+ev;S.log.push(`🌟「${card.name}」→相手次DEF-${ev}`);break;}
      case 'weatherSun':{setWeather(S,'sun');break;}
      case 'weatherRain':{setWeather(S,'rain');break;}
      case 'weatherStorm':{setWeather(S,'storm');break;}
      case 'weatherChange':{const ids=['sun','rain','storm'];const avail=ids.filter(w=>w!==S.weather.current);setWeather(S,avail[~~(Math.random()*avail.length)]||'sun');break;}
    }
  }
}
function getOpp(slot,S){if(S.numP===2)return slot===1?2:1;const ni=(S.seqIdx+1)%S.seq.length;return S.seq[ni].player;}

// Check if card needs hand-pick for its effects
function needsHandPick(card,trigger){
  const effs=card.effects?.length?card.effects:[];
  const PLAY_T=['onPlay','onAttack','onDefend'];
  if(!PLAY_T.includes(trigger))return false;
  return effs.some(e=>(e.eff==='selfAtkUp'||e.eff==='selfDefUp'||e.eff==='buffAtk'||e.eff==='buffDef')&&(e.trigger===trigger||['ifHpLow','ifHpHigh','ifChance','ifWeatherSun','ifWeatherRain','ifWeatherStorm','ifTurnGte'].includes(e.trigger)));
}

// ═══ VFX ═══
function getCenter(){const bf=document.querySelector('.battlefield');if(!bf)return{x:window.innerWidth/2,y:window.innerHeight/2};const r=bf.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
let bigIllustTimer=null;
function showBigIllust(card,mc){
  if(!mc)mc=mainC(card);if(bigIllustTimer)clearTimeout(bigIllustTimer);
  document.querySelectorAll('.big-illust').forEach(el=>el.remove());
  const ov=document.createElement('div');ov.className='big-illust';
  ov.style.setProperty('--bi-glow',mc.glow);ov.style.setProperty('--bi-border',mc.border);
  const inner=document.createElement('div');inner.className='big-illust-inner';
  const artDiv=document.createElement('div');artDiv.className='bi-art';
  if(card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))){const img=document.createElement('img');img.src=card.illust;img.style.cssText='width:100%;height:100%;object-fit:cover';img.onerror=()=>{artDiv.textContent=card.illust||'🃏';};artDiv.appendChild(img);}
  else{artDiv.textContent=card.illust||'🃏';}
  const nm=document.createElement('div');nm.className='bi-name';nm.textContent=card.name||'';
  inner.appendChild(artDiv);inner.appendChild(nm);ov.appendChild(inner);document.body.appendChild(ov);
  bigIllustTimer=setTimeout(()=>{ov.classList.add('out');setTimeout(()=>ov.remove(),280);},1700);

// ═══ BUILD STATE ═══
function buildState(n){
  let order=Array.from({length:n},(_,i)=>i+1);
  for(let i=order.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  const seq=[];
  for(let oi=0;oi<order.length;oi++){seq.push({player:order[oi],phase:'attack'});seq.push({player:order[(oi+1)%order.length],phase:'defend'});}
  const players={};
  for(let oi=0;oi<order.length;oi++){
    const slot=order[oi],isFirst=oi===0;
    const hand=Array.from({length:isFirst?7:8},()=>drawCard()).filter(Boolean);
    players[slot]={hp:20,maxHp:20,cost:isFirst?1:2,_cB:0,_nAtkD:0,_nDefD:0,hand,alive:true};
  }
  return{status:'playing',numP:n,seqIdx:0,seq,players,discardCard:null,atkCardPlayed:null,defCardPlayed:null,playedThisTurn:false,turnCount:0,weather:{current:'sun',changeCount:0,defendsDone:0},log:[`ゲーム開始！先行: P${seq[0].player}「${pNames[seq[0].player]||'P'+seq[0].player}」`]};
}

// ═══ ACTIONS ═══
window.selCardFn=function(i){
  if(processing)return;
  if(!isMyTurn()){showToast('あなたのターンではありません');return;}
  if(G.playedThisTurn){showToast('今ターンはすでにカードを出しました');return;}
  const card=G.players[mySlot]?.hand?.[i];if(!card)return;
  if(selCard===i){selCard=-1;renderMyHand();updateBtns();return;}
  if((G.players[mySlot].cost||0)<wCost(card)){showToast(`コスト不足 (必要:${wCost(card)} 所持:${G.players[mySlot].cost||0})`);return;}
  if(!canPlay(card)){const disc=G.discardCard;showToast(disc?`出せません（捨て札「${disc.name}」と同色/同コスト、または出し条件未達）`:'コスト不足か出し条件未達');return;}
  selCard=i;renderMyHand();updateBtns();
};

window.playCard=async function(){
  if(processing||selCard<0||!isMyTurn()||G.playedThisTurn)return;
  lockUI();
  try{
    const me=G.players[mySlot];const card=me.hand?.[selCard];if(!card){unlockUI();return;}

    // ★ Pre-resolve hand picks BEFORE cloning state (async modal)
    let pickIdxAtk=-1,pickIdxDef=-1;
    const phaseNow=phase();
    if(needsHandPick(card,phaseNow==='attack'?'onAttack':'onDefend')||needsHandPick(card,'onPlay')){
      // We need to ask before modifying state
      pickIdxAtk=await pickHandCard(me.hand.filter((_,i)=>i!==selCard),'手札から1枚選んでください');
      // adjust index since we'll remove selCard first
      if(pickIdxAtk>=selCard)pickIdxAtk++;
    }

    const S=clone(G);const p=S.players[mySlot];
    const pc={...card};
    // Apply debuffs
    if(p._nAtkD){pc.atk=Math.max(0,(pc.atk||0)-p._nAtkD);p._nAtkD=0;}
    if(p._nDefD){pc.def=Math.max(0,(pc.def||0)-p._nDefD);p._nDefD=0;}
    // selfCardAtkUp/DefUp on played card
    for(const e of (card.effects||[])){
      if(e.eff==='selfCardAtkUp')pc.atk=(pc.atk||0)+(e.effVal||1);
      if(e.eff==='selfCardDefUp')pc.def=(pc.def||0)+(e.effVal||1);
    }
    const cost=wCost(card,S);p.cost-=Math.max(0,cost-(p._cB||0));p._cB=0;
    p.hand.splice(selCard,1);
    S.playedThisTurn=true;
    S.discardCard=clone(pc);

    if(phase(S)==='attack'){
      S.atkCardPlayed=clone(pc);S.defCardPlayed=null;S.lastAtkPlayer=mySlot;
      const av=wAtk(pc,S);
      S.log.push(`P${mySlot}「${pNames[mySlot]||myName}」→攻撃「${pc.name}」ATK:${av}`);
      applyEffSync(pc,S,mySlot,'onPlay',pickIdxAtk);
      applyEffSync(pc,S,mySlot,'onAttack',pickIdxAtk);
    } else {
      S.defCardPlayed=clone(pc);
      const atkCard=S.atkCardPlayed;
      if(atkCard){
        const av=wAtk(atkCard,S);const dv=pc.def||0;const dmg=Math.max(0,av-dv);
        if(dmg>0){
          p.hp=Math.max(0,p.hp-dmg);
          S.log.push(`⚔ 「${atkCard.name}」ATK:${av} vs 「${pc.name}」DEF:${dv} → ${dmg}ダメ！`);
          setTimeout(()=>attackEffect(atkCard,dmg,false),150);
          applyEffSync(atkCard,S,S.lastAtkPlayer,'onDamage',pickIdxAtk);
          applyEffSync(pc,S,mySlot,'onTakeDmg',pickIdxAtk);
        } else {
          S.log.push(`🛡 「${atkCard.name}」ATK:${av} vs 「${pc.name}」DEF:${dv} → ブロック！`);
          setTimeout(()=>attackEffect(atkCard,0,true),150);
        }
      }
      applyEffSync(pc,S,mySlot,'onPlay',pickIdxAtk);
      applyEffSync(pc,S,mySlot,'onDefend',pickIdxAtk);
      S.atkCardPlayed=null;weatherTick(S);
    }

    // ★ Draw a card for the player who just played (draw-on-play)
    const drawn=drawCard();
    if(drawn){
      p.hand.push(drawn);
      // onDraw effect for drawn card (only if card has it set)
      applyEffSync(drawn,S,mySlot,'onDraw',-1);
      S.log.push(`P${mySlot}「${pNames[mySlot]||myName}」→カードをプレイして1枚ドロー`);
    }

    triggerVfx(pc);
    selCard=-1;

    // ★ CRITICAL: Save state, then wait for Firebase to confirm, then auto-end turn
    await save(S);
    // Update local G immediately for responsiveness
    G=S;
    renderAll();checkWin();

    // Auto end turn after VFX
    setTimeout(async()=>{
      // Re-check that it's still my turn and I've played (guard against race condition)
      if(!G||!isMyTurn()||!G.playedThisTurn)return;
      await endTurnInternal();
    },900);
  } catch(err){
    console.error('playCard error',err);showToast('エラーが発生しました');
  } finally{
    unlockUI();
  }
};

window.extraDraw=async function(){
  if(processing||!isMyTurn()||phase()!=='attack'||G.playedThisTurn)return;
  lockUI();
  try{
    const S=clone(G);const p=S.players[mySlot];
    if((p.hp||0)<=2){showToast('HP2消費できません');return;}
    const card=drawCard();if(!card){showToast('カードプールが空です');return;}
    p.hp-=2;p.hand.push(card);
    S.log.push(`P${mySlot}がHP2消費で追加ドロー`);

  }finally{unlockUI();}
};

// Internal end turn — can be called from playCard auto-end or button
async function endTurnInternal(){
  if(!isMyTurn())return; // guard
  const S=clone(G);const c=S.seq[S.seqIdx%S.seq.length];
  // Defender skipped → take full damage
  if(c.phase==='defend'&&!S.playedThisTurn){
    const atkCard=S.atkCardPlayed;
    if(atkCard){
      const av=wAtk(atkCard,S);
      if(av>0){
        S.players[c.player].hp=Math.max(0,(S.players[c.player].hp||0)-av);
        S.log.push(`P${c.player}がガードせず ${av}ダメ！`);
        setTimeout(()=>attackEffect(atkCard,av,false),50);
        applyEffSync(atkCard,S,S.lastAtkPlayer,'onDamage',-1);
      }
    }
  }
  if(c.phase==='defend'){S.atkCardPlayed=null;S.defCardPlayed=null;weatherTick(S);}

  // Mark dead players
  for(let i=1;i<=S.numP;i++){if(S.players[i]&&(S.players[i].hp||0)<=0&&S.players[i].alive!==false){S.players[i].alive=false;S.log.push(`💀 P${i}「${pNames[i]||'P'+i}」が脱落！`);}}

  // Advance turn (skip dead players)
  let nextIdx=(S.seqIdx+1)%S.seq.length;
  for(let safety=0;safety<S.seq.length*2;safety++){
    if(S.players[S.seq[nextIdx%S.seq.length].player]?.alive!==false)break;
    nextIdx=(nextIdx+1)%S.seq.length;
  }
  S.seqIdx=nextIdx%S.seq.length;S.playedThisTurn=false;S.turnCount=(S.turnCount||0)+1;
  const next=S.seq[S.seqIdx%S.seq.length];const np=S.players[next.player];

  if(next.phase==='attack'){
    if(np){
      S.atkCardPlayed=null;S.defCardPlayed=null;
      // ★ No longer draw at turn start (draw-on-play is the new system)
      np.cost=(np.cost||0)+3; // +3 cost recovery, no cap
      S.log.push(`P${next.player}「${pNames[next.player]||'P'+next.player}」の攻撃ターン（コスト+3）`);
    }
  } else {
    if(np){np.cost=(np.cost||0)+3;S.log.push(`P${next.player}「${pNames[next.player]||'P'+next.player}」の防御ターン（コスト+3）`);}
  }
  if(np)applyEffSync({effects:[]},S,next.player,'onTurnStart',-1);
  selCard=-1;
  await save(S);G=S;renderAll();checkWin();
}

// ═══ WIN CHECK ═══
let gameOverShown=false;
function checkWin(){
  if(!G||G.status!=='playing'||gameOverShown)return;
  const alive=[];
  for(let i=1;i<=G.numP;i++)if(G.players[i]&&G.players[i].alive!==false&&(G.players[i].hp||0)>0)alive.push(i);
  if(alive.length>1)return;
  gameOverShown=true;G.status='over';
  const iWin=alive.includes(mySlot)||(alive.length===0);
  const winName=alive.length?alive.map(i=>pNames[i]||'P'+i).join('・'):'引き分け';
  const lastLog=G.log?.[G.log.length-1]||'';
  document.getElementById('gopTitle').textContent=iWin?'🏆 勝利！':'💀 敗北';
  document.getElementById('gopTitle').style.color=iWin?'var(--gold)':'var(--red)';
  document.getElementById('gopSub').innerHTML=`${winName} の勝利！<br><small style="font-size:.78rem;opacity:.7">${lastLog}</small>`;
  setTimeout(()=>document.getElementById('gameOverPanel').classList.add('show'),2000);
}

    const fieldCard=(G.atkCardPlayed&&G.lastAtkPlayer===i)?G.atkCardPlayed:(G.defCardPlayed&&isDef?G.defCardPlayed:null);
    d.innerHTML=`<div class="opp-info"><div class="opp-name">${name}</div><div class="rpill ${rc}">${rt}</div>
      <div class="opp-hp-row"><span style="font-size:.7rem">❤️</span><div class="opp-hb-out"><div class="opp-hb-in" style="width:${pct}%"></div></div><div class="opp-hp-txt">${p.hp}/${p.maxHp}</div></div>
      <div class="opp-cost-circle"><div class="occ-lbl">cost</div><div class="occ-num">${p.cost||0}</div></div>
      <span style="font-family:'Rajdhani',sans-serif;font-size:.58rem;color:var(--text-dim)">🃏${p.hand?.length||0}</span></div>
    <div style="display:flex;gap:.38rem;align-items:flex-start;flex-wrap:wrap">
      ${!isDead&&p.hand?.length?`<div style="display:flex;gap:.32rem;overflow-x:auto;padding-bottom:3px">${Array(Math.min(p.hand.length,7)).fill(0).map(()=>`<div class="gc facedown static-card" style="border-color:rgba(201,168,76,.15);width:42px;height:62px"><div class="gc-art" style="font-size:.85rem;height:32px;z-index:1;position:relative">🃏</div></div>`).join('')}${p.hand.length>7?`<span style="font-size:.55rem;color:var(--text-dim);align-self:center;flex-shrink:0">+${p.hand.length-7}</span>`:''}</div>`:'' }
      ${fieldCard?`<div style="flex-shrink:0">${buildGC(fieldCard,false,true)}</div>`:''}
    </div>`;
    pp.appendChild(d);
  }
}
function renderBattlefield(){
  document.getElementById('atkZone').innerHTML=G.atkCardPlayed?buildGC(G.atkCardPlayed,false,true):'<div class="field-empty">🗡️</div>';
  document.getElementById('discardZone').innerHTML=G.discardCard?buildGC(G.discardCard,false,true):'<div class="discard-none">なし<br>最初は<br>自由</div>';
  document.getElementById('defZone').innerHTML=G.defCardPlayed?buildGC(G.defCardPlayed,false,true):'<div class="field-empty">🛡️</div>';
}
function buildGC(card,isSel,isStatic){
  const cols=getColors(card);const mc=mainC(card);const av=wAtk(card);const atkCh=av!==(card.atk||0);
  const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:(card.illust||'🃏');
  const colStrip=cols.map(c=>`<div class="gc-colseg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
  const skillLines=cardSkillLines(card);const hasSkill=skillLines.length>0;
  return `<div class="gc${isSel?' sel':''}${isStatic?' static-card':''}" style="border-color:${mc.border};box-shadow:${isStatic?'0 0 10px '+mc.glow:isSel?'0 0 15px '+mc.glow:'none'}">
    ${hasSkill?'<div class="gc-skill-dot"></div>':''}
    <div class="gc-colstrip">${colStrip}</div>
    <div class="gc-head"><div class="gc-cost" style="background:${mc.cost}">${card.cost||1}</div><div class="gc-name">${card.name||'?'}</div></div>
    <div class="gc-art">${ill}</div>
    <div class="gc-stats"><span style="color:${atkCh?'#f1c40f':mc.accent}">${av>0?'⚔':''}${av}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div>
    <div class="gc-flavor">${card.flavor?`<div class="gc-flavor-txt">${card.flavor}</div>`:''}${skillLines.map(s=>`<div class="gc-skill-line">${s}</div>`).join('')}</div>
  </div>`;
}
function renderMyHand(){
  const me=G?.players?.[mySlot];const hand=me?.hand||[];
  const el=document.getElementById('myHand');
  if(!hand.length){el.innerHTML='<div style="color:var(--text-dim);font-size:.78rem;padding:.4rem">手札なし</div>';return;}
  const myT=isMyTurn();
  el.innerHTML=hand.map((card,i)=>{
    const mc=mainC(card);const cols=getColors(card);
    const effAtk=wAtk(card);const atkCh=effAtk!==(card.atk||0);
    const effCost=wCost(card);const cstCh=effCost!==card.cost;
    const isSel=selCard===i;
    let isDim=false;
    if(myT&&!G.playedThisTurn){isDim=!(canPlay(card));}
    else if(myT&&G.playedThisTurn){isDim=true;}
    const skillLines=cardSkillLines(card);const hasSkill=skillLines.length>0;
    const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:(card.illust||'🃏');
    const colStrip=cols.map(c=>`<div class="gc-colseg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
    return `<div class="gc hand-card${isSel?' sel':''}${isDim?' dim':''}"
      style="border-color:${mc.border};box-shadow:${isSel?'0 0 18px '+mc.glow+',0 0 35px '+mc.glow.replace('.45','.25'):'none'}"
      onclick="${myT&&!isDim&&!processing?`selCardFn(${i})`:'void(0)'}"
      onmouseenter="showTT(event,${i})" onmouseleave="hideTT()"
      ontouchstart="showTT(event,${i})" ontouchend="hideTT()">
      ${hasSkill?'<div class="gc-skill-dot"></div>':''}
      <div class="gc-colstrip">${colStrip}</div>
      <div class="gc-head"><div class="gc-cost" style="background:${mc.cost};${cstCh?'outline:2px solid #f1c40f;outline-offset:-1px':''}">${effCost}</div><div class="gc-name">${card.name||'?'}</div></div>
      <div class="gc-art">${ill}</div>
      <div class="gc-stats"><span style="color:${atkCh?'#f1c40f':mc.accent}">${effAtk>0?'⚔':''}${effAtk}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div>
      <div class="gc-flavor">${card.flavor?`<div class="gc-flavor-txt">${card.flavor}</div>`:''}${skillLines.map(s=>`<div class="gc-skill-line">${s}</div>`).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('handCnt').textContent=`(${hand.length}枚)`;
}
function renderLog(){
  const el=document.getElementById('glog');const logs=(G.log||[]).slice(-14);
  el.innerHTML=logs.map(t=>{let cls='le';if(t.includes('ダメ')||t.includes('ガード'))cls+=' dmg';else if(t.includes('回復'))cls+=' heal';else if(t.includes('🌟'))cls+=' eff';else if(t.includes('天候')||t.includes('🌤'))cls+=' wth';else if(t.includes('開始')||t.includes('ゲーム'))cls+=' hl';return `<div class="${cls}">▸ ${t}</div>`;}).join('');el.scrollTop=el.scrollHeight;
}
function updateBtns(){
  const myT=isMyTurn();const ph=phase();
  document.getElementById('btnDraw').disabled=!myT||ph!=='attack'||G.playedThisTurn||processing;
  document.getElementById('btnPlay').disabled=!myT||selCard<0||G.playedThisTurn||processing;
  document.getElementById('btnEnd').disabled=!myT||processing;
}
window.showTT=function(e,i){
  const me=G?.players?.[mySlot];if(!me)return;const card=me.hand?.[i];if(!card)return;
  document.getElementById('ttName').textContent=card.name||'?';
  document.getElementById('ttStat').textContent=`コスト:${wCost(card)} ATK:${wAtk(card)} DEF:${card.def||0} [${getColors(card).map(c=>CN[c]||c).join('/')}]`;
  document.getElementById('ttSkill').textContent=cardSkillLines(card).join('\n')||'スキルなし';
  document.getElementById('ttFlavor').textContent=card.flavor||'';
  const t=document.getElementById('tooltip');t.style.display='block';
  const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;
  t.style.left=Math.min(cx+12,window.innerWidth-205)+'px';t.style.top=Math.max(cy-130,5)+'px';
};
window.hideTT=function(){document.getElementById('tooltip').style.display='none';};

function genDefault(){
  const cols=[['red'],['blue'],['yellow'],['green'],['red','blue'],['yellow','green']];
  const names=['騎士','魔法使い','竜','妖精','戦士','弓使い','僧侶','忍者','海賊','錬金術師','天使','悪魔','剣士','盗賊','召喚士','聖騎士','魔剣士','竜騎士','幻術師','召喚魔法'];
  const ills=['⚔️','🔮','🐉','🦋','🛡️','🏹','✨','🌸','🗡️','🧪','👼','😈','⚡','🗺️','📖','🏰','🌙','🦅','🌀','🔥'];
  return names.map((n,i)=>({id:'def'+i,name:n,colors:cols[i%cols.length],color:cols[i%cols.length][0],cost:1+~~(i/4),atk:2+(i%5),def:1+(i%4),illust:ills[i],flavor:'',effects:[],effect:{trigger:'',type:'',value:1},vfx:[]}));
}
init();
</script>
</body>
</html>
