<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しんウノ — 対戦</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%230e0e1d'/><rect x='20' y='10' width='60' height='80' rx='8' fill='%23c9a84c' opacity='.9'/><text y='62' x='50' text-anchor='middle' font-size='48' font-family='serif'>🃏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#07070f;--panel:#0e0e1d;--panel2:#131325;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,.18);--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--yellow:#f1c40f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column}
#loadScr{position:fixed;inset:0;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:999}
.load-logo{font-family:'Rajdhani',sans-serif;font-size:clamp(1.3rem,5vw,2rem);font-weight:700;color:var(--gold)}
.load-msg{font-family:'Rajdhani',sans-serif;letter-spacing:.15em;color:var(--text-dim);font-size:.85rem}
.load-bar{width:min(200px,80vw);height:3px;background:#141428;border-radius:3px;overflow:hidden}
.load-fill{height:100%;width:0;background:linear-gradient(90deg,#7a6430,#c9a84c);border-radius:3px;transition:width .5s}
#gameApp{display:flex;flex-direction:column;height:100%;overflow:hidden}
/* HUD */
.hud{display:flex;align-items:center;gap:.38rem;padding:.28rem .48rem;background:rgba(10,10,20,.96);border-bottom:1px solid var(--border);flex-shrink:0;min-height:34px}
.hud-back{color:var(--gold-dim);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:.7rem}
.hud-title{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:var(--gold);flex:1;text-align:center}
.hud-turn{font-family:'Rajdhani',sans-serif;font-size:.65rem;color:var(--text-dim);flex-shrink:0}
.tbadge{font-family:'Rajdhani',sans-serif;font-size:.65rem;font-weight:700;padding:.18rem .48rem;border-radius:4px;text-transform:uppercase;flex-shrink:0}
.tb-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.5)}
.tb-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.5)}
.tb-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.2)}
/* TURN BANNER */
.turn-banner{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.38rem .5rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(.82rem,3.2vw,.95rem);letter-spacing:.1em;text-transform:uppercase;border-bottom:2px solid transparent;transition:background .3s}
.turn-banner.attack{background:rgba(231,76,60,.16);border-bottom-color:rgba(231,76,60,.6);color:var(--red);animation:pA .9s ease-in-out infinite alternate}
.turn-banner.defend{background:rgba(52,152,219,.16);border-bottom-color:rgba(52,152,219,.6);color:var(--blue);animation:pD .9s ease-in-out infinite alternate}
.turn-banner.wait{background:rgba(20,20,40,.6);border-bottom-color:rgba(100,100,130,.2);color:var(--text-dim)}
@keyframes pA{to{background:rgba(231,76,60,.26)}}
@keyframes pD{to{background:rgba(52,152,219,.26)}}
/* MY STATUS */
.my-status{display:flex;align-items:center;gap:.42rem;padding:.32rem .5rem;background:rgba(5,5,18,.94);border-bottom:1px solid var(--border);flex-shrink:0}
.mys-name{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;color:var(--gold);flex-shrink:0;max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mys-hp-row{display:flex;align-items:center;gap:.3rem;flex:1;min-width:70px}
.mys-hp-bar-out{flex:1;height:12px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.mys-hp-bar-in{height:100%;border-radius:6px;transition:width .5s;background:linear-gradient(90deg,#c0392b,#e67e22,#27ae60)}
.mys-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;color:#fff;flex-shrink:0;min-width:40px;text-align:right}
.cost-circle{flex-shrink:0;width:42px;height:42px;border-radius:50%;border:2.5px solid rgba(201,168,76,.5);background:rgba(201,168,76,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .4s,box-shadow .4s}
.cost-circle-lbl{font-family:'Rajdhani',sans-serif;font-size:.4rem;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase;line-height:1}
.cost-circle-num{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--gold);line-height:1}
/* WEATHER */
.wbar{display:flex;align-items:center;gap:.4rem;padding:.24rem .48rem;background:rgba(8,8,20,.85);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.68rem}
.wbar .wc{font-size:.56rem;color:var(--text-dim);margin-left:auto}
/* HINT */
.shint{padding:.24rem .48rem;background:rgba(201,168,76,.07);border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:.62rem;color:var(--gold);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* SCROLL */
.gscroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:.3rem .35rem .3rem}
/* OPPONENTS */
.opp-area{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:.4rem .52rem;margin-bottom:.28rem;transition:border-color .3s}
.opp-area.oa{border-color:rgba(231,76,60,.55)}
.opp-area.od{border-color:rgba(52,152,219,.55)}
.opp-dead{opacity:.45;border-color:rgba(100,100,100,.3)!important}
.opp-info{display:flex;align-items:center;gap:.38rem;flex-wrap:wrap;margin-bottom:.22rem}
.opp-name{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:var(--gold)}
.rpill{font-family:'Rajdhani',sans-serif;font-size:.55rem;font-weight:700;padding:.1rem .36rem;border-radius:3px;text-transform:uppercase}
.rp-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.4)}
.rp-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.4)}
.rp-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.18)}
.rp-dead{background:rgba(60,60,60,.3);color:var(--text-dim);border:1px solid rgba(100,100,100,.25)}
/* Opponent HP row — larger for mobile readability */
.opp-hp-row{display:flex;align-items:center;gap:.3rem;flex:1;min-width:100px}
.opp-hb-out{flex:1;height:10px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;position:relative}
.opp-hb-in{height:100%;border-radius:5px;transition:width .5s;background:linear-gradient(90deg,var(--red),#e67e22,var(--green))}
.opp-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;color:var(--text);min-width:38px;text-align:right}
.opp-cost-c{width:26px;height:26px;border-radius:50%;border:2px solid rgba(201,168,76,.45);background:rgba(201,168,76,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.occ-l{font-family:'Rajdhani',sans-serif;font-size:.35rem;color:var(--gold-dim);text-transform:uppercase;line-height:1}
.occ-n{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;color:var(--gold);line-height:1}
/* BATTLEFIELD */
.battlefield{display:grid;grid-template-columns:1fr 58px 1fr;gap:.28rem;margin:.25rem 0;align-items:start}
.field-col{display:flex;flex-direction:column;gap:.1rem}
.field-lbl{font-family:'Rajdhani',sans-serif;font-size:.5rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-bottom:.1rem}
.field-zone{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:7px;padding:.26rem;min-height:92px;display:flex;align-items:center;justify-content:center}
.field-empty{border:1px dashed rgba(201,168,76,.12);border-radius:5px;width:56px;height:80px;display:flex;align-items:center;justify-content:center;font-size:.95rem;opacity:.13}
.discard-col{display:flex;flex-direction:column;align-items:center;gap:.1rem}
.discard-lbl{font-family:'Rajdhani',sans-serif;font-size:.44rem;letter-spacing:.1em;color:var(--gold-dim);text-transform:uppercase}
.discard-zone{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.22);border-radius:7px;padding:.26rem;width:58px;min-height:92px;display:flex;align-items:center;justify-content:center}
.discard-none{font-family:'Rajdhani',sans-serif;font-size:.42rem;color:rgba(201,168,76,.28);text-align:center;line-height:1.5}
/* GAME CARD — field/discard small */
.gc{width:56px;height:80px;border-radius:5px;border:1.5px solid;background:var(--panel2);display:flex;flex-direction:column;cursor:pointer;transition:transform .12s;position:relative;overflow:hidden;flex-shrink:0}
.gc:hover{transform:translateY(-5px) scale(1.04)}
.gc.sel{transform:translateY(-12px) scale(1.09);z-index:20;outline:3px solid var(--gold);outline-offset:1px}
.gc.dim{opacity:.2;cursor:not-allowed}
.gc.dim:hover{transform:none}
.gc.static-card,.gc.facedown{cursor:default}
.gc.static-card:hover,.gc.facedown:hover{transform:none}
.gc.facedown{background:repeating-linear-gradient(45deg,var(--panel2)0,var(--panel2)4px,rgba(201,168,76,.04)4px,rgba(201,168,76,.04)8px)}
.gc-cs{height:4px;display:flex;flex-shrink:0;border-radius:3px 3px 0 0}
.gc-cs-seg{flex:1}
.gc-head{padding:2px 3px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.88);flex-shrink:0;gap:2px}
.gc-cost{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.56rem;color:#000;flex-shrink:0}
.gc-name{font-size:.38rem;color:rgba(255,255,255,.65);overflow:hidden;font-family:'Rajdhani',sans-serif;font-weight:700;word-break:break-all;line-height:1.2;max-height:1.6em;flex:1}
.gc-art{height:30px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(0,0,0,.15);position:relative;overflow:hidden;flex-shrink:0}
.gc-art img{width:100%;height:100%;object-fit:contain;background:#12121e}
.gc-stats{display:flex;justify-content:space-around;padding:2px;background:rgba(0,0,0,.9);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.52rem;font-weight:700}
.gc-flavor{flex:1;padding:1px 3px;background:rgba(0,0,0,.85);overflow:hidden;display:flex;flex-direction:column;gap:1px}
.gc-ft{font-size:.38rem;color:rgba(255,255,255,.32);font-style:italic;line-height:1.3;overflow:hidden}
.gc-sl{font-size:.38rem;color:#f1c40f;line-height:1.25;overflow:hidden}
.gc-sdot{position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:#f1c40f;z-index:3}
/* HAND CARD — 2.5x larger */
.gc.hand-card{width:148px;height:232px;border-radius:10px;border:2px solid}
.gc.hand-card:hover{transform:translateY(-11px) scale(1.04)}
.gc.hand-card.sel{transform:translateY(-18px) scale(1.08);outline:3px solid var(--gold);outline-offset:2px}
.gc.hand-card.dim:hover{transform:none}
.gc.hand-card .gc-cs{height:6px;border-radius:8px 8px 0 0}
.gc.hand-card .gc-head{padding:4px 6px}
.gc.hand-card .gc-cost{width:25px;height:25px;font-size:.78rem}
.gc.hand-card .gc-name{font-size:.6rem;max-height:2.4em;word-break:break-all;line-height:1.2}
.gc.hand-card .gc-art{height:88px;font-size:3rem}
.gc.hand-card .gc-stats{font-size:.75rem;padding:3px 5px}
.gc.hand-card .gc-sdot{width:6px;height:6px;top:3px;right:3px}
.gc.hand-card .gc-ft{font-size:.54rem;line-height:1.4;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
.gc.hand-card .gc-sl{font-size:.54rem;line-height:1.35}
/* HAND */
.hs-wrap{margin:.25rem 0 0}
.hand-label{font-family:'Rajdhani',sans-serif;font-size:.58rem;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.2rem;padding:0 .08rem}
.hand-scroll{display:flex;gap:.4rem;overflow-x:auto;padding:.22rem .08rem .38rem;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;min-height:258px;align-items:flex-end}
.hand-scroll::-webkit-scrollbar{height:3px}
.hand-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,.32);border-radius:2px}
/* ACTION BAR */
.abar{display:flex;gap:.28rem;align-items:center;padding:.32rem .42rem;background:rgba(0,0,0,.85);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.22rem;padding:.42rem .72rem;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .12s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap}
.btn:active{transform:scale(.92)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--deep)}
.btn-gold:disabled{opacity:.2;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#1a4a6b,#2471a3);color:#fff}
.btn-blue:disabled{opacity:.2;cursor:not-allowed}
.btn-red{background:linear-gradient(135deg,#7b241c,#c0392b);color:#fff}
.btn-red:disabled{opacity:.2;cursor:not-allowed}
.btn-gray{background:rgba(80,80,100,.22);color:var(--text-dim);border:1px solid rgba(80,80,100,.28);font-size:.66rem;padding:.38rem .55rem}
/* LOG */
.glog{height:54px;overflow-y:auto;padding:.26rem .48rem;background:rgba(0,0,0,.72);border-top:1px solid var(--border);flex-shrink:0;font-size:.63rem;line-height:1.6}
.glog::-webkit-scrollbar{width:3px}
.glog::-webkit-scrollbar-thumb{background:rgba(201,168,76,.25)}
.le{color:var(--text-dim)}.le.hl{color:var(--gold)}.le.dmg{color:var(--red)}.le.heal{color:var(--green)}.le.eff{color:#f1c40f}.le.wth{color:#87ceeb}
/* TOOLTIP */
.tooltip{position:fixed;z-index:500;background:rgba(5,5,18,.97);border:1px solid var(--gold-dim);border-radius:9px;padding:.6rem;font-size:.7rem;max-width:190px;pointer-events:none;display:none;line-height:1.55;backdrop-filter:blur(4px)}
.tt-name{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:.2rem}
.tt-stat{color:var(--text-dim);margin-bottom:.2rem;font-family:'Rajdhani',sans-serif;font-size:.74rem}
.tt-skill{color:#f1c40f;font-style:italic;font-size:.7rem;white-space:pre-wrap}
.tt-flavor{color:var(--text-dim);font-style:italic;font-size:.65rem;margin-top:.18rem;border-top:1px solid var(--border);padding-top:.18rem}
/* VFX — lightweight, CSS-only where possible */
.dmg-float{position:fixed;z-index:600;font-family:'Rajdhani',sans-serif;font-weight:900;pointer-events:none;animation:fup 1.6s ease-out forwards;will-change:transform,opacity}
@keyframes fup{0%{opacity:1;transform:translateY(0)scale(1.2)}80%{opacity:.8}100%{opacity:0;transform:translateY(-80px)scale(.7)}}
.df-r{color:var(--red);font-size:clamp(1.8rem,7vw,2.8rem);text-shadow:0 0 15px var(--red)}
.df-g{color:var(--green);font-size:clamp(1.8rem,7vw,2.8rem);text-shadow:0 0 15px var(--green)}
.hp-pop{position:fixed;z-index:600;font-family:'Rajdhani',sans-serif;font-size:clamp(.85rem,3vw,1.05rem);font-weight:700;pointer-events:none;animation:fup2 1.2s ease-out forwards}
@keyframes fup2{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-22px)}}
.sw{position:fixed;z-index:580;border-radius:50%;pointer-events:none;animation:swA .6s ease-out forwards;will-change:transform,opacity}
@keyframes swA{0%{transform:scale(.1);opacity:.9}100%{transform:scale(5);opacity:0}}
.pt{position:fixed;z-index:585;border-radius:50%;pointer-events:none;animation:ptA var(--dur,.75s) ease-out forwards;will-change:transform,opacity}
@keyframes ptA{0%{transform:translate(0,0)scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty))scale(0);opacity:0}}
.sf{position:fixed;inset:0;z-index:560;pointer-events:none;animation:sfA .5s ease-out forwards}
@keyframes sfA{0%{opacity:.45}100%{opacity:0}}
.bi{position:fixed;bottom:calc(54px + 3rem + .5rem);right:.65rem;z-index:690;pointer-events:none;width:84px;height:120px;border-radius:8px;overflow:hidden;animation:biIn .28s ease-out forwards;will-change:transform,opacity;border:2px solid var(--bi-b,rgba(201,168,76,.5));box-shadow:0 0 22px rgba(0,0,0,.7),0 0 14px var(--bi-g,rgba(201,168,76,.3))}
.bi-art{width:100%;height:calc(100% - 20px);display:flex;align-items:center;justify-content:center;font-size:3.2rem;background:rgba(0,0,0,.3);overflow:hidden}
.bi-art img{width:100%;height:100%;object-fit:cover}
.bi-nm{height:20px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;color:#fff;background:rgba(0,0,0,.82);padding:0 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes biIn{0%{opacity:0;transform:translateX(18px)scale(.85)}100%{opacity:1;transform:translateX(0)scale(1)}}
.bi.out{animation:biOut .22s ease-in forwards}
@keyframes biOut{0%{opacity:1}100%{opacity:0;transform:translateX(12px)}}
/* Card pick modal */
.cpov{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:1rem}
.cpov-t{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:.7rem;text-align:center}
.cpov-s{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;max-height:52vh;overflow-y:auto;padding:.25rem}
.cpov-item{cursor:pointer;border-radius:7px;border:2px solid var(--border);transition:all .18s;touch-action:manipulation}
.cpov-item:hover,.cpov-item:active{border-color:var(--gold);transform:scale(1.05)}
/* Game over */
.gop{position:fixed;bottom:0;left:0;right:0;z-index:800;background:rgba(5,5,18,.97);border-top:2px solid var(--gold);padding:.85rem;backdrop-filter:blur(6px);transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.56,.64,1)}
.gop.show{transform:translateY(0)}
.gop-title{font-family:'Rajdhani',sans-serif;font-size:clamp(1.2rem,5.5vw,1.7rem);font-weight:700;text-align:center;margin-bottom:.25rem}
.gop-sub{font-family:'Rajdhani',sans-serif;font-size:.85rem;color:var(--text-dim);text-align:center;margin-bottom:.75rem;line-height:1.55}
.gop-btns{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap}
.proc-ov{position:fixed;inset:0;z-index:750;background:transparent;cursor:wait}
.toast{position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%) translateY(110px);background:var(--panel);border:1px solid var(--gold);border-radius:7px;padding:.5rem 1rem;font-family:'Rajdhani',sans-serif;font-size:.78rem;letter-spacing:.07em;color:var(--gold);z-index:420;transition:transform .32s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
/* Card deal animation */
@keyframes dealCard{
  0%{opacity:0;transform:translateY(-40px) scale(.7) rotate(-8deg)}
  60%{opacity:1;transform:translateY(6px) scale(1.05) rotate(1deg)}
  100%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
}
.hand-card.dealing{animation:dealCard .38s cubic-bezier(.34,1.4,.64,1) forwards}
</style>
</head>
<body>
<div id="loadScr"><div class="load-logo">🃏 しんウノ</div><div class="load-msg" id="loadMsg">対戦を準備中...</div><div class="load-bar"><div class="load-fill" id="loadFill"></div></div></div>
<div id="gameApp" style="display:none">
  <div class="hud">
    <a href="javascript:void(0)" class="hud-back" onclick="leaveToLobby()">← ロビー</a>
    <div class="hud-title">🃏 しんウノ</div>
    <div class="hud-turn" id="hudTurn">T1</div>

// ★ Firebaseから受け取ったデータを正規化

function normalizeState(S){
  if(!S)return S;

  // ── players の正規化 ──
  // 'slot_1','slot_2'キー → {1:{...},2:{...}}
  // 's1','s2'キー（旧形式）→ {1:{...},2:{...}}
  // 配列形式 → {1:{...},2:{...}}
  // 数値文字列キー → そのまま数値化
  const norm={};
  if(Array.isArray(S.players)){
    S.players.forEach((p,i)=>{if(p&&i>0)norm[i]=p;});
  } else if(S.players){
    for(const[k,v]of Object.entries(S.players)){
      if(!v)continue;
      let num;
      if(k.startsWith('slot_'))num=parseInt(k.slice(5));
      else if(k.startsWith('s'))num=parseInt(k.slice(1));
      else num=parseInt(k);
      if(!isNaN(num)&&num>0)norm[num]=v;
    }
  }
  S.players=norm;

  // ── seq の正規化 ──
  // 'seq_0','seq_1'キー → 配列
  // 'i0','i1'キー（旧形式）→ 配列
  // 配列 → そのまま
  if(!Array.isArray(S.seq)){
    const len=S.seqLen||Object.keys(S.seq||{}).length;
    const arr=[];
    for(let i=0;i<len;i++){
      const item=S.seq?.['seq_'+i]||S.seq?.['i'+i];
      if(item)arr.push(item);
    }
    S.seq=arr;
  }

  // ── カードの colors 正規化（共通） ──
  function fixCardColors(card){
    if(!card)return;
    if(card.colors&&typeof card.colors==='object'&&!Array.isArray(card.colors)){
      card.colors=Object.values(card.colors).filter(v=>typeof v==='string');
    }
    if(!card.colors||!Array.isArray(card.colors)||!card.colors.length){
      card.colors=[card.color||'red'];
    }
  }
  // 手札
  for(const p of Object.values(S.players||{})){
    for(const card of(p.hand||[]))fixCardColors(card);
  }
  // フィールド上のカード
  fixCardColors(S.discardCard);
  fixCardColors(S.atkCardPlayed);
  fixCardColors(S.defCardPlayed);
  return S;
}

function rehydrateState(S){
  if(!S)return S;
  normalizeState(S);// まず正規化
  for(const p of Object.values(S.players||{}))(p.hand||[]).forEach(rehydrate);
  rehydrate(S.atkCardPlayed);rehydrate(S.defCardPlayed);rehydrate(S.discardCard);
  return S;
}

function wxTick(S){S.weather.defendsDone=(S.weather.defendsDone||0)+1;if(S.weather.defendsDone>=2*S.numP){S.weather.defendsDone=0;const a=['sun','rain','storm'].filter(w=>w!==S.weather.current);const nw=a[~~(Math.random()*a.length)]||'sun';S.weather.current=nw;S.log.push(`🌤天候→${wData(nw).icon}${wData(nw).name}`);}}

function canPlay(card,S){S=S||G;const me=S.players[mySlot];if(!me)return false;if((me.cost||0)<wCost(card,S))return false;const d=S.discardCard;if(d){
    const mc=getColors(card),dc=getColors(d);
    const sameColor=mc.some(col=>dc.includes(col));
    const sameCost=(card.cost||1)===(d.cost||1);
    if(!sameColor&&!sameCost)return false;
  }for(const e of(card.effects||[])){if(e.trigger!=='playCondition')continue;const pc=e.playCond||'',cv=+e.condVal||3;if(pc==='ifHpLow'&&(me.hp||0)>cv)return false;if(pc==='ifHpHigh'&&(me.hp||0)<cv)return false;if(pc==='ifChance'&&Math.random()*100>cv)return false;if(pc==='ifWeatherSun'&&S.weather.current!=='sun')return false;if(pc==='ifWeatherRain'&&S.weather.current!=='rain')return false;if(pc==='ifWeatherStorm'&&S.weather.current!=='storm')return false;}return true;}

const ED={draw:n=>`${n}枚ドロー`,selfHeal:n=>`自HP+${n}`,selfDamage:n=>`自-${n}ダメ`,selfAtkUp:n=>`手札ATK+${n}`,selfDefUp:n=>`手札DEF+${n}`,selfCardAtkUp:n=>`カードATK+${n}`,selfCardDefUp:n=>`カードDEF+${n}`,oppDamage:n=>`相+${n}ダメ`,selfCostDown:n=>`次コスト-${n}`,selfCostUp:n=>`自コスト+${n}`,oppCostDown:n=>`相コスト-${n}`,oppAtkDown:n=>`相ATK-${n}`,oppDefDown:n=>`相DEF-${n}`,weatherSun:()=>'→☀️',weatherRain:()=>'→🌧️',weatherStorm:()=>'→⛈️',weatherChange:()=>'天候変化',buffAtk:n=>`手札ATK+${n}`,buffDef:n=>`手札DEF+${n}`,heal:n=>`自HP+${n}`,damage:n=>`相+${n}ダメ`,costReduce:n=>`次コスト-${n}`,costGain:n=>`自コスト+${n}`};
const TS={onAttack:'攻撃時',onDefend:'防御時',onPlay:'出した時',onDamage:'ダメ与',onTakeDmg:'被ダメ',ifHpLow:'HP≤n',ifHpHigh:'HP≥n',ifChance:'n%',ifWeatherSun:'晴れ',ifWeatherRain:'雨',ifWeatherStorm:'嵐',ifTurnGte:'T≥n',playCondition:'★出し条件'};
const PS={ifHpLow:'HP≤n',ifHpHigh:'HP≥n',ifChance:'n%',ifWeatherSun:'晴れ時',ifWeatherRain:'雨時',ifWeatherStorm:'嵐時'};
function skillLine(e){if(e.trigger==='playCondition')return`★出し条件[${(PS[e.playCond]||'?').replace(/n/g,e.condVal||'?')}]`;const tr=e.trigger||'',ek=e.eff||e.type||'',ev=e.effVal||e.value||1,cv=e.condVal||ev;const t=(TS[tr]||tr).replace(/n/g,cv);const ef=ED[ek]?ED[ek](ev):'';if(!t&&!ef)return'';return`【${t||'常時'}】${ef}`;}
function cskills(card){const ef=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type||'',effVal:card.effect.value}]:[]);return ef.map(e=>skillLine(e)).filter(Boolean);}

function applyEff(card,S,slot,trig,pickIdx){
  if(!card)return;
  const ef=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type||'',effVal:card.effect.value,condVal:3}]:[]);
  const COND=['ifHpLow','ifHpHigh','ifChance','ifWeatherSun','ifWeatherRain','ifWeatherStorm','ifTurnGte'];
  const PLAY=['onPlay','onAttack','onDefend'];
  const opp=sl=>{if(S.numP===2)return sl===1?2:1;const ni=(S.seqIdx+1)%S.seq.length;return S.seq[ni].player;};
  for(const e of ef){const tr=e.trigger||'';if(tr==='playCondition')continue;const ek=e.eff||e.type||'',ev=+e.effVal||+e.value||1,cv=+e.condVal||ev;if(COND.includes(tr)){if(!PLAY.includes(trig))continue;if(tr==='ifHpLow'&&(S.players[slot]?.hp||0)>cv)continue;if(tr==='ifHpHigh'&&(S.players[slot]?.hp||0)<cv)continue;if(tr==='ifChance'&&Math.random()*100>cv)continue;if(tr==='ifWeatherSun'&&S.weather.current!=='sun')continue;if(tr==='ifWeatherRain'&&S.weather.current!=='rain')continue;if(tr==='ifWeatherStorm'&&S.weather.current!=='storm')continue;if(tr==='ifTurnGte'&&(S.turnCount||0)<cv)continue;}else if(tr!==trig)continue;const p=S.players[slot];if(!p)continue;const os=opp(slot);const op=os?S.players[os]:null;switch(ek){case'draw':for(let i=0;i<ev;i++){const d=drawCard();if(d){p.hand.push(d);newCards.add('n'+(p.hand.length-1));}}S.log.push(`🌟${card.name}→${ev}枚ドロー`);break;case'selfHeal':case'heal':p.hp=Math.min(p.maxHp,(p.hp||0)+ev);S.log.push(`🌟${card.name}→HP+${ev}`);break;case'selfDamage':p.hp=Math.max(0,(p.hp||0)-ev);S.log.push(`🌟${card.name}→自-${ev}`);break;case'selfAtkUp':case'buffAtk':{const i=pickIdx??0;if(p.hand[i]){p.hand[i].atk=(p.hand[i].atk||0)+ev;S.log.push(`🌟ATK+${ev}`);}}break;case'selfDefUp':case'buffDef':{const i=pickIdx??0;if(p.hand[i]){p.hand[i].def=(p.hand[i].def||0)+ev;S.log.push(`🌟DEF+${ev}`);}}break;case'oppDamage':case'damage':if(op){op.hp=Math.max(0,(op.hp||0)-ev);S.log.push(`🌟${card.name}→相-${ev}`);}break;case'selfCostDown':case'costReduce':p._cB=(p._cB||0)+ev;S.log.push(`🌟次コスト-${ev}`);break;case'selfCostUp':case'costGain':p.cost=(p.cost||0)+ev;break;case'oppCostDown':if(op)op.cost=Math.max(0,(op.cost||0)-ev);break;case'oppAtkDown':if(op)op._nAtkD=(op._nAtkD||0)+ev;break;case'oppDefDown':if(op)op._nDefD=(op._nDefD||0)+ev;break;case'weatherSun':setWx(S,'sun');break;case'weatherRain':setWx(S,'rain');break;case'weatherStorm':setWx(S,'storm');break;case'weatherChange':{const a=['sun','rain','storm'].filter(w=>w!==S.weather.current);setWx(S,a[~~(Math.random()*a.length)]||'sun');}break;}}
}

function vfx(card){const vs=new Set(card.vfx||[]);const mc=mainC(card);const{x:cx,y:cy}=gcenter();if(vs.size===0||vs.has('bigIllust'))bigIll(card,mc);fl(mc.fx);for(let i=0;i<16;i++)pt(cx,cy,50+Math.random()*100,5+Math.random()*7,mc.fx,.45+Math.random()*.7);if(vs.has('fire')||(!vs.size&&getColors(card).includes('red')))for(let i=0;i<6;i++)setTimeout(()=>pt(cx,cy,30+Math.random()*55,8,i%2?'#e74c3c':'#f39c12',.6),i*20);if(vs.has('lightning')||(!vs.size&&getColors(card).includes('yellow'))){const l=document.createElement('div');l.style.cssText=`position:fixed;left:${cx-1}px;top:${cy-55}px;width:2px;height:110px;background:linear-gradient(to bottom,transparent,#f1c40f,#fff,#f1c40f,transparent);z-index:575;pointer-events:none;animation:sfA .4s ease-out forwards;box-shadow:0 0 8px #f1c40f`;document.body.appendChild(l);setTimeout(()=>l.remove(),450);}if(vs.has('shockwave')){const sw=document.createElement('div');sw.style.cssText=`position:fixed;left:${cx-55}px;top:${cy-55}px;width:110px;height:110px;border-radius:50%;border:4px solid ${mc.fx};pointer-events:none;z-index:580;animation:swA .6s ease-out forwards`;document.body.appendChild(sw);setTimeout(()=>sw.remove(),700);}if(vs.has('darkness'))fl('rgba(0,0,0,.5)');if(vs.has('rainbow'))fl('linear-gradient(135deg,rgba(255,0,0,.1),rgba(0,200,0,.1),rgba(0,0,255,.1))');}

function genDefault(){const cols=[['red'],['blue'],['yellow'],['green'],['red','blue'],['yellow','green']];const nms=['騎士','魔法使い','竜','妖精','戦士','弓使い','僧侶','忍者','海賊','錬金術師','天使','悪魔','剣士','盗賊','召喚士','聖騎士','魔剣士','竜騎士','幻術師','召喚魔法'];const ils=['⚔️','🔮','🐉','🦋','🛡️','🏹','✨','🌸','🗡️','🧪','👼','😈','⚡','🗺️','📖','🏰','🌙','🦅','🌀','🔥'];return nms.map((nm,i)=>({id:'def'+i,name:nm,colors:cols[i%cols.length],color:cols[i%cols.length][0],cost:1+~~(i/4),atk:2+(i%5),def:1+(i%4),illust:ils[i],flavor:'',effects:[],vfx:[]}));}
function buildState(n){if(!pool.length)return null;let order=Array.from({length:n},(_,i)=>i+1);for(let i=order.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}const seq=[];for(let oi=0;oi<order.length;oi++){seq.push({player:order[oi],phase:'attack'});seq.push({player:order[(oi+1)%order.length],phase:'defend'});}const players={};for(let oi=0;oi<order.length;oi++){const slot=order[oi];const hand=Array.from({length:oi===0?7:8},()=>drawCard()).filter(Boolean);if(slot===mySlot)hand.forEach((_,i)=>newCards.add('i'+i));players[slot]={hp:20,maxHp:20,cost:4,_cB:0,_nAtkD:0,_nDefD:0,hand,alive:true};}const fp=seq[0].player;return{status:'playing',numP:n,seqIdx:0,seq,players,discardCard:null,atkCardPlayed:null,defCardPlayed:null,playedThisTurn:false,turnCount:0,weather:{current:'sun',changeCount:0,defendsDone:0},log:[`ゲーム開始！先行:P${fp}「${pNames[fp]||'P'+fp}」`]};}

async function save(S){
  try{
    const slim=clone(S);

    // ★ playersを正規化してから文字列キーへ変換
    // S.playersが配列の場合も数値キーオブジェクトに正規化してから変換
    let playersNorm={};
    if(Array.isArray(slim.players)){
      // 配列: [null, P1, P2] → {1:P1, 2:P2}
      slim.players.forEach((p,i)=>{if(p&&i>0)playersNorm[i]=p;});
    } else {
      // オブジェクト: キーが's1'等なら数値に戻してから再変換
      for(const[k,v]of Object.entries(slim.players||{})){
        if(!v)continue;
        const num=k.startsWith('s')?parseInt(k.slice(1)):parseInt(k);
        if(!isNaN(num)&&num>0)playersNorm[num]=v;
      }
    }
    // playersを 'slot_1', 'slot_2' キーで保存（Firebaseの配列変換を確実に防ぐ）
    const playersOut={};
    for(const[k,v]of Object.entries(playersNorm))playersOut['slot_'+k]=v;
    slim.players=playersOut;

    // seqを配列から 'seq_0','seq_1'... キーのオブジェクトに変換
    const seqArr=Array.isArray(slim.seq)?slim.seq:Object.values(slim.seq||{});
    const seqOut={};
    seqArr.forEach((s,i)=>{if(s)seqOut['seq_'+i]=s;});
    slim.seq=seqOut;
    slim.seqLen=seqArr.length;

    // 画像データを除去
    const strip=c=>{if(c?.illust?.startsWith('data:'))c.illust='[img]';};
    for(const p of Object.values(slim.players||{}))(p.hand||[]).forEach(strip);
    strip(slim.atkCardPlayed);strip(slim.defCardPlayed);strip(slim.discardCard);
    await set(gameRef,slim);
  }catch(e){
    console.error('save fail:',e.message);
    // 1回だけリトライ
    try{await set(gameRef,slim);}catch(e2){console.error('save retry fail:',e2.message);}
  }
}

// ★ onGameRef: モジュールレベルのコールバック
//   gameStarted がモジュール変数なのでクロージャ問題なし
// ══════════════════════════════════════════
function onGameRef(snap){
  const ng=snap.val();

  if(!gameStarted){
    if(ng){
      gameStarted=true;
      G=rehydrateState(ng);
      SL(100,'開始！');
      showGame();
      renderAll();
    } else if(amHost){
      if(!pool.length)applyPool(genDefault());
      const ns=buildState(numP);
      if(ns)save(ns);
    }
    return;
  }

  if(!ng)return;

  // 古いデータを無視（turnCountが現在より小さい場合）
  if(G&&(ng.turnCount||0)<(G.turnCount||0)){
    console.log('[SYNC] stale data ignored, ng.tc='+ng.turnCount+' G.tc='+G.turnCount);
    return;
  }

  const changed=ng.seqIdx!==G?.seqIdx||ng.turnCount!==G?.turnCount;
  if(changed)selCard=-1;
  G=rehydrateState(ng);
  const _c=G.seq?.[G.seqIdx];
  console.log('[SYNC]','tc='+G.turnCount,'seq='+G.seqIdx,'P'+_c?.player+_c?.phase?.[0],'me='+mySlot,'myTurn='+myTurn(),'played='+G.playedThisTurn);
  renderAll();
  checkWin();
}

function init(){
  SL(20,'カードを読み込み中...');

  let cachedCards=[];
  try{const cd=localStorage.getItem('cardrealmDeck');if(cd)cachedCards=JSON.parse(cd);}catch(e){}
  applyPool(cachedCards.length?cachedCards:genDefault());

  onValue(cardsRef,snap=>{
    const cards=Object.values(snap.val()||{});
    if(cards.length){try{localStorage.setItem('cardrealmDeck',JSON.stringify(cards));}catch(e){}applyPool(cards);}
  },{onlyOnce:true});

  SL(50,'接続中...');

  if(amHost){
    SL(60,'ゲームを準備中...');
    const delay=cachedCards.length?300:2000;
    setTimeout(async()=>{
      if(gameStarted)return;
      if(!pool.length)applyPool(genDefault());
      const ns=buildState(numP);
      if(ns)await save(ns);
    },delay);
  } else {
    SL(60,'ホストの試合開始を待っています...');
  }

  onValue(gameRef,onGameRef);

  if(roomRef){
    onValue(roomRef,snap=>{
      if(!snap.exists()||navigating)return;
      const room=snap.val();
      if(room.action==='home'){navigating=true;update(roomRef,{action:null}).catch(()=>{});setTimeout(()=>{window.location.href='index.html';},300);}
      else if(room.action==='rematch'){update(roomRef,{action:null}).catch(()=>{});gameOverShown=false;gameStarted=false;document.getElementById('gop').classList.remove('show');if(amHost&&pool.length){const ns=buildState(numP);if(ns)save(ns);}}
    });
  }
}

window.selCardFn=function(i){if(processing)return;if(!myTurn()){toast('あなたのターンではありません');return;}if(G.playedThisTurn){toast('今ターンはすでにカードを出しました');return;}const card=G.players[mySlot]?.hand?.[i];if(!card)return;if(selCard===i){selCard=-1;renderHand();updBtn();return;}if(!canPlay(card)){toast(G.discardCard?'出せません（同色/同コスト または出し条件未達）':'コスト不足か出し条件未達');return;}selCard=i;renderHand();updBtn();};

window.playCard=async function(){
  if(processing||selCard<0||!myTurn()||G.playedThisTurn)return;
  lock();
  try{
    const me=G.players[mySlot];const card=me.hand?.[selCard];if(!card){unlock();return;}
    let pickIdx=-1;
    const needPick=(card.effects||[]).some(e=>['selfAtkUp','selfDefUp','buffAtk','buffDef'].includes(e.eff||e.type||'')&&['onPlay','onAttack','onDefend','ifHpLow','ifHpHigh','ifChance'].includes(e.trigger));
    if(needPick&&me.hand.length>1){const other=me.hand.filter((_,i)=>i!==selCard);const pi=await pickCard(other,'強化する手札を選択');pickIdx=pi>=selCard?pi+1:pi;}
    const S=clone(G);const p=S.players[mySlot];
    const pc={...card};
    if(p._nAtkD){pc.atk=Math.max(0,(pc.atk||0)-p._nAtkD);p._nAtkD=0;}
    if(p._nDefD){pc.def=Math.max(0,(pc.def||0)-p._nDefD);p._nDefD=0;}
    for(const e of(card.effects||[])){if(e.eff==='selfCardAtkUp')pc.atk=(pc.atk||0)+(e.effVal||1);if(e.eff==='selfCardDefUp')pc.def=(pc.def||0)+(e.effVal||1);}
    const fc=Math.max(1,wCost(card,S)-(p._cB||0));
    if((p.cost||0)<fc){toast('コスト不足');unlock();return;}
    p.cost-=fc;p._cB=0;p.hand.splice(selCard,1);S.playedThisTurn=true;S.discardCard=clone(pc);
    if(ph(S)==='attack'){S.atkCardPlayed=clone(pc);S.defCardPlayed=null;S.lastAtkPlayer=mySlot;S.log.push(`P${mySlot}「${pNames[mySlot]||myName}」→攻撃「${pc.name}」ATK:${wAtk(pc,S)}`);applyEff(pc,S,mySlot,'onPlay',pickIdx);applyEff(pc,S,mySlot,'onAttack',pickIdx);}
    else{S.defCardPlayed=clone(pc);const ak=S.atkCardPlayed;if(ak){const av=wAtk(ak,S),dv=pc.def||0,dmg=Math.max(0,av-dv);if(dmg>0){p.hp=Math.max(0,p.hp-dmg);S.log.push(`⚔「${ak.name}」ATK:${av} vs「${pc.name}」DEF:${dv}→${dmg}ダメ！`);setTimeout(()=>atkFx(ak,dmg,false),150);applyEff(ak,S,S.lastAtkPlayer,'onDamage',pickIdx);applyEff(pc,S,mySlot,'onTakeDmg',pickIdx);}else{S.log.push(`🛡「${ak.name}」ATK:${av} vs「${pc.name}」DEF:${dv}→ブロック！`);setTimeout(()=>atkFx(ak,0,true),150);}}applyEff(pc,S,mySlot,'onPlay',pickIdx);applyEff(pc,S,mySlot,'onDefend',pickIdx);S.atkCardPlayed=null;wxTick(S);}
    const dr=drawCard();if(dr){p.hand.push(dr);newCards.add('n'+(p.hand.length-1));S.log.push(`P${mySlot}→1枚ドロー`);}
    vfx(pc);selCard=-1;G=S;renderAll();checkWin();
    await save(S);
    const snapTc=S.turnCount,snapSi=S.seqIdx;
    setTimeout(async()=>{
      // turnCountとseqIdxが変わっていなければ自動ターン終了
      if(!G||G.turnCount!==snapTc||G.seqIdx!==snapSi)return;
      if(!myTurn()||!G.playedThisTurn)return;
      processing=false;// 念のためprocessingをリセット
      lock();
      try{await endTurnInt();}
      catch(e){console.warn('autoEndTurn error:',e);}
      finally{unlock();}
    },900);
  }catch(e){console.error('playCard:',e);toast('エラー: '+e.message);}
  finally{unlock();}
};

window.extraDraw=async function(){if(processing||!myTurn()||ph()!=='attack'||G.playedThisTurn)return;lock();try{const S=clone(G);const p=S.players[mySlot];if((p.hp||0)<=2){toast('HP2消費できません');return;}const card=drawW(p.hand);if(!card){toast('プールが空です');return;}p.hp-=2;p.hand.push(card);newCards.add('n'+(p.hand.length-1));S.log.push(`P${mySlot}→HP-2でドロー`);G=S;renderAll();await save(S);toast('ドロー！');}finally{unlock();}};
window.endTurn=async function(){if(processing||!myTurn())return;lock();try{await endTurnInt();}finally{unlock();}};
async function endTurnInt(){if(!myTurn())return;const S=clone(G);const c=S.seq[S.seqIdx%S.seq.length];if(c.phase==='defend'&&!S.playedThisTurn){const ak=S.atkCardPlayed;if(ak){const av=wAtk(ak,S);if(av>0){S.players[c.player].hp=Math.max(0,(S.players[c.player].hp||0)-av);S.log.push(`P${c.player}がガードせず${av}ダメ！`);setTimeout(()=>atkFx(ak,av,false),50);applyEff(ak,S,S.lastAtkPlayer,'onDamage',-1);}}}if(c.phase==='defend'){S.atkCardPlayed=null;S.defCardPlayed=null;wxTick(S);}for(let i=1;i<=S.numP;i++){if(S.players[i]&&(S.players[i].hp||0)<=0&&S.players[i].alive!==false){S.players[i].alive=false;S.log.push(`💀P${i}「${pNames[i]||'P'+i}」脱落！`);}}let nx=(S.seqIdx+1)%S.seq.length;for(let sf=0;sf<S.seq.length*2;sf++){if(S.players[S.seq[nx%S.seq.length].player]?.alive!==false)break;nx=(nx+1)%S.seq.length;}S.seqIdx=nx%S.seq.length;S.playedThisTurn=false;S.turnCount=(S.turnCount||0)+1;const next=S.seq[S.seqIdx%S.seq.length];const np=S.players[next.player];if(np){np.cost=(np.cost||0)+3;S.log.push(`P${next.player}「${pNames[next.player]||'P'+next.player}」の${next.phase==='attack'?'攻撃':'防御'}ターン（コスト+3）`);}selCard=-1;G=S;renderAll();checkWin();await save(S);}

function checkWin(){if(!G||G.status!=='playing'||gameOverShown)return;const alive=[];for(let i=1;i<=G.numP;i++)if(G.players[i]?.alive!==false&&(G.players[i]?.hp||0)>0)alive.push(i);if(alive.length>1)return;gameOverShown=true;G.status='over';const win=alive.includes(mySlot)||alive.length===0;const nm=alive.length?alive.map(i=>pNames[i]||'P'+i).join('・'):'引き分け';document.getElementById('gopTitle').textContent=win?'🏆 勝利！':'💀 敗北';document.getElementById('gopTitle').style.color=win?'var(--gold)':'var(--red)';document.getElementById('gopSub').innerHTML=`${nm} の勝利！<br><small style="opacity:.6">${G.log?.[G.log.length-1]||''}</small>`;setTimeout(()=>document.getElementById('gop').classList.add('show'),2000);}

function ill(card){const i=card?.illust;if(i&&i!=='[img]'&&(i.startsWith('http')||i.startsWith('data:')))return`<img src="${i}" style="width:100%;height:100%;object-fit:contain;background:#111" onerror="this.style.display='none'">`;return(i&&i!=='[img]')?i:'🃏';}
function gc2(card,sel,stat){if(!card)return'';const cols=getColors(card);const mc=mainC(card);const av=wAtk(card);const cs=cols.map(c=>`<div class="gc-cs-seg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');const sk=cskills(card);return`<div class="gc${sel?' sel':''}${stat?' static-card':''}" style="border-color:${mc.border};box-shadow:${sel?'0 0 12px '+mc.glow:stat?'0 0 7px '+mc.glow:'none'}">${sk.length?'<div class="gc-sdot"></div>':''}<div class="gc-cs">${cs}</div><div class="gc-head"><div class="gc-cost" style="background:${mc.cost}">${card.cost||1}</div><div class="gc-name">${card.name||'?'}</div></div><div class="gc-art">${ill(card)}</div><div class="gc-stats"><span style="color:${av!==(card.atk||0)?'#f1c40f':mc.accent}">⚔${av}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div><div class="gc-flavor">${card.flavor?`<div class="gc-ft">${card.flavor}</div>`:''}${sk.map(s=>`<div class="gc-sl">${s}</div>`).join('')}</div></div>`;}
function renderAll(){if(!G)return;rStat();rBanner();rHint();rWx();rOpps();rBF();renderHand();rLog();updBtn();}
function rStat(){const me=G.players[mySlot];if(!me)return;document.getElementById('myNameDisp').textContent=(pNames[mySlot]||myName)+' 👤';document.getElementById('myHpBar').style.width=Math.max(0,Math.min(100,(me.hp/me.maxHp)*100))+'%';document.getElementById('myHpTxt').textContent=`${me.hp}/${me.maxHp}`;const cost=me.cost||0;document.getElementById('myCostNum').textContent=cost;const col=cost>=10?'rgba(241,196,15,.85)':cost>=5?'rgba(201,168,76,.65)':'rgba(201,168,76,.45)';const circ=document.getElementById('myCostCircle');circ.style.borderColor=col;circ.style.boxShadow=cost>=5?`0 0 10px ${col}`:'none';}
function rBanner(){const c=cur();const tb=document.getElementById('turnBadge');const bn=document.getElementById('turnBanner');const hud=document.getElementById('hudTurn');if(hud)hud.textContent=`T${(G.turnCount||0)+1}[seq:${G.seqIdx} P${c.player}${c.phase[0]} me:${mySlot} played:${G.playedThisTurn?1:0} h:${amHost?1:0}]`;if(myTurn()&&ph()==='attack'){tb.className='tbadge tb-a';tb.textContent='あなたの攻撃';bn.className='turn-banner attack';document.getElementById('turnIcon').textContent='⚔️';document.getElementById('turnBannerTxt').textContent='攻撃ターン — カードを選んで「出す」';}else if(myTurn()&&ph()==='defend'){tb.className='tbadge tb-d';tb.textContent='あなたの防御';bn.className='turn-banner defend';document.getElementById('turnIcon').textContent='🛡️';document.getElementById('turnBannerTxt').textContent='防御ターン — カードを出すかターン終了';}else{const nm=pNames[c.player]||`P${c.player}`;tb.className='tbadge tb-w';tb.textContent=`${nm}のターン`;bn.className='turn-banner wait';document.getElementById('turnIcon').textContent='⏳';document.getElementById('turnBannerTxt').textContent=`${nm} のターン — お待ちください`;}}
function rHint(){const d=G.discardCard,ak=G.atkCardPlayed;document.getElementById('shint').textContent=(d?`捨て札:「${d.name}」[${getColors(d).map(x=>CN[x]||x).join('/')} C${d.cost}]`:'最初は何でも出せます')+(ak?` | 攻撃:「${ak.name}」ATK:${wAtk(ak)}`:'');}
function rWx(){const w=wData(G.weather.current);document.getElementById('wIcon').textContent=w.icon;document.getElementById('wName').textContent=w.name;document.getElementById('wEff').textContent=' '+w.eff;document.getElementById('wChg').textContent=`変化まで${2*G.numP-(G.weather.defendsDone||0)}防御`;}
function rOpps(){const el=document.getElementById('oppsPanel');el.innerHTML='';const c=cur();for(let i=1;i<=G.numP;i++){if(i===mySlot)continue;const p=G.players[i];if(!p)continue;const dead=p.alive===false||(p.hp||0)<=0;const isA=!dead&&c.player===i&&c.phase==='attack';const isD=!dead&&c.player===i&&c.phase==='defend';const pct=Math.max(0,Math.min(100,(p.hp/p.maxHp)*100));const nm=pNames[i]||`P${i}`;const fcard=(G.atkCardPlayed&&G.lastAtkPlayer===i)?G.atkCardPlayed:(G.defCardPlayed&&isD?G.defCardPlayed:null);const d2=document.createElement('div');d2.className='opp-area'+(dead?' opp-dead':isA?' oa':isD?' od':'');d2.innerHTML=`<div class="opp-info"><div class="opp-name">${nm}</div><div class="rpill ${dead?'rp-dead':isA?'rp-a':isD?'rp-d':'rp-w'}">${dead?'💀脱落':isA?'攻撃中':isD?'防御中':'待機'}</div><div class="opp-hp-row"><span style="font-size:.7rem">❤️</span><div class="opp-hb-out"><div class="opp-hb-in" style="width:${pct}%"></div></div><div class="opp-hp-txt">${p.hp}/${p.maxHp}</div></div><div class="opp-cost-c"><div class="occ-l">cost</div><div class="occ-n">${p.cost||0}</div></div><span style="font-family:'Rajdhani',sans-serif;font-size:.58rem;color:var(--text-dim)">🃏${p.hand?.length||0}</span></div><div style="display:flex;gap:.3rem;flex-wrap:wrap">${!dead&&p.hand?.length?`<div style="display:flex;gap:.22rem;overflow-x:auto">${Array(Math.min(p.hand.length,6)).fill(0).map(()=>`<div class="gc facedown static-card" style="border-color:rgba(201,168,76,.15);width:36px;height:52px"><div class="gc-art" style="height:26px;font-size:.75rem">🃏</div></div>`).join('')}${p.hand.length>6?`<span style="font-size:.52rem;color:var(--text-dim);align-self:center">+${p.hand.length-6}</span>`:''}</div>`:''  }${fcard?`<div style="flex-shrink:0">${gc2(fcard,false,true)}</div>`:''}</div>`;el.appendChild(d2);}}
function rBF(){document.getElementById('atkZone').innerHTML=G.atkCardPlayed?gc2(G.atkCardPlayed,false,true):'<div class="field-empty">🗡️</div>';document.getElementById('discardZone').innerHTML=G.discardCard?gc2(G.discardCard,false,true):'<div class="discard-none">なし<br>最初は<br>自由</div>';document.getElementById('defZone').innerHTML=G.defCardPlayed?gc2(G.defCardPlayed,false,true):'<div class="field-empty">🛡️</div>';}
function renderHand(){const me=G?.players?.[mySlot];const hand=me?.hand||[];const el=document.getElementById('myHand');if(!hand.length){el.innerHTML='<div style="color:var(--text-dim);font-size:.76rem;padding:.4rem">手札なし</div>';return;}const mt=myTurn();const sorted=[...hand.map((c,i)=>({card:c,oi:i}))].sort((a,b)=>(a.card.cost||0)-(b.card.cost||0));el.innerHTML=sorted.map(({card,oi:i},si)=>{const mc=mainC(card);const cols=getColors(card);const av=wAtk(card);const ec=Math.max(1,wCost(card)-(me._cB||0));const sel=selCard===i;const dim=mt?(!G.playedThisTurn?!canPlay(card):true):false;const isNew=newCards.has('i'+i)||newCards.has('n'+i)||newCards.has('i'+si);if(isNew){newCards.delete('i'+i);newCards.delete('n'+i);newCards.delete('i'+si);}const cs=cols.map(c=>`<div class="gc-cs-seg" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');const sk=cskills(card);return`<div class="gc hand-card${sel?' sel':''}${dim?' dim':''}${isNew?' dealing':''}" style="border-color:${mc.border};box-shadow:${sel?'0 0 16px '+mc.glow+',0 0 28px '+mc.glow.replace('.4','.15'):'none'}" onclick="${mt&&!dim&&!processing?`selCardFn(${i})`:'void(0)'}" onmouseenter="showTT(event,${i})" onmouseleave="hideTT()" ontouchstart="showTT(event,${i})" ontouchend="hideTT()">${sk.length?'<div class="gc-sdot"></div>':''}<div class="gc-cs">${cs}</div><div class="gc-head"><div class="gc-cost" style="background:${mc.cost};${ec!==card.cost?'outline:2px solid #f1c40f;outline-offset:-1px':''}">${ec}</div><div class="gc-name">${card.name||'?'}</div></div><div class="gc-art">${ill(card)}</div><div class="gc-stats"><span style="color:${av!==(card.atk||0)?'#f1c40f':mc.accent}">⚔${av}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div><div class="gc-flavor">${card.flavor?`<div class="gc-ft">${card.flavor}</div>`:''}${sk.map(s=>`<div class="gc-sl">${s}</div>`).join('')}</div></div>`;}).join('');document.getElementById('handCnt').textContent=`(${hand.length}枚)`;}
function rLog(){const el=document.getElementById('glog');el.innerHTML=(G.log||[]).slice(-12).map(t=>{let c='le';if(t.includes('ダメ')||t.includes('ガード'))c+=' dmg';else if(t.includes('回復')||t.includes('HP+'))c+=' heal';else if(t.includes('🌟'))c+=' eff';else if(t.includes('天候')||t.includes('🌤'))c+=' wth';else if(t.includes('開始'))c+=' hl';return`<div class="${c}">▸ ${t}</div>`;}).join('');el.scrollTop=el.scrollHeight;}
function updBtn(){
  const mt=myTurn();
  document.getElementById('btnDraw').disabled=!mt||ph()!=='attack'||G.playedThisTurn;
  document.getElementById('btnPlay').disabled=!mt||selCard<0||G.playedThisTurn;
  // ★ ターン終了はprocessingに関係なく自分のターンなら押せる（詰み防止）
  document.getElementById('btnEnd').disabled=!mt;
}
window.showTT=function(e,i){const me=G?.players?.[mySlot];if(!me)return;const card=me.hand?.[i];if(!card)return;document.getElementById('ttN').textContent=card.name||'?';document.getElementById('ttS').textContent=`コスト:${Math.max(1,wCost(card)-(me._cB||0))} ATK:${wAtk(card)} DEF:${card.def||0} [${getColors(card).map(c=>CN[c]||c).join('/')}]`;document.getElementById('ttSk').textContent=cskills(card).join('\n')||'スキルなし';document.getElementById('ttF').textContent=card.flavor||'';const t=document.getElementById('tooltip');t.style.display='block';const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;t.style.left=Math.min(cx+12,innerWidth-198)+'px';t.style.top=Math.max(cy-130,5)+'px';};
window.hideTT=function(){document.getElementById('tooltip').style.display='none';};

document.head.insertAdjacentHTML('beforeend',`<style>
@keyframes fup{0%{opacity:1;transform:translateY(0)scale(1.2)}80%{opacity:.8}100%{opacity:0;transform:translateY(-75px)scale(.7)}}
@keyframes sfA{0%{opacity:.45}100%{opacity:0}}
@keyframes swA{0%{transform:scale(.1);opacity:.9}100%{transform:scale(5);opacity:0}}
@keyframes ptA{0%{transform:translate(0,0)scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty))scale(0);opacity:0}}
@keyframes biIn{0%{opacity:0;transform:translateX(16px)scale(.85)}100%{opacity:1;transform:translateX(0)scale(1)}}
@keyframes biOut{0%{opacity:1}100%{opacity:0;transform:translateX(10px)}}
@keyframes dealCard{0%{opacity:0;transform:translateY(-40px)scale(.7)rotate(-8deg)}60%{opacity:1;transform:translateY(6px)scale(1.05)rotate(1deg)}100%{opacity:1;transform:translateY(0)scale(1)rotate(0)}}
.hand-card.dealing{animation:dealCard .38s cubic-bezier(.34,1.4,.64,1) forwards}
</style>`);

init();
</script>
</body>
</html>
