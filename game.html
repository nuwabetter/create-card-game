<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARD REALM — 対戦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #f0d080; --gold-dim: #7a6430;
    --deep: #080810; --panel: #0f1020; --panel2: #141428;
    --text: #e8e0d0; --text-dim: #8a8070;
    --border: rgba(201,168,76,0.2);
    --red: #e74c3c; --blue: #3498db; --yellow: #f1c40f; --green: #2ecc71;
    --color-red: #c0392b; --color-blue: #2471a3;
    --color-yellow: #d4ac0d; --color-green: #1e8449;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
  }

  /* ====== LAYOUT ====== */
  .game-wrapper {
    display: flex; flex-direction: column;
    min-height: 100vh;
    padding: 0.75rem;
    gap: 0.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Top HUD */
  .hud {
    display: flex; align-items: center;
    gap: 1rem;
    padding: 0.5rem 1rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .hud-back { color: var(--gold-dim); text-decoration: none; font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; }
  .hud-back:hover { color: var(--gold); }

  .hud-title { font-family: 'Cinzel Decorative', serif; font-size: 1rem; color: var(--gold); flex: 1; text-align: center; }

  .hud-turn {
    font-family: 'Rajdhani', sans-serif; font-size: 0.8rem;
    letter-spacing: 0.15em; color: var(--gold);
    background: rgba(201,168,76,0.1); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.25rem 0.75rem;
    text-transform: uppercase;
  }

  /* Player Areas */
  .battlefield {
    display: grid;
    grid-template-rows: auto 1fr auto auto 1fr auto;
    gap: 0.5rem;
    flex: 1;
  }

  .player-area {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
  }

  .player-area.active-attack {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }

  .player-area.active-defend {
    border-color: #3498db;
    box-shadow: 0 0 20px rgba(52,152,219,0.2);
  }

  .player-info {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem;
  }

  .player-name {
    font-family: 'Rajdhani', sans-serif; font-size: 1rem;
    font-weight: 700; letter-spacing: 0.1em; color: var(--gold);
    text-transform: uppercase;
  }

  .player-role-badge {
    font-family: 'Rajdhani', sans-serif; font-size: 0.65rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 0.15rem 0.5rem; border-radius: 3px;
    font-weight: 700;
  }

  .role-attack { background: rgba(231,76,60,0.2); color: var(--red); border: 1px solid rgba(231,76,60,0.4); }
  .role-defend { background: rgba(52,152,219,0.2); color: var(--blue); border: 1px solid rgba(52,152,219,0.4); }
  .role-wait   { background: rgba(138,128,112,0.2); color: var(--text-dim); border: 1px solid rgba(138,128,112,0.2); }

  .hp-bar-wrap { flex: 1; }
  .hp-label {
    font-family: 'Rajdhani', sans-serif; font-size: 0.75rem;
    color: var(--text-dim); letter-spacing: 0.1em;
    display: flex; justify-content: space-between; margin-bottom: 0.2rem;
  }
  .hp-bar {
    height: 8px; background: var(--panel2); border-radius: 4px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .hp-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.6s ease;
    background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71);
  }

  .cost-badge {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; letter-spacing: 0.1em;
    color: var(--gold); white-space: nowrap;
  }

  /* Hand */
  .hand-label {
    font-family: 'Rajdhani', sans-serif; font-size: 0.65rem;
    letter-spacing: 0.2em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 0.4rem;
  }

  .hand {
    display: flex; flex-wrap: wrap; gap: 0.4rem;
    min-height: 70px;
  }

  /* Cards */
  .game-card {
    width: 72px; height: 100px;
    border-radius: 6px; border: 1px solid;
    background: var(--panel2);
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  .game-card:hover { transform: translateY(-8px) scale(1.05); z-index: 10; }
  .game-card.selected { transform: translateY(-12px) scale(1.08); z-index: 20; }
  .game-card.disabled { opacity: 0.35; cursor: not-allowed; }
  .game-card.disabled:hover { transform: none; }

  .game-card.back {
    background: repeating-linear-gradient(
      45deg, var(--panel2) 0, var(--panel2) 3px,
      rgba(201,168,76,0.05) 3px, rgba(201,168,76,0.05) 6px
    );
    cursor: default;
  }

  .gc-header {
    padding: 2px 4px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(0,0,0,0.4);
    flex-shrink: 0;
  }

  .gc-cost {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.65rem;
    color: var(--deep);
  }

  .gc-name {
    font-size: 0.45rem; color: rgba(255,255,255,0.6);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 42px;
  }

  .gc-art {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    background: rgba(0,0,0,0.2);
  }

  .gc-art img { width: 100%; height: 100%; object-fit: cover; }

  .gc-stats {
    display: flex; justify-content: space-around;
    padding: 2px;
    background: rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  .gc-stat { font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; font-weight: 700; }

  .gc-effect-dot {
    position: absolute; top: 2px; right: 2px;
    width: 6px; height: 6px; border-radius: 50%;
    background: #f1c40f; box-shadow: 0 0 4px #f1c40f;
  }

  /* Field */
  .field-row {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.5rem;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 120px;
  }

  .field-label {
    font-family: 'Rajdhani', sans-serif; font-size: 0.65rem;
    letter-spacing: 0.2em; color: var(--text-dim);
    text-transform: uppercase; writing-mode: vertical-rl;
    flex-shrink: 0;
  }

  .field-slots {
    display: flex; gap: 1rem; flex: 1;
    align-items: center;
    flex-wrap: wrap;
  }

  .field-card-wrap {
    position: relative;
  }

  .field-card-age {
    position: absolute; top: -8px; right: -6px;
    background: rgba(231,76,60,0.9); color: white;
    font-size: 0.55rem; font-family: 'Rajdhani', sans-serif;
    font-weight: 700; letter-spacing: 0.05em;
    padding: 1px 4px; border-radius: 3px;
    z-index: 5;
  }

  .field-empty {
    border: 1px dashed rgba(201,168,76,0.15);
    border-radius: 6px; width: 72px; height: 100px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; opacity: 0.15;
  }

  /* Center actions */
  .center-zone {
    display: flex; align-items: center; justify-content: center; gap: 1.5rem;
    padding: 0.5rem;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
    padding: 0.5rem 1.1rem;
    border: none; border-radius: 6px;
    font-family: 'Rajdhani', sans-serif; font-size: 0.85rem;
    font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    color: var(--deep); box-shadow: 0 3px 12px rgba(201,168,76,0.3);
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(201,168,76,0.5); }
  .btn-gold:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-blue {
    background: linear-gradient(135deg, #1a4a6b, #2471a3);
    color: white; box-shadow: 0 3px 12px rgba(36,113,163,0.3);
  }
  .btn-blue:hover { transform: translateY(-2px); }
  .btn-blue:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-outline {
    background: transparent; color: var(--gold); border: 1px solid var(--gold-dim);
  }
  .btn-outline:hover { background: rgba(201,168,76,0.1); }

  .btn-red {
    background: linear-gradient(135deg, #7b241c, #c0392b);
    color: white;
  }
  .btn-red:hover { transform: translateY(-1px); }
  .btn-red:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* Log */
  .game-log {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.75rem;
    height: 90px; overflow-y: auto;
    font-size: 0.75rem; line-height: 1.6;
  }

  .log-entry { color: var(--text-dim); }
  .log-entry.highlight { color: var(--gold); }
  .log-entry.damage { color: var(--red); }
  .log-entry.heal { color: var(--green); }
  .log-entry.effect { color: #f1c40f; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: var(--panel);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 2.5rem;
    text-align: center;
    max-width: 420px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(201,168,76,0.2);
  }

  .modal-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2rem; color: var(--gold);
    margin-bottom: 0.5rem;
    animation: winner-glow 2s ease-in-out infinite;
  }

  @keyframes winner-glow {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(201,168,76,0.4)); }
    50% { filter: drop-shadow(0 0 25px rgba(201,168,76,0.8)); }
  }

  .modal-sub { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .modal-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

  /* Tooltip */
  .card-tooltip {
    position: fixed; z-index: 50;
    background: var(--panel);
    border: 1px solid var(--gold-dim);
    border-radius: 8px; padding: 0.75rem;
    font-size: 0.75rem; max-width: 200px;
    pointer-events: none;
    display: none;
  }

  .tooltip-name { color: var(--gold); font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 700; margin-bottom: 0.3rem; }
  .tooltip-stats { color: var(--text-dim); margin-bottom: 0.3rem; }
  .tooltip-effect { color: #f1c40f; font-style: italic; }

  /* Floating damage */
  .dmg-float {
    position: fixed; z-index: 200;
    font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700;
    pointer-events: none;
    animation: floatUp 1.5s ease-out forwards;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  .dmg-float.red   { color: var(--red); text-shadow: 0 0 20px var(--red); }
  .dmg-float.green { color: var(--green); text-shadow: 0 0 20px var(--green); }

  /* Color dots */
  .color-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 3px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .game-card { width: 58px; height: 82px; }
    .gc-art { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="game-wrapper" id="gameWrapper" style="display:none">
  <!-- HUD -->
  <div class="hud">
    <a href="index.html" class="hud-back">← ホーム</a>
    <div class="hud-title">⚔ CARD REALM</div>
    <div class="hud-turn" id="turnBadge">準備中...</div>
  </div>

  <!-- Battlefield -->
  <div class="battlefield">

    <!-- OPPONENT (Player 2 from my perspective) -->
    <div class="player-area" id="opponentArea">
      <div class="player-info">
        <div class="player-name" id="opponentName">相手</div>
        <div class="player-role-badge role-wait" id="opponentRoleBadge">待機</div>
        <div class="hp-bar-wrap">
          <div class="hp-label"><span>HP</span><span id="opponentHp">20 / 20</span></div>
          <div class="hp-bar"><div class="hp-fill" id="opponentHpBar" style="width:100%"></div></div>
        </div>
        <div class="cost-badge">コスト: <span id="opponentCost">0</span></div>
      </div>
      <div class="hand-label">相手の手札</div>
      <div class="hand" id="opponentHand"></div>
    </div>

    <!-- Opponent field -->
    <div class="field-row" id="opponentField">
      <div class="field-label">相手フィールド</div>
      <div class="field-slots" id="opponentFieldSlots">
        <div class="field-empty">🃏</div>
      </div>
    </div>

    <!-- Center -->
    <div class="center-zone">
      <button class="btn btn-blue" id="btnDraw" onclick="extraDraw()">
        ➕ 追加ドロー（HP-2）
      </button>
      <button class="btn btn-gold" id="btnPlay" onclick="playSelectedCard()" disabled>
        ▶ カードを出す
      </button>
      <button class="btn btn-red" id="btnEndTurn" onclick="endTurn()">
        ⏩ ターン終了
      </button>
    </div>

    <!-- My field -->
    <div class="field-row" id="myField">
      <div class="field-label">自分フィールド</div>
      <div class="field-slots" id="myFieldSlots">
        <div class="field-empty">🃏</div>
      </div>
    </div>

    <!-- MY Player -->
    <div class="player-area" id="myArea">
      <div class="player-info">
        <div class="player-name" id="myName">あなた</div>
        <div class="player-role-badge role-attack" id="myRoleBadge">攻撃</div>
        <div class="hp-bar-wrap">
          <div class="hp-label"><span>HP</span><span id="myHp">20 / 20</span></div>
          <div class="hp-bar"><div class="hp-fill" id="myHpBar" style="width:100%"></div></div>
        </div>
        <div class="cost-badge">コスト: <span id="myCost">0</span></div>
      </div>
      <div class="hand-label">あなたの手札 <span id="handCount" style="color:var(--gold)"></span></div>
      <div class="hand" id="myHand"></div>
    </div>

    <!-- Log -->
    <div class="game-log" id="gameLog">
      <div class="log-entry highlight">▶ ゲームを読み込んでいます...</div>
    </div>

  </div>
</div>

<!-- Loading Screen -->
<div id="loadingScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.5rem">
  <div style="font-family:'Cinzel Decorative',serif;font-size:2rem;background:linear-gradient(135deg,#7a6430,#f0d080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">CARD REALM</div>
  <div id="loadingMsg" style="font-family:'Rajdhani',sans-serif;letter-spacing:0.2em;color:#8a8070;font-size:0.9rem">対戦を準備中...</div>
  <div style="width:200px;height:3px;background:#141428;border-radius:3px;overflow:hidden">
    <div id="loadBar" style="height:100%;width:0%;background:linear-gradient(90deg,#7a6430,#c9a84c);border-radius:3px;transition:width 0.5s"></div>
  </div>
</div>

<!-- Win/Lose Modal -->
<div class="modal-overlay" id="resultModal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="resultTitle">勝利！</div>
    <div class="modal-sub" id="resultSub">おめでとうございます！</div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="rematch()">もう一度</button>
      <a href="index.html" class="btn btn-outline">ホームへ</a>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="card-tooltip" id="cardTooltip">
  <div class="tooltip-name" id="ttName"></div>
  <div class="tooltip-stats" id="ttStats"></div>
  <div class="tooltip-effect" id="ttEffect"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, get, update, serverTimestamp, push, remove }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // ========== FIREBASE CONFIG ==========
  // TODO: index.htmlと同じFirebase設定を入力してください
  // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCXyreqDjZXIWnZqWZShw1yjwubHduqCoc",
  authDomain: "createcardgame-8edbf.firebaseapp.com",
  databaseURL: "https://createcardgame-8edbf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "createcardgame-8edbf",
  storageBucket: "createcardgame-8edbf.firebasestorage.app",
  messagingSenderId: "173024784980",
  appId: "1:173024784980:web:606d80ee258239d656f3c1",
  measurementId: "G-DDB5KGS7K3"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

  // ===== COLOR CONFIG =====
  const COLOR_MAP = {
    red:    { border: '#c0392b', accent: '#e74c3c', glow: 'rgba(192,57,43,0.4)', cost: '#c0392b' },
    blue:   { border: '#2471a3', accent: '#3498db', glow: 'rgba(36,113,163,0.4)', cost: '#2471a3' },
    yellow: { border: '#d4ac0d', accent: '#f1c40f', glow: 'rgba(212,172,13,0.4)', cost: '#d4ac0d' },
    green:  { border: '#1e8449', accent: '#2ecc71', glow: 'rgba(30,132,73,0.4)', cost: '#1e8449' }
  };

  const COLOR_NAMES = { red:'赤', blue:'青', yellow:'黄', green:'緑' };

  // ===== GAME STATE =====
  let G = null;     // Full game state from Firebase
  let db, gameRef;
  let mySlot = parseInt(localStorage.getItem('mySlot') || '1');
  let selectedCardIndex = -1;
  let firebaseOK = false;
  let loadProgress = 0;
  let demoMode = false;

  // ===== INIT =====
  async function init() {
    setLoad(10, 'Firebase接続中...');

    try {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      gameRef = ref(db, 'gameState');
      firebaseOK = true;
      setLoad(30, 'データ読み込み中...');
    } catch(e) {
      console.warn('Firebase not configured, demo mode');
      demoMode = true;
      setLoad(40, 'デモモードで起動...');
    }

    // Load deck
    const deck = JSON.parse(localStorage.getItem('cardrealmDeck') || '[]');
    setLoad(50, `デッキ読み込み: ${deck.length}枚`);

    if (demoMode || !firebaseOK) {
      await startDemoGame(deck);
      return;
    }

    // Check existing game state
    const snap = await get(gameRef);
    if (snap.val() && snap.val().status === 'playing') {
      G = snap.val();
      setLoad(80, '既存ゲームに参加...');
    } else {
      setLoad(60, 'ゲーム初期化中...');
      await initGame(deck);
    }

    setLoad(100, '完了！');
    setTimeout(() => showGame(), 500);

    // Listen for updates
    onValue(gameRef, (snap) => {
      if (!snap.val()) return;
      G = snap.val();
      renderGame();
      checkWin();
    });
  }

  function setLoad(pct, msg) {
    document.getElementById('loadBar').style.width = pct + '%';
    document.getElementById('loadingMsg').textContent = msg;
  }

  // ===== DEMO MODE (Single Player) =====
  async function startDemoGame(deck) {
    const defaultDeck = generateDefaultDeck();
    const usedDeck = deck.length >= 10 ? deck : [...deck, ...defaultDeck].slice(0, 20);

    G = buildInitialState(usedDeck, usedDeck);
    // In demo mode, player 1 is you, player 2 is AI
    setLoad(100, '完了！（デモモード）');
    setTimeout(() => {
      showGame();
      renderGame();
      addLog('デモモードで起動しました。Firebaseを設定するとオンライン対戦できます。', 'highlight');
    }, 500);
  }

  async function initGame(deck) {
    const defaultDeck = generateDefaultDeck();
    const usedDeck = deck.length >= 5 ? deck : [...deck, ...defaultDeck].slice(0, 20);

    const snap = await get(ref(db, 'currentMatch'));
    const matchData = snap.val() || {};

    // Determine who is P1
    const firstPlayer = Math.random() < 0.5 ? 1 : 2;

    const state = buildInitialState(usedDeck, usedDeck, firstPlayer);
    state.status = 'playing';

    await set(gameRef, state);
  }

  function buildInitialState(p1Deck, p2Deck, firstPlayer = 1) {
    const shuffled1 = shuffle([...p1Deck]);
    const shuffled2 = shuffle([...p2Deck]);

    // First player draws 7, second draws 8
    const p1Hand = shuffled1.splice(0, 7);
    const p2Hand = shuffled2.splice(0, 8);

    // Turn order: attackP1 -> defendP2 -> attackP2 -> defendP1 -> ...
    // We define turns by whose attack/defend it is
    return {
      status: 'playing',
      turn: 0,
      phase: 'attack',  // 'attack' or 'defend'
      activePlayer: firstPlayer, // who is attacking this turn
      firstPlayer,
      players: {
        1: { hp: 20, maxHp: 20, cost: firstPlayer === 1 ? 1 : 2, maxCost: 10, hand: p1Hand, deck: shuffled1 },
        2: { hp: 20, maxHp: 20, cost: firstPlayer === 2 ? 1 : 2, maxCost: 10, hand: p2Hand, deck: shuffled2 }
      },
      field: {
        1: [],  // [{...card, age: 0}]
        2: []
      },
      lastCard: null,  // last card played for color/cost matching
      log: ['ゲーム開始！先行はプレイヤー' + firstPlayer + 'です'],
      playedThisTurn: false
    };
  }

  // ===== RENDER =====
  function renderGame() {
    if (!G) return;

    const me = G.players[mySlot];
    const opp = G.players[mySlot === 1 ? 2 : 1];
    const oppSlot = mySlot === 1 ? 2 : 1;

    // HP
    const myHpPct = (me.hp / me.maxHp) * 100;
    const oppHpPct = (opp.hp / opp.maxHp) * 100;
    document.getElementById('myHp').textContent = `${me.hp} / ${me.maxHp}`;
    document.getElementById('opponentHp').textContent = `${opp.hp} / ${opp.maxHp}`;
    document.getElementById('myHpBar').style.width = myHpPct + '%';
    document.getElementById('opponentHpBar').style.width = oppHpPct + '%';

    // Cost
    document.getElementById('myCost').textContent = me.cost;
    document.getElementById('opponentCost').textContent = opp.cost;

    // Names
    document.getElementById('myName').textContent = `プレイヤー${mySlot}（あなた）`;
    document.getElementById('opponentName').textContent = `プレイヤー${oppSlot}（相手）`;

    // Turn badge & roles
    const isMyAttack   = G.activePlayer === mySlot  && G.phase === 'attack';
    const isMyDefend   = G.activePlayer !== mySlot && G.phase === 'defend' ? false
                       : G.activePlayer === mySlot  && G.phase === 'defend';
    const isOppAttack  = G.activePlayer === oppSlot && G.phase === 'attack';
    const isOppDefend  = G.activePlayer === mySlot  && G.phase === 'defend';

    // Simpler logic: my turn = active player === me, any phase
    const myTurn = G.activePlayer === mySlot;

    let turnText = '';
    if (myTurn && G.phase === 'attack') {
      turnText = 'あなたの攻撃ターン';
      document.getElementById('myRoleBadge').className = 'player-role-badge role-attack';
      document.getElementById('myRoleBadge').textContent = '攻撃';
      document.getElementById('opponentRoleBadge').className = 'player-role-badge role-defend';
      document.getElementById('opponentRoleBadge').textContent = '防御待ち';
      document.getElementById('myArea').className = 'player-area active-attack';
      document.getElementById('opponentArea').className = 'player-area';
    } else if (myTurn && G.phase === 'defend') {
      turnText = 'あなたの防御ターン';
      document.getElementById('myRoleBadge').className = 'player-role-badge role-defend';
      document.getElementById('myRoleBadge').textContent = '防御';
      document.getElementById('opponentRoleBadge').className = 'player-role-badge role-wait';
      document.getElementById('opponentRoleBadge').textContent = '待機';
      document.getElementById('myArea').className = 'player-area active-defend';
      document.getElementById('opponentArea').className = 'player-area';
    } else if (!myTurn && G.phase === 'attack') {
      turnText = '相手の攻撃ターン';
      document.getElementById('myRoleBadge').className = 'player-role-badge role-defend';
      document.getElementById('myRoleBadge').textContent = '防御待ち';
      document.getElementById('opponentRoleBadge').className = 'player-role-badge role-attack';
      document.getElementById('opponentRoleBadge').textContent = '攻撃中';
      document.getElementById('myArea').className = 'player-area';
      document.getElementById('opponentArea').className = 'player-area active-attack';
    } else {
      turnText = '相手の防御ターン';
      document.getElementById('myRoleBadge').className = 'player-role-badge role-wait';
      document.getElementById('myRoleBadge').textContent = '待機';
      document.getElementById('opponentRoleBadge').className = 'player-role-badge role-defend';
      document.getElementById('opponentRoleBadge').textContent = '防御中';
      document.getElementById('myArea').className = 'player-area';
      document.getElementById('opponentArea').className = 'player-area active-defend';
    }

    document.getElementById('turnBadge').textContent = turnText;

    // Hand
    renderHand(me.hand, 'myHand', myTurn);
    renderOpponentHand(opp.hand ? opp.hand.length : 0);

    // Field
    renderField(G.field[mySlot] || [], 'myFieldSlots');
    renderField(G.field[oppSlot] || [], 'opponentFieldSlots');

    // Buttons
    const canAct = G.activePlayer === mySlot;
    document.getElementById('btnDraw').disabled = !canAct || G.phase === 'defend';
    document.getElementById('btnPlay').disabled = !canAct || selectedCardIndex < 0 || G.playedThisTurn;
    document.getElementById('btnEndTurn').disabled = !canAct;

    // Update hand count
    document.getElementById('handCount').textContent = `(${me.hand ? me.hand.length : 0}枚)`;

    // Log
    renderLog();
  }

  function renderHand(hand, containerId, isMyTurn) {
    const el = document.getElementById(containerId);
    if (!hand || hand.length === 0) { el.innerHTML = '<div style="color:var(--text-dim);font-size:0.75rem;padding:0.5rem;">手札なし</div>'; return; }

    el.innerHTML = hand.map((card, i) => {
      const c = COLOR_MAP[card.color] || COLOR_MAP.red;
      const playable = isMyTurn && !G.playedThisTurn && canPlayCard(card, i);
      const isSelected = selectedCardIndex === i;
      const illust = card.illust && card.illust.startsWith('http')
        ? `<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='🃏'">`
        : (card.illust || '🃏');
      const hasEffect = card.effect && card.effect.trigger && card.effect.type;

      return `<div class="game-card ${isSelected ? 'selected' : ''} ${!playable && isMyTurn ? 'disabled' : ''}"
        style="border-color:${c.border};box-shadow:${isSelected ? '0 0 15px ' + c.glow : 'none'}"
        onclick="selectCard(${i})"
        onmouseenter="showTooltip(event, ${i})"
        onmouseleave="hideTooltip()">
        ${hasEffect ? '<div class="gc-effect-dot"></div>' : ''}
        <div class="gc-header">
          <div class="gc-cost" style="background:${c.cost}">${card.cost}</div>
          <div class="gc-name">${card.name || '?'}</div>
        </div>
        <div class="gc-art">${illust}</div>
        <div class="gc-stats">
          <div class="gc-stat" style="color:${c.accent}">⚔${card.atk || 0}</div>
          <div class="gc-stat" style="color:${c.accent}">🛡${card.def || 0}</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderOpponentHand(count) {
    const el = document.getElementById('opponentHand');
    el.innerHTML = Array(Math.min(count, 12)).fill(0).map(() => `
      <div class="game-card back" style="border-color:rgba(201,168,76,0.2)">
        <div class="gc-art" style="font-size:1.2rem">🃏</div>
      </div>`).join('') + (count > 12 ? `<div style="color:var(--text-dim);font-size:0.75rem;align-self:center">+${count-12}</div>` : '');
  }

  function renderField(cards, containerId) {
    const el = document.getElementById(containerId);
    if (!cards || cards.length === 0) {
      el.innerHTML = '<div class="field-empty">🃏</div>';
      return;
    }

    el.innerHTML = cards.map(card => {
      const c = COLOR_MAP[card.color] || COLOR_MAP.red;
      const illust = card.illust && card.illust.startsWith('http')
        ? `<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='🃏'">`
        : (card.illust || '🃏');
      const ageText = card.age === 0 ? '今ターン' : '消滅間近';

      return `<div class="field-card-wrap">
        <div class="game-card" style="border-color:${c.border};box-shadow:0 0 12px ${c.glow};cursor:default">
          <div class="gc-header">
            <div class="gc-cost" style="background:${c.cost}">${card.cost}</div>
            <div class="gc-name">${card.name || '?'}</div>
          </div>
          <div class="gc-art">${illust}</div>
          <div class="gc-stats">
            <div class="gc-stat" style="color:${c.accent}">⚔${card.atk || 0}</div>
            <div class="gc-stat" style="color:${c.accent}">🛡${card.def || 0}</div>
          </div>
        </div>
        <div class="field-card-age">${ageText}</div>
      </div>`;
    }).join('');
  }

  function renderLog() {
    if (!G || !G.log) return;
    const el = document.getElementById('gameLog');
    const logs = G.log.slice(-15);
    el.innerHTML = logs.map(entry => {
      let cls = 'log-entry';
      if (entry.includes('ダメージ') || entry.includes('HP')) cls += ' damage';
      else if (entry.includes('回復')) cls += ' heal';
      else if (entry.includes('効果') || entry.includes('スキル')) cls += ' effect';
      else if (entry.includes('勝利') || entry.includes('敗北') || entry.includes('ゲーム')) cls += ' highlight';
      return `<div class="${cls}">▸ ${entry}</div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  }

  // ===== GAME LOGIC =====

  function canPlayCard(card, index) {
    const me = G.players[mySlot];
    if (me.cost < card.cost) return false;
    if (!G.lastCard) return true;  // First card: always playable

    const last = G.lastCard;
    return card.color === last.color || card.cost === last.cost;
  }

  window.selectCard = function(index) {
    if (G.activePlayer !== mySlot) return;
    if (G.playedThisTurn) { addLog('このターンはすでにカードを出しました'); return; }

    const me = G.players[mySlot];
    const card = me.hand[index];
    if (!card) return;

    if (!canPlayCard(card, index)) {
      showToast('このカードは出せません（同色か同コストのカードのみ）');
      return;
    }
    if (me.cost < card.cost) {
      showToast('コストが足りません');
      return;
    }

    selectedCardIndex = selectedCardIndex === index ? -1 : index;
    renderGame();
    document.getElementById('btnPlay').disabled = selectedCardIndex < 0 || G.playedThisTurn;
  };

  window.playSelectedCard = async function() {
    if (selectedCardIndex < 0 || !G || G.activePlayer !== mySlot) return;
    if (G.playedThisTurn) { showToast('このターンはすでにカードを出しました'); return; }

    const me = G.players[mySlot];
    const card = me.hand[selectedCardIndex];
    if (!card) return;

    if (me.cost < card.cost) { showToast('コストが足りません'); return; }
    if (!canPlayCard(card)) { showToast('このカードは出せません'); return; }

    // Apply play
    const newState = JSON.parse(JSON.stringify(G));
    const p = newState.players[mySlot];
    p.cost -= card.cost;
    p.hand.splice(selectedCardIndex, 1);

    const fieldCard = { ...card, age: 0 };
    newState.field[mySlot] = newState.field[mySlot] || [];
    newState.field[mySlot].push(fieldCard);
    newState.lastCard = card;
    newState.playedThisTurn = true;

    // Combat resolution (if both played)
    const oppSlot = mySlot === 1 ? 2 : 1;

    if (newState.phase === 'defend') {
      // Resolve: attacker's field vs defender's (this card)
      const attackerField = newState.field[oppSlot];
      const attackCard = attackerField && attackerField[attackerField.length - 1];
      if (attackCard) {
        const dmg = Math.max(0, attackCard.atk - fieldCard.def);
        if (dmg > 0) {
          newState.players[mySlot].hp = Math.max(0, newState.players[mySlot].hp - dmg);
          newState.log.push(`戦闘: ${attackCard.name}(ATK:${attackCard.atk}) vs ${fieldCard.name}(DEF:${fieldCard.def}) → ${dmg}ダメージ！`);
          showDamageFloat(dmg, true);
        } else {
          newState.log.push(`戦闘: ${attackCard.name}(ATK:${attackCard.atk}) vs ${fieldCard.name}(DEF:${fieldCard.def}) → ブロック成功！`);
        }
      }
      // Apply effects
      applyEffect(fieldCard, newState, mySlot, 'onDefend');
    } else {
      // Attack phase - just played
      applyEffect(fieldCard, newState, mySlot, 'onPlay');
      applyEffect(fieldCard, newState, mySlot, 'onAttack');
      newState.log.push(`プレイヤー${mySlot}が「${card.name}」を場に出した（ATK:${card.atk}, DEF:${card.def}）`);
    }

    selectedCardIndex = -1;
    await saveState(newState);
  };

  function applyEffect(card, state, slot, trigger) {
    if (!card.effect || card.effect.trigger !== trigger || !card.effect.type) return;
    const oppSlot = slot === 1 ? 2 : 1;
    const v = card.effect.value || 1;

    switch (card.effect.type) {
      case 'draw':
        const drawn = [];
        for (let i = 0; i < v; i++) {
          if (state.players[slot].deck && state.players[slot].deck.length > 0) {
            drawn.push(state.players[slot].deck.shift());
          }
        }
        state.players[slot].hand.push(...drawn);
        state.log.push(`🌟 スキル発動：${card.name}の効果で${v}枚ドロー！`);
        break;
      case 'buffAtk':
        if (state.players[slot].hand.length > 0) {
          const ri = Math.floor(Math.random() * state.players[slot].hand.length);
          state.players[slot].hand[ri].atk = (state.players[slot].hand[ri].atk || 0) + v;
          state.log.push(`🌟 スキル発動：${card.name}の効果で手札の攻撃力+${v}！`);
        }
        break;
      case 'buffDef':
        if (state.players[slot].hand.length > 0) {
          const ri = Math.floor(Math.random() * state.players[slot].hand.length);
          state.players[slot].hand[ri].def = (state.players[slot].hand[ri].def || 0) + v;
          state.log.push(`🌟 スキル発動：${card.name}の効果で手札の防御力+${v}！`);
        }
        break;
      case 'heal':
        state.players[slot].hp = Math.min(state.players[slot].maxHp, state.players[slot].hp + v);
        state.log.push(`🌟 スキル発動：${card.name}の効果でHP+${v}回復！`);
        break;
      case 'damage':
        state.players[oppSlot].hp = Math.max(0, state.players[oppSlot].hp - v);
        state.log.push(`🌟 スキル発動：${card.name}の効果で相手に${v}追加ダメージ！`);
        break;
      case 'costReduce':
        state.players[slot]._nextCostReduce = (state.players[slot]._nextCostReduce || 0) + v;
        state.log.push(`🌟 スキル発動：${card.name}の効果で次のカードコスト-${v}！`);
        break;
    }
  }

  window.extraDraw = async function() {
    if (!G || G.activePlayer !== mySlot || G.phase !== 'attack') return;
    const newState = JSON.parse(JSON.stringify(G));
    const p = newState.players[mySlot];

    if (p.hp <= 2) { showToast('HPが足りません（HP2消費が必要）'); return; }
    if (!p.deck || p.deck.length === 0) { showToast('デッキにカードがありません'); return; }

    p.hp -= 2;
    const card = p.deck.shift();
    p.hand.push(card);
    newState.log.push(`プレイヤー${mySlot}がHP2消費で追加ドロー`);

    await saveState(newState);
    showToast('カードをドローしました');
  };

  window.endTurn = async function() {
    if (!G || G.activePlayer !== mySlot) return;
    const newState = JSON.parse(JSON.stringify(G));

    // Age field cards and remove old ones
    [1, 2].forEach(slot => {
      newState.field[slot] = (newState.field[slot] || []).map(c => ({...c, age: c.age + 1})).filter(c => c.age < 2);
    });

    // If opponent didn't play a card during their defend, take full attack damage
    if (newState.phase === 'attack') {
      // Transition to defend phase - opponent's turn
      const oppSlot = mySlot === 1 ? 2 : 1;
      newState.phase = 'defend';
      newState.activePlayer = oppSlot;
      newState.playedThisTurn = false;
      newState.log.push(`プレイヤー${mySlot}が攻撃ターン終了 → プレイヤー${oppSlot}の防御ターン`);
    } else {
      // defend phase ended - check if attacker played but defender didn't
      const attackerSlot = mySlot === 1 ? 2 : 1;
      const attackerField = newState.field[attackerSlot];
      const myField = newState.field[mySlot];

      if (attackerField && attackerField.length > 0 && (!myField || myField.length === 0)) {
        // Defender didn't block - take full attack damage
        const attackCard = attackerField[attackerField.length - 1];
        const dmg = attackCard.atk || 0;
        if (dmg > 0) {
          newState.players[mySlot].hp = Math.max(0, newState.players[mySlot].hp - dmg);
          newState.log.push(`${attackCard.name}の攻撃がガードされず、プレイヤー${mySlot}に${dmg}ダメージ！`);
          showDamageFloat(dmg, true);
        }
      }

      // Move to next attack turn (next player's attack)
      const nextAttacker = attackerSlot;
      newState.phase = 'attack';
      newState.activePlayer = nextAttacker;
      newState.playedThisTurn = false;

      // Draw card + restore cost for next attacker
      const nextP = newState.players[nextAttacker];
      if (nextP.deck && nextP.deck.length > 0) {
        nextP.hand.push(nextP.deck.shift());
      }
      nextP.cost = Math.min(nextP.maxCost, nextP.cost + 2);
      newState.log.push(`プレイヤー${nextAttacker}の攻撃ターン開始（コスト+2回復、1枚ドロー）`);
    }

    newState.turn = (newState.turn || 0) + 1;
    selectedCardIndex = -1;
    await saveState(newState);
  };

  function checkWin() {
    if (!G) return;
    const p1Dead = G.players[1].hp <= 0;
    const p2Dead = G.players[2].hp <= 0;

    if (p1Dead || p2Dead) {
      const winner = p1Dead ? 2 : 1;
      const iWin = winner === mySlot;
      document.getElementById('resultTitle').textContent = iWin ? '🏆 勝利！' : '💀 敗北...';
      document.getElementById('resultSub').textContent = iWin ? 'おめでとうございます！' : '次は勝てる...';
      document.getElementById('resultModal').style.display = 'flex';
    }
  }

  async function saveState(state) {
    if (demoMode || !firebaseOK) {
      G = state;
      renderGame();
      checkWin();
      return;
    }
    try {
      await set(gameRef, state);
    } catch(e) {
      // Fallback to local
      G = state;
      renderGame();
      checkWin();
    }
  }

  // ===== HELPERS =====

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function generateDefaultDeck() {
    const colors = ['red', 'blue', 'yellow', 'green'];
    const names = ['騎士', '魔法使い', '竜', '妖精', '戦士', '弓使い', '僧侶', '忍者', '海賊', '錬金術師'];
    const illust = ['⚔️', '🔮', '🐉', '🦋', '🛡️', '🏹', '✨', '🌸', '🗡️', '🧪'];
    const deck = [];
    for (let i = 0; i < 20; i++) {
      const ci = i % 4;
      deck.push({
        id: 9000 + i,
        name: names[i % names.length],
        color: colors[ci],
        cost: 1 + Math.floor(i / 4),
        atk: 2 + (i % 5),
        def: 1 + (i % 4),
        illust: illust[i % illust.length],
        flavor: 'デフォルトカード',
        effect: { trigger: '', type: '', value: 1 }
      });
    }
    return deck;
  }

  function showDamageFloat(amount, bad = true) {
    const el = document.createElement('div');
    el.className = 'dmg-float ' + (bad ? 'red' : 'green');
    el.textContent = (bad ? '-' : '+') + amount;
    el.style.left = (30 + Math.random() * 40) + 'vw';
    el.style.top = (40 + Math.random() * 20) + 'vh';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }

  function addLog(msg, cls = '') {
    const el = document.getElementById('gameLog');
    const d = document.createElement('div');
    d.className = 'log-entry ' + cls;
    d.textContent = '▸ ' + msg;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
  }

  function showToast(msg) {
    // Simple overlay toast
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#0f1020;border:1px solid rgba(201,168,76,0.5);border-radius:8px;padding:0.75rem 1.5rem;color:#c9a84c;font-family:Rajdhani,sans-serif;font-size:0.9rem;letter-spacing:0.1em;z-index:999;animation:fadeIn 0.3s ease';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  window.showToast = showToast;

  function showGame() {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('gameWrapper').style.display = 'flex';
    renderGame();
  }

  // Tooltip
  window.showTooltip = function(e, index) {
    if (!G) return;
    const me = G.players[mySlot];
    const card = me.hand[index];
    if (!card) return;

    const t = document.getElementById('cardTooltip');
    document.getElementById('ttName').textContent = card.name;
    document.getElementById('ttStats').textContent = `コスト:${card.cost} / ATK:${card.atk} / DEF:${card.def} / 色:${COLOR_NAMES[card.color] || card.color}`;

    const eff = card.effect;
    const triggerText = { onAttack:'攻撃時', onDefend:'防御時', onPlay:'場に出た時', onDamage:'ダメージ時', onDraw:'ドロー時', onTurnStart:'ターン開始時' };
    const effectText  = { draw:`${eff?.value}枚ドロー`, buffAtk:`ATK+${eff?.value}`, buffDef:`DEF+${eff?.value}`, heal:`HP+${eff?.value}回復`, damage:`追加${eff?.value}ダメージ`, costReduce:`コスト-${eff?.value}` };

    if (eff && eff.trigger && eff.type) {
      document.getElementById('ttEffect').textContent = `【${triggerText[eff.trigger] || eff.trigger}】${effectText[eff.type] || eff.type}`;
    } else {
      document.getElementById('ttEffect').textContent = 'スキルなし';
    }

    t.style.display = 'block';
    t.style.left = Math.min(e.clientX + 10, window.innerWidth - 220) + 'px';
    t.style.top  = Math.min(e.clientY - 10, window.innerHeight - 150) + 'px';
  };

  window.hideTooltip = function() {
    document.getElementById('cardTooltip').style.display = 'none';
  };

  window.rematch = async function() {
    document.getElementById('resultModal').style.display = 'none';
    const deck = JSON.parse(localStorage.getItem('cardrealmDeck') || '[]');
    if (demoMode || !firebaseOK) {
      await startDemoGame(deck);
    } else {
      await initGame(deck);
    }
  };

  // Start!
  init();
</script>
