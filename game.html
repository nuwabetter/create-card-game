<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CARD REALM — 対戦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#080810;--panel:#0f1020;--panel2:#141428;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,.2);--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--yellow:#f1c40f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column}

/* ===== LOAD ===== */
#loadScr{position:fixed;inset:0;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:999}
.load-logo{font-family:'Cinzel Decorative',serif;font-size:2rem;background:linear-gradient(135deg,#7a6430,#f0d080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.load-msg{font-family:'Rajdhani',sans-serif;letter-spacing:.2em;color:var(--text-dim);font-size:.88rem}
.load-bar{width:200px;height:3px;background:#141428;border-radius:3px;overflow:hidden}
.load-fill{height:100%;width:0;background:linear-gradient(90deg,#7a6430,#c9a84c);border-radius:3px;transition:width .5s}

#gameApp{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* ===== HUD ===== */
.hud{display:flex;align-items:center;gap:.45rem;padding:.35rem .6rem;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;min-height:40px}
.hud-back{color:var(--gold-dim);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:.72rem;letter-spacing:.08em}
.hud-title{font-family:'Cinzel Decorative',serif;font-size:.8rem;color:var(--gold);flex:1;text-align:center}
.tbadge{font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.08em;padding:.2rem .55rem;border-radius:4px;text-transform:uppercase;flex-shrink:0}
.tb-a{background:rgba(231,76,60,.14);color:var(--red);border:1px solid rgba(231,76,60,.4)}
.tb-d{background:rgba(52,152,219,.14);color:var(--blue);border:1px solid rgba(52,152,219,.4)}
.tb-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.18)}

/* ===== MY STATUS BAR ===== */
.my-status-bar{display:flex;align-items:center;gap:.6rem;padding:.42rem .7rem;background:rgba(5,5,18,.9);border-bottom:2px solid rgba(201,168,76,.3);flex-shrink:0}
.mys-name{font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;color:var(--gold);flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mys-ti{font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:700;padding:.2rem .52rem;border-radius:5px;flex-shrink:0;transition:all .3s}
.mti-a{background:rgba(231,76,60,.2);color:var(--red);border:1px solid rgba(231,76,60,.5);animation:pA .7s ease-in-out infinite alternate}
.mti-d{background:rgba(52,152,219,.2);color:var(--blue);border:1px solid rgba(52,152,219,.5);animation:pD .7s ease-in-out infinite alternate}
.mti-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.2)}
@keyframes pA{to{box-shadow:0 0 10px rgba(231,76,60,.7)}}
@keyframes pD{to{box-shadow:0 0 10px rgba(52,152,219,.7)}}
.mys-hp-row{display:flex;align-items:center;gap:.38rem;flex:1;min-width:80px}
.hp-bar-outer{flex:1;height:11px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.hp-bar-inner{height:100%;border-radius:5px;transition:width .6s;background:linear-gradient(90deg,#c0392b,#e67e22,#27ae60)}
.mys-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;color:#fff;flex-shrink:0;min-width:42px;text-align:right}
.mys-cost{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;color:var(--gold);background:rgba(201,168,76,.14);border:1px solid rgba(201,168,76,.4);border-radius:6px;padding:.22rem .55rem;flex-shrink:0}

/* ===== WEATHER ===== */
.wbar{display:flex;align-items:center;gap:.5rem;padding:.3rem .6rem;background:rgba(10,10,25,.8);border-bottom:1px solid var(--border);flex-shrink:0;font-family:'Rajdhani',sans-serif}
.wi{font-size:1.1rem}.wn{font-size:.78rem;font-weight:700}.we{font-size:.65rem;color:var(--text-dim)}.wc{font-size:.62rem;color:var(--text-dim);margin-left:auto}

/* ===== STATUS HINT ===== */
.shint{padding:.3rem .6rem;background:rgba(201,168,76,.07);border-bottom:1px solid var(--border);font-family:'Rajdhani',sans-serif;font-size:.7rem;color:var(--gold);text-align:center;flex-shrink:0;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== SCROLL ===== */
.gscroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:.4rem .48rem .5rem}

/* ===== OPPONENTS ===== */
.opp-area{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:.5rem .65rem;margin-bottom:.38rem;transition:border-color .3s,box-shadow .3s}
.opp-area.oa{border-color:rgba(231,76,60,.55);box-shadow:0 0 12px rgba(231,76,60,.12)}
.opp-area.od{border-color:rgba(52,152,219,.55);box-shadow:0 0 12px rgba(52,152,219,.12)}
.opp-info{display:flex;align-items:center;gap:.48rem;margin-bottom:.3rem;flex-wrap:wrap}
.opp-name{font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;color:var(--gold)}
.rpill{font-family:'Rajdhani',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.1em;padding:.12rem .4rem;border-radius:3px;text-transform:uppercase}
.rp-a{background:rgba(231,76,60,.18);color:var(--red);border:1px solid rgba(231,76,60,.4)}
.rp-d{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.4)}
.rp-w{background:rgba(138,128,112,.1);color:var(--text-dim);border:1px solid rgba(138,128,112,.18)}
.opp-hp-row{display:flex;align-items:center;gap:.38rem;flex:1;min-width:80px}
.opp-hb-out{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.opp-hb-in{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,var(--red),#e67e22,var(--green))}
.opp-hp-txt{font-family:'Rajdhani',sans-serif;font-size:.72rem;color:var(--text-dim)}
.opp-cost{font-family:'Rajdhani',sans-serif;font-size:.7rem;color:var(--gold);border:1px solid var(--border);border-radius:4px;padding:.1rem .36rem}

/* ===== BATTLEFIELD ===== */
.battlefield{display:grid;grid-template-columns:1fr 68px 1fr;gap:.38rem;margin:.35rem 0;align-items:start}
.field-col{display:flex;flex-direction:column;gap:.18rem}
.field-lbl{font-family:'Rajdhani',sans-serif;font-size:.55rem;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-bottom:.15rem}
.field-zone{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:.35rem;min-height:102px;display:flex;align-items:center;justify-content:center}
.field-empty{border:1px dashed rgba(201,168,76,.13);border-radius:6px;width:64px;height:92px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;opacity:.14}

/* ===== DISCARD PILE ===== */
.discard-col{display:flex;flex-direction:column;align-items:center;gap:.18rem}
.discard-lbl{font-family:'Rajdhani',sans-serif;font-size:.5rem;letter-spacing:.12em;color:var(--gold-dim);text-transform:uppercase;text-align:center}
.discard-zone{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.22);border-radius:8px;padding:.35rem;width:68px;min-height:102px;display:flex;align-items:center;justify-content:center;position:relative}
.discard-none{font-family:'Rajdhani',sans-serif;font-size:.48rem;letter-spacing:.1em;color:rgba(201,168,76,.25);text-align:center;line-height:1.4}

/* ===== CARD ===== */
.gc{width:64px;height:92px;border-radius:6px;border:1.5px solid;background:var(--panel2);display:flex;flex-direction:column;cursor:pointer;transition:transform .16s,box-shadow .16s;position:relative;overflow:hidden;flex-shrink:0}
.gc:hover{transform:translateY(-7px) scale(1.05);z-index:10}
.gc.sel{transform:translateY(-13px) scale(1.1);z-index:20;outline:2px solid var(--gold)}
.gc.dim{opacity:.22;cursor:not-allowed}
.gc.dim:hover,.gc.dim:active{transform:none}
.gc.static-card{cursor:default}
.gc.static-card:hover{transform:none}
.gc.facedown{background:repeating-linear-gradient(45deg,var(--panel2)0,var(--panel2)3px,rgba(201,168,76,.04)3px,rgba(201,168,76,.04)6px);cursor:default}
.gc-head{padding:2px 3px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.85);flex-shrink:0}
.gc-cost{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.62rem;color:#000;flex-shrink:0}
.gc-name{font-size:.46rem;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:37px;font-family:'Rajdhani',sans-serif;font-weight:700}
.gc-art{flex:1;display:flex;align-items:center;justify-content:center;font-size:1.55rem;background:rgba(0,0,0,.15);position:relative;overflow:hidden}
.gc-art img{width:100%;height:100%;object-fit:cover}
.gc-art::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 58%,rgba(0,0,0,.82)100%);pointer-events:none}
.gc-stats{display:flex;justify-content:space-around;padding:2px;background:rgba(0,0,0,.88);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700}
.gc-cdots{display:flex;gap:1px;position:absolute;bottom:14px;left:2px;z-index:3}
.gc-cdot{width:4px;height:4px;border-radius:50%}
.gc-skill-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#f1c40f;box-shadow:0 0 4px #f1c40f;z-index:3}
/* Card play animation */
.gc.play-anim{animation:cardPlay .4s ease-out}
@keyframes cardPlay{0%{transform:translateY(-20px) scale(.9);opacity:.5}100%{transform:translateY(0) scale(1);opacity:1}}

/* ===== HAND ===== */
.hs-wrap{margin:.32rem 0}
.hand-label{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.25rem}
.hand-scroll{display:flex;gap:.38rem;overflow-x:auto;padding:.2rem .05rem .35rem;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.hand-scroll::-webkit-scrollbar{height:3px}
.hand-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}

/* ===== ACTION BAR ===== */
.abar{display:flex;gap:.38rem;align-items:center;padding:.42rem .52rem;background:rgba(0,0,0,.75);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.26rem;padding:.46rem .8rem;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap}
.btn:active{transform:scale(.92)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--deep);box-shadow:0 2px 10px rgba(201,168,76,.35)}
.btn-gold:disabled{opacity:.2;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#1a4a6b,#2471a3);color:#fff}
.btn-blue:disabled{opacity:.2;cursor:not-allowed}
.btn-red{background:linear-gradient(135deg,#7b241c,#c0392b);color:#fff}
.btn-red:disabled{opacity:.2;cursor:not-allowed}
.btn-gray{background:rgba(90,90,110,.22);color:var(--text-dim);border:1px solid rgba(90,90,110,.28);font-size:.7rem;padding:.42rem .62rem}

/* ===== LOG ===== */
.glog{height:64px;overflow-y:auto;padding:.32rem .55rem;background:rgba(0,0,0,.65);border-top:1px solid var(--border);flex-shrink:0;font-size:.68rem;line-height:1.62}
.glog::-webkit-scrollbar{width:3px}
.glog::-webkit-scrollbar-thumb{background:rgba(201,168,76,.25)}
.le{color:var(--text-dim)}.le.hl{color:var(--gold)}.le.dmg{color:var(--red)}.le.heal{color:var(--green)}.le.eff{color:#f1c40f}.le.wth{color:#87ceeb}

/* ===== TOOLTIP ===== */
.tooltip{position:fixed;z-index:200;background:rgba(6,6,18,.97);border:1px solid var(--gold-dim);border-radius:8px;padding:.6rem;font-size:.72rem;max-width:180px;pointer-events:none;display:none;line-height:1.55;backdrop-filter:blur(4px)}
.tt-name{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:.2rem}
.tt-stat{color:var(--text-dim);margin-bottom:.2rem;font-family:'Rajdhani',sans-serif;font-size:.76rem}
.tt-skill{color:#f1c40f;font-style:italic;font-size:.72rem}
.tt-flavor{color:var(--text-dim);font-style:italic;font-size:.66rem;margin-top:.18rem;border-top:1px solid var(--border);padding-top:.18rem}

/* ===== EFFECTS OVERLAY ===== */
/* Floating damage numbers */
.dmg-float{position:fixed;z-index:400;font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;pointer-events:none;animation:fup 1.4s ease-out forwards;text-shadow:0 2px 12px rgba(0,0,0,.6)}
@keyframes fup{0%{opacity:1;transform:translateY(0)scale(1)}80%{opacity:.8}100%{opacity:0;transform:translateY(-70px)scale(1.4)}}
.df-r{color:var(--red)}.df-g{color:var(--green)}.df-y{color:var(--yellow)}

/* Color attack shockwave effect */
.shockwave{position:fixed;z-index:350;border-radius:50%;pointer-events:none;animation:shock .6s ease-out forwards}
@keyframes shock{0%{transform:scale(.2);opacity:.9}100%{transform:scale(4);opacity:0}}

/* Particle burst */
.particle{position:fixed;z-index:360;width:6px;height:6px;border-radius:50%;pointer-events:none;animation:part var(--dur,.8s) ease-out forwards}
@keyframes part{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}

/* Attack beam */
.atk-beam{position:fixed;z-index:340;pointer-events:none;border-radius:2px;animation:beam .5s ease-in-out forwards}
@keyframes beam{0%{opacity:0;transform:scaleX(0)}30%{opacity:1}100%{opacity:0;transform:scaleX(1)}}

/* Card zoom overlay */
.card-zoom-overlay{position:fixed;inset:0;z-index:450;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);pointer-events:none;animation:zoomIn .4s ease-out forwards}
@keyframes zoomIn{0%{opacity:0;transform:scale(.8)}60%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
.card-zoom-overlay.fade-out{animation:zoomOut .3s ease-in forwards}
@keyframes zoomOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.9)}}
.card-zoom-inner{transform:scale(2.5);transform-origin:center}

/* Screen flash */
.screen-flash{position:fixed;inset:0;z-index:380;pointer-events:none;animation:flash .5s ease-out forwards}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}

/* Modal */
.moverlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal{background:var(--panel);border:1px solid var(--gold);border-radius:16px;padding:1.8rem 1.4rem;text-align:center;max-width:360px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1.6rem;color:var(--gold);margin-bottom:.4rem;animation:mg 2s ease-in-out infinite}
@keyframes mg{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.4))}50%{filter:drop-shadow(0 0 22px rgba(201,168,76,.85))}}
.modal-sub{color:var(--text-dim);font-size:.85rem;margin-bottom:1.1rem}
.modal-btns{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(110px);background:var(--panel);border:1px solid var(--gold);border-radius:7px;padding:.55rem 1.1rem;font-family:'Rajdhani',sans-serif;font-size:.82rem;letter-spacing:.08em;color:var(--gold);z-index:420;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loadScr">
  <div class="load-logo">CARD REALM</div>
  <div class="load-msg" id="loadMsg">対戦を準備中...</div>
  <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
</div>

<div id="gameApp" style="display:none">
  <div class="hud">
    <a href="index.html" class="hud-back">← ホーム</a>
    <div class="hud-title">⚔ CARD REALM</div>
    <div class="tbadge tb-w" id="turnBadge">準備中</div>
  </div>

  <div class="my-status-bar">
    <div class="mys-name" id="myNameDisp">あなた</div>
    <div class="mys-ti mti-w" id="myTurnInd">待機中</div>
    <div class="mys-hp-row">
      <span style="font-size:.85rem;flex-shrink:0">❤️</span>
      <div class="hp-bar-outer"><div class="hp-bar-inner" id="myHpBar" style="width:100%"></div></div>
      <div class="mys-hp-txt" id="myHpTxt">20/20</div>
    </div>
    <div class="mys-cost" id="myCostDisp">💎 0</div>
  </div>

  <div class="shint" id="shint">読み込み中...</div>

  <div class="wbar">
    <div class="wi" id="wIcon">☀️</div>
    <div class="wn" id="wName">晴れ</div>
    <div class="we" id="wEff">天候効果なし</div>
    <div class="wc" id="wChg">—</div>
  </div>

  <div class="gscroll">
    <div id="oppsPanel"></div>

    <!-- Battlefield: Attack | Discard | Defense -->
    <div class="battlefield">
      <div class="field-col">
        <div class="field-lbl">🗡️ 攻撃</div>
        <div class="field-zone" id="atkZone"><div class="field-empty">🗡️</div></div>
      </div>
      <div class="discard-col">
        <div class="discard-lbl">捨て札</div>
        <div class="discard-zone" id="discardZone"><div class="discard-none">なし<br>(最初は<br>自由)</div></div>
      </div>
      <div class="field-col">
        <div class="field-lbl">🛡️ 防御</div>
        <div class="field-zone" id="defZone"><div class="field-empty">🛡️</div></div>
      </div>
    </div>

    <div class="hs-wrap">
      <div class="hand-label">あなたの手札 <span id="handCnt" style="color:var(--gold)"></span></div>
      <div class="hand-scroll" id="myHand"></div>
    </div>
  </div>

  <div class="abar">
    <button class="btn btn-blue"  id="btnDraw" onclick="extraDraw()"  disabled>+ドロー<small style="opacity:.6;font-size:.62rem">(HP-2)</small></button>
    <button class="btn btn-gold"  id="btnPlay" onclick="playCard()"   disabled>▶ カードを出す</button>
    <button class="btn btn-red"   id="btnEnd"  onclick="endTurn()"   disabled>⏩ ターン終了</button>
    <button class="btn btn-gray"               onclick="forceEnd()">🚫 強制終了</button>
  </div>
  <div class="glog" id="glog"></div>
</div>

<div class="moverlay" id="resultModal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="resTitle">勝利！</div>
    <div class="modal-sub"   id="resSub"></div>
    <div class="modal-btns">
      <button class="btn btn-gold" onclick="rematch()">もう一度</button>
      <a href="index.html" class="btn" style="border:1px solid var(--gold-dim);color:var(--gold);background:transparent;text-decoration:none">ホームへ</a>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-name"   id="ttName"></div>
  <div class="tt-stat"   id="ttStat"></div>
  <div class="tt-skill"  id="ttSkill"></div>
  <div class="tt-flavor" id="ttFlavor"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

function getCardCenterPos(){
  // Find approximate center of field area
  const bf=document.querySelector('.battlefield');
  if(!bf)return{x:window.innerWidth/2,y:window.innerHeight/2};
  const r=bf.getBoundingClientRect();
  return{x:r.left+r.width/2, y:r.top+r.height/2};
}

function playAttackEffect(card, dmg, blocked){
  const cols=getColors(card);
  const mc=mainC(card);
  const pos=getCardCenterPos();
  const cx=pos.x, cy=pos.y;

  // 1. Screen flash (color-tinted)
  const flash=document.createElement('div');
  flash.className='screen-flash';
  flash.style.background=mc.fx.replace('.9','.15');
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(),600);

  // 2. Shockwave ring
  const sw=document.createElement('div');
  sw.className='shockwave';
  sw.style.cssText=`left:${cx-40}px;top:${cy-40}px;width:80px;height:80px;border:3px solid ${mc.fx};box-shadow:0 0 20px ${mc.fx}`;
  document.body.appendChild(sw);
  setTimeout(()=>sw.remove(),700);

  // 3. Particles burst
  const pColors=cols.map(c=>CM[c]?.fx||'#fff');
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='particle';
    const angle=Math.random()*360;const dist=40+Math.random()*80;
    const rad=angle*Math.PI/180;
    const dur=.4+Math.random()*.6;
    p.style.cssText=`left:${cx-3}px;top:${cy-3}px;background:${pColors[i%pColors.length]};--tx:${Math.cos(rad)*dist}px;--ty:${Math.sin(rad)*dist}px;--dur:${dur}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),dur*1000+100);
  }

  // 4. Damage number
  setTimeout(()=>{
    if(!blocked){
      floatNum('-'+dmg,'df-r',cx,cy);
    } else {
      floatNum('BLOCK!','df-g',cx,cy-10);

  },200);

  if(cols.includes('red')){fireEffect(cx,cy);}
  if(cols.includes('blue')){iceEffect(cx,cy);}
  if(cols.includes('yellow')){lightningEffect(cx,cy);}

// WEATHER
// ═══════════════════════════════════════════════
function wCost(card,S){const c=card.cost||1;return (S||G).weather.current==='rain'?Math.max(1,c-1):c;}
function wAtk(card,S){
  const a=card.atk||0;S=S||G;
  if(S.weather.current==='storm'&&(S.weather.changeCount||0)>=4)return Math.floor(a*1.5);
  return a;
}
function weatherTick(S){
  S.weather.defendsDone=(S.weather.defendsDone||0)+1;
  const need=2*S.numP;
  if(S.weather.defendsDone>=need){
    S.weather.defendsDone=0;
    const ids=['sun','rain','storm'];
    const avail=ids.filter(w=>w!==S.weather.current&&(w!=='storm'||(S.weather.changeCount||0)>=3));
    const pick=avail.length?avail[Math.floor(Math.random()*avail.length)]:ids.filter(w=>w!==S.weather.current)[0];
    S.weather.current=pick;S.weather.changeCount=(S.weather.changeCount||0)+1;
    S.log.push(`🌤 天候変化 → ${wData(pick).icon}${wData(pick).name}`);
  }
}
function changeWeatherRandom(S){
  const ids=['sun','rain','storm'];const avail=ids.filter(w=>w!==S.weather.current);
  const pick=avail[Math.floor(Math.random()*avail.length)]||'sun';
  S.weather.current=pick;S.weather.changeCount=(S.weather.changeCount||0)+1;
  S.log.push(`🌤 天候強制変化 → ${wData(pick).icon}${wData(pick).name}`);
}

// ═══════════════════════════════════════════════
// CAN PLAY — checks against discardCard
// ═══════════════════════════════════════════════
function canPlay(card,S){
  if(!S)S=G;
  const me=S.players[mySlot];if(!me)return false;
  if((me.cost||0)<wCost(card,S))return false;
  const disc=S.discardCard;
  if(!disc)return true; // no discard yet: any card OK
  const myC=getColors(card);const dC=getColors(disc);
  return myC.some(c=>dC.includes(c))||card.cost===disc.cost;
}

// ═══════════════════════════════════════════════
// SKILL HELPERS
// ═══════════════════════════════════════════════
const TMAP={onAttack:'攻撃時',onDefend:'防御時',onPlay:'場に出た時',onDamage:'ダメ与えた時',onTakeDmg:'被ダメ時',onDraw:'ドロー時',onTurnStart:'ターン開始時',ifHpLow:'HP低下時',ifHpHigh:'HP高時',ifChance:'確率',ifWeatherSun:'晴れ時',ifWeatherRain:'雨時',ifWeatherStorm:'嵐時',ifTurnGte:'ターン数判定'};
const EMAP={draw:v=>`${v}枚ドロー`,buffAtk:v=>`ATK+${v}`,buffDef:v=>`DEF+${v}`,heal:v=>`HP+${v}`,damage:v=>`+${v}ダメ`,costReduce:v=>`次コスト-${v}`,costGain:v=>`コスト+${v}`,oppCostDown:v=>`敵コスト-${v}`,oppAtkDown:v=>`敵次ATK-${v}`,oppDefDown:v=>`敵次DEF-${v}`,weatherChange:()=>'天候変化'};
function skillLabel(e){
  const t=TMAP[e.trigger||'']||'';const k=e.eff||e.effType||e.type||'';
  const ev=e.effVal||e.val||e.value||1;const cv=e.condVal||ev;
  const tt=t.replace('n',cv);const et=EMAP[k]?EMAP[k](ev):'';
  return (tt||et)?`【${tt||'発動'}】${et}`:'';
}
function cardSkillLines(card){
  const effs=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type,effVal:card.effect.value}]:[]);
  return effs.map(e=>skillLabel(e)).filter(Boolean);
}

// ═══════════════════════════════════════════════
// APPLY EFFECTS
// ═══════════════════════════════════════════════
function applyEff(card,S,slot,trigger){
  if(!card)return;
  const effs=card.effects?.length?card.effects:(card.effect&&(card.effect.trigger||card.effect.type)?[{trigger:card.effect.trigger,eff:card.effect.type,effVal:card.effect.value,condVal:3}]:[]);
  const opp=getOpp(slot,S);
  for(const e of effs){
    const trig=e.trigger||'';const eff=e.eff||e.effType||e.type||'';
    const ev=parseInt(e.effVal||e.val||e.value||1);const cv=parseInt(e.condVal||ev);
    if(trig==='ifHpLow'&&(S.players[slot]?.hp||0)>cv)continue;
    if(trig==='ifHpHigh'&&(S.players[slot]?.hp||0)<cv)continue;
    if(trig==='ifChance'&&Math.random()*100>cv)continue;
    if(trig==='ifWeatherSun'&&S.weather.current!=='sun')continue;
    if(trig==='ifWeatherRain'&&S.weather.current!=='rain')continue;
    if(trig==='ifWeatherStorm'&&S.weather.current!=='storm')continue;
    if(trig==='ifTurnGte'&&(S.turnCount||0)<cv)continue;
    if(!['ifHpLow','ifHpHigh','ifChance','ifWeatherSun','ifWeatherRain','ifWeatherStorm','ifTurnGte'].includes(trig)&&trig!==trigger)continue;
    if(!S.players[slot])continue;
    const p=S.players[slot];const op=opp?S.players[opp]:null;
    switch(eff){
      case 'draw':{for(let i=0;i<ev;i++){const d=drawCard();if(d)p.hand.push(d);}S.log.push(`🌟「${card.name}」→${ev}枚ドロー`);break;}
      case 'buffAtk':{if(p.hand.length){const ri=~~(Math.random()*p.hand.length);p.hand[ri].atk=(p.hand[ri].atk||0)+ev;}S.log.push(`🌟「${card.name}」→ATK+${ev}`);break;}
      case 'buffDef':{if(p.hand.length){const ri=~~(Math.random()*p.hand.length);p.hand[ri].def=(p.hand[ri].def||0)+ev;}S.log.push(`🌟「${card.name}」→DEF+${ev}`);break;}
      case 'heal':{const before=p.hp||0;p.hp=Math.min(p.maxHp,before+ev);S.log.push(`🌟「${card.name}」→HP+${ev}`);
        const pos=getCardCenterPos();healEffect(pos.x,pos.y,ev);break;}
      case 'damage':{if(op)op.hp=Math.max(0,(op.hp||0)-ev);S.log.push(`🌟「${card.name}」→追加${ev}ダメ`);break;}
      case 'costReduce':{p._cBonus=(p._cBonus||0)+ev;S.log.push(`🌟「${card.name}」→次コスト-${ev}`);break;}
      case 'costGain':{p.cost=Math.min(p.maxCost,(p.cost||0)+ev);S.log.push(`🌟「${card.name}」→コスト+${ev}`);break;}
      case 'oppCostDown':{if(op)op.cost=Math.max(0,(op.cost||0)-ev);S.log.push(`🌟「${card.name}」→敵コスト-${ev}`);break;}
      case 'oppAtkDown':{if(op)op._nAtkD=(op._nAtkD||0)+ev;S.log.push(`🌟「${card.name}」→敵次ATK-${ev}`);break;}
      case 'oppDefDown':{if(op)op._nDefD=(op._nDefD||0)+ev;S.log.push(`🌟「${card.name}」→敵次DEF-${ev}`);break;}
      case 'weatherChange':{changeWeatherRandom(S);break;}
    }
  }
}
function getOpp(slot,S){
  if(S.numP===2)return slot===1?2:1;
  const ni=(S.seqIdx+1)%S.seq.length;return S.seq[ni].player;
}

// ═══════════════════════════════════════════════
// BUILD STATE
// ═══════════════════════════════════════════════
function buildState(n){
  let order=Array.from({length:n},(_,i)=>i+1);
  for(let i=order.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  const seq=[];
  for(let oi=0;oi<order.length;oi++){
    seq.push({player:order[oi],phase:'attack'});
    seq.push({player:order[(oi+1)%order.length],phase:'defend'});
  }
  const players={};
  for(let oi=0;oi<order.length;oi++){
    const slot=order[oi],isFirst=oi===0;
    const hand=Array.from({length:isFirst?7:8},()=>drawCard()).filter(Boolean);
    players[slot]={hp:20,maxHp:20,cost:isFirst?1:2,maxCost:10,hand,_cBonus:0,_nAtkD:0,_nDefD:0};
  }
  return{
    status:'playing',numP:n,seqIdx:0,seq,players,
    // ★ discardCard: the most recently played card (for canPlay check)
    // Both atk and def cards immediately move here when played
    discardCard:null,
    // ★ atkCardPlayed: the attack card currently on the attack field (waiting for defense resolution)
    // Once defense resolves or turn ends, it's cleared
    atkCardPlayed:null,
    // ★ defCardPlayed: the defense card currently on the defense field
    defCardPlayed:null,
    playedThisTurn:false,
    turnCount:0,
    weather:{current:'sun',changeCount:0,defendsDone:0},
    log:[`ゲーム開始！先行: P${seq[0].player}「${pNames[seq[0].player]||'P'+seq[0].player}」`]
  };
}

// INIT

async function init(){
  setLoad(15,'カード読み込み中...');
  // ★ Load cards directly from Firebase sharedCards
  // Use activeCardIds if provided (from lobbyCtrl)
  const activeIdStr=localStorage.getItem('activeCardIds')||'all';
  const csnap=await get(cardsRef);
  const allCards=Object.values(csnap.val()||{});
  if(activeIdStr==='all'||!activeIdStr){
    pool=allCards;
  } else {
    const ids=new Set(JSON.parse(activeIdStr));
    pool=allCards.filter(c=>ids.has(c.id));
    if(!pool.length)pool=allCards; // fallback
  }
  if(!pool.length)pool=genDefault();

  setLoad(40,'ゲーム確認...');
  const snap=await get(gameRef);const ex=snap.val();
  if(ex&&ex.status==='playing'&&ex.numP===numP){
    G=ex;setLoad(85,'復帰中...');
  } else {
    setLoad(60,'初期化中...');
    G=buildState(numP);await save(G);
  }
  setLoad(100,'開始！');
  setTimeout(()=>{document.getElementById('loadScr').style.display='none';document.getElementById('gameApp').style.display='flex';renderAll();},350);
  onValue(gameRef,snap=>{if(!snap.val())return;G=snap.val();renderAll();checkWin();});
}

async function save(s){
  G=s;
  try{await set(gameRef,s);}catch(e){console.warn('save fail',e);}
  renderAll();checkWin();
}

// ACTIONS
// ═══════════════════════════════════════════════
window.selCardFn=function(i){
  if(!isMyTurn()){showToast('あなたのターンではありません');return;}
  if(G.playedThisTurn){showToast('今ターンはすでにカードを出しました');return;}
  const card=G.players[mySlot]?.hand?.[i];if(!card)return;
  if(selCard===i){selCard=-1;renderMyHand();updateBtns();return;}
  const cost=wCost(card);
  if((G.players[mySlot].cost||0)<cost){showToast(`コスト不足 (必要:${cost} 所持:${G.players[mySlot].cost||0})`);return;}
  if(!canPlay(card)){
    const disc=G.discardCard;
    showToast(disc?`出せません（捨て札「${disc.name}」と同色/同コストのみ）`:'コスト不足');return;
  }
  selCard=i;renderMyHand();updateBtns();
};

window.playCard=async function(){
  if(selCard<0||!isMyTurn()||G.playedThisTurn)return;
  const me=G.players[mySlot];
  const card=me.hand?.[selCard];if(!card)return;
  const S=clone(G);const p=S.players[mySlot];

  // Apply debuffs
  const pc={...card};
  if(p._nAtkD){pc.atk=Math.max(0,(pc.atk||0)-p._nAtkD);p._nAtkD=0;}
  if(p._nDefD){pc.def=Math.max(0,(pc.def||0)-p._nDefD);p._nDefD=0;}

  const cost=wCost(card,S);const bonus=p._cBonus||0;
  p.cost-=Math.max(0,cost-bonus);p._cBonus=0;
  p.hand.splice(selCard,1);
  S.playedThisTurn=true;

  // ★ IMMEDIATELY update discardCard when card is played
  S.discardCard=clone(pc); // copy to discard right away

  if(phase(S)==='attack'){
    // Place on attack field
    S.atkCardPlayed=clone(pc);
    S.defCardPlayed=null; // clear any previous defense card
    S.lastAtkPlayer=mySlot;
    const av=wAtk(pc,S);
    S.log.push(`P${mySlot}「${pNames[mySlot]||myName}」→攻撃「${pc.name}」ATK:${av}`);
    applyEff(pc,S,mySlot,'onPlay');
    applyEff(pc,S,mySlot,'onAttack');
    cardPlayFlash(pc);

  } else {
    // DEFEND: resolve combat
    S.defCardPlayed=clone(pc); // show on defense field
    const atkCard=S.atkCardPlayed;
    if(atkCard){
      const av=wAtk(atkCard,S);const dv=pc.def||0;
      const dmg=Math.max(0,av-dv);
      if(dmg>0){
        p.hp=Math.max(0,p.hp-dmg);
        S.log.push(`⚔ 「${atkCard.name}」ATK:${av} vs 「${pc.name}」DEF:${dv} → ${dmg}ダメ！`);
        // Visual effect with attacker's card color
        const pos=getCardCenterPos();
        setTimeout(()=>playAttackEffect(atkCard,dmg,false),100);
        applyEff(atkCard,S,S.lastAtkPlayer,'onDamage');
        applyEff(pc,S,mySlot,'onTakeDmg');
      } else {
        S.log.push(`🛡 「${atkCard.name}」ATK:${av} vs 「${pc.name}」DEF:${dv} → ブロック！`);
        setTimeout(()=>playAttackEffect(atkCard,0,true),100);
      }
    }
    applyEff(pc,S,mySlot,'onPlay');
    applyEff(pc,S,mySlot,'onDefend');
    // After resolve: clear BOTH field cards (they are consumed)
    S.atkCardPlayed=null;
    // defCardPlayed cleared at turn end
    weatherTick(S);
    cardPlayFlash(pc);
  }

  selCard=-1;await save(S);
};

window.extraDraw=async function(){
  if(!isMyTurn()||phase()!=='attack')return;
  const S=clone(G);const p=S.players[mySlot];
  if((p.hp||0)<=2){showToast('HP2消費できません');return;}
  const card=drawCard();if(!card){showToast('カードプールが空です');return;}
  p.hp-=2;p.hand.push(card);
  applyEff(card,S,mySlot,'onDraw');
  S.log.push(`P${mySlot}がHP2消費で追加ドロー`);
  await save(S);showToast('ドロー！');
};

window.endTurn=async function(){
  if(!isMyTurn())return;
  const S=clone(G);const c=S.seq[S.seqIdx%S.seq.length];

  // Defend skipped → take full attack damage
  if(c.phase==='defend'&&!S.playedThisTurn){
    const atkCard=S.atkCardPlayed;
    if(atkCard){
      const av=wAtk(atkCard,S);
      if(av>0){
        S.players[c.player].hp=Math.max(0,(S.players[c.player].hp||0)-av);
        S.log.push(`P${c.player}がガードせず ${av}ダメ！`);
        // Show effect even for skipped defense
        setTimeout(()=>playAttackEffect(atkCard,av,false),50);
        applyEff(atkCard,S,S.lastAtkPlayer,'onDamage');
      }
    }
    weatherTick(S);
  }

  // ★ Clear BOTH field cards at end of turn phase
  // Attack card: cleared after defense phase ends
  if(c.phase==='defend'){
    S.atkCardPlayed=null;
    S.defCardPlayed=null;
  }
  // Attack card stays visible during defend phase, cleared after

  S.seqIdx=(S.seqIdx+1)%S.seq.length;
  S.playedThisTurn=false;
  S.turnCount=(S.turnCount||0)+1;
  const next=S.seq[S.seqIdx%S.seq.length];
  const np=S.players[next.player];

  if(next.phase==='attack'){
    if(np){
      // Also clear any leftover attack cards
      S.atkCardPlayed=null;S.defCardPlayed=null;
      const drawn=drawCard();
      if(drawn){np.hand.push(drawn);applyEff(drawn,S,next.player,'onDraw');}
      np.cost=Math.min(np.maxCost,(np.cost||0)+2);
      S.log.push(`P${next.player}「${pNames[next.player]||'P'+next.player}」の攻撃ターン（コスト+2、1ドロー）`);
    }
  } else {
    if(np){
      np.cost=Math.min(np.maxCost,(np.cost||0)+2);
      S.log.push(`P${next.player}「${pNames[next.player]||'P'+next.player}」の防御ターン（コスト+2）`);
    }
  }
  if(np)applyEff({effects:[]},S,next.player,'onTurnStart');
  selCard=-1;await save(S);
};

window.forceEnd=async function(){
  if(!confirm('試合を強制終了しますか？'))return;
  await remove(gameRef);await remove(lobbyRef);await remove(lobbyCtrlRef);
  window.location.href='index.html';
};
window.rematch=async function(){
  document.getElementById('resultModal').style.display='none';
  await remove(lobbyRef);await remove(lobbyCtrlRef);
  G=buildState(numP);await save(G);selCard=-1;
};

// ═══════════════════════════════════════════════
// WIN CHECK
// ═══════════════════════════════════════════════
function checkWin(){
  if(!G||G.status!=='playing')return;
  const dead=[];
  for(let i=1;i<=G.numP;i++)if(G.players[i]&&(G.players[i].hp||0)<=0)dead.push(i);
  if(!dead.length)return;
  G.status='over';
  const survivors=[];for(let i=1;i<=G.numP;i++)if(!dead.includes(i))survivors.push(i);
  const iLose=dead.includes(mySlot);
  document.getElementById('resTitle').textContent=iLose?'💀 敗北...':'🏆 勝利！';
  document.getElementById('resSub').textContent=iLose?`${survivors.map(i=>pNames[i]||'P'+i).join('・')} の勝利`:'おめでとうございます！';
  document.getElementById('resultModal').style.display='flex';
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderAll(){
  if(!G)return;
  renderMyStatus();
  renderStatusHint();
  renderWeather();
  renderOpps();
  renderBattlefield();
  renderMyHand();
  renderLog();
  updateBtns();
}

function renderMyStatus(){
  const me=G.players[mySlot];if(!me)return;
  const pct=Math.max(0,Math.min(100,(me.hp/me.maxHp)*100));
  document.getElementById('myNameDisp').textContent=(pNames[mySlot]||myName)+' 👤';
  document.getElementById('myHpBar').style.width=pct+'%';
  document.getElementById('myHpTxt').textContent=`${me.hp}/${me.maxHp}`;
  document.getElementById('myCostDisp').textContent=`💎 ${me.cost||0}`;
  const ti=document.getElementById('myTurnInd');
  const c=cur();
  if(isMyTurn()&&phase()==='attack'){ti.className='mys-ti mti-a';ti.textContent='⚔ 攻撃ターン';}
  else if(isMyTurn()&&phase()==='defend'){ti.className='mys-ti mti-d';ti.textContent='🛡 防御ターン';}
  else{ti.className='mys-ti mti-w';ti.textContent='⏳ 待機中';}
}

function renderStatusHint(){
  const c=cur();const sh=document.getElementById('shint');
  const tb=document.getElementById('turnBadge');
  const disc=G.discardCard;
  const discInfo=disc?` | 捨て札:「${disc.name}」(${getColors(disc).map(x=>CN[x]||x).join('/')} C${disc.cost})`:' | 最初は何でもOK';
  if(isMyTurn()&&phase()==='attack'){
    tb.className='tbadge tb-a';tb.textContent='あなたの攻撃';
    sh.textContent=`カードを選んで「出す」を押す${discInfo}`;
  } else if(isMyTurn()&&phase()==='defend'){
    tb.className='tbadge tb-d';tb.textContent='あなたの防御';
    const ac=G.atkCardPlayed;
    sh.textContent=`防御カードを出すか「ターン終了」${ac?` | 相手:「${ac.name}」ATK:${wAtk(ac)}`:''}${discInfo}`;
  } else {
    const name=pNames[c.player]||`P${c.player}`;
    tb.className='tbadge tb-w';tb.textContent=`${name}の${phase()==='attack'?'攻撃':'防御'}`;
    sh.textContent=`${name}のターン待機${discInfo}`;
  }
}

function renderWeather(){
  const w=wData(G.weather.current);
  document.getElementById('wIcon').textContent=w.icon;
  document.getElementById('wName').textContent=w.name;
  document.getElementById('wEff').textContent=w.eff+(G.weather.current==='storm'&&(G.weather.changeCount||0)<4?' ※4回変化後':(G.weather.current==='storm'?' ✓':''));
  document.getElementById('wChg').textContent=`変化まで${2*G.numP-(G.weather.defendsDone||0)}防御`;
}

function renderOpps(){
  const pp=document.getElementById('oppsPanel');pp.innerHTML='';
  const c=cur();
  for(let i=1;i<=G.numP;i++){
    if(i===mySlot)continue;
    const p=G.players[i];if(!p)continue;
    const isAtk=c.player===i&&c.phase==='attack';
    const isDef=c.player===i&&c.phase==='defend';
    const pct=Math.max(0,Math.min(100,(p.hp/p.maxHp)*100));
    const cls='opp-area'+(isAtk?' oa':isDef?' od':'');
    const rc=isAtk?'rp-a':isDef?'rp-d':'rp-w';
    const rt=isAtk?'攻撃中':isDef?'防御中':'待機';
    const name=pNames[i]||`P${i}`;
    const d=document.createElement('div');d.className=cls;
    d.innerHTML=`<div class="opp-info">
      <div class="opp-name">${name}</div><div class="rpill ${rc}">${rt}</div>
      <div class="opp-hp-row"><span style="font-size:.75rem">❤️</span><div class="opp-hb-out"><div class="opp-hb-in" style="width:${pct}%"></div></div><div class="opp-hp-txt">${p.hp}/${p.maxHp}</div></div>
      <div class="opp-cost">💎${p.cost||0}</div><span style="font-family:'Rajdhani',sans-serif;font-size:.6rem;color:var(--text-dim)">🃏${p.hand?.length||0}</span>
    </div>
    ${p.hand?.length?`<div class="hand-scroll">${Array(Math.min(p.hand.length,8)).fill(0).map(()=>`<div class="gc facedown static-card" style="border-color:rgba(201,168,76,.15)"><div class="gc-art" style="font-size:.95rem;z-index:1;position:relative">🃏</div></div>`).join('')}${p.hand.length>8?`<span style="font-size:.58rem;color:var(--text-dim);align-self:center;flex-shrink:0">+${p.hand.length-8}</span>`:''}</div>`:''}`;
    pp.appendChild(d);
  }
}

function renderBattlefield(){
  // ★ Atk zone: show atkCardPlayed (the card currently attacking)
  const az=document.getElementById('atkZone');
  if(G.atkCardPlayed){az.innerHTML=buildGC(G.atkCardPlayed,false,true);}
  else{az.innerHTML='<div class="field-empty">🗡️</div>';}

  // ★ Discard zone: show discardCard (immediately updated on play)
  const dz=document.getElementById('discardZone');
  if(G.discardCard){dz.innerHTML=buildGC(G.discardCard,false,true);}
  else{dz.innerHTML='<div class="discard-none">なし<br>(最初は<br>自由)</div>';}

  // ★ Def zone: show defCardPlayed (briefly, then cleared)
  const dfz=document.getElementById('defZone');
  if(G.defCardPlayed){dfz.innerHTML=buildGC(G.defCardPlayed,false,true);}
  else{dfz.innerHTML='<div class="field-empty">🛡️</div>';}
}

function buildGC(card,isSel,isStatic){
  const mc=mainC(card);const av=wAtk(card);const atkCh=av!==(card.atk||0);
  const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:(card.illust||'🃏');
  const cdots=getColors(card).map(c=>`<div class="gc-cdot" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
  const hasSk=cardSkillLines(card).length>0;
  return `<div class="gc${isSel?' sel':''}${isStatic?' static-card':''}"
    style="border-color:${mc.border};box-shadow:${isStatic?'0 0 12px '+mc.glow:isSel?'0 0 14px '+mc.glow:'none'}">
    ${hasSk?'<div class="gc-skill-dot"></div>':''}
    <div class="gc-head"><div class="gc-cost" style="background:${mc.cost}">${card.cost||1}</div><div class="gc-name">${card.name||'?'}</div></div>
    <div class="gc-art">${ill}<div class="gc-cdots">${cdots}</div></div>
    <div class="gc-stats"><span style="color:${atkCh?'#f1c40f':mc.accent}">${av>0?'⚔':''}${av}</span><span style="color:${mc.accent}">🛡${card.def||0}</span></div>
  </div>`;
}

function renderMyHand(){
  const me=G?.players?.[mySlot];const hand=me?.hand||[];
  const el=document.getElementById('myHand');
  if(!hand.length){el.innerHTML='<div style="color:var(--text-dim);font-size:.76rem;padding:.4rem">手札なし</div>';return;}
  const myT=isMyTurn();
  el.innerHTML=hand.map((card,i)=>{
    const mc=mainC(card);
    const effAtk=wAtk(card);const atkCh=effAtk!==(card.atk||0);
    const effCost=wCost(card);const cstCh=effCost!==card.cost;
    const isSel=selCard===i;
    let isDim=false;
    if(myT&&!G.playedThisTurn){
      const hasCost=(me.cost||0)>=effCost;
      let ok=true;const disc=G.discardCard;
      if(disc){const myC=getColors(card);const dC=getColors(disc);ok=myC.some(c=>dC.includes(c))||card.cost===disc.cost;}
      isDim=!(hasCost&&ok);
    } else if(myT&&G.playedThisTurn){isDim=true;}
    const hasSk=cardSkillLines(card).length>0;
    const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:(card.illust||'🃏');
    const cdots=getColors(card).map(c=>`<div class="gc-cdot" style="background:${CM[c]?.dot||'#888'}"></div>`).join('');
    return `<div class="gc${isSel?' sel':''}${isDim?' dim':''}"
      style="border-color:${mc.border};box-shadow:${isSel?'0 0 14px '+mc.glow:'none'}"
      onclick="${myT&&!isDim?`selCardFn(${i})`:'void(0)'}"
      onmouseenter="showTT(event,${i})" onmouseleave="hideTT()"
      ontouchstart="showTT(event,${i})" ontouchend="hideTT()">
      ${hasSk?'<div class="gc-skill-dot"></div>':''}
      <div class="gc-head">
        <div class="gc-cost" style="background:${mc.cost};${cstCh?'outline:2px solid #f1c40f;outline-offset:-1px':''}">${effCost}</div>
        <div class="gc-name">${card.name||'?'}</div>
      </div>
      <div class="gc-art">${ill}<div class="gc-cdots">${cdots}</div></div>
      <div class="gc-stats">
        <span style="color:${atkCh?'#f1c40f':mc.accent}">${effAtk>0?'⚔':''}${effAtk}</span>
        <span style="color:${mc.accent}">🛡${card.def||0}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('handCnt').textContent=`(${hand.length}枚)`;
}

function renderLog(){
  const el=document.getElementById('glog');
  const logs=(G.log||[]).slice(-14);
  el.innerHTML=logs.map(t=>{
    let cls='le';
    if(t.includes('ダメ')||t.includes('ガード'))cls+=' dmg';
    else if(t.includes('回復'))cls+=' heal';
    else if(t.includes('🌟'))cls+=' eff';
    else if(t.includes('天候')||t.includes('🌤'))cls+=' wth';
    else if(t.includes('開始')||t.includes('ゲーム'))cls+=' hl';
    return `<div class="${cls}">▸ ${t}</div>`;
  }).join('');el.scrollTop=el.scrollHeight;
}

function updateBtns(){
  const myT=isMyTurn();const ph=phase();
  document.getElementById('btnDraw').disabled=!myT||ph!=='attack';
  document.getElementById('btnPlay').disabled=!myT||selCard<0||G.playedThisTurn;
  document.getElementById('btnEnd').disabled=!myT;
}

window.showTT=function(e,i){
  const me=G?.players?.[mySlot];if(!me)return;
  const card=me.hand?.[i];if(!card)return;
  document.getElementById('ttName').textContent=card.name||'?';
  document.getElementById('ttStat').textContent=`コスト:${wCost(card)} ATK:${wAtk(card)} DEF:${card.def||0} [${getColors(card).map(c=>CN[c]||c).join('/')}]`;
  document.getElementById('ttSkill').textContent=cardSkillLines(card).join('\n')||'スキルなし';
  document.getElementById('ttFlavor').textContent=card.flavor||'';
  const t=document.getElementById('tooltip');t.style.display='block';
  const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;
  t.style.left=Math.min(cx+12,window.innerWidth-195)+'px';
  t.style.top=Math.max(cy-100,5)+'px';
};
window.hideTT=function(){document.getElementById('tooltip').style.display='none';};

function genDefault(){
  const cols=[['red'],['blue'],['yellow'],['green'],['red','blue'],['yellow','green']];
  const names=['騎士','魔法使い','竜','妖精','戦士','弓使い','僧侶','忍者','海賊','錬金術師','天使','悪魔','剣士','盗賊','召喚士','聖騎士','魔剣士','竜騎士','幻術師','召喚魔法'];
  const ills=['⚔️','🔮','🐉','🦋','🛡️','🏹','✨','🌸','🗡️','🧪','👼','😈','⚡','🗺️','📖','🏰','🌙','🦅','🌀','🔥'];
  return names.map((n,i)=>({id:'def'+i,name:n,colors:cols[i%cols.length],color:cols[i%cols.length][0],cost:1+~~(i/4),atk:2+(i%5),def:1+(i%4),illust:ills[i],flavor:'',effects:[],effect:{trigger:'',type:'',value:1}}));
}

init();
