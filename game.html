<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CARD REALM — 対戦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#080810;--panel:#0f1020;--panel2:#141428;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,.2)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column}
/* ===== LAYOUT ===== */
#loadScr{position:fixed;inset:0;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:999}
.load-logo{font-family:'Cinzel Decorative',serif;font-size:2rem;background:linear-gradient(135deg,#7a6430,#f0d080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.load-msg{font-family:'Rajdhani',sans-serif;letter-spacing:.2em;color:var(--text-dim);font-size:.85rem}
.load-bar{width:200px;height:3px;background:#141428;border-radius:3px;overflow:hidden}
.load-fill{height:100%;width:0%;background:linear-gradient(90deg,#7a6430,#c9a84c);border-radius:3px;transition:width .5s}

#gameApp{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* HUD */
.hud{display:flex;align-items:center;gap:.6rem;padding:.4rem .7rem;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;min-height:44px}
.hud-back{color:var(--gold-dim);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:.72rem;letter-spacing:.1em}
.hud-title{font-family:'Cinzel Decorative',serif;font-size:.85rem;color:var(--gold);flex:1;text-align:center}
.turn-badge{font-family:'Rajdhani',sans-serif;font-size:.68rem;letter-spacing:.1em;padding:.22rem .6rem;border-radius:4px;text-transform:uppercase;font-weight:700}
.tb-atk{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.4)}
.tb-def{background:rgba(52,152,219,.15);color:#3498db;border:1px solid rgba(52,152,219,.4)}
.tb-wait{background:rgba(138,128,112,.12);color:var(--text-dim);border:1px solid rgba(138,128,112,.2)}

/* Weather bar */
.weather-bar{display:flex;align-items:center;gap:.6rem;padding:.35rem .7rem;background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0}
.w-icon{font-size:1.2rem}
.w-name{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.1em}
.w-effect{font-family:'Rajdhani',sans-serif;font-size:.68rem;color:var(--text-dim);letter-spacing:.05em}
.w-change{font-family:'Rajdhani',sans-serif;font-size:.65rem;color:var(--text-dim);margin-left:auto}
.w-anim{animation:wpulse 1s ease-in-out 3}
@keyframes wpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* Scroll area */
.game-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:.5rem .5rem 1rem}

/* Player cards (compact) */
.player-row{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.6rem .8rem;margin-bottom:.5rem;transition:border-color .3s,box-shadow .3s}
.player-row.my-atk{border-color:#e74c3c;box-shadow:0 0 15px rgba(231,76,60,.15)}
.player-row.my-def{border-color:#3498db;box-shadow:0 0 15px rgba(52,152,219,.15)}
.player-row.opp-atk{border-color:rgba(231,76,60,.5)}

.p-info{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem;flex-wrap:wrap}
.p-name{font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.08em;color:var(--gold);flex-shrink:0}
.role-pill{font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;padding:.15rem .45rem;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.rp-a{background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid rgba(231,76,60,.4)}
.rp-d{background:rgba(52,152,219,.2);color:#3498db;border:1px solid rgba(52,152,219,.4)}
.rp-w{background:rgba(138,128,112,.12);color:var(--text-dim);border:1px solid rgba(138,128,112,.2)}

.hp-wrap{flex:1;min-width:100px}
.hp-lbl{font-family:'Rajdhani',sans-serif;font-size:.6rem;color:var(--text-dim);display:flex;justify-content:space-between;margin-bottom:2px}
.hp-bar{height:6px;background:var(--panel2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.hp-fill{height:100%;border-radius:3px;transition:width .5s;background:linear-gradient(90deg,#e74c3c,#f39c12,#2ecc71)}
.cost-chip{font-family:'Rajdhani',sans-serif;font-size:.68rem;color:var(--gold);background:rgba(201,168,76,.08);border:1px solid var(--border);border-radius:5px;padding:.15rem .45rem;flex-shrink:0}

/* Hand area */
.hand-label{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.3rem}
.hand-scroll{display:flex;gap:.4rem;overflow-x:auto;padding:.25rem .1rem;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.hand-scroll::-webkit-scrollbar{height:3px}
.hand-scroll::-webkit-scrollbar-track{background:transparent}
.hand-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}

/* Field */
.field-area{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:.4rem;margin:.4rem 0;min-height:90px;display:flex;align-items:center;gap:.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.field-lbl{font-family:'Rajdhani',sans-serif;font-size:.55rem;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;writing-mode:vertical-rl;flex-shrink:0;margin-right:.2rem}
.field-slots{display:flex;gap:.5rem;align-items:center}
.field-empty-slot{border:1px dashed rgba(201,168,76,.12);border-radius:6px;width:58px;height:82px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;opacity:.15;flex-shrink:0}
.field-card-wrap{position:relative;flex-shrink:0}
.fcard-age{position:absolute;top:-5px;right:-4px;background:rgba(231,76,60,.9);color:#fff;font-size:.5rem;font-family:'Rajdhani',sans-serif;font-weight:700;padding:1px 4px;border-radius:3px;z-index:3}

/* Game card */
.gc{width:58px;height:82px;border-radius:6px;border:1.5px solid;background:var(--panel2);display:flex;flex-direction:column;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;flex-shrink:0;scroll-snap-align:start}
.gc:hover,.gc:active{transform:translateY(-6px) scale(1.05);z-index:10}
.gc.sel{transform:translateY(-10px) scale(1.08);z-index:20}
.gc.dim{opacity:.3;cursor:not-allowed}
.gc.dim:hover,.gc.dim:active{transform:none}
.gc.back{background:repeating-linear-gradient(45deg,var(--panel2) 0,var(--panel2) 3px,rgba(201,168,76,.04) 3px,rgba(201,168,76,.04) 6px);cursor:default}
.gc-head{padding:2px 3px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.75);flex-shrink:0}
.gc-cost{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.58rem;color:#000;flex-shrink:0}
.gc-name{font-size:.4rem;color:rgba(255,255,255,.55);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:35px}
.gc-art{flex:1;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:rgba(0,0,0,.15);position:relative}
.gc-art img{width:100%;height:100%;object-fit:cover}
.gc-art::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 60%,rgba(0,0,0,.7) 100%)}
.gc-stats{display:flex;justify-content:space-around;padding:2px;background:rgba(0,0,0,.8);flex-shrink:0;font-family:'Rajdhani',sans-serif;font-size:.56rem;font-weight:700}
.gc-skill-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#f1c40f;box-shadow:0 0 4px #f1c40f;z-index:3}
.gc-colors{display:flex;gap:1px;position:absolute;bottom:14px;left:2px;z-index:3}
.gc-cdot{width:4px;height:4px;border-radius:50%}

/* Action bar */
.action-bar{display:flex;gap:.5rem;align-items:center;padding:.5rem .6rem;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.3rem;padding:.5rem .85rem;border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;touch-action:manipulation;-webkit-user-select:none;user-select:none;white-space:nowrap}
.btn:active{transform:scale(.94)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--deep);box-shadow:0 2px 10px rgba(201,168,76,.3)}
.btn-gold:disabled{opacity:.28;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#1a4a6b,#2471a3);color:#fff}
.btn-blue:disabled{opacity:.28;cursor:not-allowed}
.btn-red{background:linear-gradient(135deg,#7b241c,#c0392b);color:#fff}
.btn-red:disabled{opacity:.28;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold-dim)}

/* Log */
.game-log{height:72px;overflow-y:auto;padding:.4rem .6rem;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;font-size:.68rem;line-height:1.65}
.game-log::-webkit-scrollbar{width:3px}
.game-log::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3)}
.le{color:var(--text-dim)}.le.hl{color:var(--gold)}.le.dmg{color:#e74c3c}.le.heal{color:#2ecc71}.le.eff{color:#f1c40f}.le.wth{color:#87ceeb}

/* Players list for 3-4p mode */
.players-panel{display:flex;flex-direction:column;gap:.5rem}

/* Tooltip */
.tooltip{position:fixed;z-index:200;background:var(--panel);border:1px solid var(--gold-dim);border-radius:8px;padding:.6rem;font-size:.72rem;max-width:180px;pointer-events:none;display:none;line-height:1.5}
.tt-name{color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;margin-bottom:.2rem}
.tt-stat{color:var(--text-dim);margin-bottom:.2rem}
.tt-skill{color:#f1c40f;font-style:italic}
.tt-flavor{color:var(--text-dim);font-style:italic;font-size:.65rem;margin-top:.2rem;border-top:1px solid var(--border);padding-top:.2rem}

/* Float damage */
.dmg-float{position:fixed;z-index:300;font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;pointer-events:none;animation:fup 1.4s ease-out forwards}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.4)}}
.df-red{color:#e74c3c;text-shadow:0 0 15px #e74c3c}
.df-green{color:#2ecc71;text-shadow:0 0 15px #2ecc71}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--panel);border:1px solid var(--gold);border-radius:16px;padding:2rem 1.5rem;text-align:center;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1.8rem;color:var(--gold);margin-bottom:.4rem;animation:mglow 2s ease-in-out infinite}
@keyframes mglow{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.4))}50%{filter:drop-shadow(0 0 20px rgba(201,168,76,.8))}}
.modal-sub{color:var(--text-dim);font-size:.85rem;margin-bottom:1.3rem}
.modal-actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}

/* Toast */
.toast{position:fixed;bottom:6rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--panel);border:1px solid var(--gold);border-radius:7px;padding:.6rem 1.2rem;font-family:'Rajdhani',sans-serif;font-size:.82rem;letter-spacing:.08em;color:var(--gold);z-index:400;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadScr">
  <div class="load-logo">CARD REALM</div>
  <div class="load-msg" id="loadMsg">対戦を準備中...</div>
  <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
</div>

<!-- Game -->
<div id="gameApp" style="display:none">
  <!-- HUD -->
  <div class="hud">
    <a href="index.html" class="hud-back">← ホーム</a>
    <div class="hud-title">⚔ CARD REALM</div>
    <div class="turn-badge tb-wait" id="turnBadge">準備中</div>
  </div>

  <!-- Weather -->
  <div class="weather-bar">
    <div class="w-icon" id="wIcon">☀️</div>
    <div class="w-name" id="wName">晴れ</div>
    <div class="w-effect" id="wEffect">天候効果なし</div>
    <div class="w-change" id="wChange">変化まで — 防御</div>
  </div>

  <!-- Scrollable game area -->
  <div class="game-scroll" id="gameScroll">
    <div class="players-panel" id="playersPanel"></div>

    <!-- Field area -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:.4rem 0">
      <div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:.58rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.2rem">攻撃フィールド</div>
        <div class="field-area" id="atkField"><div class="field-slots" id="atkFieldSlots"><div class="field-empty-slot">🗡️</div></div></div>
      </div>
      <div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:.58rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.2rem">防御フィールド</div>
        <div class="field-area" id="defField"><div class="field-slots" id="defFieldSlots"><div class="field-empty-slot">🛡️</div></div></div>
      </div>
    </div>

    <!-- My hand -->
    <div style="margin-top:.4rem">
      <div class="hand-label">あなたの手札 <span id="myHandCount" style="color:var(--gold)"></span></div>
      <div class="hand-scroll" id="myHand"></div>
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="btn btn-blue" id="btnDraw" onclick="extraDraw()">+ドロー<span style="font-size:.65rem;opacity:.7">(HP-2)</span></button>
    <button class="btn btn-gold" id="btnPlay" onclick="playCard()" disabled>▶ 出す</button>
    <button class="btn btn-red" id="btnEnd" onclick="endTurn()">⏩ 終了</button>
  </div>

  <!-- Log -->
  <div class="game-log" id="gameLog"></div>
</div>

<!-- Result modal -->
<div class="modal-overlay" id="resultModal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="resultTitle">勝利！</div>
    <div class="modal-sub" id="resultSub"></div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="rematch()">もう一度</button>
      <a href="index.html" class="btn btn-outline">ホームへ</a>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-stat" id="ttStat"></div>
  <div class="tt-skill" id="ttSkill"></div>
  <div class="tt-flavor" id="ttFlavor"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, get }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXyreqDjZXIWnZqWZShw1yjwubHduqCoc",
  authDomain: "createcardgame-8edbf.firebaseapp.com",
  databaseURL: "https://createcardgame-8edbf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "createcardgame-8edbf",
  storageBucket: "createcardgame-8edbf.firebasestorage.app",
  messagingSenderId: "173024784980",
  appId: "1:173024784980:web:606d80ee258239d656f3c1",
  measurementId: "G-DDB5KGS7K3"
};

// ===== CONFIG =====
const COLOR_MAP={
  red:{border:'#c0392b',accent:'#e74c3c',glow:'rgba(192,57,43,.4)',cost:'#c0392b',dot:'#e74c3c'},
  blue:{border:'#2471a3',accent:'#3498db',glow:'rgba(36,113,163,.4)',cost:'#2471a3',dot:'#3498db'},
  yellow:{border:'#d4ac0d',accent:'#f1c40f',glow:'rgba(212,172,13,.4)',cost:'#d4ac0d',dot:'#f1c40f'},
  green:{border:'#1e8449',accent:'#2ecc71',glow:'rgba(30,132,73,.4)',cost:'#1e8449',dot:'#2ecc71'}
};
const COLOR_NAMES={red:'赤',blue:'青',yellow:'黄',green:'緑'};
const TRIG_TEXT={onAttack:'攻撃時',onDefend:'防御時',onPlay:'場に出た時',onDamage:'ダメージ時',onDraw:'ドロー時',onTurnStart:'ターン開始時'};
const EFF_TEXT={draw:n=>`${n}枚ドロー`,buffAtk:n=>`手札1枚ATK+${n}`,buffDef:n=>`手札1枚DEF+${n}`,heal:n=>`HP+${n}回復`,damage:n=>`追加${n}ダメージ`,costReduce:n=>`コスト-${n}`};

// Weather
const WEATHERS=[
  {id:'sun',icon:'☀️',name:'晴れ',effect:'天候効果なし'},
  {id:'rain',icon:'🌧️',name:'雨',effect:'全カードのコスト-1(最低1)'},
  {id:'storm',icon:'⛈️',name:'嵐',effect:'攻撃力×1.5'}
];

// ===== STATE =====
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const gameRef=ref(db,'gameState');

let G=null;
let mySlot=parseInt(localStorage.getItem('mySlot')||'1');
let numPlayers=parseInt(localStorage.getItem('actualPlayers')||'2');
let selCard=-1;
let fireOK=false;

// ===== INIT =====
function setLoad(pct,msg){
  document.getElementById('loadFill').style.width=pct+'%';
  document.getElementById('loadMsg').textContent=msg;
}

async function init(){
  setLoad(20,'Firebase接続中...');
  try{
    await get(ref(db,'.info/connected'));
    fireOK=true;
  }catch(e){console.warn('FB error',e);}

  setLoad(50,'カード読み込み...');
  const deck=JSON.parse(localStorage.getItem('activeCards')||localStorage.getItem('cardrealmDeck')||'[]');
  const useDeck=deck.length>=5?deck:genDefault();

  setLoad(70,'ゲーム初期化...');
  const snap=await get(gameRef);
  const existing=snap.val();

  if(existing&&existing.status==='playing'&&existing.numPlayers===numPlayers){
    G=existing;
    setLoad(100,'復帰しています...');
  } else {
    G=buildState(useDeck,numPlayers);
    await save(G);
    setLoad(100,'ゲーム開始！');
  }

  setTimeout(()=>{
    document.getElementById('loadScr').style.display='none';
    document.getElementById('gameApp').style.display='flex';
    renderAll();
  },400);

  // Real-time listener
  onValue(gameRef,snap=>{
    if(!snap.val())return;
    G=snap.val();
    renderAll();
    checkWin();
  });
}

// ===== GAME BUILDER =====
function buildState(deck,n){
  const shuffled=shuffle([...deck]);
  /* Turn order: P1 atk→P2 def→P2 atk→P3 def→P3 atk→P1 def→ (3p)
     turnSeq: array of {player, phase}  */
  const turnSeq=[];
  for(let i=1;i<=n;i++){
    const next=i===n?1:i+1;
    turnSeq.push({player:i,phase:'attack'});
    turnSeq.push({player:next,phase:'defend'});
  }
  // Build players
  const players={};
  const firstCosts=[1,2,2,2]; // player 1 gets 1, others get 2
  for(let i=1;i<=n;i++){
    const hand=shuffled.splice(0,i===1?7:8);
    players[i]={hp:20,maxHp:20,cost:firstCosts[i-1],maxCost:10,hand,deck:[...shuffled.splice(0,10)]};
  }
  return{
    status:'playing',numPlayers:n,
    turnSeqIndex:0,turnSeq,
    players,
    field:{},
    lastCard:null,
    playedThisTurn:false,
    weather:{current:'sun',changeCount:0,defendCount:0,needDefendCycles:2*n},
    log:['ゲーム開始！']
  };
}

// ===== TURN HELPERS =====
function curTurn(){return G.turnSeq[G.turnSeqIndex%G.turnSeq.length];}
function isMyTurn(){return curTurn().player===mySlot;}
function curPhase(){return curTurn().phase;}
function nextPlayerInSeq(){
  const ni=(G.turnSeqIndex+1)%G.turnSeq.length;
  return G.turnSeq[ni];
}

// ===== WEATHER =====
const WIDS=['sun','rain','storm'];
function getWeather(){return WEATHERS.find(w=>w.id===G.weather.current)||WEATHERS[0];}

function weatherEffect(card,ctx){
  // ctx: 'cost' or 'atk'
  const w=G.weather.current;
  if(ctx==='cost'&&w==='rain') return Math.max(1,card.cost-1);
  if(ctx==='atk'&&w==='storm'&&G.weather.changeCount>=4) return Math.floor((card.atk||0)*1.5);
  return ctx==='cost'?card.cost:(card.atk||0);
}

function tryWeatherChange(state){
  // Increment defend count
  state.weather.defendCount=(state.weather.defendCount||0)+1;
  const needed=2*state.numPlayers;
  if(state.weather.defendCount>=needed){
    state.weather.defendCount=0;
    // Choose new weather (not same)
    const candidates=WIDS.filter(w=>w!==state.weather.current);
    // storm only available after 4 changes
    const avail=candidates.filter(w=>w!=='storm'||(state.weather.changeCount||0)>=3);
    const newW=avail[Math.floor(Math.random()*avail.length)]||candidates[0];
    state.weather.current=newW;
    state.weather.changeCount=(state.weather.changeCount||0)+1;
    const wdata=WEATHERS.find(w=>w.id===newW);
    state.log.push(`🌤 天候が変化！→ ${wdata?.icon||''} ${wdata?.name||newW} (${wdata?.effect||''})`);
    return true;
  }
  return false;
}

function renderWeather(){
  if(!G)return;
  const w=getWeather();
  const wEl=document.getElementById('wIcon');
  wEl.textContent=w.icon;
  document.getElementById('wName').textContent=w.name;
  document.getElementById('wEffect').textContent=w.effect+(G.weather.changeCount<4&&w.id==='storm'?' ※4回変化後有効':'');
  const needed=2*G.numPlayers;
  const rem=needed-(G.weather.defendCount||0);
  document.getElementById('wChange').textContent=`変化まで ${rem}防御`;
}

// ===== CARD HELPERS =====
function getColors(card){return Array.isArray(card.colors)?card.colors:[card.color||'red'];}
function getMainColor(card){return getColors(card)[0];}

function canPlay(card){
  const me=G.players[mySlot];
  const effCost=weatherEffect(card,'cost');
  if(me.cost<effCost) return false;
  if(!G.lastCard) return true;
  const last=G.lastCard;
  // Check color overlap or same cost
  const myColors=getColors(card);
  const lastColors=getColors(last);
  const colorMatch=myColors.some(c=>lastColors.includes(c));
  const costMatch=card.cost===last.cost;
  return colorMatch||costMatch;
}

function buildCardEl(card,index,isHand,dimmed){
  const cols=getColors(card);
  const mc=COLOR_MAP[cols[0]]||COLOR_MAP.red;
  const isSel=isHand&&selCard===index;
  const isDim=isHand&&dimmed;
  const effAtk=G?weatherEffect(card,'atk'):card.atk||0;
  const effCost=G?weatherEffect(card,'cost'):card.cost||1;
  const hasSkill=card.effect&&card.effect.trigger&&card.effect.type;
  const ill=card.illust&&card.illust.startsWith('http')
    ?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='🃏'">`
    :(card.illust||'🃏');
  const colorDots=cols.map(c=>`<div class="gc-cdot" style="background:${COLOR_MAP[c]?.dot||'#888'}"></div>`).join('');
  const atkChanged=effAtk!==card.atk;
  const costChanged=effCost!==card.cost;

  return `<div class="gc${isSel?' sel':''}${isDim?' dim':''}"
    style="border-color:${mc.border};box-shadow:${isSel?'0 0 12px '+mc.glow:'none'}"
    ${isHand?`onclick="selCardFn(${index})" onmouseenter="showTT(event,${index})" onmouseleave="hideTT()" ontouchstart="showTT(event,${index})" ontouchend="hideTT()"`:''}
    data-idx="${index}">
    ${hasSkill?'<div class="gc-skill-dot"></div>':''}
    <div class="gc-head">
      <div class="gc-cost" style="background:${mc.cost};${costChanged?'outline:2px solid #f1c40f;outline-offset:-1px':''}">${effCost}</div>
      <div class="gc-name">${card.name||'?'}</div>
    </div>
    <div class="gc-art">${ill}<div class="gc-colors">${colorDots}</div></div>
    <div class="gc-stats">
      <span style="color:${mc.accent};${atkChanged?'color:#f1c40f':''}">${effAtk>0?'⚔':''}${effAtk}</span>
      <span style="color:${mc.accent}">🛡${card.def||0}</span>
    </div>
  </div>`;
}

function buildFieldCard(card){
  const cols=getColors(card);
  const mc=COLOR_MAP[cols[0]]||COLOR_MAP.red;
  const effAtk=weatherEffect(card,'atk');
  const atkCh=effAtk!==card.atk;
  const ill=card.illust&&card.illust.startsWith('http')
    ?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='🃏'">`
    :(card.illust||'🃏');
  const colorDots=cols.map(c=>`<div class="gc-cdot" style="background:${COLOR_MAP[c]?.dot||'#888'}"></div>`).join('');
  const ageTxt=card.age===0?'今':'消';
  return `<div class="field-card-wrap">
    <div class="fcard-age">${ageTxt}</div>
    <div class="gc" style="border-color:${mc.border};box-shadow:0 0 10px ${mc.glow};cursor:default">
      <div class="gc-head">
        <div class="gc-cost" style="background:${mc.cost}">${card.cost}</div>
        <div class="gc-name">${card.name}</div>
      </div>
      <div class="gc-art">${ill}<div class="gc-colors">${colorDots}</div></div>
      <div class="gc-stats">
        <span style="color:${mc.accent};${atkCh?'color:#f1c40f':''}">${effAtk>0?'⚔':''}${effAtk}</span>

function renderFields(){
  const cur=curTurn();
  // Determine which player is attacking / defending in current turn context
  // atkField shows attacking player's cards, defField shows defending player's cards
  const atkP=cur.phase==='attack'?cur.player:nextPlayerForDefend();
  const defP=cur.phase==='defend'?cur.player:null;

  // We show field as: left=current attacker cards, right=current defender cards
  // Find the attacker: last attack turn player
  const atkCards=G.field[G.lastAtkPlayer]||[];
  const defCards=G.field[cur.player]||[];

  const as=document.getElementById('atkFieldSlots');
  const ds=document.getElementById('defFieldSlots');

  if(!atkCards.length) as.innerHTML='<div class="field-empty-slot">🗡️</div>';
  else as.innerHTML=atkCards.map(c=>buildFieldCard(c)).join('');

  if(!defCards.length) ds.innerHTML='<div class="field-empty-slot">🛡️</div>';
  else ds.innerHTML=defCards.map(c=>buildFieldCard(c)).join('');
}

function nextPlayerForDefend(){
  const ni=(G.turnSeqIndex+1)%G.turnSeq.length;

}

window.selCardFn=function(i){
  if(!isMyTurn()){showToast('あなたのターンではありません');return;}
  if(G.playedThisTurn){showToast('今ターンはすでに出しました');return;}
  const card=G.players[mySlot].hand[i];
  if(!card)return;
  if(!canPlay(card)){showToast('出せません（同色か同コストのみ）');return;}
  if(G.players[mySlot].cost<weatherEffect(card,'cost')){showToast('コストが足りません');return;}
  selCard=selCard===i?-1:i;
  renderMyHand();
  document.getElementById('btnPlay').disabled=selCard<0||G.playedThisTurn;
};

window.playCard=async function(){
  if(selCard<0||!isMyTurn()||G.playedThisTurn)return;
  const me=G.players[mySlot];
  const card=me.hand[selCard];
  if(!card)return;
  const effCost=weatherEffect(card,'cost');
  if(me.cost<effCost){showToast('コストが足りません');return;}
  if(!canPlay(card)){showToast('出せません');return;}

  const S=clone(G);
  const p=S.players[mySlot];
  p.cost-=effCost;
  p.hand.splice(selCard,1);
  const fc={...card,age:0};
  if(!S.field[mySlot]) S.field[mySlot]=[];
  S.field[mySlot].push(fc);
  S.lastCard=card;
  S.playedThisTurn=true;
  const phase=curTurn(/*use S*/).phase; // same index

  if(phase==='attack'){
    S.lastAtkPlayer=mySlot;
    S.log.push(`P${mySlot}「${card.name}」を攻撃！(ATK:${weatherEffect(card,'atk')} DEF:${card.def})`);
    applyEffect(fc,S,mySlot,'onPlay');
    applyEffect(fc,S,mySlot,'onAttack');
  } else {
    // defend: resolve combat
    const atkP=S.lastAtkPlayer;
    const atkField=S.field[atkP]||[];
    const atkCard=atkField[atkField.length-1];
    if(atkCard){
      const atkVal=weatherEffect(atkCard,'atk');
      const dmg=Math.max(0,atkVal-fc.def);
      if(dmg>0){
        p.hp=Math.max(0,p.hp-dmg);
        S.log.push(`⚔ 戦闘: ${atkCard.name}(ATK:${atkVal}) vs ${fc.name}(DEF:${fc.def}) → ${dmg}ダメージ！`);
        floatDmg(dmg,true);
      } else {
        S.log.push(`🛡 戦闘: ${atkCard.name}(ATK:${atkVal}) vs ${fc.name}(DEF:${fc.def}) → ブロック成功！`);
      }
      applyEffect(fc,S,mySlot,'onDefend');
    }
    S.log.push(`P${mySlot}「${card.name}」で防御`);
    // Weather defend count
    tryWeatherChange(S);
  }

  selCard=-1;
  await save(S);
};

window.extraDraw=async function(){
  if(!isMyTurn()||curPhase()!=='attack')return;
  const S=clone(G);
  const p=S.players[mySlot];
  if(p.hp<=2){showToast('HPが足りません');return;}
  if(!p.deck||!p.deck.length){showToast('デッキが空です');return;}
  p.hp-=2;
  p.hand.push(p.deck.shift());
  S.log.push(`P${mySlot}がHP2消費で追加ドロー`);
  await save(S);showToast('ドローしました！');
};

window.endTurn=async function(){
  if(!isMyTurn())return;
  const S=clone(G);
  const cur=S.turnSeq[S.turnSeqIndex%S.turnSeq.length];

  // If attack phase ended without card, no combat
  // If defend phase ended without card, take full atk damage
  if(cur.phase==='defend'&&!S.playedThisTurn){
    const atkP=S.lastAtkPlayer;
    if(atkP){
      const atkField=S.field[atkP]||[];
      const atkCard=atkField[atkField.length-1];
      if(atkCard){
        const atkVal=weatherEffect(atkCard,'atk');
        if(atkVal>0){
          S.players[cur.player].hp=Math.max(0,S.players[cur.player].hp-atkVal);
          S.log.push(`P${cur.player}がガードせず ${atkVal}ダメージ！`);
          floatDmg(atkVal,cur.player===mySlot);
        }
      }
    }
    // Weather defend count
    tryWeatherChange(S);
  }

  // Age fields
  Object.keys(S.field).forEach(slot=>{
    S.field[slot]=(S.field[slot]||[]).map(c=>({...c,age:c.age+1})).filter(c=>c.age<2);
  });

  // Advance turn
  S.turnSeqIndex=(S.turnSeqIndex+1)%S.turnSeq.length;
  S.playedThisTurn=false;
  const next=S.turnSeq[S.turnSeqIndex%S.turnSeq.length];

  // If next is attack, draw+cost recovery
  if(next.phase==='attack'){
    const np=S.players[next.player];
    if(np.deck&&np.deck.length) np.hand.push(np.deck.shift());
    np.cost=Math.min(np.maxCost,np.cost+2);
    S.log.push(`P${next.player}の攻撃ターン（コスト+2、1枚ドロー）`);
  } else {
    S.log.push(`P${next.player}の防御ターン`);
  }

  selCard=-1;
  await save(S);
};

function applyEffect(card,S,slot,trigger){
  if(!card.effect||card.effect.trigger!==trigger||!card.effect.type)return;
  const opp=getOpponent(slot,S);
  const v=card.effect.value||1;
  switch(card.effect.type){
    case 'draw':
      for(let i=0;i<v;i++) if(S.players[slot].deck?.length) S.players[slot].hand.push(S.players[slot].deck.shift());
      S.log.push(`🌟 スキル: ${card.name} → ${v}枚ドロー`); break;
    case 'buffAtk':
      if(S.players[slot].hand.length){const ri=Math.floor(Math.random()*S.players[slot].hand.length);S.players[slot].hand[ri].atk=(S.players[slot].hand[ri].atk||0)+v;}
      S.log.push(`🌟 スキル: ${card.name} → ATK+${v}`); break;
    case 'buffDef':
      if(S.players[slot].hand.length){const ri=Math.floor(Math.random()*S.players[slot].hand.length);S.players[slot].hand[ri].def=(S.players[slot].hand[ri].def||0)+v;}
      S.log.push(`🌟 スキル: ${card.name} → DEF+${v}`); break;
    case 'heal':
      S.players[slot].hp=Math.min(S.players[slot].maxHp,S.players[slot].hp+v);
      S.log.push(`🌟 スキル: ${card.name} → HP+${v}回復`); break;
    case 'damage':
      if(opp) S.players[opp].hp=Math.max(0,S.players[opp].hp-v);
      S.log.push(`🌟 スキル: ${card.name} → 相手に${v}追加ダメージ`); break;
    case 'costReduce':
      S.players[slot]._nextCostReduce=(S.players[slot]._nextCostReduce||0)+v;
      S.log.push(`🌟 スキル: ${card.name} → 次コスト-${v}`); break;
  }
}

function getOpponent(slot,S){
  // For 2p: the other. For 3-4p: next in turn order
  const n=S.numPlayers;
  if(n===2) return slot===1?2:1;
  const cur=S.turnSeq[S.turnSeqIndex%S.turnSeq.length];
  const atkP=cur.phase==='attack'?cur.player:S.lastAtkPlayer;
  // return the attacker if we're defending, else next
  if(slot!==atkP) return atkP;
  const ni=(S.turnSeqIndex+1)%S.turnSeq.length;
  return S.turnSeq[ni].player;
}

function checkWin(){
  if(!G)return;
  const dead=[];
  for(let i=1;i<=G.numPlayers;i++){
    if(G.players[i]&&G.players[i].hp<=0) dead.push(i);
  }
  if(!dead.length)return;
  const iLose=dead.includes(mySlot);
  const survivors=[];
  for(let i=1;i<=G.numPlayers;i++) if(!dead.includes(i)) survivors.push(i);
  const winnerText=survivors.length===1?`P${survivors[0]}の勝利！`:`複数生存`;
  document.getElementById('resultTitle').textContent=iLose?'💀 敗北...':'🏆 勝利！';
  document.getElementById('resultSub').textContent=iLose?`${winnerText}でした`:`おめでとうございます！${winnerText}`;
  document.getElementById('resultModal').style.display='flex';
}

  const ills=['⚔️','🔮','🐉','🦋','🛡️','🏹','✨','🌸','🗡️','🧪','👼','😈','⚡','🗺️','📖','🔭','🏰','🌙','🦅','🌀'];
  return Array.from({length:20},(_,i)=>({
    id:9000+i,name:names[i],colors:colors[i%colors.length],color:colors[i%colors.length][0],
    cost:1+Math.floor(i/4),atk:2+(i%5),def:1+(i%4),illust:ills[i],flavor:'デフォルトカード',
