<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>しんウノ -新世界UNOバトル-</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%230e0e1d'/><rect x='20' y='10' width='60' height='80' rx='8' fill='%23c9a84c' opacity='.9'/><text y='62' x='50' text-anchor='middle' font-size='48' font-family='serif'>🃏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#0a0a14;--panel:#0f1020;--panel2:#141428;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,.25);--red:#e74c3c;--green:#2ecc71}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:2rem 1.5rem;width:100%;max-width:420px}
header{text-align:center;margin-bottom:2rem}
.logo{font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;color:var(--gold)}
.logo-sub{font-size:.7rem;letter-spacing:.3em;color:var(--gold-dim);margin-top:.3rem}
.sec{margin-bottom:1.4rem}
.sec-title{font-family:'Rajdhani',sans-serif;font-size:.68rem;letter-spacing:.22em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.65rem;padding-bottom:.32rem;border-bottom:1px solid var(--border)}
label{display:block;font-size:.76rem;color:var(--text-dim);margin-bottom:.28rem;font-family:'Rajdhani',sans-serif;letter-spacing:.06em;text-transform:uppercase}
input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:.58rem .82rem;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:.65rem}
input:focus{border-color:var(--gold-dim)}
input::placeholder{color:var(--text-dim)}
.room-input{text-align:center;font-size:1.5rem;letter-spacing:.35em;font-family:'Rajdhani',sans-serif;font-weight:700}
.btn{display:flex;align-items:center;justify-content:center;gap:.3rem;width:100%;padding:.65rem;border:none;border-radius:9px;font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none;margin-bottom:.5rem}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.96)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#05050e;box-shadow:0 3px 14px rgba(201,168,76,.3)}
.btn-blue{background:linear-gradient(135deg,#1a4a6b,#2471a3);color:#fff}
.divider{display:flex;align-items:center;gap:.7rem;margin:.2rem 0 .9rem;font-size:.7rem;color:var(--text-dim);font-family:'Rajdhani',sans-serif}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.nav-links{display:flex;gap:.65rem;margin-top:1.2rem}
.nl{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:.7rem .5rem;text-decoration:none;text-align:center;transition:border-color .2s}
.nl:hover{border-color:var(--gold-dim)}
.nl-i{font-size:1.3rem;display:block;margin-bottom:.22rem}
.nl-t{font-family:'Rajdhani',sans-serif;font-size:.74rem;font-weight:700;color:var(--gold);letter-spacing:.07em}
.spin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;backdrop-filter:blur(4px)}
.spin-overlay.show{display:flex}
.spin{width:38px;height:38px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-msg{font-family:'Rajdhani',sans-serif;font-size:.95rem;letter-spacing:.15em;color:var(--text-dim)}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(130px);background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:.6rem 1.1rem;font-family:'Rajdhani',sans-serif;font-size:.82rem;color:var(--gold);z-index:300;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="card">
  <header>
    <div class="logo">🃏 しんウノ</div>
    <div class="logo-sub">-新世界UNOバトル-</div>
  </header>

  <div class="sec">
    <div class="sec-title">プレイヤー名</div>
    <input type="text" id="nameInput" placeholder="あなたの名前を入力..." maxlength="12">
  </div>

  <div class="sec">
    <div class="sec-title">ゲームに参加</div>
    <button class="btn btn-gold" onclick="createRoom()">🏠 部屋を作成する</button>
    <div class="divider">または部屋番号で入室</div>
    <input type="text" id="roomInput" placeholder="0000" maxlength="4"
      pattern="[0-9]*" inputmode="numeric" class="room-input">
    <button class="btn btn-blue" onclick="joinRoom()">🚪 部屋に入る</button>
  </div>

  <div class="nav-links">
    <a href="card.html" class="nl"><span class="nl-i">🎨</span><span class="nl-t">カード作成</span></a>
    <a href="lobby.html" class="nl"><span class="nl-i">📋</span><span class="nl-t">ロビー一覧</span></a>
  </div>
</div>

<div class="spin-overlay" id="spinOverlay">
  <div class="spin"></div>
  <div class="spin-msg" id="spinMsg">処理中...</div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const FB={apiKey:"AIzaSyBsASKwkmpRx_vi7JBqC-fvBl3LOgoOtbo",authDomain:"newcard-8fd59.firebaseapp.com",databaseURL:"https://newcard-8fd59-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"newcard-8fd59",storageBucket:"newcard-8fd59.firebasestorage.app",messagingSenderId:"822236707244",appId:"1:822236707244:web:f2a82f612226d7ac3f6209"};
const db=getDatabase(initializeApp(FB));

// 名前を復元
const sn=localStorage.getItem('myName');if(sn)document.getElementById('nameInput').value=sn;
// 部屋番号が前回残っていれば入力欄に復元
const sr=localStorage.getItem('lastRoomCode');if(sr)document.getElementById('roomInput').value=sr;

function getName(){
  const n=document.getElementById('nameInput').value.trim();
  if(!n){showToast('名前を入力してください');return null;}
  localStorage.setItem('myName',n);return n;
}
function spin(show,msg='処理中...'){
  const ov=document.getElementById('spinOverlay');
  ov.style.display=show?'flex':'none';
  document.getElementById('spinMsg').textContent=msg;
}
async function genRoomCode(){
  for(let i=0;i<20;i++){
    const c=String(Math.floor(1000+Math.random()*9000));
    const s=await get(ref(db,`rooms/${c}/status`));
    if(!s.exists())return c;
  }
  throw new Error('部屋番号の生成に失敗しました');
}
function makePlayerId(){return 'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}

window.createRoom=async function(){
  const name=getName();if(!name)return;
  spin(true,'部屋を作成中...');
  try{
    const code=await genRoomCode();
    const myId=makePlayerId();
    await set(ref(db,`rooms/${code}`),{
      code,status:'waiting',hostId:myId,
      createdAt:Date.now(),
      players:{[myId]:{name,id:myId,slot:1,joinedAt:Date.now()}}
    });
    localStorage.setItem('roomCode',code);
    localStorage.setItem('myPlayerId',myId);
    localStorage.setItem('myName',name);
    localStorage.setItem('lastRoomCode',code);
    spin(false);
    window.location.href='lobby.html?room='+code;
  }catch(e){spin(false);showToast('エラー: '+e.message);}
};

window.joinRoom=async function(){
  const name=getName();if(!name)return;
  const code=document.getElementById('roomInput').value.trim().replace(/\D/g,'');
  if(code.length!==4){showToast('4桁の部屋番号を入力してください');return;}
  spin(true,'部屋を検索中...');
  try{
    const snap=await get(ref(db,`rooms/${code}`));
    if(!snap.exists()){spin(false);showToast('部屋が見つかりません ('+code+')');return;}
    const room=snap.val();
    if(room.status==='playing'){spin(false);showToast('この部屋はすでに試合中です');return;}
    const players=Object.values(room.players||{});
    if(players.length>=4){spin(false);showToast('この部屋は満員です（最大4人）');return;}
    const used=new Set(players.map(p=>p.slot));
    let slot=1;while(used.has(slot))slot++;
    const myId=makePlayerId();
    await set(ref(db,`rooms/${code}/players/${myId}`),{name,id:myId,slot,joinedAt:Date.now()});
    localStorage.setItem('roomCode',code);
    localStorage.setItem('myPlayerId',myId);
    localStorage.setItem('myName',name);
    localStorage.setItem('lastRoomCode',code);
    spin(false);
    window.location.href='lobby.html?room='+code;
  }catch(e){spin(false);showToast('エラー: '+e.message);}
};

// Enterキーで入室
document.getElementById('roomInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.joinRoom();});

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
</script>
</body>
</html>
