<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARD REALM — オンラインカードゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dim: #7a6430;
    --deep: #0a0a14;
    --panel: #0f1020;
    --panel2: #141428;
    --red: #c0392b;
    --blue: #2471a3;
    --yellow: #d4ac0d;
    --green: #1e8449;
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --border: rgba(201,168,76,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-stars {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(30,40,80,0.8) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(60,20,40,0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(20,50,60,0.5) 0%, transparent 50%);
  }

  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  header {
    text-align: center;
    padding: 4rem 0 2rem;
    position: relative;
  }

  .logo-ornament {
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    color: var(--gold-dim);
    text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
    margin-bottom: 1rem;
  }

  .logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold-light) 40%, var(--gold) 60%, var(--gold-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(201,168,76,0.4));
    line-height: 1.1;
    animation: shimmer 4s ease-in-out infinite;
    background-size: 200% 100%;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .logo-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2.5rem auto;
    max-width: 400px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }

  .divider-gem {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .status-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 3rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2ecc71;
    box-shadow: 0 0 8px #2ecc71;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text { color: var(--text-dim); }
  .status-highlight { color: var(--gold); font-weight: 600; }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .match-panel {
    grid-column: 1 / -1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  .match-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .panel-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .players-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1.5rem;
    align-items: center;
  }

  .player-slot {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
    transition: all 0.3s;
    position: relative;
  }

  .player-slot.filled {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }

  .player-slot.waiting {
    opacity: 0.8;
    border-style: dashed;
  }

  .slot-number {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-bottom: 0.5rem;
  }

  .slot-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    display: block;
  }

  .slot-status {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .vs-badge {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.8rem;
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
  }

  .match-footer {
    margin-top: 1.5rem;
    text-align: center;
  }

  #matchStatus {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }

  .nav-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .nav-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 4px; height: 100%;
    background: var(--accent);
    opacity: 0.5;
  }

  .nav-card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .nav-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
  }

  .nav-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.2rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .nav-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    gap: 0.5rem;
  }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 100%);
    color: var(--deep);
    box-shadow: 0 4px 15px rgba(201,168,76,0.2);
  }

  .btn-gold:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(201,168,76,0.4);
  }

  .btn-gold:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-green {
    background: linear-gradient(135deg, #1e8449 0%, #27ae60 100%);
    color: white;
    width: 100%;
    max-width: 250px;
    animation: btnPulse 2s infinite;
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 4px 15px rgba(39,174,96,0.3); }
    50% { box-shadow: 0 4px 30px rgba(39,174,96,0.6); }
  }

  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--panel2);
    border: 1px solid var(--gold-dim);
    padding: 1rem 2rem;
    border-radius: 50px;
    color: var(--gold-light);
    font-family: 'Rajdhani', sans-serif;
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .players-row { grid-template-columns: 1fr; gap: 1rem; }
    .vs-badge { order: -1; }
  }
</style>
</head>
<body>

<div class="bg-stars" id="bgStars"></div>

<div class="container">
  <header>
    <div class="logo-ornament">Est. 2024 — Digital TCG</div>
    <h1 class="logo">CARD REALM</h1>
    <div class="logo-sub">Multiplayer Battle Arena</div>
    <div class="divider"><div class="divider-gem"></div></div>
  </header>

  <div class="status-bar">
    <div class="status-dot"></div>
    <div class="status-text">Server Status: <span class="status-highlight">ONLINE</span></div>
    <div style="margin-left:auto; color:var(--text-dim)">Realm: Asia-South</div>
  </div>

  <div class="match-panel">
    <div class="panel-title">LIVE MATCH ENTRY</div>
    
    <div class="players-row">
      <div class="player-slot waiting" id="slot1">
        <div class="slot-number">PLAYER 1</div>
        <span class="slot-icon">🛡️</span>
        <div class="slot-status" id="slot1Status">待機中...</div>
        <button class="btn btn-gold" id="btn1" onclick="enterMatch(1)">エントリー</button>
      </div>

      <div class="vs-badge">VS</div>

      <div class="player-slot waiting" id="slot2">
        <div class="slot-number">PLAYER 2</div>
        <span class="slot-icon">⚔️</span>
        <div class="slot-status" id="slot2Status">待機中...</div>
        <button class="btn btn-gold" id="btn2" onclick="enterMatch(2)">エントリー</button>
      </div>
    </div>

    <div class="match-footer">
      <div id="matchStatus">プレイヤーが揃うと試合が開始されます</div>
      <button class="btn btn-green" id="startBtn" style="display:none" onclick="goToGame()">
        ⚔️ 試合開始！
      </button>
    </div>
  </div>

  <div class="main-grid">
    <a href="card.html" class="nav-card" style="--accent: #e74c3c">
      <div class="nav-icon">✨</div>
      <h3 class="nav-title">CARD CREATOR</h3>
      <p class="nav-desc">オリジナルのカードを作成してデッキを構築します。ステータスや特殊効果を自由に設定可能。</p>
    </a>
    
    <div class="nav-card" style="--accent: #3498db; opacity: 0.6; cursor: not-allowed;">
      <div class="nav-icon">📖</div>
      <h3 class="nav-title">COLLECTION</h3>
      <p class="nav-desc">これまでに作成したカードや、獲得した称号を確認できます。（近日公開）</p>
    </div>
  </div>
</div>

<div id="toast">メッセージ</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCXyreqDjZXIWnZqWZShw1yjwubHduqCoc",
    authDomain: "createcardgame-8edbf.firebaseapp.com",
    databaseURL: "https://createcardgame-8edbf-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "createcardgame-8edbf",
    storageBucket: "createcardgame-8edbf.firebasestorage.app",
    messagingSenderId: "173024784980",
    appId: "1:173024784980:web:606d80ee258239d656f3c1",
    measurementId: "G-DDB5KGS7K3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const matchRef = ref(db, 'currentMatch');
  let mySlot = localStorage.getItem('mySlot') ? parseInt(localStorage.getItem('mySlot')) : null;

  onValue(matchRef, (snapshot) => {
    const data = snapshot.val() || {};
    updateUI(data);
  });

  function updateUI(data) {
    const p1 = data.player1;
    const p2 = data.player2;

    const slot1 = document.getElementById('slot1');
    const s1Status = document.getElementById('slot1Status');
    const btn1 = document.getElementById('btn1');
    if (p1) {
      slot1.className = 'player-slot filled';
      s1Status.textContent = '参加済み ✓';
      btn1.disabled = true;
      btn1.textContent = '準備完了';
    } else {
      slot1.className = 'player-slot waiting';
      s1Status.textContent = '待機中...';
      btn1.disabled = mySlot === 2;
      btn1.textContent = 'エントリー';
    }

    const slot2 = document.getElementById('slot2');
    const s2Status = document.getElementById('slot2Status');
    const btn2 = document.getElementById('btn2');
    if (p2) {
      slot2.className = 'player-slot filled';
      s2Status.textContent = '参加済み ✓';
      btn2.disabled = true;
      btn2.textContent = '準備完了';
    } else {
      slot2.className = 'player-slot waiting';
      s2Status.textContent = '待機中...';
      btn2.disabled = mySlot === 1;
      btn2.textContent = 'エントリー';
    }

    const startBtn = document.getElementById('startBtn');
    const matchStatus = document.getElementById('matchStatus');
    if (p1 && p2) {
      startBtn.style.display = 'inline-flex';
      matchStatus.textContent = '全プレイヤーが揃いました！';
    } else {
      startBtn.style.display = 'none';
      matchStatus.textContent = 'プレイヤーが揃うと試合が開始されます';
    }
  }

  window.enterMatch = async function(playerNum) {
    if (mySlot) {
      showToast('既にエントリーしています');
      return;
    }

    try {
      const snap = await get(matchRef);
      const data = snap.val() || {};

      if (data[`player${playerNum}`]) {
        showToast(`プレイヤー${playerNum}は既に参加しています`);
        return;
      }

      await set(ref(db, `currentMatch/player${playerNum}`), {
        joined: true,
        timestamp: serverTimestamp()
      });

      mySlot = playerNum;
      localStorage.setItem('mySlot', playerNum);
      showToast(`プレイヤー${playerNum}としてエントリーしました！`);
    } catch(e) {
      showToast('エントリーに失敗しました: ' + e.message);
    }
  };

  window.goToGame = function() {
    if (!mySlot) { showToast('先にエントリーしてください'); return; }
    localStorage.setItem('mySlot', mySlot);
    window.location.href = 'game.html';
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  window.showToast = showToast;
</script>

<script>
  const bg = document.getElementById('bgStars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      --d: ${2 + Math.random()*4}s;
      --delay: ${Math.random()*5}s;
    `;
    bg.appendChild(s);
  }
</script>
</body>
</html>
