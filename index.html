<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>しんウノ -新世界UNOバトル-</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%230e0e1d'/><rect x='20' y='10' width='60' height='80' rx='8' fill='%23c9a84c' opacity='.9'/><text y='62' x='50' text-anchor='middle' font-size='48' font-family='serif'>🃏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6430;--deep:#0a0a14;--panel:#0f1020;--panel2:#141428;--text:#e8e0d0;--text-dim:#8a8070;--border:rgba(201,168,76,.25);--red:#e74c3c;--blue:#3498db;--green:#2ecc71}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--deep);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden}
.wrap{max-width:860px;margin:0 auto;padding:1rem 1rem 4rem}
header{text-align:center;padding:1.5rem 0 .8rem}
.logo{font-family:'Rajdhani',sans-serif;font-size:clamp(1.4rem,5vw,2.4rem);font-weight:700;color:var(--gold);line-height:1.1}
.logo-sub{font-size:.7rem;letter-spacing:.3em;color:var(--gold-dim);margin-top:.3rem}
.sbar{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:.55rem .9rem;display:flex;align-items:center;gap:.5rem;margin-bottom:.9rem;font-family:'Rajdhani',sans-serif;font-size:.8rem;flex-wrap:wrap}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.shigh{color:var(--gold);font-weight:700}.sdim{color:var(--text-dim)}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.9rem}
.ptitle{font-family:'Rajdhani',sans-serif;font-size:.7rem;letter-spacing:.25em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.8rem;padding-bottom:.38rem;border-bottom:1px solid var(--border)}
.name-row{display:flex;gap:.55rem;align-items:flex-end;margin-bottom:.7rem;flex-wrap:wrap}
.name-row input{flex:1;min-width:150px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:.58rem .85rem;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.name-row input:focus{border-color:var(--gold-dim)}
.name-row input::placeholder{color:var(--text-dim)}
.name-display{font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--gold);padding:.3rem 0}
.cnt-row{display:flex;gap:.45rem;margin-bottom:.9rem}
.cnt-btn{flex:1;padding:.5rem;border-radius:8px;border:2px solid var(--border);background:var(--panel2);color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;text-align:center;touch-action:manipulation}
.cnt-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1)}
.slots-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.65rem;margin-bottom:.8rem}
.pslot{background:var(--panel2);border:2px dashed var(--border);border-radius:10px;padding:.8rem;text-align:center;transition:all .3s}
.pslot.filled{border-style:solid;border-color:var(--green)}
.pslot.mine{border-color:var(--gold)}
.pslot-num{font-family:'Rajdhani',sans-serif;font-size:.6rem;letter-spacing:.2em;color:var(--text-dim);margin-bottom:.3rem}
.pslot-icon{font-size:1.6rem;margin-bottom:.3rem;display:block}
.pslot-name{font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:700;color:var(--gold);min-height:1.2em;margin-bottom:.15rem}
.pslot-st{font-family:'Rajdhani',sans-serif;font-size:.7rem;color:var(--text-dim);margin-bottom:.5rem}
.pslot-st.ok{color:var(--green)}
.mfooter{text-align:center;margin-top:.8rem}
#matchStatus{font-family:'Rajdhani',sans-serif;font-size:.85rem;color:var(--text-dim);margin-bottom:.55rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.32rem;padding:.55rem 1.05rem;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .18s;text-decoration:none;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.95)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--deep);box-shadow:0 3px 12px rgba(201,168,76,.3)}
.btn-green{background:linear-gradient(135deg,#1a6b35,#27ae60);color:#fff;animation:gg 2s ease-in-out infinite}
@keyframes gg{0%,100%{box-shadow:0 3px 12px rgba(39,174,96,.3)}50%{box-shadow:0 3px 25px rgba(39,174,96,.6)}}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold-dim)}
.btn-sm{padding:.35rem .7rem;font-size:.74rem}
.btn-full{width:100%;margin-top:.4rem}
.btn-red-outline{background:transparent;color:var(--red);border:1px solid rgba(231,76,60,.4);font-size:.74rem;padding:.35rem .7rem}
/* Card select */
.csgrid{display:flex;flex-wrap:wrap;gap:.45rem;max-height:200px;overflow-y:auto;padding:.1rem}
.csi{position:relative;cursor:pointer;flex-shrink:0;touch-action:manipulation}
.chk{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--green);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.6rem;color:#fff;z-index:2;font-weight:700}
.csi.sel .chk{display:flex}
.cst-thumb{width:60px;height:84px;border-radius:7px;border:2px solid;background:var(--panel2);display:flex;flex-direction:column;overflow:hidden;transition:transform .15s}
.csi.sel .cst-thumb{transform:scale(1.07)}
.cst-art{flex:1;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(0,0,0,.3);overflow:hidden}
.cst-art img{width:100%;height:100%;object-fit:cover}
.cst-info{padding:2px 3px;background:rgba(0,0,0,.75)}
.cst-name{font-size:.5rem;font-family:'Rajdhani',sans-serif;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.cst-stats{display:flex;justify-content:space-around;font-size:.48rem;font-family:'Rajdhani',sans-serif}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.9rem}
.nc{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;text-decoration:none;color:inherit;display:block;transition:all .25s}
.nc:hover{border-color:var(--acc,var(--gold));transform:translateY(-2px)}
.ni{font-size:1.7rem;margin-bottom:.45rem}
.nt{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.1em;color:var(--acc,var(--gold));text-transform:uppercase;margin-bottom:.22rem}
.nd{font-size:.73rem;color:var(--text-dim);line-height:1.5}
.wait-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;backdrop-filter:blur(6px)}
.wait-spin{width:40px;height:40px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wait-msg{font-family:'Rajdhani',sans-serif;font-size:1rem;letter-spacing:.2em;color:var(--text-dim);text-align:center;padding:0 2rem}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(130px);background:var(--panel);border:1px solid var(--gold);border-radius:8px;padding:.62rem 1.2rem;font-family:'Rajdhani',sans-serif;font-size:.82rem;letter-spacing:.08em;color:var(--gold);z-index:1000;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:500px){.nav-grid{grid-template-columns:1fr}.slots-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="logo">🃏 しんウノ</h1>
    <div class="logo-sub">-新世界UNOバトル-</div>
  </header>
  <div class="sbar">
    <div class="sdot"></div><span class="sdim">Firebase —</span>
    <span class="shigh" id="fbStatus">接続中...</span>
    <span class="sdim" style="margin-left:auto">ロビー:</span>
    <span class="shigh" id="lobbyCount">—</span>
  </div>

  <div class="panel">
    <div class="ptitle">① プレイヤー名を入力</div>
    <div id="nameSetArea">
      <div class="name-row">
        <input type="text" id="nameInput" placeholder="あなたの名前" maxlength="12">
        <button class="btn btn-gold" onclick="confirmName()">決定</button>
      </div>
    </div>
    <div id="nameDoneArea" style="display:none">
      <div class="name-display" id="nameDoneLabel"></div>
      <button class="btn btn-outline btn-sm" onclick="changeName()" style="margin-top:.35rem">名前を変更</button>
    </div>
  </div>

  <div class="panel" id="entryPanel" style="display:none">
    <div class="ptitle">② 参加人数とスロットを選択</div>
    <div class="cnt-row">
      <button class="cnt-btn on" onclick="setPC(2)" id="cnt2">👥 2人</button>
      <button class="cnt-btn"    onclick="setPC(3)" id="cnt3">👥 3人</button>
      <button class="cnt-btn"    onclick="setPC(4)" id="cnt4">👥 4人</button>
    </div>
    <div class="slots-grid" id="slotsGrid"></div>
    <div class="mfooter">
      <div id="matchStatus">スロットを選んでエントリーしてください</div>
      <div style="display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-top:.45rem">
        <button class="btn btn-green" id="startBtn" style="display:none" onclick="startGame()">⚔️ 試合開始！</button>
        <button class="btn btn-red-outline" id="resetLobbyBtn" style="display:none" onclick="resetLobby()">🔄 ロビーリセット</button>
      </div>
    </div>
  </div>

  <!-- カード選択パネル（エントリー後に表示） -->
  <div class="panel" id="cardSelectPanel" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;flex-wrap:wrap;gap:.4rem">
      <div class="ptitle" style="margin:0">③ 使用カードを選択</div>
      <div style="display:flex;gap:.35rem;align-items:center">
        <button class="btn btn-outline btn-sm" onclick="selectAll()">全選択</button>
        <button class="btn btn-outline btn-sm" onclick="deselectAll()">全解除</button>
        <span style="font-family:'Rajdhani',sans-serif;font-size:.75rem;color:var(--gold)" id="selCount">読込中...</span>
      </div>
    </div>
    <div style="font-size:.7rem;color:var(--text-dim);margin-bottom:.55rem">未選択=全カード使用。選択はこのブラウザに保存されます。</div>
    <div class="csgrid" id="cardSelectGrid"></div>
  </div>

  <div class="nav-grid">
    <a href="card.html" class="nc" style="--acc:#e74c3c"><div class="ni">🎨</div><div class="nt">カードを作る</div><div class="nd">カード作成・編集はこちら</div></a>
    <a href="game.html" class="nc" style="--acc:#27ae60"><div class="ni">🎮</div><div class="nt">ゲームへ直接</div><div class="nd">試合ページへ直接移動</div></a>
  </div>
</div>

<div class="wait-overlay" id="waitOverlay">
  <div style="font-family:'Rajdhani',sans-serif;font-size:1.3rem;color:var(--gold)">🃏 しんウノ</div>
  <div class="wait-spin"></div>
  <div class="wait-msg" id="waitMsg">試合を準備中...</div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, get, remove, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const FB={apiKey:"AIzaSyBsASKwkmpRx_vi7JBqC-fvBl3LOgoOtbo",authDomain:"newcard-8fd59.firebaseapp.com",databaseURL:"https://newcard-8fd59-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"newcard-8fd59",storageBucket:"newcard-8fd59.firebasestorage.app",messagingSenderId:"822236707244",appId:"1:822236707244:web:f2a82f612226d7ac3f6209"};
const db=getDatabase(initializeApp(FB));
const lobbyRef=ref(db,'lobby');
const lobbyCtrlRef=ref(db,'lobbyCtrl');
const gameCtrlRef=ref(db,'gameCtrl');
const cardsRef=ref(db,'sharedCards');

const ICONS=['🛡️','⚔️','🔮','🐉'];
const CM={red:{border:'#c0392b',accent:'#e74c3c'},blue:{border:'#2471a3',accent:'#3498db'},yellow:{border:'#d4ac0d',accent:'#f1c40f'},green:{border:'#1e8449',accent:'#2ecc71'}};

let myName=localStorage.getItem('myName')||'';
let mySlot=null;
let maxPlayers=2;
let lobbyData={};
let allCards=[];
let selectedCards=new Set();
let navigating=false; // ページ遷移中フラグ — 二重遷移完全防止

let sessionId=sessionStorage.getItem('sid');
if(!sessionId){sessionId='s'+Date.now()+Math.random().toString(36).slice(2,7);sessionStorage.setItem('sid',sessionId);}

// ══ 安全に game.html へ遷移する関数（必ず一度だけ実行） ══
function goToGame(ctrl){
  if(navigating)return; // すでに遷移中なら何もしない
  navigating=true;

  const slot=mySlot||parseInt(localStorage.getItem('mySlot')||'0');
  if(!slot){navigating=false;return;}

  const activeIds=ctrl?.activeCardIds??null;
  localStorage.setItem('activeCardIds', activeIds?JSON.stringify(activeIds):'all');
  localStorage.setItem('mySlot', String(slot));
  localStorage.setItem('myName', myName||localStorage.getItem('myName')||'');
  localStorage.setItem('maxPlayers', String(ctrl?.maxPlayers||maxPlayers));
  localStorage.setItem('actualPlayers', String(ctrl?.actualPlayers||1));
  localStorage.setItem('playerNames', JSON.stringify(ctrl?.playerNames||{}));

  document.getElementById('waitOverlay').style.display='flex';
  document.getElementById('waitMsg').textContent='試合ページに移動します...';
  setTimeout(()=>{ window.location.href='game.html'; }, 300);
}

// ══ Firebase listeners ══
onValue(ref(db,'.info/connected'),s=>document.getElementById('fbStatus').textContent=s.val()?'接続済み ✓':'オフライン');

// ページ読み込み時に古いlobbyCtrlを削除してからリスナー開始
// これで「前回の startGame データが残っていて即遷移」問題を解消
let lobbyCtrlReady=false;
remove(lobbyCtrlRef).finally(()=>{
  lobbyCtrlReady=true;
  onValue(lobbyCtrlRef,snap=>{
    if(!lobbyCtrlReady)return;
    const ctrl=snap.val();
    if(!ctrl||!ctrl.startGame)return;
    if(navigating)return;
    // 自分がエントリー済みの場合のみ遷移（ホスト以外）
    const slot=mySlot||parseInt(localStorage.getItem('mySlot')||'0');
    if(!slot)return;
    goToGame(ctrl);
  });
});

onValue(lobbyRef,snap=>{
  lobbyData=snap.val()||{};
  if(!mySlot){for(let i=1;i<=4;i++){if(lobbyData[`p${i}`]?.sessionId===sessionId){mySlot=i;break;}}}
  if(mySlot&&!lobbyData[`p${mySlot}`]){mySlot=null;localStorage.removeItem('mySlot');}
  updateLobbyUI();
});

onValue(gameCtrlRef,snap=>{
  const ctrl=snap.val();if(!ctrl)return;
  if(ctrl.action==='home'){
    navigating=false;
    mySlot=null;localStorage.removeItem('mySlot');
    setTimeout(()=>window.location.href='index.html',200);
  }
});

// カード読み込み（カード選択のため）
onValue(cardsRef,snap=>{
  allCards=Object.values(snap.val()||{});
  // localStorageの選択状態を復元
  const saved=localStorage.getItem('activeCardIds');
  if(!saved||saved==='all'){allCards.forEach(c=>selectedCards.add(c.id));}
  else{try{selectedCards=new Set(JSON.parse(saved));}catch(e){allCards.forEach(c=>selectedCards.add(c.id));}}
  renderCardSelect();
});

// ══ Name ══
if(myName)showNameDone();
window.confirmName=function(){
  const n=document.getElementById('nameInput').value.trim();
  if(!n){showToast('名前を入力してください');return;}
  myName=n;localStorage.setItem('myName',n);showNameDone();
};
window.changeName=function(){
  document.getElementById('nameDoneArea').style.display='none';
  document.getElementById('nameSetArea').style.display='block';
  document.getElementById('nameInput').value=myName;
};
function showNameDone(){
  document.getElementById('nameSetArea').style.display='none';
  document.getElementById('nameDoneArea').style.display='block';
  document.getElementById('nameDoneLabel').textContent=`👤 ${myName} としてプレイ`;
  document.getElementById('entryPanel').style.display='block';
}

// ══ Lobby ══
window.setPC=function(n){
  if(mySlot){showToast('エントリー中は変更できません');return;}
  maxPlayers=n;
  [2,3,4].forEach(i=>document.getElementById('cnt'+i).classList.toggle('on',i===n));
  localStorage.setItem('maxPlayers',n);
  buildSlots();
};
function buildSlots(){
  const g=document.getElementById('slotsGrid');g.innerHTML='';
  for(let i=1;i<=maxPlayers;i++){
    const p=lobbyData[`p${i}`],isMe=mySlot===i;
    const d=document.createElement('div');d.className='pslot'+(p?' filled':'')+(isMe?' mine':'');
    d.innerHTML=`<div class="pslot-num">PLAYER ${i}</div><span class="pslot-icon">${ICONS[i-1]||'🃏'}</span><div class="pslot-name">${p?p.name:''}</div><div class="pslot-st ${p?'ok':''}">${p?'参加済み ✓':'待機中...'}</div>${(!p&&myName&&!mySlot)?`<button class="btn btn-gold btn-sm btn-full" onclick="enterMatch(${i})">エントリー</button>`:''}${isMe?`<button class="btn btn-red-outline btn-full" style="margin-top:.35rem" onclick="leaveMatch()">← 離脱</button>`:''}`;
    g.appendChild(d);
  }
}
function updateLobbyUI(){
  buildSlots();
  let filled=0;for(let i=1;i<=maxPlayers;i++)if(lobbyData[`p${i}`])filled++;
  document.getElementById('lobbyCount').textContent=`${filled}/${maxPlayers}人`;
  document.getElementById('startBtn').style.display=(filled>=1&&!!mySlot)?'inline-flex':'none';
  document.getElementById('resetLobbyBtn').style.display=mySlot?'inline-flex':'none';
  document.getElementById('cardSelectPanel').style.display=mySlot?'block':'none';
  if(filled>=2&&mySlot)      {document.getElementById('matchStatus').textContent=`${filled}人参加中！試合を開始できます`;document.getElementById('matchStatus').style.color='#2ecc71';}
  else if(mySlot)             {document.getElementById('matchStatus').textContent='他のプレイヤーを待っています（1人でもテスト可）';document.getElementById('matchStatus').style.color='';}
  else                        {document.getElementById('matchStatus').textContent='スロットを選んでエントリーしてください';document.getElementById('matchStatus').style.color='';}
  if(mySlot)renderCardSelect();
}
window.enterMatch=async function(n){
  if(!myName){showToast('先に名前を入力してください');return;}
  if(mySlot){showToast('すでにエントリー済みです');return;}
  const snap=await get(lobbyRef);const data=snap.val()||{};
  if(data[`p${n}`]){showToast(`P${n}は既に参加済みです`);return;}
  await set(ref(db,`lobby/p${n}`),{name:myName,sessionId,joined:true,ts:serverTimestamp()});
  mySlot=n;localStorage.setItem('mySlot',n);localStorage.setItem('maxPlayers',maxPlayers);
  showToast(`P${n}「${myName}」としてエントリー！`);
};
window.leaveMatch=async function(){
  if(!mySlot)return;
  await remove(ref(db,`lobby/p${mySlot}`));
  mySlot=null;localStorage.removeItem('mySlot');
  showToast('離脱しました');
};
window.resetLobby=async function(){
  if(!confirm('ロビーを全リセットしますか？'))return;
  await remove(lobbyRef);await remove(lobbyCtrlRef);
  mySlot=null;localStorage.removeItem('mySlot');
  showToast('ロビーをリセットしました');
};

// ══ startGame ══
window.startGame=async function(){
  if(!mySlot){showToast('エントリーしてください');return;}
  if(navigating){showToast('すでに遷移中です');return;}

  // 使用カードIDを確定
  const ids=[...selectedCards];
  const activeIds=(ids.length===0||ids.length===allCards.length)?null:ids;

  let cnt=0;for(let i=1;i<=maxPlayers;i++)if(lobbyData[`p${i}`])cnt++;
  const names={};for(let i=1;i<=maxPlayers;i++)if(lobbyData[`p${i}`])names[i]=lobbyData[`p${i}`].name;
  const actualPlayers=Math.max(cnt,1);

  const ctrl={startGame:true,maxPlayers,actualPlayers,playerNames:names,activeCardIds:activeIds,startedAt:Date.now()};

  // Firebaseに通知（他プレイヤー用）
  try{ await set(lobbyCtrlRef,ctrl); }catch(e){ console.warn('lobbyCtrl write failed:',e.message); }

  // 自分はここで直接遷移
  goToGame(ctrl);
};

// ══ Card select ══
function getColors(card){return Array.isArray(card.colors)?card.colors:[card.color||'red'];}
function renderCardSelect(){
  const g=document.getElementById('cardSelectGrid');
  if(!g)return;
  if(!allCards.length){g.innerHTML='<div style="color:var(--text-dim);font-size:.75rem;padding:.5rem">カードがありません（先にカードを作成してください）</div>';document.getElementById('selCount').textContent='0枚';return;}
  g.innerHTML=allCards.map(card=>{
    const sel=selectedCards.has(card.id);
    const c=CM[getColors(card)[0]]||CM.red;
    const ill=card.illust&&(card.illust.startsWith('http')||card.illust.startsWith('data:'))?`<img src="${card.illust}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:(card.illust||'🃏');
    return `<div class="csi${sel?' sel':''}" onclick="toggleCard('${card.id}')"><div class="chk">✓</div><div class="cst-thumb" style="border-color:${c.border};box-shadow:${sel?'0 0 7px '+c.border:'none'}"><div class="cst-art">${ill}</div><div class="cst-info"><div class="cst-stats"><span style="color:${c.accent}">C${card.cost}</span><span>A${card.atk}</span><span>D${card.def}</span></div><div class="cst-name">${card.name}</div></div></div></div>`;
  }).join('');
  const cnt=selectedCards.size;
  document.getElementById('selCount').textContent=cnt===allCards.length?`全${cnt}枚`:`${cnt}/${allCards.length}枚選択`;
  // localStorageに保存
  localStorage.setItem('activeCardIds', cnt===0||cnt===allCards.length ? 'all' : JSON.stringify([...selectedCards]));
}
window.toggleCard=function(id){selectedCards.has(id)?selectedCards.delete(id):selectedCards.add(id);renderCardSelect();};
window.selectAll=function(){allCards.forEach(c=>selectedCards.add(c.id));renderCardSelect();};
window.deselectAll=function(){selectedCards.clear();renderCardSelect();};

function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
