<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARD REALM — 対戦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #f0d080; --gold-dim: #7a6430;
    --deep: #080810; --panel: #0f1020; --panel2: #141428;
    --text: #e8e0d0; --text-dim: #8a8070;
    --border: rgba(201,168,76,0.2);
    --red: #e74c3c; --blue: #3498db; --yellow: #f1c40f; --green: #2ecc71;
    --color-red: #c0392b; --color-blue: #2471a3;
    --color-yellow: #d4ac0d; --color-green: #1e8449;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
  }

  .game-wrapper {
    display: flex; flex-direction: column;
    min-height: 100vh;
    padding: 0.75rem;
    gap: 0.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .hud {
    display: flex; align-items: center;
    gap: 1rem;
    padding: 0.5rem 1rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .hud-back { color: var(--gold-dim); text-decoration: none; font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; }
  .hud-back:hover { color: var(--gold); }

  .hud-title { font-family: 'Cinzel Decorative', serif; font-size: 1rem; color: var(--gold); flex: 1; text-align: center; }

  .hud-turn {
    font-family: 'Rajdhani', sans-serif; font-size: 0.8rem;
    letter-spacing: 0.15em; color: var(--gold);
    background: rgba(201,168,76,0.1); border: 1px solid var(--border);
    border-radius: 4px; padding: 0.25rem 0.75rem;
    text-transform: uppercase;
  }

  .battlefield {
    display: grid;
    grid-template-rows: auto 1fr auto auto 1fr auto;
    gap: 0.5rem;
    flex: 1;
  }

  .player-area {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
  }

  .player-area.active-attack { border-color: var(--gold); box-shadow: 0 0 20px rgba(201,168,76,0.2); }
  .player-area.active-defend { border-color: #3498db; box-shadow: 0 0 20px rgba(52,152,219,0.2); }

  .player-info { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem; }
  .player-name { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; color: var(--gold); text-transform: uppercase; }

  .player-role-badge { font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 3px; font-weight: 700; }
  .role-attack { background: rgba(231,76,60,0.2); color: var(--red); border: 1px solid rgba(231,76,60,0.4); }
  .role-defend { background: rgba(52,152,219,0.2); color: var(--blue); border: 1px solid rgba(52,152,219,0.4); }
  .role-wait   { background: rgba(138,128,112,0.2); color: var(--text-dim); border: 1px solid rgba(138,128,112,0.2); }

  .hp-bar-wrap { flex: 1; }
  .hp-label { font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; display: flex; justify-content: space-between; margin-bottom: 0.2rem; }
  .hp-bar { height: 8px; background: var(--panel2); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .hp-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; background: linear-gradient(90deg, #e74c3c, #f39c12, #2ecc71); }

  .cost-badge { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.6rem; font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; letter-spacing: 0.1em; color: var(--gold); white-space: nowrap; }

  .hand { display: flex; flex-wrap: wrap; gap: 0.4rem; min-height: 70px; }

  .game-card {
    width: 72px; height: 100px;
    border-radius: 6px; border: 1px solid;
    background: var(--panel2);
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }

  .game-card:hover { transform: translateY(-8px) scale(1.05); z-index: 10; }
  .game-card.selected { transform: translateY(-12px) scale(1.08); z-index: 20; }
  .game-card.disabled { opacity: 0.35; cursor: not-allowed; }

  .game-card.back {
    background: repeating-linear-gradient(45deg, var(--panel2) 0, var(--panel2) 3px, rgba(201,168,76,0.05) 3px, rgba(201,168,76,0.05) 6px);
    cursor: default;
  }

  .gc-header { padding: 2px 4px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); flex-shrink: 0; }
  .gc-cost { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.65rem; color: var(--deep); }
  .gc-name { font-size: 0.45rem; color: rgba(255,255,255,0.6); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 42px; }
  .gc-art { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; background: rgba(0,0,0,0.2); }
  .gc-stats { display: flex; justify-content: space-around; padding: 2px; background: rgba(0,0,0,0.5); flex-shrink: 0; }
  .gc-stat { font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; font-weight: 700; }

  .field-row { display: flex; align-items: center; gap: 1rem; padding: 0.5rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; min-height: 120px; }
  .field-label { font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; writing-mode: vertical-rl; flex-shrink: 0; }
  .field-slots { display: flex; gap: 1rem; flex: 1; align-items: center; flex-wrap: wrap; }
  .field-card-wrap { position: relative; }
  .field-card-age { position: absolute; top: -8px; right: -6px; background: rgba(231,76,60,0.9); color: white; font-size: 0.55rem; font-family: 'Rajdhani', sans-serif; font-weight: 700; padding: 1px 4px; border-radius: 3px; z-index: 5; }
  .field-empty { border: 1px dashed rgba(201,168,76,0.15); border-radius: 6px; width: 72px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; opacity: 0.15; }

  .center-zone { display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding: 0.5rem; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 0.5rem 1.1rem; border: none; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .btn-gold { background: linear-gradient(135deg, var(--gold-dim), var(--gold)); color: var(--deep); }
  .btn-blue { background: linear-gradient(135deg, #1a4a6b, #2471a3); color: white; }
  .btn-gold:disabled, .btn-blue:disabled { opacity: 0.3; cursor: not-allowed; }

  .game-log { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; height: 90px; overflow-y: auto; font-size: 0.75rem; line-height: 1.6; }

  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal { background: var(--panel); border: 1px solid var(--gold); border-radius: 16px; padding: 2.5rem; text-align: center; max-width: 420px; width: 90%; }
  .modal-title { font-family: 'Cinzel Decorative', serif; font-size: 2rem; color: var(--gold); margin-bottom: 0.5rem; }

  .card-tooltip { position: fixed; pointer-events: none; z-index: 200; background: rgba(10,10,20,0.95); border: 1px solid var(--gold-dim); border-radius: 8px; padding: 0.75rem; width: 200px; display: none; }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="hud">
    <a href="index.html" class="hud-back">← 撤退</a>
    <div class="hud-title">REALM BATTLE</div>
    <div class="hud-turn" id="turnDisplay">TURN 1</div>
  </div>

  <div class="battlefield">
    <div class="player-area" id="opponentArea">
      <div class="player-info">
        <div class="player-name">Opponent</div>
        <div class="player-role-badge role-wait" id="opponentRoleBadge">WAIT</div>
        <div class="hp-bar-wrap">
          <div class="hp-label"><span>HP</span> <span id="oppHpText">20/20</span></div>
          <div class="hp-bar"><div class="hp-fill" id="oppHpFill" style="width:100%"></div></div>
        </div>
        <div class="cost-badge">CP: <span id="oppCostText">0</span></div>
      </div>
      <div class="hand" id="opponentHand"></div>
    </div>

    <div class="field-row">
      <div class="field-label">OPP FIELD</div>
      <div class="field-slots" id="opponentField"></div>
    </div>

    <div class="center-zone">
      <button class="btn btn-gold" id="playBtn" onclick="playSelectedCard()" disabled>カードを出す</button>
      <button class="btn btn-blue" id="endTurnBtn" onclick="endTurn()" disabled>行動終了</button>
    </div>

    <div class="field-row">
      <div class="field-label">MY FIELD</div>
      <div class="field-slots" id="myField"></div>
    </div>

    <div class="player-area" id="myArea">
      <div class="player-info">
        <div class="player-name">You (Player <span id="myPlayerNum">-</span>)</div>
        <div class="player-role-badge role-wait" id="myRoleBadge">WAIT</div>
        <div class="hp-bar-wrap">
          <div class="hp-label"><span>HP</span> <span id="myHpText">20/20</span></div>
          <div class="hp-bar"><div class="hp-fill" id="myHpFill" style="width:100%"></div></div>
        </div>
        <div class="cost-badge">CP: <span id="myCostText">0</span></div>
      </div>
      <div class="hand" id="myHand"></div>
    </div>

    <div class="game-log" id="gameLog"></div>
  </div>
</div>

<div class="modal-overlay" id="resultModal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="resultTitle">VICTORY</div>
    <div class="modal-actions"><button class="btn btn-gold" onclick="rematch()">もう一度</button></div>
  </div>
</div>

<div class="card-tooltip" id="cardTooltip">
  <div id="ttName" style="color:var(--gold);font-weight:700"></div>
  <div id="ttStats" style="font-size:0.8rem"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCXyreqDjZXIWnZqWZShw1yjwubHduqCoc",
    authDomain: "createcardgame-8edbf.firebaseapp.com",
    databaseURL: "https://createcardgame-8edbf-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "createcardgame-8edbf",
    storageBucket: "createcardgame-8edbf.firebasestorage.app",
    messagingSenderId: "173024784980",
    appId: "1:173024784980:web:606d80ee258239d656f3c1",
    measurementId: "G-DDB5KGS7K3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const matchRef = ref(db, 'gameState');

  let mySlot = parseInt(localStorage.getItem('mySlot')) || 1;
  document.getElementById('myPlayerNum').textContent = mySlot;

  let G = {};
  let selectedIdx = -1;

  async function init() {
    const snap = await get(matchRef);
    if (!snap.exists() && mySlot === 1) {
      await set(matchRef, {
        turn: 1, activePlayer: 1, phase: 'attack',
        players: { 1: { hp: 20, cost: 3, hand: gen(5) }, 2: { hp: 20, cost: 3, hand: gen(5) } },
        field: { 1: [], 2: [] }, log: ['対戦開始！'], playedThisTurn: false
      });
    }
  }
  init();

  onValue(matchRef, snap => { if(snap.val()) { G = snap.val(); render(); } });

  function render() {
    const oppSlot = mySlot === 1 ? 2 : 1;
    const me = G.players[mySlot], opp = G.players[oppSlot];
    
    document.getElementById('turnDisplay').textContent = `TURN ${G.turn}`;
    updateHP('my', me.hp); updateHP('opp', opp.hp);
    document.getElementById('myCostText').textContent = me.cost;
    document.getElementById('oppCostText').textContent = opp.cost;

    const myTurn = G.activePlayer === mySlot;
    document.getElementById('playBtn').disabled = !myTurn || G.playedThisTurn || selectedIdx === -1;
    document.getElementById('endTurnBtn').disabled = !myTurn || !G.playedThisTurn;

    renderHand('myHand', me.hand, true); renderHand('opponentHand', opp.hand, false);
    renderField(G.field[mySlot], 'myField'); renderField(G.field[oppSlot], 'opponentField');
    document.getElementById('gameLog').innerHTML = G.log.slice(-10).reverse().map(l=>`<div>${l}</div>`).join('');

    if(me.hp <= 0 || opp.hp <= 0) showResult(opp.hp <= 0);
  }

  function updateHP(p, hp) {
    document.getElementById(`${p}HpText`).textContent = `${hp}/20`;
    document.getElementById(`${p}HpFill`).style.width = `${(hp/20)*100}%`;
  }

  function renderHand(id, cards, isMe) {
    const el = document.getElementById(id);
    if(!isMe) { el.innerHTML = Array(cards.length).fill('<div class="game-card back"></div>').join(''); return; }
    el.innerHTML = cards.map((c, i) => `
      <div class="game-card ${selectedIdx===i?'selected':''}" onclick="sel(${i})" style="border-color:${c.color}">
        <div class="gc-header"><div class="gc-cost" style="background:${c.color}">${c.cost}</div></div>
        <div class="gc-art">${c.illust}</div>
        <div class="gc-stats"><span style="color:#e74c3c">${c.atk}</span><span style="color:#3498db">${c.def}</span></div>
      </div>`).join('');
  }

  function renderField(cards, id) {
    const el = document.getElementById(id);
    el.innerHTML = (cards || []).map(c => `
      <div class="field-card-wrap">
        <div class="game-card" style="border-color:${c.color}">
          <div class="gc-art">${c.illust}</div>
          <div class="gc-stats"><span>${c.atk}</span><span>${c.def}</span></div>
        </div>
      </div>`).join('') || '<div class="field-empty"></div>';
  }

  window.sel = i => { if(G.activePlayer===mySlot && !G.playedThisTurn) { selectedIdx=i; render(); } };

  window.playSelectedCard = async () => {
    const S = JSON.parse(JSON.stringify(G));
    const card = S.players[mySlot].hand.splice(selectedIdx, 1)[0];
    S.players[mySlot].cost -= card.cost;
    S.field[mySlot].push({...card, age:0});
    S.playedThisTurn = true;
    if(S.phase === 'defend') {
      const oppField = S.field[mySlot===1?2:1];
      const atkC = oppField[oppField.length-1];
      const dmg = Math.max(0, atkC.atk - card.def);
      S.players[mySlot].hp -= dmg;
      S.log.push(`${card.name}で防御！ ${dmg}ダメージ`);
    } else S.log.push(`${card.name}で攻撃！`);
    selectedIdx = -1; await set(matchRef, S);
  };

  window.endTurn = async () => {
    const S = JSON.parse(JSON.stringify(G));
    if(S.phase === 'attack') { S.phase = 'defend'; S.activePlayer = (mySlot===1?2:1); }
    else {
      S.turn++; S.phase = 'attack'; S.activePlayer = (S.turn%2===0?2:1);
      [1,2].forEach(p => { S.players[p].cost = S.turn+2; if(S.players[p].hand.length<7) S.players[p].hand.push(...gen(1)); });
    }
    S.playedThisTurn = false; await set(matchRef, S);
  };

  function gen(n) {
    const colors = ['#c0392b', '#2471a3', '#d4ac0d', '#1e8449'];
    return Array(n).fill(0).map(()=>({
      name:'Card', cost:Math.floor(Math.random()*3)+1, atk:Math.floor(Math.random()*5)+1, def:Math.floor(Math.random()*5)+1,
      color:colors[Math.floor(Math.random()*4)], illust:'⚔️'
    }));
  }

  function showResult(win) {
    document.getElementById('resultModal').style.display = 'flex';
    document.getElementById('resultTitle').textContent = win ? 'VICTORY' : 'DEFEAT';
  }
  window.rematch = async () => { if(mySlot===1) await remove(matchRef); location.reload(); };
</script>
</body>
</html>
